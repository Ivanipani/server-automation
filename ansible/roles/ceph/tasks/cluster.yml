---
# Build the Ceph data plane on top of the bootstrapped cluster: OSDs
# (per node) and the `vms` RBD pool used for Proxmox guest disks.
# Played in parallel on baremetal; pool tasks carry `run_once: true`.

# ─────────────────────────── OSD per node ──────────────────────
- name: Resolve the underlying device path for the ceph-osd partition
  ansible.builtin.command: "readlink -f /dev/disk/by-partlabel/{{ ceph_osd_partition_label }}"
  register: ceph_osd_devpath
  changed_when: false

- name: Check whether the ceph-osd partition is already an OSD
  ansible.builtin.command: "ceph-volume lvm list {{ ceph_osd_devpath.stdout.strip() }}"
  register: cv_list
  changed_when: false
  failed_when: false

- name: Create BlueStore OSD on the ceph-osd partition (data + DB + WAL colocated)
  ansible.builtin.command: >-
    pveceph osd create {{ ceph_osd_devpath.stdout.strip() }}
  changed_when: true
  when: >
    cv_list.rc != 0 or
    (cv_list.stdout | length == 0) or
    'osd id' not in cv_list.stdout

- name: Apply osd_memory_target tuning (single-disk-on-everything mitigation)
  ansible.builtin.command: >-
    ceph config set osd osd_memory_target {{ ceph_osd_memory_target }}
  changed_when: true
  run_once: true

# Recovery throttle: keep backfill from saturating the single shared
# 1GbE link every time a node/OSD rejoins. Idempotent — only writes
# when the running profile differs from the desired one.
- name: Read current osd_mclock_profile
  ansible.builtin.command: ceph config get osd osd_mclock_profile
  register: ceph_mclock_profile_cur
  changed_when: false
  run_once: true

- name: Set osd_mclock_profile (deprioritize recovery vs client IO)
  ansible.builtin.command: >-
    ceph config set osd osd_mclock_profile {{ ceph_osd_mclock_profile }}
  changed_when: true
  run_once: true
  when: ceph_mclock_profile_cur.stdout | trim != ceph_osd_mclock_profile

# Raise the PG-per-OSD ceiling. The default (250) is sized for clusters
# with many OSDs; with only 3 OSDs the pg_autoscaler grows the `vms`
# pool past the cap and `osd pool create` for kube-rbd is then rejected
# by the mon (pveceph swallows the error and exits 0, so the pool just
# silently never appears). Must be set before any pool creation below.
# Idempotent — only writes when the value differs.
- name: Read current mon_max_pg_per_osd
  ansible.builtin.command: ceph config get mon mon_max_pg_per_osd
  register: ceph_max_pg_cur
  changed_when: false
  run_once: true

- name: Set mon_max_pg_per_osd (3-OSD cluster headroom for the pg_autoscaler)
  ansible.builtin.command: >-
    ceph config set mon mon_max_pg_per_osd {{ ceph_mon_max_pg_per_osd }}
  changed_when: true
  run_once: true
  when: ceph_max_pg_cur.stdout | trim != ceph_mon_max_pg_per_osd | string

- name: Wait for all OSDs to be up + in
  ansible.builtin.command: ceph osd tree -f json
  register: osd_tree
  retries: 30
  delay: 2
  until: >
    osd_tree.rc == 0 and
    ((osd_tree.stdout | from_json).nodes
     | selectattr('type', 'equalto', 'osd')
     | selectattr('status', 'equalto', 'up')
     | list | length) >= (groups['baremetal'] | length)
  changed_when: false
  run_once: true

# ─────────────────────────── RBD pool: vms (run-once) ──────────
- name: Read current pool list
  ansible.builtin.command: ceph osd pool ls
  register: ceph_pools
  changed_when: false
  run_once: true

- name: Create RBD pool for Proxmox VMs (auto-registers as PVE storage)
  ansible.builtin.command: >-
    pveceph pool create {{ ceph_pool_vms.name }}
    --size 3
    --min_size 2
    --pg_num {{ ceph_pool_vms.pg_num }}
    --pg_autoscale_mode on
    --target_size_ratio {{ ceph_pool_vms.target_size_ratio }}
    {% if ceph_pool_vms.add_storages %}--add_storages{% endif %}
  changed_when: true
  run_once: true
  when: ceph_pool_vms.name not in ceph_pools.stdout_lines

- name: Initialize RBD application metadata on the vms pool
  ansible.builtin.command: "rbd pool init {{ ceph_pool_vms.name }}"
  register: rbd_init_vms
  changed_when: false                         # idempotent; re-runs are no-ops
  run_once: true
  # `pveceph pool create` returns before the pool is openable, so a
  # first-run `rbd pool init` can race and hit ENOENT. Retry until the
  # pool is ready (no-op once initialized).
  retries: 15
  delay: 4
  until: rbd_init_vms.rc == 0

- name: Allow LXC rootdir on the vms RBD storage (PVE default is images only)
  ansible.builtin.command: >-
    pvesm set {{ ceph_pool_vms.name }} --content images,rootdir
  changed_when: true                          # pvesm set is idempotent at config-file level
  run_once: true

# ─────────────────────── RBD pool: kube-rbd (run-once) ─────────
- name: Create RBD pool for Kubernetes (ceph-csi)
  ansible.builtin.command: >-
    pveceph pool create {{ ceph_pool_kube_rbd.name }}
    --size 3
    --min_size 2
    --pg_num {{ ceph_pool_kube_rbd.pg_num }}
    --pg_autoscale_mode on
    --target_size_ratio {{ ceph_pool_kube_rbd.target_size_ratio }}
  changed_when: true
  run_once: true
  when: ceph_pool_kube_rbd.name not in ceph_pools.stdout_lines

- name: Initialize RBD application metadata on the kube-rbd pool
  ansible.builtin.command: "rbd pool init {{ ceph_pool_kube_rbd.name }}"
  register: rbd_init_kube
  changed_when: false                         # idempotent; re-runs are no-ops
  run_once: true
  # See note on the vms pool: tolerate the post-create readiness race.
  retries: 15
  delay: 4
  until: rbd_init_kube.rc == 0

- name: Storage bootstrap complete — next steps
  ansible.builtin.debug:
    msg: |
      Ceph cluster ready.
        - PVE storage: {{ ceph_pool_vms.name }} (RBD) registered for VM disks.
        - K8s storage: {{ ceph_pool_kube_rbd.name }} (RBD) ready for ceph-csi.
        - RGW (S3) endpoint: http://{{ inventory_hostname_short }}:{{ ceph_rgw_port }}/
  run_once: true
