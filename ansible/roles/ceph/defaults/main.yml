---
# Ceph cluster configuration for the poochella 3-node Proxmox cluster.
# Disk partitioning is OWNED BY the `host-disks` role; this role
# only consumes the `ceph-osd` GPT partition it produces.
#
# Owns the Ceph data plane end-to-end: OSDs, the `vms` RBD pool
# (PVE-facing), the `kube-rbd` RBD pool + `client.kubernetes` user
# (consumed by `roles/ceph-csi`), and the RGW S3 endpoint. The
# k8s-side Helm install lives in `roles/ceph-csi`.

ceph_release: squid
ceph_public_network: 10.1.1.0/24

# `ceph_osd_partition_label` is defined in group_vars/baremetal.yml so
# it stays in sync with the `host_disks_partitions` list consumed
# by the host-disks role.

# ── Pool: VM block storage ─────────────────────────────────────────────
ceph_pool_vms:
  name: vms
  pg_num: 32
  target_size_ratio: 0.6
  add_storages: true                          # registers as PVE RBD storage

# ── Pool: Kubernetes (ceph-csi RBD) ────────────────────────────────────
# No `add_storages` — this pool is for ceph-csi, NOT PVE.
ceph_pool_kube_rbd:
  name: kube-rbd
  pg_num: 32
  target_size_ratio: 0.2

# Scoped ceph user that ceph-csi binds to (caps: rbd profile on kube-rbd).
ceph_csi_user: kubernetes

# ── RGW (S3 object storage) ────────────────────────────────────────────
ceph_rgw_name: poochella
ceph_rgw_port: 7480

# ── Single-disk-on-everything mitigations ─────────────────────────────
ceph_osd_memory_target: 2147483648            # 2 GiB (default 4 GiB pressures small hosts)

# PG-per-OSD ceiling. Default 250 assumes many OSDs; with only 3 OSDs
# the pg_autoscaler grows `vms` past it and silently blocks creating
# further pools (kube-rbd). 500 gives the autoscaler headroom on a tiny
# cluster; the real fix is more OSDs. Memory cost of more PGs/OSD is
# offset by the osd_memory_target tuning above.
ceph_mon_max_pg_per_osd: 500

# Squid uses the mclock scheduler. `high_client_ops` deprioritizes
# background work (recovery/backfill/scrub) in favour of client IO, so a
# node rejoining (or an OSD coming back after a peer node's crash/reboot)
# does not saturate the single shared 1GbE link and drag the healthy
# nodes into token-timeout territory. Recovery still completes, just
# without starving everything else. Profiles: balanced (default),
# high_client_ops, high_recovery_ops.
ceph_osd_mclock_profile: high_client_ops

# ── ceph-osd@.service restart hardening ───────────────────────────────
# A transient mon-unreachable window at OSD start (1GbE contention, or a
# peer node in a reboot loop) must not permanently kill the OSD. With
# the stock start-limit, osd.2 on pve-home-01 burned its restarts in
# ~15 min and stayed down ~2 days (2026-05-15). 0 disables the
# start-rate limiter (retry forever); RestartSec backs off between
# attempts so a genuinely dead OSD loops slowly, not hot.
ceph_osd_start_limit_interval_sec: 0
ceph_osd_restart_sec: 60
