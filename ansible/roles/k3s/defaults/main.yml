---
# k3s version to install (passed to the installer via INSTALL_K3S_VERSION).
k3s_version: "v1.31.4+k3s1"

# Upstream installer. Pinned URL so air-gapped overrides are easy.
k3s_install_script_url: "https://get.k3s.io"
k3s_install_script_path: /usr/local/bin/k3s-install.sh

# Stable DNS name in front of the apiserver, resolved out-of-band (e.g.
# by OPNsense Unbound for poochella; see playbooks/poochella/infra/
# 10-router/30-unbound.yml). When set it is used as the joiner --server
# URL, the rewritten kubeconfig `server:` URL, and an extra TLS SAN on
# the apiserver cert. Empty (default) keeps the role VIP/IP-only.
k3s_api_dns_name: ""

# Endpoint joiners (CPs and agents) use to reach the cluster. Preference
# order: DNS name → kube-vip VIP → first CP's ansible_host. Joining via
# the DNS name keeps joiner configs survivable across VIP renumbers.
k3s_api_endpoint: >-
  https://{{ k3s_api_dns_name
             if k3s_api_dns_name
             else (k3s_kube_vip_address
                   if (k3s_kube_vip_enabled and k3s_kube_vip_address)
                   else hostvars[groups['kube_control_plane'][0]].ansible_host) }}:6443


# Shared cluster join token. MUST be overridden via group_vars + vault.
k3s_cluster_token: ""

# Extra TLS SANs to add to the server cert. The node's own inventory name
# and ansible_host are appended automatically at run time. The kube-vip
# address and the API DNS name are also appended automatically when set.
k3s_tls_sans: []

# Bundled components to disable (e.g. ['traefik', 'servicelb']). Empty
# default keeps the k3s defaults (Traefik enabled).
k3s_disable_components: []

# Extra `--node-label key=value` entries stamped onto the kubelet at
# registration. The role is generic; poochella drives this from
# inventory in group_vars/{kubernetes,kube_workers}.yml to map each k8s
# node onto its PHYSICAL Proxmox node (topology.kubernetes.io/zone =
# vm.proxmox_node) so Longhorn replica anti-affinity tracks the real
# failure domain, not the VM. CAVEAT: k3s applies --node-label only at
# FIRST registration — an already-joined node is not relabelled by a
# re-run; relabel it once by hand:
#   kubectl label node <n> topology.kubernetes.io/zone=<proxmox_node> --overwrite
k3s_node_labels: []

# kubeconfig file mode on control planes. 0644 makes it readable by the
# `ansible` user without sudo, which is convenient for fetch-back patterns.
k3s_kubeconfig_mode: "0644"

# kube-vip — a floating L2 (ARP) VIP across the control planes, used as a
# stable apiserver endpoint for `kubectl` and for joiners. Disabled by
# default; flip on in group_vars/kubernetes.yml and set the address.
k3s_kube_vip_enabled: false
k3s_kube_vip_version: "v0.8.7"
k3s_kube_vip_address: ""                # e.g. "10.1.1.50"
k3s_kube_vip_interface: ""              # blank → auto-detect via ansible_default_ipv4
k3s_kube_vip_rbac_url: "https://kube-vip.io/manifests/rbac.yaml"

# Local destination for the rewritten kubeconfig. Empty → fetch step is a
# no-op. Set to e.g. "{{ playbook_dir }}/../../../../kubeconfig" (repo
# root from infra/40-guests) or "~/.kube/config-poochella" to enable.
k3s_kubeconfig_local_path: ""

# Identifier used for cluster/context/user names in the rewritten kubeconfig
# fetched to the controller. k3s itself hard-codes "default" in the on-server
# /etc/rancher/k3s/k3s.yaml; this only affects the local copy written to
# k3s_kubeconfig_local_path.
k3s_cluster_name: "default"

# DESTRUCTIVE OPT-IN: when the cluster-CA gate at the top of
# 40-kube/20-k3s.yml detects an agent whose cached server-ca.crt fingerprint
# does NOT match the first CP's current server CA (typical cause: the CP
# was --cluster-init'd again while the agent kept its old cache), the
# default behaviour is FAIL-FAST with a remediation hint. Pass
# `-e k3s_reset_stale_agents=true` at run time to instead wipe each stale
# agent's /var/lib/rancher/k3s/agent + /var/lib/kubelet/pki and restart
# k3s-agent — which forces token-pinned re-bootstrap against the current
# CA. Mirrors the `host_disks_action: overwrite` opt-in pattern: the flag
# IS the consent. Per-host: only hosts the probe flagged as stale are
# touched; healthy agents are left alone.
k3s_reset_stale_agents: false
