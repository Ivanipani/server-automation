---
# Hard gates before any sgdisk write. No auto-recovery on failure.
# Resolves each declared `select:` to EXACTLY ONE device (in
# _resolve_disk.yml), building two facts consumed downstream:
#   hypervisor_disks_resolved  — one entry per PARTITION, in carve order
#   hypervisor_disks_devices   — one entry per unique DISK to act on

- name: Assert opt-in flag is set (refuses to run without explicit confirmation)
  ansible.builtin.assert:
    that:
      - confirm_carve_data_disk | default(false) | bool
    fail_msg: >-
      `confirm_carve_data_disk` is not true on {{ inventory_hostname }}.
      Set it in group_vars/hypervisors.yml or
      host_vars/{{ inventory_hostname }}.yml, then re-run.

- name: Assert this node declares a storage layout
  ansible.builtin.assert:
    that:
      - storage is defined
      - storage.disks is defined
      - storage.disks | length > 0
      - storage.disks | map(attribute='partitions') | map('length') | min > 0
    fail_msg: >-
      No `storage.disks` (with non-empty `partitions`) declared for
      {{ inventory_hostname }} in inventory.yaml. The disk layout is
      declared, not discovered — add a `storage:` block to this host (see
      the inventory.yaml header / hypervisor-disks role defaults).

- name: List existing VMs (qm list)
  ansible.builtin.command: qm list
  register: qm_list
  changed_when: false

- name: List existing containers (pct list)
  ansible.builtin.command: pct list
  register: pct_list
  changed_when: false

# Templates are REGENERABLE — 40-templates.yml (the next tier step)
# destroys + re-bakes them from pinned cloud images — so they must not
# permanently block a re-carve. Real guests carry data and are never
# regenerable: they still HARD REFUSE. `qm list` cannot tell the two
# apart (a stopped real VM looks identical), so classify every listed
# guest by its `template:` config key. The destroy below is an opt-in
# MUTATION, not a gate — deliberately so (carve_destroy_templates).
- name: Extract VMIDs / CTIDs (drop the listing header line)
  ansible.builtin.set_fact:
    _vmids: >-
      {{ qm_list.stdout_lines[1:]
         | map('regex_replace', '^\s*(\d+).*$', '\1')
         | select('match', '^\d+$') | list }}
    _ctids: >-
      {{ pct_list.stdout_lines[1:]
         | map('regex_replace', '^\s*(\d+).*$', '\1')
         | select('match', '^\d+$') | list }}

- name: Read each VM config (template detection)
  ansible.builtin.command: "qm config {{ item }}"
  loop: "{{ _vmids }}"
  register: _vm_cfg
  changed_when: false

- name: Read each container config (template detection)
  ansible.builtin.command: "pct config {{ item }}"
  loop: "{{ _ctids }}"
  register: _ct_cfg
  changed_when: false

- name: Partition listed guests into templates vs real guests
  ansible.builtin.set_fact:
    _tmpl_vmids: "{{ _vm_cfg.results | selectattr('stdout', 'search', '(\n|^)template:') | map(attribute='item') | list }}"
    _real_vmids: "{{ _vm_cfg.results | rejectattr('stdout', 'search', '(\n|^)template:') | map(attribute='item') | list }}"
    _tmpl_ctids: "{{ _ct_cfg.results | selectattr('stdout', 'search', '(\n|^)template:') | map(attribute='item') | list }}"
    _real_ctids: "{{ _ct_cfg.results | rejectattr('stdout', 'search', '(\n|^)template:') | map(attribute='item') | list }}"

- name: Refuse if any real (non-template) VM or container exists
  ansible.builtin.assert:
    that:
      - _real_vmids | length == 0
      - _real_ctids | length == 0
    fail_msg: >-
      Real (non-template) guests exist on {{ inventory_hostname }} —
      VMs {{ _real_vmids }}, containers {{ _real_ctids }}. The
      disk-carving step would risk their data. Refusing to proceed.

- name: Refuse if templates exist and the destroy opt-in is unset
  ansible.builtin.assert:
    that:
      - (_tmpl_vmids | length) + (_tmpl_ctids | length) == 0
        or (carve_destroy_templates | default(false) | bool)
    fail_msg: >-
      Only regenerable templates exist on {{ inventory_hostname }} —
      VMs {{ _tmpl_vmids }}, containers {{ _tmpl_ctids }} — but
      `carve_destroy_templates` is not true. Set it in
      group_vars/hypervisors.yml (or `-e carve_destroy_templates=true`)
      to have preflight `qm/pct destroy --purge` them first;
      40-templates.yml re-bakes them in the next tier step.

- name: "Destroy regenerable VM templates (carve_destroy_templates opt-in)"
  ansible.builtin.command: "qm destroy {{ item }} --purge"
  loop: "{{ _tmpl_vmids }}"
  when: carve_destroy_templates | default(false) | bool
  register: _vm_tmpl_destroy
  changed_when: _vm_tmpl_destroy.rc == 0
  failed_when:
    - _vm_tmpl_destroy.rc != 0
    - "'does not exist' not in _vm_tmpl_destroy.stderr"

- name: "Destroy regenerable CT templates (carve_destroy_templates opt-in)"
  ansible.builtin.command: "pct destroy {{ item }} --purge"
  loop: "{{ _tmpl_ctids }}"
  when: carve_destroy_templates | default(false) | bool
  register: _ct_tmpl_destroy
  changed_when: _ct_tmpl_destroy.rc == 0
  failed_when:
    - _ct_tmpl_destroy.rc != 0
    - "'does not exist' not in _ct_tmpl_destroy.stderr"

- name: Verify PVE LVM root is present (pve VG)
  ansible.builtin.command: vgs --noheadings -o vg_name pve
  register: pve_vg
  changed_when: false
  failed_when: pve_vg.rc != 0 or 'pve' not in pve_vg.stdout

- name: Detect the boot disk (parent of the pve VG's PV)
  ansible.builtin.shell: |
    set -eu
    # Scope to the `pve` VG (asserted present above) — never a bare
    # `pvs | head -1`, which sorts by vg_name and would pick a data-disk
    # PV (e.g. `longhordata` < `pve`) once a prior carve has populated
    # other VGs, misidentifying the data disk AS the boot disk and
    # silently excluding it from selector resolution.
    pv=$(pvs --noheadings -o pv_name -S vg_name=pve | head -1 | awk '{print $1}')
    [ -n "$pv" ] || { echo "no PV found in pve VG" >&2; exit 1; }
    lsblk -dno PKNAME "$pv"
  register: boot_disk_detect
  changed_when: false

- name: Set boot_disk fact
  ansible.builtin.set_fact:
    boot_disk: "{{ boot_disk_detect.stdout.strip() }}"

- name: Assert boot disk was detected
  ansible.builtin.assert:
    that:
      - boot_disk | length > 0
    fail_msg: >-
      Could not detect the PVE boot disk on {{ inventory_hostname }}
      (got '{{ boot_disk }}'). Check `pvs` and `lsblk`.

- name: Reset resolved accumulators
  ansible.builtin.set_fact:
    hypervisor_disks_resolved: []      # one entry per PARTITION (carve order)
    hypervisor_disks_devices: []       # one entry per unique DISK to act on

- name: Resolve and validate each declared disk
  ansible.builtin.include_tasks: _resolve_disk.yml
  loop: "{{ storage.disks }}"
  loop_control:
    loop_var: disk
    label: "{{ disk.select | string }}"

# ── Cross-pool sanity (content-addressed contract) ────────────────────

- name: Assert partition labels are unique on this node
  ansible.builtin.assert:
    that:
      - (hypervisor_disks_resolved | map(attribute='label') | list) ==
        (hypervisor_disks_resolved | map(attribute='label') | unique | list)
    fail_msg: >-
      Duplicate `label` (GPT partlabel) in {{ inventory_hostname }}'s
      storage.disks. Each partlabel must be unique per node (it is the
      GPT label and the idempotency key).

- name: "Assert every partition of one pve_storage shares vg/thinpool/content"
  ansible.builtin.assert:
    that:
      - >-
        hypervisor_disks_resolved
        | selectattr('pve_storage', 'equalto', item)
        | map(attribute='_sig') | unique | length == 1
    fail_msg: >-
      On {{ inventory_hostname }} partitions naming pve_storage '{{ item }}'
      disagree on vg/thinpool/content. Multiple disks may back ONE
      pve_storage (that is how a NVMe + HDD become one larger pool) but
      they must share vg, thinpool and content. (`_sig` =
      "vg|thinpool|content", set in _resolve_disk.yml.)
  loop: "{{ hypervisor_disks_resolved | map(attribute='pve_storage') | unique | list }}"

- name: Assert the frozen PVE storage contract is satisfied
  ansible.builtin.assert:
    that:
      - "'vms' in (hypervisor_disks_resolved | map(attribute='pve_storage') | list)"
      - "'longhorn-data' in (hypervisor_disks_resolved | map(attribute='pve_storage') | list)"
    fail_msg: >-
      {{ inventory_hostname }} would NOT produce both frozen PVE storages
      `vms` and `longhorn-data` (Tofu/templates hardcode them). Convention:
      every baremetal node yields both. Got
      {{ hypervisor_disks_resolved | map(attribute='pve_storage') | unique | list }}.

# ── Advisory sizing guard (NON-fatal by design) ───────────────────────
# data_disk_size is hand-set in inventory and read by Tofu statically;
# replica-2 usable capacity is bounded by the SMALLER node and is a
# Longhorn/Flux concern. A hard assert here would fight deliberate, tight
# homelab sizing on byte-estimate error, so this only WARNS. `just
# disk-plan` prints the authoritative capacity + recommended size.
- name: Estimate longhorn-data raw capacity (GiB, boot reserve removed)
  ansible.builtin.set_fact:
    hypervisor_disks_longhorn_capacity_gib: >-
      {{
        ((hypervisor_disks_devices
          | selectattr('pve_storages', 'contains', 'longhorn-data')
          | map(attribute='capacity_b') | map('int') | sum)
         // 1073741824) | int
      }}

- name: "Advisory: longhorn-data capacity vs pinned workers' data_disk_size"
  ansible.builtin.debug:
    msg: >-
      ADVISORY [{{ inventory_hostname }}]: longhorn-data ≈
      {{ hypervisor_disks_longhorn_capacity_gib }} GiB raw, backed by
      {{ hypervisor_disks_devices
         | selectattr('pve_storages', 'contains', 'longhorn-data')
         | map(attribute='device') | list }}.
      VM(s) pinned here with a data disk: {{ _pinned }}. Confirm each
      data_disk_size fits the THIN pool (it is overcommittable — `just
      disk-plan` gives the exact figure). Replica-2 usable size is bounded
      by the smaller node and is set Flux-side, not here.
  vars:
    _pinned: >-
      {{ groups['all'] | map('extract', hostvars)
         | selectattr('vm', 'defined')
         | selectattr('vm.proxmox_node', 'defined')
         | selectattr('vm.proxmox_node', 'equalto', inventory_hostname)
         | selectattr('vm.data_disk_size', 'defined')
         | map(attribute='inventory_hostname') | list }}
  when: _pinned | length > 0
