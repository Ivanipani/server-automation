---
# User policy applied to every baremetal Linux host. Composed from two
# sources:
#
#   1. image_baseline_users (group_vars/all/image-baseline.yml) — the
#      canonical pre-bake users (ansible, tourmanager) that EVERY host
#      gets, including VMs/LXCs/PVE installs that the bake-time
#      baseline script already created. Re-running create-user against
#      a baked host is a no-op because the on-disk state already
#      matches.
#
#   2. host_base_extra_users — the operator-only accounts that should
#      ONLY exist on physical hosts (added on top, not pre-baked).
#      Today: pani.
#
# Override either list per-group / per-host by setting the same var in
# group_vars/<group>.yml or host_vars/<host>.yml.

host_base_extra_users:
  - name: pani
    groups: [sudo, promoter, talent, docker]
    shell: /usr/bin/zsh
    ssh_key: "{{ ansible_user_ssh_public_key }}"
    password: "{{ pani_user_pass }}"
    sudoers:
      commands: ALL
      nopassword: true

host_base_users: "{{ image_baseline_users + host_base_extra_users }}"
