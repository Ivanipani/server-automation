---
# Generic baseline for every baremetal Linux host. See meta/main.yml.

# Keep the live hostname == inventory_hostname. Catches drift after an
# inventory rename (e.g. pve-home-02 → worker-home-02 on 2026-05-23):
# next time this role runs, the module writes /etc/hostname + updates
# the kernel hostname so the change persists across reboots.
- name: Enforce hostname == inventory_hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

# Replace any stale 127.0.1.1 entry pointing at the OLD hostname with
# one for the current `inventory_hostname`. Debian sets a 127.0.1.1
# alias to the install-time hostname, so without this `sudo hostname`
# warns about an "unable to resolve host" mismatch after the rename.
- name: Ensure /etc/hosts has a 127.0.1.1 line for the current hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1\t{{ inventory_hostname }}"
    state: present

# Disable automatic apt upgrades + apt-daily lock contention BEFORE the
# first apt install below. Masking apt-daily also stops it grabbing the
# dpkg lock mid-play.
- name: Disable automatic apt upgrades + apt-daily lock contention
  ansible.builtin.import_role:
    name: apt-no-auto-upgrades

- name: Install baseline packages (sudo + zsh)
  # zsh is installed eagerly because pani's shell is /usr/bin/zsh — if a
  # worker hasn't yet been through the dev tier, useradd would otherwise
  # fail (or silently fall back to /bin/sh) when create-user runs.
  ansible.builtin.apt:
    name:
      - sudo
      - zsh
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install fwupd + ensure LVFS remote is enabled
  ansible.builtin.import_role:
    name: firmware

- name: Bootstrap host users (ansible, pani, tourmanager)
  ansible.builtin.import_role:
    name: create-user
  vars:
    users: "{{ host_base_users }}"

- name: Set root password from vault
  ansible.builtin.user:
    name: root
    password: "{{ host_root_pass | password_hash('sha512') }}"
    update_password: always
  no_log: true

# proxmox-auto-install-assistant is a small utility from the PVE repo
# that prepares unattended-install ISOs (img/proxmox/). We want it on
# every physical host so any of them can rebuild a fresh-install ISO.
#
# Hypervisors already trust the Proxmox key and get the pve-no-subscription
# repo from the `hypervisor` role (20-hypervisor/10-bootstrap.yml) — and
# crucially the pin below would BLOCK PVE itself from upgrading. So on
# hypervisors we skip the repo/key/pin and just install the package.
- name: Trust Proxmox release GPG key (Debian workers only — PVE hosts already trust it)
  ansible.builtin.get_url:
    url: https://enterprise.proxmox.com/debian/proxmox-release-trixie.gpg
    dest: /etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg
    mode: "0644"
  when: inventory_hostname not in groups.get('hypervisors', [])

- name: Add pve-no-subscription repo (Debian workers only — hypervisors get it from the hypervisor role)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    content: "deb http://download.proxmox.com/debian/pve trixie pve-no-subscription\n"
    mode: "0644"
  when: inventory_hostname not in groups.get('hypervisors', [])

# Pin: deny everything from download.proxmox.com EXCEPT the two packages
# we actually want. Without this, a future `apt upgrade` on a Debian
# worker could pull in pve-kernel / libpve-* / etc. on the back of this
# repo. Skipped on hypervisors because PVE needs the repo unconstrained.
- name: Pin Proxmox origin on Debian workers (allow only proxmox-auto-install-assistant + proxmox-first-boot)
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/proxmox-assistant.pref
    content: |
      Package: *
      Pin: origin download.proxmox.com
      Pin-Priority: -1

      Package: proxmox-auto-install-assistant proxmox-first-boot
      Pin: origin download.proxmox.com
      Pin-Priority: 500
    mode: "0644"
  when: inventory_hostname not in groups.get('hypervisors', [])

- name: Install proxmox-auto-install-assistant + xorriso
  ansible.builtin.apt:
    name:
      - proxmox-auto-install-assistant
      - xorriso
    state: present
    update_cache: true
