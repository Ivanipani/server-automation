---
# Pre-flight: the break-glass user must already exist. If it does not,
# rendering the Match block would lock us out via password while no
# account can use it. host-base creates it; the 17-host tier orders
# host-base before this role.
- name: Assert break-glass user exists
  ansible.builtin.command: id -u {{ ssh_hardening.password_breakglass_user }}
  register: _breakglass_check
  changed_when: false
  failed_when: _breakglass_check.rc != 0
  when: ssh_hardening.password_breakglass_user | length > 0

- name: Ensure sshd_config.d exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Render SSH hardening drop-in
  ansible.builtin.template:
    src: 10-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    mode: "0644"
    owner: root
    group: root
    # `sshd -t` against the would-be config catches a syntactically
    # broken render BEFORE it lands; without this a typo only fires
    # when the handler reloads, by which time the file is already
    # written.
    validate: "sshd -t -f %s"
  notify: reload sshd
