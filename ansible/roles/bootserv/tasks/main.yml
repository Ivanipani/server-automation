---
# Configures bootserv01 (an LXC on pve-home-01) as the fleet's iPXE +
# Debian-netboot home base. Idempotent — re-runs are cheap and only
# touch the files that actually changed.
#
# What gets served:
#   TFTP (port 69, dnsmasq):
#     /srv/tftp/ipxe.efi          chainloaded by UEFI PXE clients
#     /srv/tftp/undionly.kpxe     chainloaded by legacy BIOS PXE clients
#   HTTP (port 80, caddy — installed by the `caddy` role declared as a
#                          dependency in meta/main.yml):
#     /                            (autoindex on, for ops sanity-checks)
#     /boot.ipxe                   the script iPXE clients fetch after chainload
#     /hosts/<host>.ipxe           per-host dispatch (kernel/initrd/preseed URL)
#     /debian-13/{linux,initrd.gz} pinned upstream netboot installer
#     /preseed/<host>.cfg          per-host preseed (LAN-only)
#     /scripts/image-baseline.sh   canonical pre-bake baseline script
#                                  (LAN-only — embeds the tourmanager
#                                  vault password hash); the preseed's
#                                  late_command wgets + execs it
#     /proxmox-pxe/{vmlinuz,        PVE auto-install netboot artifacts
#       initrd.img,<pxe>.iso}      (produced on foundation by
#                                  97-bake-publish-pve-pxe.yml)
#     /proxmox-install.ipxe        shared iPXE that boots the PVE installer
#     /proxmox-answer (LAN-only)   reverse-proxied to the answer responder,
#                                  which returns the per-host answer.toml
#                                  matched on the installer-POSTed MAC
#
#   The PVE answer files themselves live OUTSIDE the docroot at
#   {{ bootserv_pve_answers_dir }} (never file_server'd); a localhost
#   stdlib-Python service (proxmox-answer-responder) serves them by MAC.
#
# Pre-conditions:
#   - this play targets a fresh Debian 13 LXC with the ansible user + sudo
#   - the LXC has outbound HTTP to ftp.debian.org for the netboot fetch
#   - tourmanager_user_pass + ansible_user_ssh_public_key are set in
#     group_vars (the canonical image-baseline.sh.j2 template reads them
#     from those vars at render time; nothing role-local to assert)

# The Tofu LXC module clones from the Debian 13 template and cannot
# override the template's baked-in hostname at clone time (PVE's
# container-clone API doesn't accept the same init params as create).
# So the hostname is set from inventory here, post-clone, and reconciled
# every run — idempotent.
- name: Set hostname from inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure /etc/hosts maps the hostname to 127.0.1.1
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1 {{ inventory_hostname }}.{{ domain | default('lan') }} {{ inventory_hostname }}"
    state: present

- name: Install dnsmasq, ipxe, python3
  ansible.builtin.apt:
    name:
      - dnsmasq        # TFTP only (port=0 disables its DNS)
      - ipxe           # ships /usr/lib/ipxe/{ipxe.efi,undionly.kpxe}
      - python3        # runtime for the PVE answer responder (stdlib only)
    state: present

- name: Ensure document-root directory tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0755"
  loop: "{{ _bootserv_dirs }}"
  vars:
    _bootserv_dirs: >-
      {{ [bootserv_tftp_root,
          bootserv_http_root,
          bootserv_http_root ~ '/debian-13',
          bootserv_http_root ~ '/hosts',
          bootserv_http_root ~ '/preseed',
          bootserv_http_root ~ '/scripts',
          bootserv_pve_answers_dir]
         + (bootserv_static_dirs | map('regex_replace', '^', bootserv_http_root ~ '/') | list) }}

# --- TFTP: iPXE chainload binaries -----------------------------------
# Copy from the Debian-packaged location to /srv/tftp. Source-of-truth
# is the apt package, so no upstream pinning beyond the apt repo state.
- name: Copy iPXE chainload binaries into TFTP root
  ansible.builtin.copy:
    src: "/usr/lib/ipxe/{{ item }}"
    dest: "{{ bootserv_tftp_root }}/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - ipxe.efi          # UEFI x86_64 chainload
    - undionly.kpxe     # legacy BIOS chainload

# --- HTTP: Debian netboot kernel + initrd ----------------------------
# Cache SHA256SUMS to disk on bootserv01, then `awk` exact-match column
# 2 to extract the kernel + initrd hashes. This used to be a Jinja
# select('search', ...) pipeline; the regex variant was brittle
# (escaping + `$` anchor + lazy-eval interactions returned an empty
# sequence for initrd.gz even though Python re.search matched). awk on
# whole-string column 2 is bulletproof and the saved file doubles as
# a manual debug aid (`cat /srv/http/debian-13/.SHA256SUMS | head`).
- name: Cache upstream Debian SHA256SUMS to disk
  ansible.builtin.get_url:
    url: "{{ bootserv_debian_release_url }}/SHA256SUMS"
    dest: "{{ bootserv_http_root }}/debian-13/.SHA256SUMS"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0644"
    force: true     # always re-fetch — SHA values may bump with mirrors

- name: Extract pinned kernel SHA256 from SHA256SUMS
  ansible.builtin.command:
    cmd: >-
      awk -v p='./{{ bootserv_debian_netboot_subdir }}/linux'
          '$2 == p {print $1; found=1} END {exit found?0:1}'
          {{ bootserv_http_root }}/debian-13/.SHA256SUMS
  register: bootserv_kernel_sha_result
  changed_when: false

- name: Extract pinned initrd SHA256 from SHA256SUMS
  ansible.builtin.command:
    cmd: >-
      awk -v p='./{{ bootserv_debian_netboot_subdir }}/initrd.gz'
          '$2 == p {print $1; found=1} END {exit found?0:1}'
          {{ bootserv_http_root }}/debian-13/.SHA256SUMS
  register: bootserv_initrd_sha_result
  changed_when: false

- name: Set pinned-SHA facts
  ansible.builtin.set_fact:
    bootserv_kernel_sha256: "{{ bootserv_kernel_sha_result.stdout | trim }}"
    bootserv_initrd_sha256: "{{ bootserv_initrd_sha_result.stdout | trim }}"

- name: Fetch Debian netboot kernel
  ansible.builtin.get_url:
    url: "{{ bootserv_debian_release_url }}/{{ bootserv_debian_netboot_subdir }}/linux"
    dest: "{{ bootserv_http_root }}/debian-13/linux"
    checksum: "sha256:{{ bootserv_kernel_sha256 }}"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0644"
    force: false

- name: Fetch Debian netboot initrd
  ansible.builtin.get_url:
    url: "{{ bootserv_debian_release_url }}/{{ bootserv_debian_netboot_subdir }}/initrd.gz"
    dest: "{{ bootserv_http_root }}/debian-13/initrd.gz"
    checksum: "sha256:{{ bootserv_initrd_sha256 }}"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0644"
    force: false

# --- iPXE dispatcher + per-host scripts ------------------------------
# The dispatcher matches on the MAC of the booting NIC and chains to
# the per-host script. A host is "netbootable via this bootserv preseed"
# iff its `storage.disks` carries a `select: boot` entry with an
# `hw: {model, serial}` pin — the resolver + preseed need that pin to
# find the install disk, so its presence IS the netbootable marker.
# Every MAC in `mac_addresses` dispatches to the same per-host script.
- name: Initialize empty netboot host list
  ansible.builtin.set_fact:
    bootserv_netboot_hosts: []

- name: Compute netboot host list (boot-disk hw pin defined)
  ansible.builtin.set_fact:
    bootserv_netboot_hosts: "{{ bootserv_netboot_hosts + [item] }}"
  loop: "{{ groups['all'] }}"
  when:
    - hostvars[item].mac_addresses is defined
    - hostvars[item].storage is defined
    - hostvars[item].storage.disks is defined
    - (hostvars[item].storage.disks
        | selectattr('select', 'eq', 'boot')
        | selectattr('hw', 'defined')
        | list | length) > 0
  loop_control:
    label: "{{ item }}"

# Split the netbootable hosts by role. Hypervisors get the Proxmox VE
# auto-installer (one shared proxmox-install.ipxe + a MAC-matched
# answer.toml); everyone else gets the per-host Debian preseed path.
# This also corrects a latent mismatch: PVE hosts were previously offered
# a Debian preseed by the single dispatch list.
- name: Split netboot hosts into PVE (hypervisors) vs Debian
  ansible.builtin.set_fact:
    bootserv_pve_hosts: "{{ bootserv_netboot_hosts | intersect(groups.get('hypervisors', [])) | list }}"
    bootserv_debian_hosts: "{{ bootserv_netboot_hosts | difference(groups.get('hypervisors', [])) | list }}"

- name: Render the iPXE dispatcher (boot.ipxe)
  ansible.builtin.template:
    src: boot.ipxe.j2
    dest: "{{ bootserv_http_root }}/boot.ipxe"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0644"
  vars:
    pve_hosts: "{{ bootserv_pve_hosts }}"
    debian_hosts: "{{ bootserv_debian_hosts }}"

- name: Render per-host Debian iPXE script
  ansible.builtin.template:
    src: host.ipxe.j2
    dest: "{{ bootserv_http_root }}/hosts/{{ item }}.ipxe"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0644"
  loop: "{{ bootserv_debian_hosts }}"
  loop_control:
    label: "{{ item }}"

- name: Render per-host Debian preseed
  ansible.builtin.template:
    src: preseed.cfg.j2
    dest: "{{ bootserv_http_root }}/preseed/{{ item }}.cfg"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0640"
  loop: "{{ bootserv_debian_hosts }}"
  loop_control:
    label: "{{ item }}"

# Generic pre-netcfg install-NIC resolver. Same idea as the disk
# resolver but BEFORE netcfg instead of partman: fetched + executed by
# the preseed's `preseed/early_command`. Walks /sys/class/net, picks
# the first NIC with carrier, udhcpc's a lease, db_set's
# netcfg/disable_autoconfig=true + every netcfg/get_* so netcfg runs
# in MANUAL mode. This sidesteps netcfg's down/up cycle that breaks
# slow SFP+/DAC PHYs and makes the install port-agnostic — whichever
# NIC the operator cables is the one the install uses. Not per-host
# (the logic is identical); rendered once at /scripts/.
- name: Render generic install-NIC resolver
  ansible.builtin.template:
    src: resolve-install-iface.sh.j2
    dest: "{{ bootserv_http_root }}/scripts/resolve-install-iface.sh"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0644"

# Per-host install-disk resolver. The preseed's `partman/early_command`
# wgets this and `sh`'s it; the resolver walks /sys/block, matches the
# inventory hw pin (model + serial), and debconf-sets partman-auto/disk +
# grub-installer/bootdev. Hosted under /scripts/* so the Caddy site's
# @sensitive ACL keeps it LAN-only (the script contains the host's
# expected disk model + serial — not strictly secrets, but no reason
# to leak them off-LAN either).
- name: Render per-host install-disk resolver (Debian)
  ansible.builtin.template:
    src: resolve-install-disk.sh.j2
    dest: "{{ bootserv_http_root }}/scripts/{{ item }}-resolve-install-disk.sh"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0640"
  loop: "{{ bootserv_debian_hosts }}"
  loop_control:
    label: "{{ item }}"
  vars:
    # Same lookup the preseed template uses, so the rendered script
    # carries the expected model + serial baked in.
    _hw: "{{ (hostvars[item].storage.disks | selectattr('select', 'eq', 'boot') | list | first).hw }}"

# ── Canonical image-baseline.sh -----------------------------------
# Single source of truth applied to every freshly-installed or
# cloned Debian/PVE host (preseed late_command wgets + execs it).
# Same script the VM bake, LXC bake, and PVE first-boot run. See
# group_vars/all/image-baseline.yml + files/image-baseline.sh.j2.
- name: Render canonical image-baseline.sh into bootserv docroot (LAN-only)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../files/image-baseline.sh.j2"
    dest: "{{ bootserv_http_root }}/scripts/image-baseline.sh"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0640"

# PVE first-boot wrapper: installs sudo+zsh (which a fresh PVE base lacks
# but the baseline assumes) BEFORE running image-baseline.sh. The PVE
# answer's [first-boot] from-url points here, not at the bare baseline.
- name: Render PVE first-boot wrapper into bootserv docroot (LAN-only)
  ansible.builtin.template:
    src: pve-first-boot.sh.j2
    dest: "{{ bootserv_http_root }}/scripts/pve-first-boot.sh"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0640"

# ── Proxmox VE auto-install dispatch + answers ───────────────────────
# Hypervisors netboot the PVE auto-installer (artifacts published to
# /proxmox-pxe/ by 13-foundation/97-bake-publish-pve-pxe.yml). One shared
# iPXE script boots them all; per-host config is the answer.toml the
# responder hands back, keyed on the booting NIC's MAC.
- name: Render the shared Proxmox install iPXE script
  ansible.builtin.template:
    src: proxmox-install.ipxe.j2
    dest: "{{ bootserv_http_root }}/proxmox-install.ipxe"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0644"

- name: Render per-host PVE answer.toml (outside docroot — responder-served)
  ansible.builtin.template:
    src: proxmox-answer.toml.j2
    dest: "{{ bootserv_pve_answers_dir }}/{{ item }}.toml"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0640"
  loop: "{{ bootserv_pve_hosts }}"
  loop_control:
    label: "{{ item }}"

# MAC → host index the responder consults. Keys are normalized (lowercase,
# no separators); every NIC MAC of every PVE host maps back to that host.
- name: Initialize PVE answer MAC map
  ansible.builtin.set_fact:
    bootserv_pve_mac_map: {}

- name: Build PVE answer MAC map (every NIC MAC → host)
  ansible.builtin.set_fact:
    bootserv_pve_mac_map: >-
      {{ bootserv_pve_mac_map | combine(dict(
           (hostvars[item].mac_addresses
              | map('lower') | map('regex_replace', '[^0-9a-f]', '') | list)
           | zip([item] * (hostvars[item].mac_addresses | length))
         )) }}
  loop: "{{ bootserv_pve_hosts }}"
  loop_control:
    label: "{{ item }}"

- name: Render PVE answer MAC map
  ansible.builtin.copy:
    content: "{{ bootserv_pve_mac_map | to_nice_json }}\n"
    dest: "{{ bootserv_pve_answers_dir }}/mac-map.json"
    owner: "{{ bootserv_owner }}"
    group: "{{ bootserv_group }}"
    mode: "0640"

- name: Install the PVE answer responder script
  ansible.builtin.template:
    src: proxmox-answer-responder.py.j2
    dest: /usr/local/bin/proxmox-answer-responder
    owner: root
    group: root
    mode: "0755"
  notify: "Restart proxmox-answer-responder"

- name: Install the PVE answer responder systemd unit
  ansible.builtin.template:
    src: proxmox-answer-responder.service.j2
    dest: /etc/systemd/system/proxmox-answer-responder.service
    owner: root
    group: root
    mode: "0644"
  notify: "Restart proxmox-answer-responder"

- name: Ensure the PVE answer responder is enabled and running
  ansible.builtin.systemd:
    name: proxmox-answer-responder
    enabled: true
    state: started
    daemon_reload: true

# --- dnsmasq (TFTP only) ---------------------------------------------
- name: Configure dnsmasq for TFTP-only
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.d/bootserv.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

# Disable the stock /etc/dnsmasq.conf DHCP/DNS server behavior — we
# want only the bootserv.conf snippet active. Editing the main file
# rather than removing the package keeps the daemon happy.
- name: Neutralize the stock dnsmasq.conf
  ansible.builtin.copy:
    content: |
      # Managed by roles/bootserv. Real config in /etc/dnsmasq.d/bootserv.conf.
      conf-dir=/etc/dnsmasq.d,*.conf
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

# --- caddy site config -----------------------------------------------
# Caddy itself (binary, /etc/caddy/Caddyfile, systemd unit) is set up
# by the `caddy` role declared as a dependency in meta/main.yml, which
# runs ahead of this role's tasks. We only drop a site file into
# /etc/caddy/sites-enabled/ and notify the caddy reload handler
# exposed by that role.
- name: Deploy bootserv Caddy site config
  ansible.builtin.template:
    src: bootserv.caddy.j2
    dest: /etc/caddy/sites-enabled/bootserv.caddy
    owner: caddy
    group: caddy
    mode: "0644"
  notify: "reload caddy"

- name: Ensure dnsmasq is enabled and running
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started
