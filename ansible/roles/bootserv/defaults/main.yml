---
# Filesystem roots served by the boot server.
bootserv_tftp_root: /srv/tftp
bootserv_http_root: /srv/http

# Additional subdirectories of bootserv_http_root that bootserv01 hosts.
# Caddy's catch-all `file_server browse` block (templates/bootserv.caddy.j2)
# serves any file under the docroot, so creating the directory is enough
# to publish a new URL prefix. Used by 13-foundation/95-bake-publish-images.yml
# to drop the centrally-baked Debian VM qcow2 + LXC vzdump tarball that
# every hypervisor consumes via 20-hypervisor/40-templates.yml.
bootserv_static_dirs:
  - cloud-images   # virt-customize'd Debian VM qcow2s (+ .sha256 sidecars)
  - lxc-templates  # vzdump'd Debian LXC template tarballs (+ .sha256 sidecars)
  - artifacts      # LAN mirror of pinned upstream blobs (GitHub releases, Go,
                   # uv …) populated by 13-foundation/96-mirror-artifacts.yml.
                   # Subtree mirrors the upstream URL path; NOT under the
                   # @sensitive ACL — carries no secrets, LAN-servable.
  - proxmox-pxe    # PVE auto-install netboot artifacts (vmlinuz + initrd.img
                   # + stripped iso, + .sha256 sidecars) published by
                   # 13-foundation/97-bake-publish-pve-pxe.yml. Open-served
                   # like debian-13 — they carry no secrets (iPXE fetches
                   # them before DNS/answer; the answer.toml is served
                   # separately by the LAN-only responder).

# LAN CIDR allowed to fetch sensitive paths (/preseed/, /scripts/).
# Other paths (/debian-13/, /boot.ipxe, /hosts/) are open to the
# listening interface — those carry no secrets and have to be
# reachable by pre-install initrds that may not have full network
# config yet.
bootserv_lan_cidr: "10.1.1.0/24"

# Upstream Debian 13 netboot kernel + initrd. The role fetches the
# upstream SHA256SUMS at run time and uses the published hashes to verify
# the kernel + initrd downloads (so a tampered mirror trips the get_url
# checksum check). Pin a specific Debian point release by adjusting
# `bootserv_debian_release_url` — `current/` always points at the latest
# point release of trixie; flip it to e.g. `13.1.0/` for reproducibility.
bootserv_debian_release_url: "http://ftp.debian.org/debian/dists/trixie/main/installer-amd64/current/images"
bootserv_debian_netboot_subdir: "netboot/debian-installer/amd64"

# Caddy listen socket on the LXC. Port 80 by convention; the OPNsense
# DNS reservation for `bootserv01.lan` resolves to the LXC's IP. Caddy
# Caddyfile syntax: `:80` binds all interfaces; use e.g. `10.1.1.5:80`
# to bind a single address.
bootserv_http_listen: ":80"

# OS user that owns the document roots. Caddy runs as `caddy:caddy` so
# the doc-root tree is owned by that user. dnsmasq's TFTP runs as
# `dnsmasq` and only needs read on /srv/tftp (mode 0644 / 0755 lets it
# read regardless of owner).
bootserv_owner: caddy
bootserv_group: caddy

# User accounts, SSH keys, sshd hardening, apt-no-auto-upgrades and
# root locking are now ALL handled by the canonical image-baseline.sh
# script (rendered into bootserv01:/srv/http/scripts/ by this role
# and wgot+exec'd in the preseed late_command). The script reads
# tourmanager_user_pass + ~/.ssh/ansible.pub directly via lookup()
# at render time — no role-local indirection needed. See
# group_vars/all/image-baseline.yml.

# Timezone baked into preseeds (and PVE auto-install answer files).
bootserv_timezone: "America/New_York"

# ── Proxmox VE auto-install PXE path ─────────────────────────────────
# Per-host PVE answer.toml files live OUTSIDE the Caddy docroot so the
# catch-all file_server never exposes them; the MAC-matching responder
# (proxmox-answer-responder, a localhost stdlib-Python service) reads
# them and Caddy reverse-proxies /proxmox-answer to it behind the LAN
# ACL. The installer POSTs its sysinfo to that path and gets back the
# answer.toml whose host owns the booting MAC.
bootserv_pve_answers_dir: /srv/proxmox-answers
bootserv_pve_responder_port: 8765
bootserv_pve_answer_path: /proxmox-answer

# Published PVE PXE artifact filenames under /srv/http/proxmox-pxe/.
# MIRROR of the `pve_pxe` manifest in
# playbooks/poochella/infra/vars/templates.yml (the producer reads that;
# this role reads these to render proxmox-install.ipxe). Keep them in
# lockstep when re-pinning the PVE ISO.
bootserv_pve_pxe_kernel_file: vmlinuz
bootserv_pve_pxe_initrd_file: initrd.img
bootserv_pve_pxe_iso_file: proxmox-ve_9.1-1-pxe.iso
