
- name: Remove Proxmox enterprise PVE repo
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/pve-enterprise.sources

- name: Remove Proxmox enterprise Ceph repo
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/ceph.list
    - /etc/apt/sources.list.d/ceph.sources
    - /etc/apt/sources.list.d/ceph-squid.list
    - /etc/apt/sources.list.d/ceph-squid-enterprise.list
    - /etc/apt/sources.list.d/ceph-squid-enterprise.sources

- name: Add Proxmox no-subscription PVE repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    content: "deb http://download.proxmox.com/debian/pve trixie pve-no-subscription\n"
    mode: "0644"

- name: Add Proxmox no-subscription Ceph repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph-no-subscription.list
    content: "deb http://download.proxmox.com/debian/ceph-squid trixie no-subscription\n"
    mode: "0644"

# Disable automatic ("unattended") apt upgrading BEFORE the first apt
# install below. Masking apt-daily also stops it grabbing the dpkg lock
# mid-play — the long-standing lock-contention pain the brute-force block
# that used to live here was fighting. See roles/apt-no-auto-upgrades.
- name: Disable automatic apt upgrades + apt-daily lock contention
  ansible.builtin.import_role:
    name: apt-no-auto-upgrades

- name: Install sudo
  ansible.builtin.apt:
    name: sudo
    state: present
    update_cache: true

- name: Bootstrap ansible user (baremetal)
  import_role:
    name: create-user
  vars:
    users:
      - name: ansible
        groups: [ansible, sudo]
        shell: /bin/bash
        ssh_key: "~/.ssh/ansible.pub"
        password: "{{ ansible_user_pass }}"
        sudoers:
          commands: ALL
          nopassword: true

- name: Set root password from vault
  ansible.builtin.user:
    name: root
    password: "{{ hypervisor_root_pass | password_hash('sha512') }}"
    update_password: always
  no_log: true
