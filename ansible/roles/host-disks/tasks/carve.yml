---
# Two ordered passes over what preflight resolved:
#   1. per-DISK wipe gate  (_wipe_disk.yml)  — foreign-signature refusal
#      or, only when the disk declares `wipe: force`, a deliberate zap.
#      Runs ONCE per disk, before any partition on it is created, and is
#      a no-op on the boot disk and on any disk that already carries one
#      of our partlabels (idempotent / safe re-run).
#   2. per-PARTITION carve (_carve_one.yml)  — create the GPT partition,
#      idempotent on its partlabel, in declared order so multi-partition
#      disks (incl. the boot tail) lay out predictably.
#
# Requires: preflight.yml built host_disks_resolved (partitions)
# and host_disks_devices (disks).

- name: Assert preflight resolved disks and partitions
  ansible.builtin.assert:
    that:
      - host_disks_resolved is defined
      - host_disks_resolved | length > 0
      - host_disks_devices is defined
      - host_disks_devices | length > 0
    fail_msg: >-
      Resolution facts are empty — run preflight.yml first (it validates
      storage.disks and resolves each selector to exactly one device).

- name: "Pass 1 — wipe gate, once per disk"
  ansible.builtin.include_tasks: _wipe_disk.yml
  loop: "{{ host_disks_devices }}"
  loop_control:
    loop_var: wd
    label: "{{ wd.device }} (wipe={{ wd.wipe }}, boot={{ wd.is_boot }})"

- name: "Pass 2 — carve each partition in declared order"
  ansible.builtin.include_tasks: _carve_one.yml
  loop: "{{ host_disks_resolved }}"
  loop_control:
    loop_var: partition
    label: "{{ partition.label }} → {{ partition.device }} ({{ partition.size }})"
