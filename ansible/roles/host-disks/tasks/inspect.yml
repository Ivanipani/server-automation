---
# Read-only PRESENT/MISSING report. For each declared partition, check
# whether its GPT partlabel exists at /dev/disk/by-partlabel/<label>.
# Tolerates absent disks via the `<unmatched>` sentinel that
# _resolve_disk.yml sets in info mode.
#
# Preflight has already run and built `host_disks_resolved` (one entry
# per declared partition). This file only consumes that fact.
#
# Never halts. The point of info mode is to report deviation, not to
# refuse on it.

- name: Probe each declared partlabel
  ansible.builtin.stat:
    path: "/dev/disk/by-partlabel/{{ item.label }}"
  loop: "{{ host_disks_resolved }}"
  loop_control:
    label: "{{ item.label }}"
  register: _partlabel_stat
  changed_when: false
  failed_when: false

- name: Assemble PRESENT/MISSING rows
  ansible.builtin.set_fact:
    host_disks_inspect: >-
      {{ host_disks_inspect | default([]) + [{
           'label': item.item.label,
           'device': item.item.device,
           'vg': item.item.vg | default('-'),
           'thinpool': item.item.thinpool | default('-'),
           'status': (
             'MISSING (disk not found)' if item.item.device == '<unmatched>'
             else ('PRESENT' if item.stat.exists else 'MISSING')
           ),
         }] }}
  loop: "{{ _partlabel_stat.results }}"
  loop_control:
    label: "{{ item.item.label }}"

- name: Format inspection rows as strings
  ansible.builtin.set_fact:
    host_disks_inspect_lines: >-
      {{ host_disks_inspect | map('to_json') | list }}

- name: Report disk-layout compliance (per declared partition)
  ansible.builtin.debug:
    msg: "{{ [inventory_hostname ~ ' host-disks inspect:'] + host_disks_inspect_lines }}"
