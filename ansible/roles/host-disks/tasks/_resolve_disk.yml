---
# Resolve ONE declared disk (`disk`, an entry of storage.disks) to the
# single kernel device its partitions will be carved on, validating that
# reality matches inventory. Appends:
#   - one entry per partition  → host_disks_resolved
#   - one entry for the disk   → host_disks_devices
#
# Read-only (lsblk only). Loop var: `disk`. Upstream fact: `boot_disk`.
#
# The core safety rule: a non-`boot` selector must match EXACTLY ONE
# non-boot, non-removable disk. Zero or many matches → hard failure (we
# never guess, never auto-claim, and the kernel name is never used).
#
# Each partition declares AT MOST ONE of:
#   - `pve_storage` + `content`      → PVE-side: thin pool registered with pvesm
#   - `mount: { path, fstype, ... }` → worker-side: ext4 on a thin LV
#   - neither (bare pool member)     → joins a (vg,thinpool) whose target is
#                                      declared on another partition (the
#                                      multi-disk-one-pool convention:
#                                      NVMe + HDD → one larger longhornthin
#                                      with the mount on exactly one of them)
# Enforced below. label/vg/thinpool/size are required either way; the
# "at least one target per (vg,thinpool)" invariant is asserted in the
# cross-pool consistency pass in preflight.yml.

- name: "[{{ disk.select | string }}] Validate the disk declaration"
  ansible.builtin.assert:
    that:
      - disk.select is defined
      - disk.partitions is defined and disk.partitions | length > 0
      - disk.wipe | default('refuse') in ['refuse', 'force']
      - >-
        disk.select is string
        or (disk.select.exclude_boot | default(true)) | bool
      - disk.partitions | map(attribute='label')        | select('undefined') | list | length == 0
      - disk.partitions | map(attribute='vg')           | select('undefined') | list | length == 0
      - disk.partitions | map(attribute='thinpool')     | select('undefined') | list | length == 0
      - disk.partitions | map(attribute='size')         | select('undefined') | list | length == 0
    fail_msg: >-
      Bad storage.disks entry on {{ inventory_hostname }}:
      {{ disk | to_json }}. Need `select`, a non-empty `partitions` list
      (each with label/vg/thinpool/size, plus AT MOST ONE of
      `pve_storage`+`content` or `mount.{path,fstype}` — bare partitions
      that just declare label/vg/thinpool/size are allowed and join a
      pool whose target is declared on another partition), optional
      `wipe: refuse|force`, and `exclude_boot` may not be false (the OS
      disk is never carved as a data disk).

- name: "[{{ disk.select | string }}] Each partition declares pve_storage, mount, or neither"
  ansible.builtin.assert:
    that:
      # Allowed shapes:
      #   pve_storage + content                  → PVE-registered thin pool
      #   mount.{path,fstype}                    → role-mounted ext4 on a thin LV
      #   neither pve_storage/content nor mount  → bare pool member; another
      #                                            partition with the same
      #                                            (vg,thinpool) carries the
      #                                            target (preflight asserts
      #                                            at least one target exists
      #                                            per pool).
      - (item.pve_storage is defined and item.content is defined and item.mount is not defined)
        or (item.mount is defined and item.mount.path is defined and item.mount.fstype is defined
            and item.pve_storage is not defined and item.content is not defined)
        or (item.pve_storage is not defined and item.content is not defined and item.mount is not defined)
    fail_msg: >-
      Partition {{ item.label | default('?') }} on
      {{ inventory_hostname }} must declare EITHER `pve_storage:` +
      `content:` (PVE-registered thin pool) OR `mount:` (with `path` +
      `fstype`, role-mounted ext4 on a thin LV) OR neither (bare pool
      member — another partition with the same vg+thinpool carries the
      target). Mixing the two on one partition is forbidden. Got:
      {{ item | to_json }}.
  loop: "{{ disk.partitions }}"
  loop_control:
    label: "{{ item.label | default('?') }}"

# ── select: boot — the auto-detected host boot disk ───────────────────

- name: "[boot] Resolve the boot disk"
  when: disk.select is string and disk.select == 'boot'
  ansible.builtin.set_fact:
    _dev: "/dev/{{ boot_disk }}"
    _is_boot: true

# ── select: { model/serial/size_gib/min_size_gib/rotational } ─────────
# Selector match against stable hardware attributes, never the kernel
# name. Excludes the boot disk and removable (USB) media structurally.

- name: "[{{ disk.select | string }}] Resolve the selector to device(s)"
  ansible.builtin.shell: |
    set -eu
    boot="{{ boot_disk }}"
    lsblk -dpno NAME,TYPE | awk '$2=="disk"{print $1}' | while read -r name; do
      base="${name#/dev/}"
      [ "$base" = "$boot" ] && continue
      rm=$(lsblk -dno RM "$name" | tr -d ' ');     [ "$rm" = "1" ] && continue
      rota=$(lsblk -dno ROTA "$name" | tr -d ' ')
      size=$(lsblk -bdno SIZE "$name" | tr -d ' ')
      model=$(lsblk -dno MODEL "$name" | sed -e 's/[[:space:]]\{1,\}$//')
      serial=$(lsblk -dno SERIAL "$name" | tr -d ' ')
      size_gib=$(( size / 1073741824 ))
    {% if disk.select.model is defined %}
      printf '%s' "$model" | grep -qiF -- "{{ disk.select.model }}" || continue
    {% endif %}
    {% if disk.select.serial is defined %}
      [ "$serial" = "{{ disk.select.serial }}" ] || continue
    {% endif %}
    {% if disk.select.rotational is defined %}
      [ "$rota" = "{{ 1 if disk.select.rotational else 0 }}" ] || continue
    {% endif %}
    {% if disk.select.size_gib is defined %}
      lo={{ (disk.select.size_gib * 97) // 100 }}
      hi={{ (disk.select.size_gib * 103) // 100 }}
      { [ "$size_gib" -ge "$lo" ] && [ "$size_gib" -le "$hi" ]; } || continue
    {% endif %}
    {% if disk.select.min_size_gib is defined %}
      [ "$size_gib" -ge "{{ disk.select.min_size_gib }}" ] || continue
    {% endif %}
      echo "$name"
    done
  register: _sel
  changed_when: false
  when: not (disk.select is string and disk.select == 'boot')

- name: "[{{ disk.select | string }}] Assert the selector matched EXACTLY one disk"
  when: not (disk.select is string and disk.select == 'boot')
  ansible.builtin.assert:
    that:
      - _sel.stdout_lines | length == 1
    fail_msg: >-
      Selector {{ disk.select | to_json }} on {{ inventory_hostname }}
      matched {{ _sel.stdout_lines | length }} disk(s):
      {{ _sel.stdout_lines | default([]) }}. It must match EXACTLY one
      non-boot, non-removable disk. Run `just disk-plan` to see every
      disk's model/serial/size and tighten the selector — the role
      refuses to guess.

- name: "[{{ disk.select | string }}] Record the selected device"
  when: not (disk.select is string and disk.select == 'boot')
  ansible.builtin.set_fact:
    _dev: "{{ _sel.stdout_lines[0] | trim }}"
    _is_boot: false

# ── Common: size, wipe policy, accumulate ─────────────────────────────

- name: "[{{ _dev }}] Read the device size in bytes"
  ansible.builtin.command: "lsblk -bdno SIZE {{ _dev }}"
  register: _dev_size
  changed_when: false

- name: "[{{ _dev }}] Compute the effective wipe policy"
  ansible.builtin.set_fact:
    # boot disk is NEVER wiped (boot_tail only appends to its GPT). For a
    # data disk: declared per-disk `wipe`, or 'force' if the fleet-wide
    # emergency override is set this run.
    _wipe: >-
      {{ 'refuse' if _is_boot
         else ('force'
               if (disk.wipe | default('refuse')) == 'force'
                  or (host_disks_force_wipe | default(false) | bool)
               else 'refuse') }}

# Per-partition signature. Targeted partitions (pve_storage OR mount)
# naming the same vg+thinpool must produce the same _sig — i.e. agree on
# what sits on top of that pool. BARE partitions (neither pve_storage
# nor mount) produce a `bare|…` sig that the cross-pool consistency
# check (preflight.yml) filters out before its uniqueness assertion,
# then separately asserts every pool has at least ONE targeted
# partition. Mixed pve_storage+mount on one pool is caught there too.
- name: "[{{ _dev }}] Append this disk's partitions (carve order preserved)"
  ansible.builtin.set_fact:
    host_disks_resolved: >-
      {{ host_disks_resolved + [
           item | combine({
             'device': _dev,
             'is_boot': _is_boot,
             'wipe': _wipe,
             'size': item.size | string,
             '_pool_key': (item.vg ~ '|' ~ item.thinpool),
             '_sig': (
                'pve|' ~ item.vg ~ '|' ~ item.thinpool
                       ~ '|' ~ item.pve_storage ~ '|' ~ item.content
                if item.pve_storage is defined
                else (
                  'mnt|' ~ item.vg ~ '|' ~ item.thinpool
                         ~ '|' ~ item.mount.path
                         ~ '|' ~ item.mount.fstype
                         ~ '|' ~ (item.mount.lv_name | default(item.thinpool ~ '-data'))
                         ~ '|' ~ (item.mount.lv_size | default('100%FREE'))
                  if item.mount is defined
                  else 'bare|' ~ item.vg ~ '|' ~ item.thinpool
                )
             ),
           })
         ] }}
  loop: "{{ disk.partitions }}"
  loop_control:
    label: "{{ item.label }} → {{ _dev }} ({{ item.size }})"

- name: "[{{ _dev }}] Record the disk for the carve-time wipe pass"
  ansible.builtin.set_fact:
    host_disks_devices: >-
      {{ host_disks_devices + [{
           'device': _dev,
           'is_boot': _is_boot,
           'wipe': _wipe,
           'select_label': (disk.select | string),
           'capacity_b': (_dev_size.stdout | trim | int),
           'partlabels': (disk.partitions | map(attribute='label') | list),
           'pve_storages': (disk.partitions
                            | selectattr('pve_storage', 'defined')
                            | map(attribute='pve_storage') | unique | list),
         }] }}
