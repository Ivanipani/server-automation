---
# Build a node-local LVM-thin pool per declared (vg,thinpool). Idempotent.
# Runs on every physical host that declares storage.disks; nodes are
# independent (no shared pmxcfs) so each owns its identically-named
# VG/thinpool. What sits ON TOP of the pool is per-partition:
#   - pve_storage partitions → registered as PVE storage by the PVE-only
#     playbook in 20-hypervisor/ (out of scope here)
#   - mount partitions       → a thin LV, ext4'd and mounted via fstab —
#     handled by the second pass below
#
# Derives purely from inventory `storage.disks` (not preflight facts) so
# this play is self-contained, operating on /dev/disk/by-partlabel/<label>.
# Multiple partitions (on different physical disks) may share one
# vg/thinpool: that VG then spans every such partition's PV and the thin
# pool grows over all of them — this is how a NVMe + HDD present as one
# larger pool (e.g. `longhornthin` on a worker, `longhorn-data` on a
# hypervisor).
#
# Requires: carve.yml has created the by-partlabel devices.

- name: Flatten declared partitions
  ansible.builtin.set_fact:
    _parts: "{{ storage.disks | map(attribute='partitions') | flatten }}"

- name: Resolve each partition's device path
  ansible.builtin.command: "readlink -f /dev/disk/by-partlabel/{{ item.label }}"
  loop: "{{ _parts }}"
  loop_control:
    label: "{{ item.label }}"
  register: _devpaths
  changed_when: false

- name: Map partlabel → resolved device
  ansible.builtin.set_fact:
    _pl_dev: >-
      {{ dict(_devpaths.results | map(attribute='item.label') | list
              | zip(_devpaths.results | map(attribute='stdout') | map('trim') | list)) }}

# Stale-state cleanup: if a previous run left a declared VG in a
# degraded state — typically because a disk that backed the VG was
# removed / repartitioned without first running `vgremove` so the VG
# metadata still references a now-vanished PV — `community.general.lvg`
# below will fail with "Cannot change VG ... while PVs are missing".
# We own these VG names (they're declared in inventory) so a missing-PV
# instance is by definition stale: drop the missing reference (and any
# LV with extents on it — typically a partial thinpool from the aborted
# run; this play recreates it cleanly below). The VG itself is
# preserved along with its real PVs so the idempotent re-run path
# (lvg = no-op when PVs already match) stays fast. Idempotent no-op
# when the VG is absent or has no missing PVs.
- name: Drop stale "missing-PV" references from our declared VGs (idempotent)
  ansible.builtin.shell: |
    set -u
    vg={{ item }}
    missing=$(vgs --noheadings -o vg_missing_pv_count "$vg" 2>/dev/null \
              | awk '{$1=$1;print}' || true)
    if [ -n "${missing:-}" ] && [ "$missing" -gt 0 ]; then
      vgchange -an "$vg" 2>/dev/null || true
      vgreduce --removemissing -f --force "$vg"
    fi
  loop: "{{ _parts | map(attribute='vg') | unique | list }}"
  loop_control:
    label: "{{ item }}"
  register: _vg_clean
  changed_when: (_vg_clean.stdout | default('')) | length > 0

- name: Create / extend the VG across all PVs that back it
  community.general.lvg:
    vg: "{{ item }}"
    pvs: "{{ _parts | selectattr('vg', 'equalto', item) | map(attribute='label') | map('extract', _pl_dev) | list }}"
    state: present
  loop: "{{ _parts | map(attribute='vg') | unique | list }}"
  loop_control:
    label: "{{ item }}"

- name: Inspect each thin pool LV
  ansible.builtin.command: "lvs --noheadings -o lv_name {{ item.vg }}/{{ item.thinpool }}"
  loop: "{{ _parts | unique(attribute='vg') | list }}"
  loop_control:
    label: "{{ item.vg }}/{{ item.thinpool }}"
  register: _thinpool_check
  changed_when: false
  failed_when: false

- name: Create the thin pool LV spanning the whole VG
  ansible.builtin.command: >-
    lvcreate --type thin-pool --name {{ item.0.thinpool }}
    --extents 100%FREE --poolmetadatasize 1G {{ item.0.vg }}
  loop: "{{ (_parts | unique(attribute='vg') | list) | zip(_thinpool_check.results) | list }}"
  loop_control:
    label: "{{ item.0.vg }}/{{ item.0.thinpool }}"
  when: item.1.rc != 0
  changed_when: true

# Capacity bump path: when a bigger/extra disk was added the VG gained
# free extents but the thin pool LV still has the old size. Grow it onto
# the new space. Idempotent: with no free extents lvextend exits rc 5
# and emits a benign no-op message — but WHICH stream varies by LVM
# version (observed: "New size (...) matches existing size." on stdout
# while stderr carries "No size change."). So scan stdout+stderr
# COMBINED for any benign marker; only a real rc!=0 with none of them
# is an error here.
- name: Grow an existing thin pool onto any new free VG space
  ansible.builtin.command: >-
    lvextend --extents +100%FREE {{ item.0.vg }}/{{ item.0.thinpool }}
  loop: "{{ (_parts | unique(attribute='vg') | list) | zip(_thinpool_check.results) | list }}"
  loop_control:
    label: "{{ item.0.vg }}/{{ item.0.thinpool }}"
  when: item.1.rc == 0
  register: _thinpool_grow
  changed_when: "'successfully resized' in (_thinpool_grow.stdout | default(''))"
  failed_when: >-
    _thinpool_grow.rc != 0
    and 'matches existing size' not in ((_thinpool_grow.stdout | default('')) ~ (_thinpool_grow.stderr | default('')))
    and 'up to date' not in ((_thinpool_grow.stdout | default('')) ~ (_thinpool_grow.stderr | default('')))
    and 'No size change' not in ((_thinpool_grow.stdout | default('')) ~ (_thinpool_grow.stderr | default('')))

# ── Pass 3 — mount partitions: thin LV → ext4 → fstab mount ──────────
# Each unique (vg,thinpool) that has any `mount:` partition gets ONE
# thin LV + ONE ext4 + ONE mount. Multiple partitions on the same pool
# (NVMe + HDD → one longhornthin) collapse to one operation since the
# preflight consistency check guarantees they declare the same target.

- name: Pick one representative mount-partition per (vg,thinpool)
  ansible.builtin.set_fact:
    _mounts: >-
      {{ (_parts | selectattr('mount', 'defined') | list)
         | groupby('vg')
         | map(attribute=1) | map('first') | list }}

# `--virtualsize` requires an absolute size (`100G`, `1932735283200B`…);
# lvcreate rejects percentages there ("Can't parse size argument").
# The role's default `lv_size: 100%FREE` is a sentinel meaning "match
# the thin pool's data size" — read the pool size here so the next
# step can resolve the sentinel. Any explicit absolute size in
# `lv_size:` is passed through verbatim and this lookup is unused.
- name: Read each thin pool's data size (for 100%FREE resolution)
  ansible.builtin.command: >-
    lvs --noheadings --units b --nosuffix
    -o lv_size {{ item.vg }}/{{ item.thinpool }}
  loop: "{{ _mounts }}"
  loop_control:
    label: "{{ item.vg }}/{{ item.thinpool }}"
  register: _pool_sizes
  changed_when: false

- name: Create the thin LV for each mount target
  ansible.builtin.command:
    argv:
      - lvcreate
      - --type
      - thin
      - --name
      - "{{ item.0.mount.lv_name | default(item.0.thinpool ~ '-data') }}"
      - --virtualsize
      - "{{ ((item.1.stdout | trim) ~ 'B')
            if (item.0.mount.lv_size | default('100%FREE')) == '100%FREE'
            else item.0.mount.lv_size }}"
      - --thinpool
      - "{{ item.0.vg }}/{{ item.0.thinpool }}"
  loop: "{{ _mounts | zip(_pool_sizes.results) | list }}"
  loop_control:
    label: "{{ item.0.vg }}/{{ item.0.mount.lv_name | default(item.0.thinpool ~ '-data') }}"
  register: _lv_create
  changed_when: _lv_create.rc == 0
  failed_when:
    - _lv_create.rc != 0
    - "'already exists' not in (_lv_create.stderr | default(''))"

- name: ext4 each mount target's thin LV (skips if already formatted)
  community.general.filesystem:
    fstype: "{{ item.mount.fstype }}"
    dev: "/dev/{{ item.vg }}/{{ item.mount.lv_name | default(item.thinpool ~ '-data') }}"
  loop: "{{ _mounts }}"
  loop_control:
    label: "{{ item.vg }}/{{ item.mount.lv_name | default(item.thinpool ~ '-data') }}"

# Use mkdir -p + `creates:` rather than file/state=directory: once the
# LV is mounted, the file module's owner/mode enforcement can hit EROFS
# on re-runs. Same pattern as 17-host/16-nfs-mounts.yml.
- name: Ensure each mount point directory exists
  ansible.builtin.command:
    cmd: "mkdir -p {{ item.mount.path | quote }}"
    creates: "{{ item.mount.path }}"
  loop: "{{ _mounts }}"
  loop_control:
    label: "{{ item.mount.path }}"

- name: Read each mount LV's filesystem UUID
  ansible.builtin.command: >-
    blkid -s UUID -o value
    /dev/{{ item.vg }}/{{ item.mount.lv_name | default(item.thinpool ~ '-data') }}
  loop: "{{ _mounts }}"
  loop_control:
    label: "{{ item.vg }}/{{ item.mount.lv_name | default(item.thinpool ~ '-data') }}"
  register: _mount_uuids
  changed_when: false

- name: Mount each ext4 LV by UUID (idempotent fstab + mount)
  ansible.posix.mount:
    path: "{{ item.0.mount.path }}"
    src: "UUID={{ item.1.stdout | trim }}"
    fstype: "{{ item.0.mount.fstype }}"
    opts: defaults
    state: mounted
  loop: "{{ _mounts | zip(_mount_uuids.results) | list }}"
  loop_control:
    label: "{{ item.0.mount.path }} ← {{ item.0.vg }}/{{ item.0.mount.lv_name | default(item.0.thinpool ~ '-data') }}"
