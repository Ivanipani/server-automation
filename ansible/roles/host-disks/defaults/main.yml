---
# Per-host disk → LVM-thin → (PVE-storage OR ext4-mount) realisation.
# Runs against every baremetal Linux host (`physical` group) — both PVE
# hypervisors and plain Linux workers. The role builds the LVM substrate
# uniformly; what sits on top depends on which field the partition
# declares (at most one, enforced in preflight):
#   - `pve_storage:` → the partition's thin pool is registered as a PVE
#                      lvmthin storage (hypervisors only; the actual
#                      `pvesm add` lives in a PVE-only playbook, not in
#                      this role)
#   - `mount:`        → the partition's thin pool gets a thin LV, ext4'd
#                      and mounted via /etc/fstab (workers, e.g.
#                      /var/lib/longhorn on a kube_worker)
#   - (neither)       → bare pool member: the partition just declares
#                      label/vg/thinpool/size and joins a (vg,thinpool)
#                      whose target is declared on another partition.
#                      Preflight asserts every pool has AT LEAST ONE
#                      targeted partition.
#
# DECLARED, NOT DISCOVERED — but disks are named by STABLE SELECTOR, not
# by a fragile /dev/disk/by-id symlink. The layout is the `storage.disks`
# list on each host in inventory.yaml (single source of truth). This role
# never auto-claims a disk: it resolves each declared `select:` to
# EXACTLY ONE non-boot, non-removable disk (0 or >1 matches is a HARD
# preflight failure — it refuses to guess), then carves that disk's
# declared `partitions` in order. Consequences:
#   - an undeclared / unmatched disk is NEVER touched
#   - a selector that matches nothing OR more than one disk is a HARD
#     FAILURE (preflight) — reality must match inventory before anything
#     runs, and ambiguity is never resolved silently
#   - kernel device renames (sdX/nvmeXnY reshuffle when a disk is added)
#     are irrelevant: selectors match on model/serial/size/rotational or
#     the auto-detected boot disk, never on the kernel name
#   - swapping a disk for an identical (or larger) one needs NO inventory
#     edit when the selector is attribute-based (size/rotational); the
#     blank replacement is re-initialised into the same pool because
#     pool/vg/thinpool/storage-id are fixed by intent, not by the device
#
# Selector kinds (see inventory.yaml header for live examples):
#   select: boot                       # the auto-detected host boot disk
#   select: { model: "...", serial: "..." }      # one exact physical drive
#   select: { min_size_gib: 900, rotational: false }   # attribute match
#   select: { size_gib: 1000, rotational: true }       #   "
# Non-boot selectors implicitly exclude the boot disk and any removable
# (USB) device; `exclude_boot: false` is rejected (never carve the OS disk).
#
# Idempotency keys are content-addressed, never kernel device names:
#   GPT partlabel (`label`) → VG (`vg`) → thinpool LV → (PVE storage id
#   OR mount path). Re-runs and device renames are no-ops.
#
# Multiple partitions may target ONE vg/thinpool (each with its own
# unique `label` partlabel) — this is how two physical disks back a
# single, larger LVM-thin pool (e.g. NVMe + HDD → one `longhorndata`/
# `longhornthin` pool on a baremetal kube_worker that mounts at
# /var/lib/longhorn).
#
# `pve_storage` (when used) is a FROZEN contract: tofu/modules/vm
# hardcodes `vms` (every VM/LXC boot disk + cloud-init drive). Renaming
# it is a breaking change across Tofu/templates. Longhorn replica state
# lives on baremetal kube_workers only — no hypervisor-side PVE storage
# backs Longhorn.
#
# Schema (each partition declares AT MOST ONE of pve_storage or mount;
# bare partitions — neither — join a pool whose target is declared on a
# sibling partition with the same vg+thinpool):
#   storage:
#     disks:
#       - select: boot                 # OR a selector dict (see above)
#         # wipe: refuse|force         # per-disk; default refuse. `force`
#         #                            # is DECLARED + scoped to this disk
#         #                            # (replaces the global -e flag) and
#         #                            # only acts when the disk holds
#         #                            # FOREIGN signatures and none of our
#         #                            # partlabels exist yet.
#         partitions:
#           # ── PVE-side (hypervisor partition) ────────────────────────
#           - label: vm-storage        # GPT partlabel (unique per node)
#             vg: vmdata
#             thinpool: vmthin
#             pve_storage: vms         # PVE storage id (frozen contract)
#             content: images,rootdir  # pvesm --content value
#             size: "200G"             # sgdisk +SIZE; "0" = fill the rest
#           # ── Worker-side (ext4 mount, single-disk pool) ─────────────
#           - label: longhorn
#             vg: longhorndata
#             thinpool: longhornthin
#             size: "0"
#             mount:
#               path: /var/lib/longhorn
#               fstype: ext4
#               lv_name: longhorn-data   # optional; default `<thinpool>-data`
#               # lv_size: 100%FREE      # optional; default 100%FREE — the
#               #                        # special sentinel "100%FREE" is
#               #                        # resolved at runtime to the thin
#               #                        # pool's data size (1:1, no
#               #                        # overprovisioning). Any other value
#               #                        # is passed verbatim to
#               #                        # lvcreate --virtualsize and must be
#               #                        # an absolute size ("600G", "1T", …),
#               #                        # NOT a percentage (lvcreate rejects
#               #                        # percentages for --virtualsize).
#       # ── Worker-side, multi-disk pool (NVMe + HDD → one larger pool) ─
#       # Convention: the mount lives on EXACTLY ONE partition per pool;
#       # the other partition just declares label/vg/thinpool/size.
#       - select: { model: "Samsung SSD 980 1TB", serial: "..." }
#         partitions:
#           - label: longhorn-nvme       # bare pool member (no mount, no pve_storage)
#             vg: longhorndata
#             thinpool: longhornthin
#             size: "0"
#       - select: { model: "WDC WD10EZEX-...", serial: "..." }
#         partitions:
#           - label: longhorn-hdd
#             vg: longhorndata
#             thinpool: longhornthin
#             size: "0"
#             mount:                     # target declared here, once per pool
#               path: /var/lib/longhorn
#               fstype: ext4
#               lv_name: longhorn-data
#
# There is intentionally NO default `storage` here — a node with no
# declared layout is silently skipped by the playbook-level `when:`
# guard (15-storage.yml) so that plain physical hosts without local
# storage pools work fleet-wide.

# Tri-state mode dispatcher (tasks/main.yml switches on this):
#   info       — DEFAULT. Read-only. For each declared partition, report
#                PRESENT / MISSING (by GPT partlabel under
#                /dev/disk/by-partlabel/). Tolerates missing disks
#                ("MISSING (disk not found)"). Never halts, never mutates.
#                Safe everywhere, every run.
#   overwrite  — DESTRUCTIVE. The carve + LVM-thin pool build. This IS the
#                explicit consent: setting it authorizes sgdisk to write
#                the GPT. Set per-host (host_vars/<name>.yml) or per-run
#                (`-e host_disks_action=overwrite --limit <host>`).
#   skip       — Silent no-op (`meta: end_host`). Use to bypass even info
#                reporting on a host whose disks are managed out-of-band.
host_disks_action: info

# EXTRA-DESTRUCTIVE fleet-wide escape hatch — EMERGENCY USE ONLY. Prefer
# the per-disk `wipe: force` field in inventory: it is declared, scoped to
# exactly the disk you mean, and self-documenting. This global flag forces
# `wipe: force` semantics on EVERY resolved non-boot disk for one run; it
# does NOT bypass the `host_disks_action: overwrite` mode gate, never
# touches the boot disk, and never touches a disk that already carries
# one of our partlabels (idempotent). Keep false in group_vars/host_vars;
# pass per-run only when you truly mean it: `-e host_disks_force_wipe=true`.
host_disks_force_wipe: false
