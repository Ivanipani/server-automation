---
- name: Install development tools
  ansible.builtin.package:
    name:
      - acl
      - zsh
      - git
      - wget
      - build-essential
      - ca-certificates
      - htop
      - curl
      - tree
      - dnsutils
      - iotop
      - sysstat
      - unzip
    state: present

- name: Ensure /opt/bin directory exists
  ansible.builtin.file:
    path: /opt/bin
    state: directory
    mode: "0755"

# Install each managed binary from the dev_tools_packages table. Per-tool
# presence/version check, mirror-or-upstream resolution, extract/symlink all
# live in install-tool.yml — see roles/dev-tools/defaults/main.yml for the table.
- name: Install managed dev tools
  ansible.builtin.include_tasks: install-tool.yml
  loop: "{{ dev_tools_packages }}"
  loop_control:
    loop_var: tool
    label: "{{ tool.name }} {{ tool.version }}"
