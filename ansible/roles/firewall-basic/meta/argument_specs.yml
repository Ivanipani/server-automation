---
argument_specs:
  main:
    short_description: Configure UFW firewall with reconciled inbound/outbound rules
    author:
      - Ivan Perdomo
    options:
      firewall_basic_scope:
        type: str
        default: "default"
        description:
          - "Per-invocation ownership label used in ufw rule comments."
          - "Reconciliation only deletes rules tagged with the current scope."
          - "Plays managing overlapping hosts MUST pass distinct scopes."
          - "See defaults/main.yml + files/ufw_reconcile.py for the full rationale."
      firewall_outbound_policy:
        type: str
        default: "allow"
        choices:
          - allow
          - deny
        description:
          - "Default policy for outgoing traffic."
          - "When 'deny', only ports in outbound_allow are permitted out."
      inbound_allow:
        type: list
        elements: dict
        default: []
        description:
          - "List of inbound ports to allow."
          - "Each item: 'port' (int or range string), 'proto' (tcp/udp)."
          - "Optional 'from_ip' scopes the rule to a source CIDR or /32 host (typical for inbound)."
          - "Optional 'to_ip' scopes by destination — rarely useful inbound."
      outbound_allow:
        type: list
        elements: dict
        default: []
        description:
          - "List of outbound ports to explicitly allow."
          - "Useful when firewall_outbound_policy is 'deny'."
          - "Each item: 'port', 'proto'; optional 'to_ip' scopes to a destination CIDR or /32 host (typical for outbound); optional 'from_ip' scopes by source."
      outbound_deny:
        type: list
        elements: dict
        default: []
        description:
          - "List of outbound ports to explicitly deny."
          - "Applied regardless of firewall_outbound_policy."
          - "Each item: 'port', 'proto'; optional 'to_ip' scopes to a destination CIDR or /32 host (typical for outbound); optional 'from_ip' scopes by source."
