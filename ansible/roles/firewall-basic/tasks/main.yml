---
# Default-deny inbound + caller-configurable outbound ufw policy, reconciled
# against the desired set each run: rules removed from inventory are removed
# from ufw rather than additively layered. Multi-play hosts (e.g.
# worker-home-02, which is in both `physical` and `kube_workers`) pass
# distinct `firewall_basic_scope` values so each play tracks only its own
# rules — see defaults/main.yml + files/ufw_reconcile.py.
#
# Per-rule optional scoping: `from_ip` restricts source (typical inbound),
# `to_ip` restricts destination (typical outbound). Both default to "any".

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Enable ufw and set default policy to deny incoming traffic
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming

- name: Set default outgoing policy
  community.general.ufw:
    default: "{{ firewall_outbound_policy }}"
    direction: outgoing

# SSH-in is hardcoded so the role can never lock itself out; everything
# else comes from the caller's lists. Each item carries optional from_ip
# and/or to_ip — passed through verbatim to community.general.ufw and
# encoded in the tagged comment so the reconciler can diff scoped rules.
- name: Build desired rule set for this scope
  ansible.builtin.set_fact:
    _firewall_basic_desired: >-
      {{
        [{'rule': 'allow', 'direction': 'in', 'port': 22, 'proto': 'tcp'}]
        + (inbound_allow  | map('combine', {'rule': 'allow', 'direction': 'in'})  | list)
        + (outbound_allow | map('combine', {'rule': 'allow', 'direction': 'out'}) | list)
        + (outbound_deny  | map('combine', {'rule': 'deny',  'direction': 'out'}) | list)
      }}

# Identify role-owned ufw rules (tagged with our scope OR matching the
# pre-reconciliation legacy comments) that aren't in this run's desired
# set. The script just observes — actual deletion happens via the
# community.general.ufw module below so it handles ufw's quirky
# delete-syntax for scoped rules.
- name: Identify orphan ufw rules
  ansible.builtin.script: >-
    ufw_reconcile.py
    {{ firewall_basic_scope | quote }}
    {{ _firewall_basic_desired | to_json | quote }}
  register: _firewall_basic_reconcile
  changed_when: false

- name: Delete orphan ufw rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    direction: "{{ item.direction }}"
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from_ip | default(omit) }}"
    to_ip: "{{ item.to_ip | default(omit) }}"
    delete: true
  loop: "{{ (_firewall_basic_reconcile.stdout | from_json).orphans }}"

- name: Apply desired ufw rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    direction: "{{ item.direction }}"
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from_ip | default(omit) }}"
    to_ip: "{{ item.to_ip | default(omit) }}"
    comment: "firewall-basic[{{ firewall_basic_scope }}]: {{ item.rule }} {{ item.direction }} {{ item.port }}/{{ item.proto }}{% if item.from_ip is defined %} from {{ item.from_ip }}{% endif %}{% if item.to_ip is defined %} to {{ item.to_ip }}{% endif %}"
  loop: "{{ _firewall_basic_desired }}"
