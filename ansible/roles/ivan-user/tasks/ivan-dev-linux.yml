---
- name: Look up pani user info
  ansible.builtin.getent:
    database: passwd
    key: pani

- name: Set pani_home fact
  ansible.builtin.set_fact:
    pani_home: "{{ getent_passwd['pani'][4] }}"

- name: Clone dotfiles repo
  ansible.builtin.git:
    repo: git@github.com:Ivanipani/dotfiles.git
    dest: "{{ pani_home }}/dotfiles"
    version: main
    accept_newhostkey: true
  become: false

- name: Set dotfiles ownership
  ansible.builtin.file:
    path: "{{ pani_home }}/dotfiles"
    owner: pani
    group: pani
    recurse: true

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ pani_home }}/.config"
    state: directory
    owner: pani
    group: pani
    mode: "0755"

- name: Install zplug
  ansible.builtin.git:
    repo: https://github.com/zplug/zplug.git
    dest: "{{ pani_home }}/.zplug"
    version: main
  become: false

- name: Set zplug ownership
  ansible.builtin.file:
    path: "{{ pani_home }}/.zplug"
    owner: pani
    group: pani
    recurse: true

- name: Run zsh setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: "{{ pani_home }}/dotfiles/zsh"
  become_user: pani
  become_method: su
  environment:
    HOME: "{{ pani_home }}"

- name: Configure neovim dotfiles
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: "{{ pani_home }}/dotfiles/nvim"
  become_user: pani
  become_method: su
  environment:
    HOME: "{{ pani_home }}"

- name: Install zellij plugins
  ansible.builtin.command:
    cmd: zsh ./install.sh
    chdir: "{{ pani_home }}/dotfiles/zellij"
  become_user: pani
  become_method: su
  environment:
    HOME: "{{ pani_home }}"

- name: Run zellij setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: "{{ pani_home }}/dotfiles/zellij"
  become_user: pani
  become_method: su
  environment:
    HOME: "{{ pani_home }}"

- name: Run version control setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: "{{ pani_home }}/dotfiles/vcs"
  become_user: pani
  become_method: su
  environment:
    HOME: "{{ pani_home }}"
