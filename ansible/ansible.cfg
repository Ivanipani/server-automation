[defaults]
inventory = inventory.yaml
roles_path = roles
# Action plugins from roles are auto-loaded when the role enters scope,
# but `module_defaults` at play-start is parsed earlier — so a role's
# action plugin isn't visible to module_defaults unless the path is
# also declared globally. Listing each role's plugin dir here is the
# fix; colon-separate as more roles add their own.
action_plugins = roles/synology-dsm/action_plugins
filter_plugins = roles/synology-storage/filter_plugins
timeout = 30
remote_user = ansible
private_key_file = ~/.ssh/ansible
host_key_checking = False


[privilege_escalation]
become_flags = -E

[ssh_connection]
pipelining = True  # Improves performance for SSH connections
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
# This homelab has a documented-fragile single 1GbE + a hardware
# crash-looping node, so SSH connections transiently drop mid-play
# ("Shared connection ... closed"). Keepalives hold idle/long-running
# connections (e.g. the 10-min k3s readiness waits) open across blips,
# and `retries` re-establishes a dropped connection instead of failing
# the host UNREACHABLE on the first hiccup.
ssh_args = -o ForwardAgent=yes -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=6 -o ConnectTimeout=5
# retries = 1
