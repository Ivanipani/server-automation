---
- name: Deploy shared GitHub SSH key for pani user
  hosts: physical:dev
  remote_user: pani
  become: false
  tasks:
    - name: Ensure ~/.ssh exists
      ansible.builtin.file:
        path: ~/.ssh
        state: directory
        mode: "0700"

    - name: Install GitHub SSH private key
      ansible.builtin.copy:
        # OpenSSH refuses the key ("error in libcrypto") if there's no `\n`
        # after `-----END OPENSSH PRIVATE KEY-----`. Normalize to exactly one.
        content: "{{ github_ssh_private_key.rstrip('\n') }}\n"
        dest: ~/.ssh/id_ed25519
        mode: "0600"
      no_log: true

    - name: Install GitHub SSH public key
      ansible.builtin.copy:
        content: "{{ github_ssh_public_key }}\n"
        dest: ~/.ssh/id_ed25519.pub
        mode: "0644"

    - name: Trust github.com host key
      ansible.builtin.known_hosts:
        path: ~/.ssh/known_hosts
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com 2>/dev/null') }}"
        state: present

    - name: Verify GitHub SSH access
      ansible.builtin.command: ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -T git@github.com
      register: gh_check
      changed_when: false
      failed_when: gh_check.rc != 1
