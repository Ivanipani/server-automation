---
# Foundation tier — bring up ONLY the infra LXCs on the foundation
# hypervisor(s). Today: bootserv01 on pve-home-01.
#
# Why a separate, targeted Tofu invocation: the full per-node apply
# lives in 30-guests/10-opentofu.yml and creates every VM + LXC declared
# in the inventory for each hypervisor. We don't want to incur that cost
# (or risk) just to land bootserv01 — fresh baremetals need it BEFORE
# the wider 17-host tier can run against them. So this play loops over
# the `foundation` group and per-iteration runs
# `tofu apply -target=module.hypervisor.module.infra_lxcs` against that
# hypervisor's per-node Tofu workspace (tofu/per-node/<host>/), which
# creates ONLY the infra LXCs and never touches any VM resource.
#
# State: each hypervisor has its own state file under
# tofu/per-node/<host>/terraform.tfstate. Targeting is per-invocation:
# the later 30-guests/10-opentofu.yml runs the un-targeted apply against
# the same state and reconciles everything (the LXC is a no-op then).
#
# Idempotent: re-running on a fully-built fleet is a no-op
# (Tofu sees the LXC matches state, nothing to do).
#
# Adding a foundation hypervisor:
#   1. Add it to `foundation:` in inventory.yaml + the node's vault key
#      to `proxmox_api_tokens` in group_vars/all/vars.yml.
#   2. `cp -r tofu/per-node/pve-home-01 tofu/per-node/<new-host>` and
#      edit `local.hypervisor_name` in the new main.tf.
#   (Nothing else: this play's loop is over `foundation`, so the new
#   host is picked up automatically.)

- name: Verify each foundation hypervisor's Proxmox API token (vault + PVE)
  hosts: "{{ target_hosts | default('foundation') }}"
  become: true
  gather_facts: false
  vars:
    token_user: "root@pam"
    token_name: "tofu-lan"
    _node_token: "{{ proxmox_api_tokens[inventory_hostname] | default('') }}"
  tasks:
    - name: Assert the vault holds a token for this node
      ansible.builtin.assert:
        that:
          - inventory_hostname in proxmox_api_tokens
          - _node_token | length > 0
        fail_msg: >-
          No Proxmox API token for {{ inventory_hostname }}. Mint it on the
          node (`pveum user token add {{ token_user }} {{ token_name }}
          --privsep 0`), encrypt the secret into group_vars/all/vault.yml,
          and wire it into the `proxmox_api_tokens` map in
          group_vars/all/vars.yml. See 30-guests/10-opentofu.yml's header.

    - name: List existing API tokens on this node
      ansible.builtin.command:
        cmd: pveum user token list {{ token_user }} --output-format json
      register: token_list
      changed_when: false

    - name: Assert the PVE-side token still exists on this node
      ansible.builtin.assert:
        that:
          - token_list.stdout | from_json | selectattr('tokenid', 'equalto', token_name) | list | length > 0
        fail_msg: >-
          The vault has a token for {{ inventory_hostname }} but PVE on
          {{ inventory_hostname }} doesn't list '{{ token_name }}' under
          {{ token_user }}. Recreate it on that node and update the vault.

- name: Provision foundation infra LXCs (per-node targeted apply)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run tofu apply -target=module.hypervisor.module.infra_lxcs per foundation node
      community.general.terraform:
        # playbook_dir = .../infra/13-foundation; the per-node Tofu
        # workspace lives at tofu/per-node/<host>/ (5 levels up).
        project_path: "{{ playbook_dir }}/../../../../../tofu/per-node/{{ item }}"
        binary_path: /opt/homebrew/bin/tofu
        state: present
        force_init: true
        # Targeted: ONLY the per-node `infra_lxcs` submodule (inside the
        # `hypervisor` wrapper). Never touches the `vms` submodule.
        targets:
          - module.hypervisor.module.infra_lxcs
      environment:
        TF_VAR_proxmox_api_token: "{{ proxmox_api_tokens[item] }}"
      loop: "{{ groups[target_hosts | default('foundation')] }}"
      register: tofu_output

    - name: Show reconciled foundation infra LXCs
      ansible.builtin.debug:
        msg: "Foundation infra LXCs reconciled on {{ item.item }}."
      loop: "{{ tofu_output.results }}"
      loop_control:
        label: "{{ item.item }}"
