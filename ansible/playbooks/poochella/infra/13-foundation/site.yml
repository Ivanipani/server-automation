---
# Tier 13 — Foundational subset that must be FULLY UP before any OTHER
# baremetal Linux host can come into being.
#
# Why this tier exists separately. Every non-foundation physical host
# (workers, future hypervisors) is installed via iPXE/preseed netboot,
# which depends on bootserv01.lan. bootserv01 is an LXC pinned to a
# hypervisor in the `foundation` inventory group (today: pve-home-01).
# So that hypervisor's full 17-host + 20-hypervisor stack, plus the
# bootserv01 LXC, plus the bootserv role, must be reconciled BEFORE the
# 17-host tier runs against the wider `physical` group — otherwise a
# fresh worker would have no netboot target.
#
# How it's implemented. This tier reuses 17-host / 20-hypervisor
# playbooks via import_playbook with `target_hosts: foundation` so they
# scope to the foundation group; those playbooks default `hosts:` back
# to `physical` / `hypervisors` when target_hosts is unset, so the
# regular tiers below are unchanged.
#
# Image build flow (the bootstrap chicken-and-egg + the publish path):
#   50-bootstrap-lxc-template.yml  — LOCAL-only LXC bake on foundation.
#                                    Produces the customized Debian LXC
#                                    template that Tofu clones bootserv01
#                                    from. Runs BEFORE 80-tofu-infra-lxcs
#                                    because Tofu needs the template to
#                                    exist. No bootserv01 = no publish
#                                    yet, so this pass is local-only.
#   80-tofu-infra-lxcs.yml         — targeted `tofu apply` that creates
#                                    bootserv01 from the local template.
#   90-bootserv.yml                — configures bootserv01 (Caddy +
#                                    dnsmasq + iPXE/preseed + docroot
#                                    dirs incl. /srv/http/cloud-images/
#                                    + /srv/http/lxc-templates/).
#   95-bake-publish-images.yml     — full PRODUCER. Bakes the Debian VM
#                                    qcow2 (virt-customize + sysprep)
#                                    and snapshots the LXC template
#                                    built at step 50; publishes both
#                                    to bootserv01 via `pct push`. After
#                                    this, every Proxmox node (including
#                                    foundation) can fetch the canonical
#                                    artifacts via 20-hypervisor/40-
#                                    templates.yml.
#
# On a future second hypervisor, this tier is unchanged — only foundation
# bakes. Peers run the consume path in 20-hypervisor/40-templates.yml.
#
# Idempotency story (the user invariant). Re-running this tier on a
# fully-built fleet is a no-op end-to-end:
#   - 17-host roles short-circuit (user/storage/ssh/firewall/tailscale/
#     node-exporter all idempotent).
#   - 50-bootstrap-lxc-template.yml: per-template `pct status` check
#     short-circuits when the local template CTID already exists.
#   - 20-hypervisor steps short-circuit (repo flip / pve storage register).
#   - The TARGETED `tofu apply -target=module.infra_lxcs_<node>` only
#     touches the LXC module — never any VM resource — and is a no-op
#     when the LXC matches state.
#   - bootserv role re-renders iPXE/preseed templates (idempotent).
#   - 95-bake-publish-images.yml: per-artifact `pct exec test -f` check
#     short-circuits when the artifact already exists on bootserv01.
#     `-e force_rebuild=true` opts in to a rebake.
# When the regular 17-host / 20-hypervisor / 30-guests tiers run after
# this, pve-home-01 sees another no-op pass and 30-guests' un-targeted
# `tofu apply` reconciles the rest of the inventory.
#
# What's deliberately NOT here:
#   - 20-cluster.yml — gated off (PVE clustering is no longer a
#     supported topology in this repo; see the assertion at the top of
#     20-hypervisor/20-cluster.yml). Also orthogonal to foundation —
#     even if the gate were lifted, a standalone foundation hypervisor
#     wouldn't sit under `pve_cluster`.

# ── 17-host baseline on the foundation hypervisor(s) ────────────────────
- import_playbook: ../17-host/10-bootstrap.yml
  vars: { target_hosts: foundation }
- import_playbook: ../17-host/15-storage.yml
  vars:
    target_hosts: foundation
    host_disks_action: info
    # Read-only disk inspection, but DO (re)publish the `vms` PVE storage:
    # the foundation pool was carved by an earlier overwrite run, and this
    # opt-in folds in the former 30-pve-storage-register step without
    # re-carving. `just disk-plan` omits this flag, so it stays read-only.
    host_disks_register_pve: true

- import_playbook: ../17-host/30-firewall.yml
  vars: { target_hosts: foundation }

# advanceteam@pve Tofu service account — MUST exist before the targeted
# `tofu apply` in 80-tofu-infra-lxcs.yml (the provider authenticates as it).
- import_playbook: ../20-hypervisor/15-tofu-service-account.yml
  vars: { target_hosts: foundation }
# PVE `vms` storage registration now happens inside the 15-storage.yml
# pass above (host_disks_register_pve: true) — no separate step here.

# ── Bootstrap-only LXC template bake (needed by 80-tofu-infra-lxcs) ─────
- import_playbook: 50-bootstrap-lxc-template.yml

# ── Targeted Tofu apply: just the infra LXCs (bootserv01 today) ─────────
- import_playbook: 80-tofu-infra-lxcs.yml

# ── Configure the bootserv01 LXC (iPXE + preseed + netboot HTTP root) ───
- import_playbook: 90-bootserv.yml

# ── Full PRODUCER: bake VM qcow2 + snapshot LXC template, publish to ─────
# ── bootserv01. Every hypervisor consumes via 20-hypervisor/40-templates ─
- import_playbook: 95-bake-publish-images.yml

# ── Mirror pinned static artifacts (dev-tools binaries, Go, uv) to the ───
# ── NAS + bootserv01. Consumed by dev/python/golang roles via the LAN ────
# ── mirror with upstream fallback. No-op when already mirrored. ──────────
- import_playbook: 96-mirror-artifacts.yml

# ── PRODUCER: prepare Proxmox VE auto-install PXE artifacts (vmlinuz + ───
# ── initrd.img + stripped iso) and publish to bootserv01:/proxmox-pxe/. ──
# ── Lets hypervisors iPXE-boot the PVE auto-installer like workers do ────
# ── Debian. No-op when already published (`pct exec test -f` guard). ─────
- import_playbook: 97-bake-publish-pve-pxe.yml
