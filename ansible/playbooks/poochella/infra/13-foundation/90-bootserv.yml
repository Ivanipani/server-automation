---
# Foundation tier — Configure bootserv01 (the fleet's iPXE + Debian
# netboot home base) as an LXC on pve-home-01. Penultimate play of the
# 13-foundation tier (95-bake-publish-images.yml follows, publishing
# centrally-baked VM/LXC artifacts into bootserv01's docroot) so that
# by the time 17-host runs against the wider `physical` group, every
# other baremetal can already PXE-fetch its kernel / initrd / preseed
# from a known-good bootserv AND every hypervisor can fetch the
# centrally-baked VM qcow2 + LXC vzdump tarball.
#
# Addressing model: bootserv01 carries NO MAC or IP in inventory. PVE
# auto-generates a unique MAC at clone time, the LXC DHCPs into the
# dynamic pool, and OPNsense's dnsmasq registers `bootserv01.lan` →
# whatever-IP-it-got via dynamic-DNS (`regdhcp: true` is on in
# 20-dnsmasq.yml). The Tofu LXC module sets the LXC's hostname to
# `bootserv01` via `initialization.hostname` at clone time so the DHCP
# request advertises the right name. Everything that needs to reach the
# bootserv (Ansible SSH, PXE clients, iPXE script) uses the hostname.
#
# Pre-conditions:
#   - 13-foundation/80-tofu-infra-lxcs.yml completed (the targeted Tofu
#     apply cloned bootserv01 from the pve-home-01 Debian 13 LXC
#     template; template bakes the `ansible` user with the canonical key
#     + sets hostname=bootserv01 via `initialization.hostname`). The
#     un-targeted apply in 30-guests/10-opentofu.yml will run later and
#     reconcile the same LXC as a no-op.
#   - 10-router/20-dnsmasq.yml has run at least once (dnsmasq's
#     `regdhcp: true` is on so dynamic leases register in DNS).
#   - `vault_tourmanager_user_pass` exists in vault. Root is LOCKED
#     on every freshly-installed/cloned Debian/PVE host by the canonical
#     image-baseline.sh (rendered into /srv/http/scripts/ by the
#     bootserv role; wget+exec'd in the preseed late_command). The
#     same script creates the `tourmanager` break-glass account with
#     the vault password — single hash strategy across all four
#     provisioning mediums.

- name: Configure bootserv01 (TFTP + Caddy + iPXE + Debian netboot)
  hosts: bootserv01
  become: true
  gather_facts: true
  roles:
    - role: apt-no-auto-upgrades
    - role: bootserv
