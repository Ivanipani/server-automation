---
# Foundation tier — Configure bootserv01 (the fleet's iPXE + Debian
# netboot home base) as an LXC on pve-home-01. Final play of the
# 16-foundation tier so that by the time 17-host runs against the wider
# `physical` group, every other baremetal can already PXE-fetch its
# kernel / initrd / preseed from a known-good bootserv.
#
# Addressing model: bootserv01 carries NO MAC or IP in inventory. PVE
# auto-generates a unique MAC at clone time, the LXC DHCPs into the
# dynamic pool, and OPNsense's dnsmasq registers `bootserv01.lan` →
# whatever-IP-it-got via dynamic-DNS (`regdhcp: true` is on in
# 20-dnsmasq.yml). The Tofu LXC module sets the LXC's hostname to
# `bootserv01` via `initialization.hostname` at clone time so the DHCP
# request advertises the right name. Everything that needs to reach the
# bootserv (Ansible SSH, PXE clients, iPXE script) uses the hostname.
#
# Pre-conditions:
#   - 16-foundation/80-tofu-infra-lxcs.yml completed (the targeted Tofu
#     apply cloned bootserv01 from the pve-home-01 Debian 13 LXC
#     template; template bakes the `ansible` user with the canonical key
#     + sets hostname=bootserv01 via `initialization.hostname`). The
#     un-targeted apply in 30-guests/10-opentofu.yml will run later and
#     reconcile the same LXC as a no-op.
#   - 10-router/20-dnsmasq.yml has run at least once (dnsmasq's
#     `regdhcp: true` is on so dynamic leases register in DNS).
#   - `vault_tourmanager_user_pass` exists in vault. Root is LOCKED on
#     every netbooted Debian host (preseed sets `passwd/root-login false`
#     and drops a `PermitRootLogin no` sshd config), so `tourmanager` is
#     the SINGLE break-glass: the preseed's late_command useradd's
#     tourmanager with a per-host-salted crypt hash of this value so
#     every netbooted Debian host has the same break-glass account that
#     host-base + ssh-hardening's Match block expect.

- name: Configure bootserv01 (TFTP + Caddy + iPXE + Debian netboot)
  hosts: bootserv01
  become: true
  gather_facts: true
  vars:
    # Read the canonical bootstrap SSH key off the controller laptop.
    # Same key the existing automation expects everywhere
    # (~/.ssh/ansible.pub).
    bootserv_ansible_pubkey: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/ansible.pub') }}"
  roles:
    - role: apt-no-auto-upgrades
    # caddy must come before bootserv: bootserv drops a site file into
    # /etc/caddy/sites-enabled and notifies the `reload caddy` handler
    # exposed by the caddy role.
    - role: caddy
    - role: bootserv
