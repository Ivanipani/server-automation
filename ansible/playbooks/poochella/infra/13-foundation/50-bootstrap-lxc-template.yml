---
# Foundation tier — Bootstrap-only LOCAL LXC template bake on the
# foundation hypervisor. Exists SOLELY to break the bootstrap chicken-
# and-egg: bootserv01 is itself an LXC, cloned by Tofu from a customized
# Debian LXC template that must exist on the foundation node BEFORE
# 80-tofu-infra-lxcs.yml runs.
#
# This playbook produces a fully-customized, syspreped, pct-template'd
# local LXC at template_ct_id_base + idx — the same CTID
# that the production publish/consume flow later treats as the canonical
# local template. After 95-bake-publish-images.yml runs, peers fetch a
# byte-identical snapshot of this template from bootserv01. Foundation
# never re-fetches itself — the consume pass on foundation sees the CTID
# already exists and short-circuits.
#
# Ordering:
#   13-foundation/site.yml runs this BEFORE 80-tofu-infra-lxcs.yml.
#
# Pre-conditions:
#   - 17-host bootstrap + storage (which now also registers the PVE `vms`
#     storage on hypervisors) + 20-hypervisor bootstrap have run on the
#     foundation node (the `vms` LVM-thin storage exists on local).
#
# What gets baked: the canonical pre-bake baseline (ansible user with
# key, tourmanager break-glass user, sshd hardening, apt-no-auto-upgrades,
# root locked) — applied by image-baseline.sh, shared with the netboot
# preseed, VM bake, and PVE first-boot. Plus LXC-specific bits: apt
# packages, sshd-keygen first-boot drop-in, machine-id + sshd-hostkey
# reset for clone uniqueness.

- name: Bootstrap LXC template on foundation (local-only, pre-bootserv)
  hosts: "{{ target_hosts | default('foundation') }}"
  gather_facts: false
  become: true
  vars_files:
    - ../vars/templates.yml
  vars:
    # zsh: project-wide default login shell; needed before
    # image-baseline.sh's useradd -s /usr/bin/zsh runs (pct exec installs
    # these before the baseline script).
    lxc_packages: openssh-server curl wget sudo zsh rsync htop

  pre_tasks:
    # Materialize the vaulted ansible keypair on the control node (mirrors
    # 00-control-node/10-stage-ansible-key.yml) so the foundation tier stays
    # self-contained end-to-end. The public half is baked into the LXC
    # template via image-baseline.sh; the private half lets ansible.cfg
    # reconnect. Never mint a fresh key here — it would diverge from the
    # vaulted canonical one.
    - name: Ensure ~/.ssh exists on the control node
      ansible.builtin.file:
        path: ~/.ssh
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Stage the vaulted ansible private key on the control node
      ansible.builtin.copy:
        content: "{{ ansible_user_ssh_private_key.rstrip('\n') }}\n"
        dest: ~/.ssh/ansible
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true
      no_log: true

    - name: Stage the ansible public key on the control node
      ansible.builtin.copy:
        content: "{{ ansible_user_ssh_public_key | trim }}\n"
        dest: ~/.ssh/ansible.pub
        mode: "0644"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Render image-baseline.sh to the foundation node
      ansible.builtin.include_tasks: ../tasks/render-image-baseline.yml

    - name: Derive this node's LXC template list (anchor + index)
      ansible.builtin.set_fact:
        lxc_templates: "{{ lxc_templates | default([]) + [tmpl | combine({'id': (template_ct_id_base | int) + idx})] }}"
      loop: "{{ lxc_templates_base }}"
      loop_control:
        loop_var: tmpl
        index_var: idx
        label: "{{ tmpl.hostname }} → {{ (template_ct_id_base | int) + idx }}"

    - name: Update PVE appliance catalog
      ansible.builtin.command: pveam update
      changed_when: true

    - name: Check available LXC base images
      ansible.builtin.command: pveam list local
      register: pveam_list
      changed_when: false

    - name: Download LXC base images
      ansible.builtin.command: "pveam download local {{ item.image }}"
      loop: "{{ lxc_templates }}"
      when: item.image not in pveam_list.stdout
      changed_when: true

  tasks:
    - name: Build local LXC templates (skipped if CTID already exists)
      ansible.builtin.include_tasks: ../tasks/create-lxc-template.yml
      loop: "{{ lxc_templates }}"
      loop_control:
        loop_var: lxc_template

  post_tasks:
    - name: Remove rendered baseline script from foundation node (contains vault hash)
      ansible.builtin.file:
        path: "{{ image_baseline_rendered_path }}"
        state: absent
      when: image_baseline_rendered_path is defined
