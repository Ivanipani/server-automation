---
# Provisions every Proxmox guest (VMs + LXCs) defined in inventory.yaml
# by looping a per-hypervisor `tofu apply` over the `hypervisors` group.
#
# Topology: every Proxmox hypervisor is a standalone PVE host with its
# own Tofu workspace under `tofu/per-node/<host>/` and its own state.
# This playbook iterates the group and runs one `tofu apply` per node,
# passing each iteration's token via `TF_VAR_proxmox_api_token` sourced
# from the `proxmox_api_tokens` map in group_vars/all/vars.yml.
#
# Auth indirection: `proxmox_api_tokens` (group_vars/all/vars.yml) maps
# node => `{{ vault_* }}`. No plaintext token ever hits disk — values are
# passed to Tofu through environment variables only.
#
# Bootstrap a NEW node's token (first-time / when adding a node):
#   ssh root@<node> 'pveum user token add root@pam tofu-lan --privsep 0'
#   just secret-encrypt vault_proxmox_api_token_<node_with_underscores>
#   # paste the encrypted block into group_vars/all/vault.yml, then add
#   # the node to the `proxmox_api_tokens` map in group_vars/all/vars.yml.
#   # Also `cp -r tofu/per-node/pve-home-01 tofu/per-node/<new-host>` and
#   # edit local.hypervisor_name in its main.tf. See tofu/README.md.
#
# To rotate a token:
#   ssh root@<node> 'pveum user token modify root@pam tofu-lan'
#   re-encrypt the new secret over its block in group_vars/all/vault.yml

- name: Verify each node's Proxmox API token exists in PVE and the vault
  hosts: hypervisors
  become: true
  gather_facts: false
  vars:
    token_user: "root@pam"
    token_name: "tofu-lan"
    _node_token: "{{ proxmox_api_tokens[inventory_hostname] | default('') }}"
  tasks:
    - name: Assert the vault holds a token for this node
      ansible.builtin.assert:
        that:
          - inventory_hostname in proxmox_api_tokens
          - _node_token | length > 0
        fail_msg: >-
          No Proxmox API token for {{ inventory_hostname }}. Mint it on the
          node (`pveum user token add {{ token_user }} {{ token_name }}
          --privsep 0`), encrypt the secret into group_vars/all/vault.yml,
          and wire it into the `proxmox_api_tokens` map in
          group_vars/all/vars.yml. See this playbook's header.

    - name: List existing API tokens on this node
      ansible.builtin.command:
        cmd: pveum user token list {{ token_user }} --output-format json
      register: token_list
      changed_when: false

    - name: Assert the PVE-side token still exists on this node
      ansible.builtin.assert:
        that:
          - token_list.stdout | from_json | selectattr('tokenid', 'equalto', token_name) | list | length > 0
        fail_msg: >-
          The vault has a token for {{ inventory_hostname }} but PVE on
          {{ inventory_hostname }} doesn't list '{{ token_name }}' under
          {{ token_user }}. Recreate it on that node and update the vault.

- name: Provision infrastructure with OpenTofu (one apply per hypervisor)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run tofu init + apply for each hypervisor
      community.general.terraform:
        # playbook_dir = .../infra/30-guests; the per-node Tofu workspace
        # lives at tofu/per-node/<host>/ in the repo root (5 levels up).
        project_path: "{{ playbook_dir }}/../../../../../tofu/per-node/{{ item }}"
        binary_path: /opt/homebrew/bin/tofu
        state: present
        force_init: true
      environment:
        # Per-iteration token. The per-node workspace exposes a single
        # `proxmox_api_token` string variable; we source it from the
        # `proxmox_api_tokens` map in group_vars/all/vars.yml. No
        # plaintext on disk — env var only.
        TF_VAR_proxmox_api_token: "{{ proxmox_api_tokens[item] }}"
      loop: "{{ groups['hypervisors'] }}"
      register: tofu_output

    - name: Show provisioned resources (per hypervisor)
      ansible.builtin.debug:
        msg: |
          {{ item.item }}: VMs={{ item.outputs.vm_ips.value | default({}) }}
      loop: "{{ tofu_output.results }}"
      loop_control:
        label: "{{ item.item }}"
