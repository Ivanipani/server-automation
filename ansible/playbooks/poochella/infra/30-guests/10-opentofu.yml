---
# Provisions every Proxmox guest (VMs + LXCs) defined in inventory.yaml
# by looping a per-hypervisor `tofu apply` over the `hypervisors` group.
#
# Topology: every Proxmox hypervisor is a standalone PVE host. A SINGLE
# flat Tofu root (`tofu/node/`) serves them all; per-node state isolation
# comes from a named tofu `workspace` per host (no per-host directories).
# This playbook iterates the group and runs one `tofu apply` per node,
# each in its own workspace with the node's endpoint URL passed in.
#
# Auth: Tofu authenticates to EVERY node as the shared advanceteam@pve
# service account (scoped `Terraform` ACL role), created identically on
# each hypervisor by 20-hypervisor/15-tofu-service-account.yml. ONE
# well-known password drives them all — `advanceteam_user_pass`
# (group_vars/all/vars.yml, re-export of vault_advanceteam_user_pass),
# passed to each workspace via `TF_VAR_proxmox_password`. The
# username is the Tofu var `proxmox_username` (default "advanceteam@pve").
# No plaintext ever hits disk — the secret is passed through an env var
# only. (Adding a hypervisor needs no new secret; the account already
# exists on it once the 20-hypervisor tier has run.)
#
# To rotate the password: change it on every node
# (`pveum passwd advanceteam@pve`) and re-encrypt the new value over
# vault_advanceteam_user_pass in group_vars/all/vault.yml.

- name: Verify the advanceteam Tofu service account exists on each node
  hosts: hypervisors
  become: true
  gather_facts: false
  vars:
    sa_userid: "advanceteam@pve"
  tasks:
    - name: Assert the shared service-account password is set in the vault
      ansible.builtin.assert:
        that:
          - advanceteam_user_pass | default('') | length > 0
        fail_msg: >-
          advanceteam_user_pass is empty. It must re-export
          vault_advanceteam_user_pass (group_vars/all/vars.yml ->
          group_vars/all/vault.yml). Tofu cannot authenticate without it.

    - name: List existing PVE users on this node
      ansible.builtin.command:
        cmd: pveum user list --output-format json
      register: pve_user_list
      changed_when: false

    - name: Assert advanceteam@pve exists on this node
      ansible.builtin.assert:
        that:
          - sa_userid in (pve_user_list.stdout | from_json | map(attribute='userid') | list)
        fail_msg: >-
          {{ sa_userid }} is missing on {{ inventory_hostname }}. Run the
          20-hypervisor tier (15-tofu-service-account.yml) against this node
          to create the Tofu service account before applying.

- name: Provision infrastructure with OpenTofu (one apply per hypervisor)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run tofu init + apply for each hypervisor
      community.general.terraform:
        # ONE flat Tofu root (5 levels up at tofu/node) drives every
        # hypervisor — no per-host directories. State is isolated by a
        # named tofu `workspace` per node; the target node is selected by
        # `workspace` + the `hypervisor_name`/`proxmox_endpoint` vars.
        project_path: "{{ playbook_dir }}/../../../../../tofu/node"
        binary_path: /opt/homebrew/bin/tofu
        state: present
        force_init: true
        workspace: "{{ item }}"
        variables:
          # The node's API URL (the flat root's primary input) + which
          # inventory node to slice. Both non-secret; passed on the CLI.
          proxmox_endpoint: "{{ proxmox_endpoints[item] }}"
          hypervisor_name: "{{ item }}"
      environment:
        # The shared advanceteam@pve password, identical for every node.
        # The root's `proxmox_username` var defaults to "advanceteam@pve",
        # so only the password needs supplying. No plaintext on disk —
        # env var only.
        TF_VAR_proxmox_password: "{{ advanceteam_user_pass }}"
      # Only hypervisors that have a proxmox_endpoints entry are
      # Tofu-managed; skip any group member without one (not yet wired).
      loop: "{{ groups['hypervisors'] | select('in', proxmox_endpoints) | list }}"
      register: tofu_output

    - name: Show provisioned resources (per hypervisor)
      ansible.builtin.debug:
        msg: |
          {{ item.item }}: VMs={{ item.outputs.vm_ips.value | default({}) }}
      loop: "{{ tofu_output.results }}"
      loop_control:
        label: "{{ item.item }}"
