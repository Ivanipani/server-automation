---
# Firewall configuration for all poochella guests.
#
# Default-deny incoming, allow outgoing EXCEPT SSH out, with PER-GROUP
# (and per-host) inbound allowances. The per-group policy lives in
# inventory.yaml on each group's `vars:` block (single source of truth
# alongside the topology); per-host overrides live directly on the host
# (e.g. bootserv01). This playbook is a thin, host-agnostic loop —
# there are no host/port maps here anymore.
#
#   Consequences of inventory-driven:
#     - adding/uncommenting a host inherits its group's policy with zero
#       edits to this file;
#     - an empty group (e.g. `databases` until a DB VM exists) simply
#       opens nothing;
#     - the port rationale lives WITH the topology in inventory.yaml.
#
#   Per-group `vars.firewall_inbound_allow` blocks live on (today):
#     dev, kube_control_plane, kube_workers (and commented scaffolds
#     for `databases` and `dns`).
#   Per-host overrides today: bootserv01 (SSH + HTTP).
#
# Precedence is standard Ansible: HOST > most-specific GROUP > parent.
# There is NO list merge — the deepest level that defines the var
# REPLACES the parent's value. See inventory.yaml's header for the
# resolution rules.
#
# The k3s ports MUST be open before 40-kube/20-k3s.yml runs so the
# cluster can form behind this default-deny-incoming firewall (this
# playbook runs earlier, in tier 30-guests).

# Uniform fleet baseline for guests: no lateral SSH out. The default is
# applied to every leaf group below; a group or host can opt out by
# setting `firewall_outbound_deny: []` on its inventory.yaml `vars:`
# block. Currently only `kube_workers` opts out (baremetal
# worker-home-02 needs git-over-SSH to GitHub as `pani`).

# Virtual machines (dev, databases).
- hosts: virtual-machines
  become: true
  roles:
    - role: firewall-basic
      vars:
        firewall_basic_scope: 30-guests
        inbound_allow: "{{ firewall_inbound_allow | default([]) }}"
        outbound_deny: "{{ firewall_outbound_deny | default([{'port': 22, 'proto': 'tcp'}]) }}"

# Kubernetes nodes (kube_control_plane VMs + kube_workers, which today
# includes the baremetal worker-home-02). `kubernetes` is its own
# top-level group (no longer a child of `virtual-machines`) so the
# default-deny + k3s ports + SSH-out-deny policy applies whether each
# node is a VM or baremetal.
- hosts: kubernetes
  become: true
  roles:
    - role: firewall-basic
      vars:
        firewall_basic_scope: 30-guests
        inbound_allow: "{{ firewall_inbound_allow | default([]) }}"
        outbound_deny: "{{ firewall_outbound_deny | default([{'port': 22, 'proto': 'tcp'}]) }}"

# Containers / LXCs (webservers, dns).
- hosts: containers
  become: true
  roles:
    - role: firewall-basic
      vars:
        firewall_basic_scope: 30-guests
        inbound_allow: "{{ firewall_inbound_allow | default([]) }}"
        outbound_deny: "{{ firewall_outbound_deny | default([{'port': 22, 'proto': 'tcp'}]) }}"
