---
# Tier P — the provisioning barrier.
#
# The single point where the router and hypervisor tracks converge:
# OpenTofu creates the guests. NOTHING in tier G (40-kube) exists
# before this runs. Kept as its own tier (one playbook today) precisely
# so the barrier is visible in the structure, not implied by a number.
#
# 10-opentofu.yml here runs the UN-TARGETED `tofu apply` against the
# full inventory: every `vm:` block becomes a VM, every `lxc:` block
# becomes an LXC. The bootserv01 LXC was already brought up by the
# 13-foundation tier's targeted apply (so other baremetals could
# netboot); this un-targeted apply reconciles it as a no-op alongside
# creating the VMs. bootserv01 configuration (the bootserv role) also
# lives in 13-foundation — by the time this tier runs, bootserv01 is
# fully configured.
- import_playbook: 10-opentofu.yml
- import_playbook: 20-firewall.yml

# Mount nas01 NFS shares onto VM groups that declare `nfs_mounts`
# (today: kube_control_plane). Re-uses the baremetal-side
# 17-host/16-nfs-mounts.yml — same schema, same module — scoped to the
# VM group. Slot 50 keeps the gap-10 convention while sitting after
# the firewall settles.
- import_playbook: ../17-host/16-nfs-mounts.yml
  vars:
    target_hosts: kube_control_plane
