---
# PRODUCER — bake a single Debian VM cloud image on the foundation
# hypervisor and PUBLISH the customized qcow2 to bootserv01 at
# http://bootserv01.lan/cloud-images/<image_file>. Every Proxmox node
# (including foundation itself) later consumes that artifact via
# tasks/consume-vm-template.yml.
#
# Required vars:
#   vm_template                  – dict with image_url, image_file
#   vm_packages                  – comma-separated package list for
#                                  virt-customize --install
#   image_baseline_rendered_path – /var/tmp path on this PVE host to
#                                  the rendered image-baseline.sh
#                                  (set by include of
#                                   tasks/render-image-baseline.yml
#                                   in 95-bake-publish-images.yml)
#   bootserv_ctid                – CTID of bootserv01 on foundation
#                                  (set as play-level fact in
#                                  95-bake-publish-images.yml)
#   bootserv_http_root, bootserv_owner, bootserv_group
#                                – mirror the bootserv role's defaults
#   force_rebuild                – rebake + republish even if the
#                                  artifact is already on bootserv01
#
# Customization split:
#   - virt-customize handles the VM-specific bits: apt --install,
#     cloud-init DHCP-renewal hook, then `--run image-baseline.sh` for
#     the canonical pre-bake baseline (users, sudo, sshd hardening,
#     apt-no-auto-upgrades, root locking). Single libguestfs appliance
#     boot — virt-customize executes flags in declared order.
#   - virt-sysprep AFTER customize so customize logs get cleaned too.
#   - Same image-baseline.sh runs in the LXC bake, the netboot preseed,
#     and the PVE first-boot — single source of truth for the
#     canonical baseline. See group_vars/all/image-baseline.yml.

- name: "Check if {{ vm_template.image_file }} is already published on bootserv01"
  ansible.builtin.command:
    cmd: "pct exec {{ bootserv_ctid }} -- test -f {{ bootserv_http_root }}/cloud-images/{{ vm_template.image_file }}"
  register: vm_image_published
  failed_when: false
  changed_when: false

- name: "Bake + publish VM image {{ vm_template.image_file }}"
  when: vm_image_published.rc != 0 or (force_rebuild | default(false) | bool)
  block:
    # virt-customize expands a ~350MB qcow2 to ~1.5GB during --install.
    # Use /var/tmp (disk-backed) not /tmp (often tmpfs on PVE).
    - name: "Download upstream cloud image {{ vm_template.image_file }}"
      ansible.builtin.get_url:
        url: "{{ vm_template.image_url }}"
        dest: "/var/tmp/{{ vm_template.image_file }}"
        mode: "0644"
        timeout: 120
      register: vm_image_dl
      until: vm_image_dl is succeeded
      retries: 5
      delay: 15

    - name: "Customize cloud image {{ vm_template.image_file }}"
      ansible.builtin.command:
        argv:
          - virt-customize
          - -a
          - "/var/tmp/{{ vm_template.image_file }}"
          - --install
          - "{{ vm_packages }}"
          # cc_set_hostname runs after networking is already up, so the
          # first DHCPREQUEST goes out without option 12 and OPNsense
          # dnsmasq has nothing to register. Renewing the lease in runcmd
          # (cloud-final stage) re-sends the request once /etc/hostname
          # is in place.
          - --write
          - |
            /etc/cloud/cloud.cfg.d/99-renew-dhcp-after-hostname.cfg:runcmd:
              - [sh, -c, "if systemctl is-active --quiet systemd-networkd; then networkctl renew --all || true; elif pgrep -x dhclient >/dev/null; then dhclient -r || true; dhclient || true; fi"]
          # `--run SCRIPT` uploads + executes the canonical baseline in
          # the guest's chroot (libguestfs appliance). Same script the
          # LXC bake, the netboot preseed, and the PVE first-boot run —
          # the SYSTEMD_LIVE=0 branch is what fires inside the appliance
          # (no PID 1), and `systemctl mask` falls back to `ln -sf
          # /dev/null` symlinks that the booted guest honours.
          - --run
          - "{{ image_baseline_rendered_path }}"
      changed_when: true

    # Sysprep AFTER customize so the customize log lines get cleaned too.
    # machine-id reset is the load-bearing fix for the duplicate-DHCP-lease
    # bug. The explicit --delete /var/lib/cloud/instances drops cloud-init's
    # instance cache so first boot runs against the new instance-id.
    - name: "Sysprep cloud image {{ vm_template.image_file }}"
      ansible.builtin.command:
        argv:
          - virt-sysprep
          - -a
          - "/var/tmp/{{ vm_template.image_file }}"
          - --operations
          - machine-id,ssh-hostkeys,bash-history,logfiles,udev-persistent-net,net-hostname
          - --delete
          - /var/lib/cloud/instances
      changed_when: true

    # ── Publish to bootserv01 via pct push (no SSH between foundation
    # and bootserv01 required — they're on the same PVE host kernel).
    - name: "Compute sha256 of baked qcow2 on foundation"
      ansible.builtin.stat:
        path: "/var/tmp/{{ vm_template.image_file }}"
        checksum_algorithm: sha256
      register: vm_image_stat

    - name: "Write sha256 sidecar locally on foundation"
      ansible.builtin.copy:
        content: "{{ vm_image_stat.stat.checksum }}  {{ vm_template.image_file }}\n"
        dest: "/var/tmp/{{ vm_template.image_file }}.sha256"
        mode: "0644"

    - name: "Push qcow2 into bootserv01 docroot"
      ansible.builtin.command:
        cmd: >-
          pct push {{ bootserv_ctid }}
          /var/tmp/{{ vm_template.image_file }}
          {{ bootserv_http_root }}/cloud-images/{{ vm_template.image_file }}
          --user {{ bootserv_owner }} --group {{ bootserv_group }} --perms 0644
      changed_when: true

    - name: "Push sha256 sidecar into bootserv01 docroot"
      ansible.builtin.command:
        cmd: >-
          pct push {{ bootserv_ctid }}
          /var/tmp/{{ vm_template.image_file }}.sha256
          {{ bootserv_http_root }}/cloud-images/{{ vm_template.image_file }}.sha256
          --user {{ bootserv_owner }} --group {{ bootserv_group }} --perms 0644
      changed_when: true

    - name: "Clean up bake scratch on foundation"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/var/tmp/{{ vm_template.image_file }}"
        - "/var/tmp/{{ vm_template.image_file }}.sha256"
