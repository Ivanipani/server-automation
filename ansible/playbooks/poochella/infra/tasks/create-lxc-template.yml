---
# Creates a single LXC template container if it doesn't already exist.
# Required vars:
#   lxc_template                  – dict with id, hostname, image
#   lxc_packages                  – space-separated package list for apt-get install
#   image_baseline_rendered_path  – /var/tmp path on this PVE host to
#                                   the rendered image-baseline.sh
#                                   (set by include of
#                                    tasks/render-image-baseline.yml
#                                    in the calling playbook)
#
# Customization split:
#   - This file handles LXC-specific bits ONLY: pct create, apt
#     install of openssh-server (needed before baseline.sh's sshd -t
#     validate), the sshd-keygen.service drop-in (LXC-only — VMs
#     don't need it), and machine-id + ssh-host-keys reset for
#     clone uniqueness.
#   - User creation, sshd hardening drop-in, apt-no-auto-upgrades,
#     and root locking are ALL done by image-baseline.sh which
#     `pct exec` runs after openssh-server is installed. Single
#     canonical source shared with the netboot preseed, VM qcow2
#     bake, and PVE first-boot. See group_vars/all/image-baseline.yml.

- name: "Check if LXC template {{ lxc_template.id }} exists"
  ansible.builtin.command: "pct status {{ lxc_template.id }}"
  register: lxc_status
  failed_when: false
  changed_when: false

- name: "Create LXC template {{ lxc_template.id }} ({{ lxc_template.hostname }})"
  when: lxc_status.rc != 0
  block:
    - name: "Create container {{ lxc_template.id }}"
      ansible.builtin.command: >
        pct create {{ lxc_template.id }}
        local:vztmpl/{{ lxc_template.image }}
        --hostname {{ lxc_template.hostname }}
        --memory 512
        --cores 1
        --net0 name=eth0,bridge=vmbr0,ip=dhcp,firewall=1
        --storage vms
        --unprivileged 1
        --features nesting=1
      changed_when: true

    - name: "Start container {{ lxc_template.id }}"
      ansible.builtin.command: "pct start {{ lxc_template.id }}"
      changed_when: true

    - name: "Wait for container {{ lxc_template.id }} to be running"
      ansible.builtin.command: "pct status {{ lxc_template.id }}"
      register: ct_running
      until: "'running' in ct_running.stdout"
      retries: 10
      delay: 2
      changed_when: false

    - name: "Update apt in container {{ lxc_template.id }}"
      ansible.builtin.command: "pct exec {{ lxc_template.id }} -- apt-get update"
      changed_when: true

    # openssh-server MUST be installed before baseline.sh runs — the
    # script invokes `sshd -t` to validate its rendered drop-in.
    # The LXC base image doesn't ship sshd; without it the validation
    # would skip silently (the script tolerates a missing sshd binary
    # so it still works during preseed late_command) and a broken
    # drop-in could land. Installing here makes the validate trip.
    - name: "Install packages in container {{ lxc_template.id }}"
      ansible.builtin.command: "pct exec {{ lxc_template.id }} -- apt-get install -y {{ lxc_packages }}"
      changed_when: true

    # ── Canonical baseline (users, sudo, sshd drop-in, apt kill-switch,
    #    root-lock) — same script every medium runs. See
    #    files/image-baseline.sh.j2 + group_vars/all/image-baseline.yml.
    - name: "Push baseline script into container {{ lxc_template.id }}"
      ansible.builtin.command: >
        pct push {{ lxc_template.id }}
        {{ image_baseline_rendered_path }}
        /var/tmp/image-baseline.sh
        --perms 0700
      changed_when: true

    - name: "Run baseline script inside container {{ lxc_template.id }}"
      ansible.builtin.command: "pct exec {{ lxc_template.id }} -- bash /var/tmp/image-baseline.sh"
      changed_when: true

    - name: "Remove baseline script from container {{ lxc_template.id }} (contains vault hash)"
      ansible.builtin.command: "pct exec {{ lxc_template.id }} -- rm -f /var/tmp/image-baseline.sh"
      changed_when: true

    # First-boot SSH host-key regenerator. The next step deletes
    # /etc/ssh/ssh_host_* so every clone gets unique keys; with no
    # host keys present, ssh.service fails to start ("no host keys
    # available") and the clone is unreachable unless something
    # regenerates them before sshd binds.
    #
    # Debian Trixie's openssh-server ships `sshd-keygen.service`
    # (Type=oneshot, ExecStart=ssh-keygen -A, Before=ssh.service,
    # WantedBy=ssh.service) which is precisely the right hook —
    # except it carries `ConditionFirstBoot=yes`. That condition is
    # unreliable for cloned LXCs (the firstboot marker is set from
    # systemd-machine-id-setup state during early boot, and in a
    # cloned unprivileged LXC the marker often ends up NOT set even
    # though we truncate /etc/machine-id in the next step), so the
    # unit silently skips on every boot of the clone.
    #
    # A drop-in on `ssh.service` itself is the wrong layer: upstream
    # declares `ExecStartPre=/usr/sbin/sshd -t` FIRST with
    # ignore_errors=no, and `sshd -t` exits non-zero when host keys
    # are missing — aborting the start before any appended drop-in
    # ExecStartPre can run.
    #
    # So instead: drop-in on sshd-keygen.service that CLEARS
    # ConditionFirstBoot (empty assignment resets the directive).
    # ssh-keygen -A is itself idempotent — only creates missing keys —
    # so running it every boot is harmless. Installed BEFORE the
    # ssh-host-key reset so the drop-in itself survives
    # templatize-and-clone.
    - name: "Install sshd-keygen.service drop-in to clear ConditionFirstBoot in {{ lxc_template.id }}"
      ansible.builtin.shell: |
        set -e
        pct exec {{ lxc_template.id }} -- mkdir -p /etc/systemd/system/sshd-keygen.service.d
        pct exec {{ lxc_template.id }} -- bash -c "cat > /etc/systemd/system/sshd-keygen.service.d/no-firstboot.conf <<'EOF'
        [Unit]
        ConditionFirstBoot=
        EOF"
        pct exec {{ lxc_template.id }} -- systemctl daemon-reload
      changed_when: true

    # Reset host identity so every clone gets unique DHCP client-id + SSH host
    # keys. systemd-networkd derives the DHCP client-id from /etc/machine-id,
    # so without this every clone presents the same id to dnsmasq and gets the
    # same lease. The ssh.service drop-in installed in the previous step is
    # what makes the SSH key deletion safe — it regenerates keys on first
    # boot before ssh.service tries to bind.
    - name: "Reset host identity in container {{ lxc_template.id }}"
      ansible.builtin.shell: |
        pct exec {{ lxc_template.id }} -- truncate -s 0 /etc/machine-id
        pct exec {{ lxc_template.id }} -- sh -c '[ -L /var/lib/dbus/machine-id ] || truncate -s 0 /var/lib/dbus/machine-id'
        pct exec {{ lxc_template.id }} -- sh -c 'rm -f /etc/ssh/ssh_host_*'
      changed_when: true

    - name: "Stop container {{ lxc_template.id }}"
      ansible.builtin.command: "pct stop {{ lxc_template.id }}"
      changed_when: true

    - name: "Convert container {{ lxc_template.id }} to template"
      ansible.builtin.command: "pct template {{ lxc_template.id }}"
      changed_when: true
