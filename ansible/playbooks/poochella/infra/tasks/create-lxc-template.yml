---
# Creates a single LXC template container if it doesn't already exist.
# Required vars:
#   lxc_template    – dict with id, hostname, image
#   lxc_packages    – space-separated package list for apt-get install
#   ansible_pubkey  – contents of ~/.ssh/ansible.pub on the controller

- name: "Check if LXC template {{ lxc_template.id }} exists"
  ansible.builtin.command: "pct status {{ lxc_template.id }}"
  register: lxc_status
  failed_when: false
  changed_when: false

- name: "Create LXC template {{ lxc_template.id }} ({{ lxc_template.hostname }})"
  when: lxc_status.rc != 0
  block:
    - name: "Create container {{ lxc_template.id }}"
      ansible.builtin.command: >
        pct create {{ lxc_template.id }}
        local:vztmpl/{{ lxc_template.image }}
        --hostname {{ lxc_template.hostname }}
        --memory 512
        --cores 1
        --net0 name=eth0,bridge=vmbr0,ip=dhcp,firewall=1
        --storage vms
        --unprivileged 1
        --features nesting=1
      changed_when: true

    - name: "Start container {{ lxc_template.id }}"
      ansible.builtin.command: "pct start {{ lxc_template.id }}"
      changed_when: true

    - name: "Wait for container {{ lxc_template.id }} to be running"
      ansible.builtin.command: "pct status {{ lxc_template.id }}"
      register: ct_running
      until: "'running' in ct_running.stdout"
      retries: 10
      delay: 2
      changed_when: false

    - name: "Update apt in container {{ lxc_template.id }}"
      ansible.builtin.command: "pct exec {{ lxc_template.id }} -- apt-get update"
      changed_when: true

    - name: "Install packages in container {{ lxc_template.id }}"
      ansible.builtin.command: "pct exec {{ lxc_template.id }} -- apt-get install -y {{ lxc_packages }}"
      changed_when: true

    - name: "Inject SSH public key for root in container {{ lxc_template.id }}"
      ansible.builtin.shell: |
        pct exec {{ lxc_template.id }} -- mkdir -p /root/.ssh
        pct exec {{ lxc_template.id }} -- chmod 700 /root/.ssh
        pct exec {{ lxc_template.id }} -- sh -c 'echo "{{ ansible_pubkey }}" > /root/.ssh/authorized_keys'
        pct exec {{ lxc_template.id }} -- chmod 600 /root/.ssh/authorized_keys
      changed_when: true

    - name: "Create ansible user in container {{ lxc_template.id }}"
      ansible.builtin.command: "pct exec {{ lxc_template.id }} -- useradd -m -s /bin/bash -G sudo ansible"
      changed_when: true

    - name: "Inject SSH public key for ansible in container {{ lxc_template.id }}"
      ansible.builtin.shell: |
        pct exec {{ lxc_template.id }} -- mkdir -p /home/ansible/.ssh
        pct exec {{ lxc_template.id }} -- chmod 700 /home/ansible/.ssh
        pct exec {{ lxc_template.id }} -- sh -c 'echo "{{ ansible_pubkey }}" > /home/ansible/.ssh/authorized_keys'
        pct exec {{ lxc_template.id }} -- chmod 600 /home/ansible/.ssh/authorized_keys
        pct exec {{ lxc_template.id }} -- chown -R ansible:ansible /home/ansible/.ssh
      changed_when: true

    - name: "Grant passwordless sudo to ansible in container {{ lxc_template.id }}"
      ansible.builtin.shell: |
        pct exec {{ lxc_template.id }} -- sh -c 'echo "ansible ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/90-ansible'
        pct exec {{ lxc_template.id }} -- chmod 0440 /etc/sudoers.d/90-ansible
      changed_when: true

    - name: "Lock root password in container {{ lxc_template.id }}"
      ansible.builtin.command: "{{ item }}"
      loop:
        - "pct exec {{ lxc_template.id }} -- passwd -d root"
        - "pct exec {{ lxc_template.id }} -- passwd -l root"
      changed_when: true

    - name: "Harden SSH in container {{ lxc_template.id }}"
      ansible.builtin.command: "{{ item }}"
      loop:
        - "pct exec {{ lxc_template.id }} -- sed -i 's/^#\\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config"
        - "pct exec {{ lxc_template.id }} -- sed -i 's/^#\\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config"
      changed_when: true

    # First-boot SSH host-key regenerator. The next step deletes
    # /etc/ssh/ssh_host_* so every clone gets unique keys, but Debian
    # Trixie's openssh-server doesn't ship a unit that regenerates them
    # on first boot — ssh.service then fails to start ("no host keys
    # available") and the clone is unreachable. This drop-in runs
    # `dpkg-reconfigure openssh-server` (which regenerates missing keys
    # via openssh-server's postinst) as an ExecStartPre for ssh.service,
    # gated by `! -f /etc/ssh/ssh_host_rsa_key` so subsequent boots
    # skip the work. Installed BEFORE the reset so the drop-in itself
    # survives templatize-and-clone.
    - name: "Install ssh.service drop-in to regenerate host keys on first boot in {{ lxc_template.id }}"
      ansible.builtin.shell: |
        set -e
        pct exec {{ lxc_template.id }} -- mkdir -p /etc/systemd/system/ssh.service.d
        pct exec {{ lxc_template.id }} -- bash -c "cat > /etc/systemd/system/ssh.service.d/regenerate-host-keys.conf <<'EOF'
        [Service]
        ExecStartPre=-/bin/sh -c 'if [ ! -f /etc/ssh/ssh_host_rsa_key ]; then DEBIAN_FRONTEND=noninteractive dpkg-reconfigure openssh-server; fi'
        EOF"
        pct exec {{ lxc_template.id }} -- systemctl daemon-reload
      changed_when: true

    # Reset host identity so every clone gets unique DHCP client-id + SSH host
    # keys. systemd-networkd derives the DHCP client-id from /etc/machine-id,
    # so without this every clone presents the same id to dnsmasq and gets the
    # same lease. The ssh.service drop-in installed in the previous step is
    # what makes the SSH key deletion safe — it regenerates keys on first
    # boot before ssh.service tries to bind.
    - name: "Reset host identity in container {{ lxc_template.id }}"
      ansible.builtin.shell: |
        pct exec {{ lxc_template.id }} -- truncate -s 0 /etc/machine-id
        pct exec {{ lxc_template.id }} -- sh -c '[ -L /var/lib/dbus/machine-id ] || truncate -s 0 /var/lib/dbus/machine-id'
        pct exec {{ lxc_template.id }} -- sh -c 'rm -f /etc/ssh/ssh_host_*'
      changed_when: true

    - name: "Stop container {{ lxc_template.id }}"
      ansible.builtin.command: "pct stop {{ lxc_template.id }}"
      changed_when: true

    - name: "Convert container {{ lxc_template.id }} to template"
      ansible.builtin.command: "pct template {{ lxc_template.id }}"
      changed_when: true
