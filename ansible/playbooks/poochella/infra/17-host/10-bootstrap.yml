---
# Tier 17 — Bootstrap baseline on every baremetal Linux host.
#
# Ensures the 'ansible' user (+ pani + tourmanager) exists on every host
# in the `physical` group: PVE hypervisors AND plain Linux workers.
# Tries SSH as 'ansible' first; falls back to root with vault password
# (same path the old 20-hypervisor/10-bootstrap.yml took, just
# generalised to the wider `physical` umbrella).
#
# Must run before any other physical-host playbook so later plays can
# connect as 'ansible'. The PVE-specific 20-hypervisor/10-bootstrap.yml
# now only flips repos and depends on this play having created the
# ansible user.

- name: Detect SSH user for every physical host
  hosts: "{{ target_hosts | default('physical') }}"
  gather_facts: false
  connection: local
  tasks:
    - name: Detect bootstrap user
      ansible.builtin.include_tasks:
        file: ../tasks/detect-bootstrap-user.yml
      vars:
        fallback_user: root

- name: Apply baseline (host-base role) on every physical host
  hosts: "{{ target_hosts | default('physical') }}"
  become: true
  remote_user: "{{ bootstrap_user }}"
  vars:
    # First-time bootstrap on fresh PVE hypervisors connects as root with
    # the vault password (the PVE auto-installer answerfile bakes that
    # root password; `host_root_pass` in group_vars/all/vars.yml must
    # match). The role then resets root to the same value via
    # `ansible.builtin.user`, and subsequent runs use the ansible key —
    # ssh-hardening later sets `PermitRootLogin no`, so this fallback
    # path only fires in the install→ssh-hardening window on a fresh PVE
    # box.
    #
    # Debian baremetal workers DO NOT need the root fallback: their
    # preseed (img/debian/) locks root entirely and creates the ansible
    # user with the canonical key, so detect-bootstrap-user resolves to
    # `ansible` on the very first probe.
    ansible_password: "{{ host_root_pass if use_root_password | default(false) else omit }}"
  roles:
    - role: host-base
