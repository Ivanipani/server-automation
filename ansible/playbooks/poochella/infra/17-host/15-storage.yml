---
# Node-local storage, end to end, for every PHYSICAL host that declares
# `storage.disks` in inventory.yaml. The host-disks role dispatches on
# `host_disks_action` (defaults/main.yml):
#   - info       (DEFAULT) read-only PRESENT/MISSING per declared partition;
#                tolerates missing disks; never halts, never mutates. The
#                `just disk-plan` recipe runs this playbook in info mode.
#   - overwrite  DESTRUCTIVE: preflight gates + wipe-gate per disk + sgdisk
#                carve + LVM-thin pool build + ext4 mount (if `mount:` set).
#                THE explicit consent — set per-host or per-run.
#   - skip       silent no-op (meta: end_host).
#
# PVE registration (`pvesm add lvmthin`) is a hypervisor-only follow-up in
# 20-hypervisor/30-pve-storage-register.yml — NOT in this playbook, which
# is PVE-free.
#
# Hosts without a `storage:` block are silently skipped by the `when:`
# guard on the role import below, so plain physical hosts that don't run
# local storage pools simply pass through this tier without effect.
#
# DISK-CENTRIC + STABLE SELECTORS. Each disk is declared with a
# `select:` that names it by *intent*, never by a kernel device name:
#   - select: boot                 → the auto-detected host boot disk
#     (PVE: the `pve` VG already owns ~100 GiB; the free tail is carved
#      by appending a fresh partition with sgdisk -n.
#      Plain Debian workers: the netboot preseed
#      (roles/bootserv/templates/preseed.cfg.j2, recipe `uefi-4p`)
#      already lays out p1/p2/p3 = 100 GiB OS area + p4 ext4
#      placeholder absorbing the rest; host-disks ADOPTS p4 by
#      sgdisk-c'ing its partlabel and wipefs-clearing the partman
#      ext4 — no new partition is appended. The boot-disk OS area is
#      never touched.)
#   - select: { model, serial }    → one exact physical drive
#   - select: { min_size_gib|size_gib, rotational } → attribute match
# Each disk carries an ordered `partitions:` list; several partitions
# (on different physical disks) may share one vg/thinpool — that is how
# a NVMe + HDD present as a single, larger pool.
#
# Per partition, declare AT MOST ONE of (enforced in preflight):
#   - `pve_storage:` + `content:`      → PVE-registered thin pool (the
#                                        register step lives in
#                                        20-hypervisor/30-pve-storage-register.yml)
#   - `mount: {path,fstype}` + vg/thinpool → ext4 on a thin LV, fstab-mounted
#   - `mount: {path,fstype}` NO vg/thinpool → DIRECT plain ext4 on the bare
#                                        partition (no LVM), fstab-mounted.
#                                        Worker convention: one mount per
#                                        physical disk under
#                                        /var/lib/longhorn-disks/<label> =
#                                        one Longhorn disk (failure isolation).
#   - neither                          → bare pool member: just label/vg/
#                                        thinpool/size. Joins a
#                                        (vg,thinpool) whose target is
#                                        declared on another partition
#                                        (the multi-disk-one-pool LVM
#                                        convention; not used by workers now).
# Preflight (overwrite mode only) additionally asserts every (vg,thinpool)
# has AT LEAST ONE targeted partition (direct-mount partitions are their
# own singleton pools and excluded). Info mode tolerates a node mid-
# migration and reports whatever's actually present.
#
# DECLARED, NOT DISCOVERED: in OVERWRITE mode a selector MUST resolve to
# exactly one non-boot, non-removable disk. Zero or many matches is a
# HARD preflight failure — the role never guesses. In INFO mode the
# zero/many path is tolerant and reports the partitions as
# "MISSING (disk not found)" instead. Kernel renames (sdX/nvmeXnY shuffle
# when a disk is added) are irrelevant. Swapping a disk for an identical
# or larger one needs NO inventory edit when the selector is
# attribute-based; `just disk-plan` reports compliance to confirm before
# you carve.
#
# Idempotent on the GPT partlabel, the VG/thinpool, the thin LV name, and
# the fstab entry, so overwrite-mode re-runs are safe; the pool-build pass
# also GROWS an existing thin pool onto a newly-fitted larger disk.
#
# A data disk that still holds old signatures (stale GPT/MBR/FS/LVM) is
# REFUSED unless that disk declares `wipe: force` in inventory.yaml
# (DECLARED + scoped + self-documenting — the preferred way; it only
# acts when the disk holds foreign signatures and none of our partlabels
# exist yet). The boot disk is never wiped. Emergency fleet-wide
# override (avoid; prefer the per-disk field):
#   ansible-playbook --vault-password-file ansible-pass \
#     playbooks/poochella/infra/17-host/15-storage.yml \
#     -e host_disks_action=overwrite -e host_disks_force_wipe=true \
#     --limit pve-home-01
#
# Disk swap / capacity-expansion runbook: docs/storage-disk-runbook.md
# (drain the Longhorn worker → verify the volume's replica is healthy on
# the PEER physical node → swap → re-run this playbook with
# `-e host_disks_action=overwrite` → Longhorn rebuilds the replica). Data
# safety lives at the Longhorn layer (separate Flux repo), NOT here —
# this playbook only makes the empty re-init safe.
#
# Pre-conditions:
#   - 17-host/10-bootstrap.yml completed (ansible user, repos staged)
#   - PVE hosts: installed with LVM/ext4 root AND `lvm.hdsize = 100` so
#     the boot disk has an unpartitioned tail for the boot pool. See the
#     answer files under scripts/images/proxmox/pve-home-0X.toml.
#   - `storage.disks` declared for each participating host in
#     inventory.yaml (preview compliance with `just disk-plan`)
#   - Overwrite mode only: no real (non-template) VMs or containers exist
#     on any participating hypervisor (the hypervisor-only preflight gate
#     checks this; info mode skips it).

- name: Disk realisation (info / overwrite / skip, per host_disks_action)
  hosts: "{{ target_hosts | default('physical') }}"
  become: true
  tasks:
    - name: Run host-disks role
      ansible.builtin.import_role:
        name: host-disks
      when: storage is defined and storage.disks is defined
