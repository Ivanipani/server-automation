---
# Node-local storage, end to end, for every PHYSICAL host that declares
# `storage.disks` in inventory.yaml. For each such host the playbook
# (1) preflights + resolves selectors, (2) gates each disk then carves
# its GPT partition(s) in declared order, (3) builds the LVM-thin
# pool(s) and ext4-mounts any `mount:` partition's thin LV. PVE
# registration (`pvesm add lvmthin`) is a hypervisor-only follow-up in
# 20-hypervisor/30-pve-storage-register.yml — NOT in this playbook,
# which is PVE-free.
#
# Hosts without a `storage:` block are silently skipped by the `when:`
# guard on each play so plain physical hosts that don't run local
# storage pools simply pass through this tier without effect.
#
# DISK-CENTRIC + STABLE SELECTORS. Each disk is declared with a
# `select:` that names it by *intent*, never by a kernel device name:
#   - select: boot                 → the auto-detected host boot disk
#     (PVE: the `pve` VG already owns ~100 GiB; the free tail is carved.
#      Plain Debian workers: the installer typically takes the whole
#      install_disk, so workers usually do NOT declare `select: boot`.)
#   - select: { model, serial }    → one exact physical drive
#   - select: { min_size_gib|size_gib, rotational } → attribute match
# Each disk carries an ordered `partitions:` list; several partitions
# (on different physical disks) may share one vg/thinpool — that is how
# a NVMe + HDD present as a single, larger pool.
#
# Per partition, declare AT MOST ONE of (enforced in preflight):
#   - `pve_storage:` + `content:`      → PVE-registered thin pool (the
#                                        register step lives in
#                                        20-hypervisor/30-pve-storage-register.yml)
#   - `mount: { path, fstype, ... }`   → ext4 on a thin LV, fstab-mounted
#                                        (worker convention: one
#                                        /var/lib/longhorn mount per node)
#   - neither                          → bare pool member: just label/vg/
#                                        thinpool/size. Joins a
#                                        (vg,thinpool) whose target is
#                                        declared on another partition.
#                                        This is the multi-disk-one-pool
#                                        convention — NVMe + HDD share
#                                        one longhornthin with the mount
#                                        declared on exactly one of them.
# Preflight additionally asserts every (vg,thinpool) has AT LEAST ONE
# targeted partition (you can't have an all-bare pool).
#
# DECLARED, NOT DISCOVERED: a selector MUST resolve to exactly one
# non-boot, non-removable disk. Zero or many matches is a HARD preflight
# failure — the role never guesses. Kernel renames (sdX/nvmeXnY shuffle
# when a disk is added) are irrelevant. Swapping a disk for an identical
# or larger one needs NO inventory edit when the selector is
# attribute-based; `just disk-plan` prints every disk + a paste-ready
# block when you do need to change one.
#
# DESTRUCTIVE on first run (plays 1-2, the carve). Refuses unless
# `confirm_carve_data_disk: true` is set per host (group_vars/physical.yml).
# Idempotent on the GPT partlabel, the VG/thinpool, the thin LV name, and
# the fstab entry, so re-runs (incl. site.yml) are safe; play 3 also
# GROWS an existing thin pool onto a newly-fitted larger disk.
#
# A data disk that still holds old signatures (stale GPT/MBR/FS/LVM) is
# REFUSED unless that disk declares `wipe: force` in inventory.yaml
# (DECLARED + scoped + self-documenting — the preferred way; it only
# acts when the disk holds foreign signatures and none of our partlabels
# exist yet). The boot disk is never wiped. Emergency fleet-wide
# override (avoid; prefer the per-disk field):
#   ansible-playbook --vault-password-file ansible-pass \
#     playbooks/poochella/infra/17-host/15-storage.yml \
#     -e host_disks_force_wipe=true --limit pve-home-01
#
# Disk swap / capacity-expansion runbook: docs/storage-disk-runbook.md
# (drain the Longhorn worker → verify the volume's replica is healthy on
# the PEER physical node → swap → re-run this playbook → Longhorn rebuilds
# the replica). Data safety lives at the Longhorn layer (separate Flux
# repo), NOT here — this playbook only makes the empty re-init safe.
#
# Pre-conditions:
#   - 17-host/10-bootstrap.yml completed (ansible user, repos staged)
#   - PVE hosts: installed with LVM/ext4 root AND `lvm.hdsize = 100` so
#     the boot disk has an unpartitioned tail for the boot pool. See the
#     answer files under scripts/images/proxmox/pve-home-0X.toml.
#   - `storage.disks` declared for each participating host in
#     inventory.yaml (preview the resolution with `just disk-plan`)
#   - No real (non-template) VMs or containers exist on any participating
#     hypervisor (the hypervisor-only preflight gate checks this).

- name: Disk preflight (gates + boot detection + selector resolution)
  hosts: "{{ target_hosts | default('physical') }}"
  become: true
  tasks:
    - name: Run host-disks preflight
      ansible.builtin.import_role:
        name: host-disks
        tasks_from: preflight.yml
      when: storage is defined and storage.disks is defined

- name: Wipe-gate each disk, then carve its partitions in order
  hosts: "{{ target_hosts | default('physical') }}"
  become: true
  tasks:
    - name: Run host-disks carve
      ansible.builtin.import_role:
        name: host-disks
        tasks_from: carve.yml
      when: storage is defined and storage.disks is defined

- name: Build / grow LVM-thin pools and mount any ext4-mount partitions
  hosts: "{{ target_hosts | default('physical') }}"
  become: true
  tasks:
    - name: Run host-disks storage_pools
      ansible.builtin.import_role:
        name: host-disks
        tasks_from: storage_pools.yml
      when: storage is defined and storage.disks is defined
