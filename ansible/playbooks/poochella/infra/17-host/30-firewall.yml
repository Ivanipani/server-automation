---
# Tier 17 — Default-deny firewall on every baremetal Linux host.
#
# Same group-driven pattern as 30-guests/40-firewall.yml: the per-group
# inbound allow-list lives in inventory.yaml on each group's `vars:`
# block as `firewall_inbound_allow`, and resolves to the most-specific
# group (or host) defining it. Today:
#   inventory `physical.vars`     → SSH (22/tcp)        (every host)
#   inventory `hypervisors.vars`  → adds PVE web UI (8006/tcp)
#   inventory `kube_workers.vars` → replaces with k3s worker ports
#
# Outbound is "allow" by default — uniform with the existing fleet
# baseline; tighten per-group/host by setting `firewall_outbound_deny`
# in inventory.yaml.
#
# Pre-condition: 10-bootstrap.yml has run (ansible user exists).

- name: Configure host firewall on every physical host
  hosts: "{{ target_hosts | default('physical') }}"
  become: true
  roles:
    - role: firewall-basic
      vars:
        firewall_basic_scope: 17-host
        inbound_allow: "{{ firewall_inbound_allow | default([]) }}"
