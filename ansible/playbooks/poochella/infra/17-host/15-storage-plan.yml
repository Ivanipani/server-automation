---
# READ-ONLY companion to 15-storage.yml. Prints every physical host's
# disks (model / serial / size / rotational / removable / signatures /
# existing partlabels) plus a paste-ready `storage.disks` skeleton with
# STABLE selectors. Writes nothing — safe anytime. Skeleton output varies
# by group: hypervisors get the PVE-side schema (pve_storage), workers
# get the worker-side schema (mount).
#
# NOT part of the ordered site flow: 17-host/site.yml imports playbooks
# explicitly and deliberately does NOT list this one. Run it via
# `just disk-plan` after adding/swapping a disk, then update
# inventory.yaml by hand and re-run the storage playbook.

- name: Disk plan (read-only)
  hosts: physical
  become: true
  gather_facts: false
  tasks:
    - ansible.builtin.import_role:
        name: host-disks
        tasks_from: discover.yml
