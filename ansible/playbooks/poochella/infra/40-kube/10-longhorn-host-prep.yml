---
# Longhorn (v1 data engine) host ground-prep. HOST prep ONLY —
# installing Longhorn itself (Helm chart / k8s manifests) is done by the
# separate FluxCD repo, not here.
#
# TWO SCOPES, on purpose (the data-safety model depends on this split):
#
#   1. CONSUMER prereqs — open-iscsi/iscsid + the NFSv4 client — on the
#      WHOLE `kubernetes` group (control planes AND workers, plus any
#      future child group e.g. kube_compute). Longhorn is true
#      network-attached storage: a volume's replicas live only on the
#      storage workers, but the volume attaches over iSCSI on *whichever
#      node runs the consuming pod*, and that node mounts it (NFSv4 for
#      RWX / share-manager). k3s control planes here are SCHEDULABLE (no
#      --node-taint), so a PVC-consuming pod can legitimately land on a
#      CP — it must be able to attach. Decision (operator, explicit): a
#      PVC workload may run on whichever node the scheduler picks; the
#      iSCSI/NFS initiator stack therefore belongs cluster-wide. iSCSI
#      lives on the VM guest OS, never the Proxmox hosts (k3s ships no
#      iscsi stack).
#
#   2. DATA-disk prep — assert/ext4/mount the second virtio disk
#      (/dev/vdb, backed by the node-local `longhorn-data` LVM-thin
#      pool) at /var/lib/longhorn — stays `kube_workers` ONLY. Only
#      kube_workers declare `vm.data_disk_size`, so only they have
#      /dev/vdb; and only they carry node.longhorn.io/create-default-disk
#      (group_vars/kube_workers.yml) so Longhorn places REPLICA data
#      (and rebuild IO) on workers only — never on the schedulable etcd
#      control planes. Replica DATA is workers-only; volume CONSUMPTION
#      is cluster-wide. These are independent and must not be conflated.
#
# OPERATIONAL CAVEAT (recorded, not an oversight): remote-attaching a
# heavy-IO stateful pod onto a control plane puts that pod's app IO +
# the iSCSI traffic to the worker-resident replicas on the CP's single
# shared 1GbE NIC, alongside etcd. The capability is intentional ("run
# on whichever node it can"); for IO-heavy workloads still PREFER the
# storage/compute workers via soft node affinity rather than relying on
# the scheduler's default spread.
#
# Pre-conditions:
#   - 30-provision/10-opentofu.yml completed (worker VMs exist with a
#     `vm.data_disk_size` declared in inventory.yaml → virtio1 disk)
#   - 20-bootstrap.yml completed (ansible reachable on all kube VMs)

- name: Install Longhorn consumer prerequisites (every schedulable node)
  hosts: kubernetes
  become: true
  tasks:
    - name: Install Longhorn host prerequisites
      ansible.builtin.apt:
        name:
          - open-iscsi   # Longhorn attaches volumes over iSCSI (required)
          - nfs-common   # NFSv4 client: required for RWX volumes & backups
        state: present

    - name: Ensure the iscsi_tcp module is loaded now and on boot
      community.general.modprobe:
        name: iscsi_tcp
        state: present
        persistent: present

    - name: Ensure iscsid is enabled and running
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

- name: Prepare the Longhorn data disk (storage workers only)
  hosts: kube_workers
  become: true
  vars:
    longhorn_data_device: /dev/vdb
    longhorn_data_path: /var/lib/longhorn
  tasks:
    - name: Assert the Longhorn data disk is present
      ansible.builtin.stat:
        path: "{{ longhorn_data_device }}"
      register: longhorn_disk
      failed_when: not longhorn_disk.stat.exists

    - name: Create an ext4 filesystem on the Longhorn data disk
      community.general.filesystem:
        fstype: ext4
        dev: "{{ longhorn_data_device }}"
        # Never reformat an already-formatted disk (no `force`).

    - name: Read the filesystem UUID
      ansible.builtin.command: "blkid -s UUID -o value {{ longhorn_data_device }}"
      register: longhorn_fs_uuid
      changed_when: false

    - name: Ensure the Longhorn data directory exists
      ansible.builtin.file:
        path: "{{ longhorn_data_path }}"
        state: directory
        mode: "0755"

    - name: Mount the Longhorn data disk by UUID (persisted in fstab)
      ansible.posix.mount:
        path: "{{ longhorn_data_path }}"
        src: "UUID={{ longhorn_fs_uuid.stdout | trim }}"
        fstype: ext4
        opts: defaults
        state: mounted
