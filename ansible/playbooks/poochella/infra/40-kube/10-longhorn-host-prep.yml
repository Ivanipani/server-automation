---
# Longhorn (v1 data engine) consumer prerequisites on every schedulable k3s node
#
# OPERATIONAL CAVEAT: remote-attaching a
# heavy-IO stateful pod onto a control plane puts that pod's app IO +
# the iSCSI traffic to the worker-resident replicas on the CP's single
# shared 1GbE NIC, alongside etcd. The capability is intentional ("run
# on whichever node it can"); for IO-heavy workloads still PREFER the
# baremetal workers via soft node affinity rather than relying on the
# scheduler's default spread.

- name: Install Longhorn consumer prerequisites (every schedulable node)
  hosts: kubernetes
  become: true
  tasks:
    - name: Install Longhorn host prerequisites
      ansible.builtin.apt:
        name:
          - open-iscsi   # Longhorn attaches volumes over iSCSI (required)
          - nfs-common   # NFSv4 client: required for RWX volumes & backups
        state: present

    - name: Ensure the iscsi_tcp module is loaded now and on boot
      community.general.modprobe:
        name: iscsi_tcp
        state: present
        persistent: present

    - name: Ensure iscsid is enabled and running
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started
