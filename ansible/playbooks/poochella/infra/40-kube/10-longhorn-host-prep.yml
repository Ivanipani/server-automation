---
# Longhorn (v1 data engine) consumer prerequisites on every schedulable
# k3s node — installing Longhorn itself (Helm chart / k8s manifests) is
# done by the separate FluxCD repo, not here.
#
# Longhorn is true network-attached storage: a volume's replicas live
# only on the storage workers (which today are BAREMETAL kube_workers —
# Longhorn replica state never lives on a VM), but the volume attaches
# over iSCSI on *whichever node runs the consuming pod*, and that node
# mounts it (NFSv4 for RWX / share-manager). k3s control planes here are
# SCHEDULABLE (no --node-taint), so a PVC-consuming pod can legitimately
# land on a CP — it must be able to attach. The iSCSI/NFS initiator
# stack therefore belongs cluster-wide. iSCSI lives on the VM guest OS,
# never the Proxmox hosts (k3s ships no iscsi stack).
#
# Replica DATA paths are realised by the host-disks role on the baremetal
# kube_workers themselves, driven from each worker's inventory
# `storage.disks` block by 17-host/15-storage.yml: each physical disk is
# its own plain-ext4 mount under /var/lib/longhorn-disks/<label>, and the
# Flux repo registers each as an explicit Longhorn disk (the single
# default-disk-at-/var/lib/longhorn mechanism is OFF). No VM ever receives
# a Longhorn-backed data disk: the model is k3s-on-baremetal for replica
# state; VM control planes are pure consumers via the iSCSI/NFS clients
# installed below.
#
# OPERATIONAL CAVEAT (recorded, not an oversight): remote-attaching a
# heavy-IO stateful pod onto a control plane puts that pod's app IO +
# the iSCSI traffic to the worker-resident replicas on the CP's single
# shared 1GbE NIC, alongside etcd. The capability is intentional ("run
# on whichever node it can"); for IO-heavy workloads still PREFER the
# baremetal workers via soft node affinity rather than relying on the
# scheduler's default spread.
#
# Pre-conditions:
#   - 20-bootstrap.yml completed (ansible reachable on all kube nodes)

- name: Install Longhorn consumer prerequisites (every schedulable node)
  hosts: kubernetes
  become: true
  tasks:
    - name: Install Longhorn host prerequisites
      ansible.builtin.apt:
        name:
          - open-iscsi   # Longhorn attaches volumes over iSCSI (required)
          - nfs-common   # NFSv4 client: required for RWX volumes & backups
        state: present

    - name: Ensure the iscsi_tcp module is loaded now and on boot
      community.general.modprobe:
        name: iscsi_tcp
        state: present
        persistent: present

    - name: Ensure iscsid is enabled and running
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started
