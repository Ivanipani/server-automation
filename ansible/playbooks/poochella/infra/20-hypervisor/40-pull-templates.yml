---
# Phase 0: Ensure every Proxmox node has its own VM/LXC templates before
# Tofu provisioning. Consume-only — the customize work runs ONCE on the
# foundation hypervisor (13-foundation/95-bake-publish-images.yml) and
# publishes to bootserv01; this playbook just fetches the centrally-
# baked artifact and templatizes locally on every node in `hypervisors`.
#
# CONSUME-FROM-BOOTSERV: VM storage is node-local LVM-thin and Proxmox
# nodes are independent (per-group topology; see inventory.yaml). The
# old BAKE-PER-NODE design downloaded + virt-customized + syspreped the
# qcow2 on EVERY node, producing per-node drift in package versions and
# customize timing. The new design produces the canonical artifact once
# on foundation, publishes via bootserv01 HTTP, and consumes here. Every
# node gets a byte-identical template.
#
# On the foundation node specifically: the local LXC template was built
# directly by 13-foundation/50-bootstrap-lxc-template.yml (the bootstrap
# chicken-and-egg), so the consume-lxc step's `pct status` skip is hit
# and foundation never re-pulls its own LXC artifact. The VM template
# on foundation IS consumed from bootserv01 (foundation does a self-
# fetch loopback over vmbr0 — cheap, keeps producer/consumer paths
# symmetric).
#
# Template IDs come from the fleet-wide `template_vm_id_base` /
# `template_ct_id_base` scalars in inventory.yaml (single source of truth,
# also read by tofu/modules/hypervisor/locals.tf). Standalone nodes each
# own an independent VMID namespace, so the anchor is the SAME on every
# node — not a per-host map. The anchor is the *first* template ID; the
# per-image-family templates are
# anchor+0, anchor+1, … in vm_templates_base / lxc_templates_base
# order. VMIDs only need to be unique per node now (standalone-only
# topology), but distinct anchors stay harmless.
#
# Pre-conditions:
#   - 30-storage.yml has run (the `vms` LVM-thin storage exists on
#     every node — pct restore / qm importdisk land here).
#   - bootserv01 is reachable at http://bootserv01.lan/ (so every node
#     can fetch the centrally-baked artifacts). 13-foundation has
#     produced + published both artifacts.
#
# Flags:
#   build_lxc_templates      – run the LXC consume phase.
#   build_vm_templates       – run the VM consume phase.
#   purge_existing_templates – destroy this node's existing VM/LXC
#                              templates before re-consuming. DEFAULT
#                              false: a re-run (incl. site.yml) is then
#                              idempotent and non-destructive — the
#                              per-template status checks short-circuit
#                              and existing templates are left untouched.
#                              Opt in (`-e purge_existing_templates=true`)
#                              ONLY for a deliberate clean rebuild, e.g.
#                              after re-pinning an image. A failed fetch
#                              mid-purge leaves the node with no
#                              template, so this is never the site.yml
#                              default.
#
# Re-pin = bump image_url + image_file (VM) or image (LXC) in
# ../vars/templates.yml + re-run 13-foundation/95-bake-publish-images.yml
# to republish + re-run this consume playbook against `hypervisors`.
#
# After re-baking, re-provision any existing clones via the
# 30-provision tier (30-provision/10-opentofu.yml).

- name: Consume centrally-baked VM/LXC templates on every Proxmox node
  hosts: "{{ target_hosts | default('hypervisors') }}"
  gather_facts: false
  become: true
  vars_files:
    - ../vars/templates.yml
  vars:
    build_lxc_templates: true
    build_vm_templates: true
    # Non-destructive by default: re-runs (and site.yml) leave existing
    # templates intact. Opt in for a deliberate clean rebuild only:
    #   -e purge_existing_templates=true
    purge_existing_templates: false

  pre_tasks:
    - name: Derive this node's VM template list (anchor + index)
      ansible.builtin.set_fact:
        vm_templates: "{{ vm_templates | default([]) + [tmpl | combine({'id': (template_vm_id_base | int) + idx})] }}"
      loop: "{{ vm_templates_base }}"
      loop_control:
        loop_var: tmpl
        index_var: idx
        label: "{{ tmpl.name }} → {{ (template_vm_id_base | int) + idx }}"

    - name: Derive this node's LXC template list (anchor + index)
      ansible.builtin.set_fact:
        lxc_templates: "{{ lxc_templates | default([]) + [tmpl | combine({'id': (template_ct_id_base | int) + idx})] }}"
      loop: "{{ lxc_templates_base }}"
      loop_control:
        loop_var: tmpl
        index_var: idx
        label: "{{ tmpl.hostname }} → {{ (template_ct_id_base | int) + idx }}"

  tasks:
    # ── Purge this node's existing templates (clean rebuild) ───────────

    - name: Destroy this node's existing VM templates
      ansible.builtin.command: "qm destroy {{ item.id }} --purge"
      loop: "{{ vm_templates }}"
      loop_control:
        label: "{{ item.name }} ({{ item.id }})"
      register: vm_destroy
      changed_when: vm_destroy.rc == 0
      failed_when:
        - vm_destroy.rc != 0
        - "'does not exist' not in vm_destroy.stderr"
      when:
        - build_vm_templates | bool
        - purge_existing_templates | bool

    - name: Destroy this node's existing LXC templates
      ansible.builtin.command: "pct destroy {{ item.id }} --purge"
      loop: "{{ lxc_templates }}"
      loop_control:
        label: "{{ item.hostname }} ({{ item.id }})"
      register: lxc_destroy
      changed_when: lxc_destroy.rc == 0
      failed_when:
        - lxc_destroy.rc != 0
        - "'does not exist' not in lxc_destroy.stderr"
      when:
        - build_lxc_templates | bool
        - purge_existing_templates | bool

    # ── LXC templates ──────────────────────────────────────────────────

    - name: Consume LXC templates from bootserv01
      when: build_lxc_templates | bool
      ansible.builtin.include_tasks: ../tasks/consume-lxc-template.yml
      loop: "{{ lxc_templates }}"
      loop_control:
        loop_var: lxc_template
        label: "{{ lxc_template.hostname }} ({{ lxc_template.id }})"

    # ── VM templates ───────────────────────────────────────────────────

    - name: Consume VM templates from bootserv01
      when: build_vm_templates | bool
      ansible.builtin.include_tasks: ../tasks/consume-vm-template.yml
      loop: "{{ vm_templates }}"
      loop_control:
        loop_var: vm_template
        label: "{{ vm_template.name }} ({{ vm_template.id }})"
