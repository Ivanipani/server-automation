---
# ⚠ KNOWN BROKEN — Phase 2 NFS migration pending (2026-05-21).
#
# This playbook + scripts/images/vm/debian-13.pkr.hcl currently push
# qcow2s to the NAS via rsync-over-SSH (`nas_rsync_target`/
# `nas_ssh_target`). Those group_vars exports were REMOVED when we
# moved the NAS to a pure-NFS design (15-nas/site.yml header
# explains why). Until this playbook is reworked to:
#   1. NFS-mount nas_nfs_mount_source on the PVE build host
#   2. Have Packer write qcow2s into the mounted path as local files
#   3. unmount on completion
# … running `just bake-images` will fail with undefined-variable
# errors for nas_rsync_target / nas_ssh_target. The `proxmox` NFS
# share is already declared in inventory and provisioned by the
# 15-nas tier; only the mount + Packer post-processor changes remain.
#
# Phase H4: Bake golden VM qcow2(s) on a single PVE build host and
# publish them to the NAS. Replaces the per-node `virt-customize` +
# `qm template` bake (20-hypervisor/40-templates.yml, now LEGACY — see
# its header). The active provisioning path is
#   Packer → NAS (HTTPS) → tofu/modules/vm's
#   proxmox_virtual_environment_download_file → disk.import_from.
#
# WHY: with per-node templates we paid the download + customize +
# sysprep cost on every Proxmox node and produced N subtly-different
# artifacts (different sysprep timestamps in logs etc.). One Packer
# build lands ONE plain qcow2 on the NAS and Tofu pulls the same bytes
# onto each PVE node's local ISO storage at provision time.
#
# WHAT RUNS WHERE: this playbook targets a SINGLE PVE node (the
# `image_build_host`, default `pve-home-01`). Packer needs KVM + a few
# hundred MiB of scratch under /var/tmp; running it on every hypervisor
# would be wasteful and would race for the NAS rsync target.
#
# OUTPUT: ${nas_rsync_target}/<family>-YYYYMMDDhhmm.qcow2 plus a
# <family>-latest.qcow2 symlink atomically refreshed by the
# post-processor. Tofu consumes ${nas_images_url_base}/<family>-latest.qcow2
# (or a pinned dated URL) via proxmox_virtual_environment_download_file.
#
# Pre-conditions:
#   - 10-bootstrap.yml has run on the build host (ansible user, sudo,
#     baseline tooling).
#   - The `storage` group is populated in inventory.yaml (so the
#     hostvars-derived nas_* values in group_vars/all/vars.yml resolve).
#   - The build host's `ansible` user has an SSH key authorised on the
#     NAS publish account (rsync over SSH; key-only). The NAS publish
#     account also needs shell + write to the images directory.
#
# Flags:
#   image_families      – list of families to build. Default ["debian-13"].
#   image_build_host    – which inventory host runs Packer. Default
#                         `pve-home-01`. Limit at runtime to override.
#
# After publishing, `just tofu-apply` to pull the new image onto each
# PVE node's `local` ISO storage. EXISTING VMs are not migrated — they
# keep their current disks (tofu/modules/vm/main.tf's
# lifecycle.ignore_changes = [disk] is what makes this safe).

- name: Bake VM golden images on the chosen PVE build host
  hosts: "{{ image_build_host | default('pve-home-01') }}"
  gather_facts: false
  become: true
  vars:
    image_families:
      - debian-13
  tasks:
    - name: Ensure Packer + qemu + provisioning deps are installed
      ansible.builtin.apt:
        name:
          - packer
          - ansible
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure working directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        mode: "0755"
      loop:
        - /opt/packer-images
        - /opt/packer-roles

    - name: Sync Packer sources to the build host
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../../scripts/images/vm/"
        dest: /opt/packer-images/
        delete: true
        rsync_opts:
          - "--exclude=.packer.d"
          - "--exclude=output-*"

    - name: Sync ansible roles needed by Packer to the build host
      # golden-image-bake imports apt-no-auto-upgrades, so both must
      # land in /opt/packer-roles/. The packer ansible provisioner's
      # --roles-path points here.
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../../roles/{{ item }}/"
        dest: "/opt/packer-roles/{{ item }}/"
        delete: true
      loop:
        - golden-image-bake
        - apt-no-auto-upgrades

    - name: Install ansible collections required by the bake role
      ansible.builtin.command:
        cmd: ansible-galaxy collection install ansible.posix community.general
        creates: /root/.ansible/collections/ansible_collections/ansible/posix

    - name: packer init (downloads required plugins; idempotent)
      ansible.builtin.command:
        cmd: packer init .
        chdir: /opt/packer-images
      register: packer_init
      changed_when: "'Installed plugin' in packer_init.stdout"

    - name: packer build {{ image_family }}
      ansible.builtin.command:
        cmd: >-
          packer build
          -force
          -var=image_family={{ image_family }}
          -var=ansible_pubkey={{ lookup('file', '~/.ssh/ansible.pub') | quote }}
          -var=nas_rsync_target={{ nas_rsync_target | quote }}
          -var=nas_ssh_target={{ nas_ssh_target | quote }}
          -var=nas_images_dir={{ nas_images_dir | quote }}
          .
        chdir: /opt/packer-images
      loop: "{{ image_families }}"
      loop_control:
        loop_var: image_family
      register: packer_build
      changed_when: "'Builds finished' in packer_build.stdout"
