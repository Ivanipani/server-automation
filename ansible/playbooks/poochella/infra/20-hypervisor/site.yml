---
# Tier H — Proxmox hypervisor fabric (PVE-only).
#
# Generic baremetal setup (users, sudo/zsh, SSH hardening, firewall,
# tailscale, node-exporter) and the LVM substrate (disk carve + LVM-thin
# pools + NFS mounts) live in the 17-host tier and run against the wider
# `physical` group. This tier shrinks to the PVE-only steps and targets
# `hypervisors`.
#
# The customize work (virt-customize + sysprep + LXC pct exec + vzdump
# publish) runs ONCE on the foundation hypervisor via
# 13-foundation/95-bake-publish-images.yml. That tier MUST complete
# before this one for fresh nodes (the consume step here has no fallback
# if bootserv01 lacks the artifact).
#
# 20-cluster.yml is gated off by an assertion at the top of the playbook;
# PVE clustering is no longer a supported topology in this repo. The
# cluster task files under `roles/hypervisor/` are kept as deprecated
# reference.
- import_playbook: 20-cluster.yml
- import_playbook: 30-pve-storage-register.yml
- import_playbook: 40-pull-templates.yml
