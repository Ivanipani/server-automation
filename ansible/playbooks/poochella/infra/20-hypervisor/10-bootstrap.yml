---
# PVE-only bootstrap: switch from enterprise → no-subscription PVE/Ceph
# repos. Generic baremetal setup (users, sudo/zsh, root password,
# apt-no-auto-upgrades) lives in 17-host/10-bootstrap.yml; the slimmed
# `hypervisor` role here only flips repos.
#
# Pre-condition (happy-path order): 17-host/10-bootstrap.yml has run,
# so the `ansible` user exists. Self-detect still falls back to root +
# vault password so this playbook is safe to run in isolation
# (`just run --limit pve-home-01`) even on a host that hasn't been
# through the 17-host tier yet.

- name: Detect SSH user for hypervisors
  hosts: hypervisors
  gather_facts: false
  connection: local
  tasks:
    - name: Detect bootstrap user
      ansible.builtin.include_tasks:
        file: ../tasks/detect-bootstrap-user.yml
      vars:
        fallback_user: root

- name: Flip Proxmox enterprise → no-subscription repos
  hosts: hypervisors
  become: true
  remote_user: "{{ bootstrap_user }}"
  vars:
    ansible_password: "{{ hypervisor_root_pass if use_root_password | default(false) else omit }}"
  roles:
    - role: hypervisor
