---
# Create the dedicated Proxmox service account that drives Tofu.
#
# Every hypervisor is a standalone PVE host (no shared /etc/pve), so the
# account is materialised independently on each node — same userid, same
# scoped role, same password (from the vault), but a separate entry in
# each node's local PVE auth DB.
#
#   user : advanceteam@pve   (PVE-internal realm — no Linux/system account)
#   role : Terraform         (scoped custom ACL role, granted on `/`)
#   pass : vault_advanceteam_user_pass (re-exported as advanceteam_user_pass)
#
# The `Terraform` role's privilege set is the dedicated-user example from
# the bpg/proxmox provider docs (the provider the fleet pins, ~> 0.107):
#   https://registry.terraform.io/providers/bpg/proxmox/latest/docs
# It is scoped (a named role) rather than blanket Administrator, but is
# deliberately the full provider-recommended set so every current and
# future Tofu operation keeps working. Trim it only with a concrete
# reason — drift between this list and the provider's needs surfaces as
# opaque 403s at `tofu apply` time.
#
# NOTE: this only CREATES the account. The Tofu provider still
# authenticates with the existing root@pam!tofu-lan API token (see
# 30-guests/10-opentofu.yml); rewiring it to advanceteam is a separate,
# deliberate change.
#
# Idempotency:
#   - role  : created if absent; its privs are re-synced on drift only.
#   - user  : created if absent. The password is set ONLY on creation
#             (`pveum user add --password`); rotating it later is a
#             manual `pveum passwd advanceteam@pve` on each node.
#   - acl   : granted only if the (path=/, user, role) tuple is missing.
#
# Pre-conditions:
#   - The `ansible` user + sudo exist on each hypervisor (host-base, run
#     by the 17-host tier).

- name: Create the advanceteam Tofu service account on each hypervisor
  hosts: "{{ target_hosts | default('hypervisors') }}"
  become: true
  gather_facts: false
  vars:
    sa_userid: "advanceteam@pve"
    sa_role: "Terraform"
    sa_comment: "Service account for OpenTofu/Terraform (managed by Ansible)"
    # Verbatim from the bpg/proxmox provider's dedicated-user docs.
    sa_role_privs:
      - Realm.AllocateUser
      - VM.PowerMgmt
      - VM.GuestAgent.Unrestricted
      - Sys.Console
      - Sys.Audit
      - Sys.AccessNetwork
      - VM.Config.Cloudinit
      - VM.Replicate
      - Pool.Allocate
      - SDN.Audit
      - Realm.Allocate
      - SDN.Use
      - Mapping.Modify
      - VM.Config.Memory
      - VM.GuestAgent.FileSystemMgmt
      - VM.Allocate
      - SDN.Allocate
      - VM.Console
      - VM.Clone
      - VM.Backup
      - Datastore.AllocateTemplate
      - VM.Snapshot
      - VM.Config.Network
      - Sys.Incoming
      - Sys.Modify
      - VM.Snapshot.Rollback
      - VM.Config.Disk
      - Datastore.Allocate
      - VM.Config.CPU
      - VM.Config.CDROM
      - Group.Allocate
      - Datastore.Audit
      - VM.Migrate
      - VM.GuestAgent.FileWrite
      - Mapping.Use
      - Datastore.AllocateSpace
      - Sys.Syslog
      - VM.Config.Options
      - Pool.Audit
      - User.Modify
      - VM.Config.HWType
      - VM.Audit
      - Sys.PowerMgmt
      - VM.GuestAgent.Audit
      - Mapping.Audit
      - VM.GuestAgent.FileRead
      - Permissions.Modify
  tasks:
    # ---- Role -------------------------------------------------------------
    - name: List existing PVE roles
      ansible.builtin.command:
        cmd: pveum role list --output-format json
      register: pve_role_list
      changed_when: false

    - name: Resolve the current/desired privilege sets for the role
      ansible.builtin.set_fact:
        _sa_role_present: >-
          {{ sa_role in (pve_role_list.stdout | from_json
             | map(attribute='roleid') | list) }}
        _sa_privs_desired: "{{ sa_role_privs | sort }}"
        _sa_privs_current: >-
          {{ ((pve_role_list.stdout | from_json
             | selectattr('roleid', 'equalto', sa_role) | list | first
             | default({})).privs | default('')).split(',')
             | select('truthy') | sort }}

    - name: Create the scoped Terraform role
      ansible.builtin.command:
        cmd: "pveum role add {{ sa_role }} --privs {{ sa_role_privs | join(',') }}"
      when: not _sa_role_present
      changed_when: true

    - name: Re-sync the Terraform role's privileges on drift
      ansible.builtin.command:
        cmd: "pveum role modify {{ sa_role }} --privs {{ sa_role_privs | join(',') }}"
      when:
        - _sa_role_present
        - _sa_privs_current != _sa_privs_desired
      changed_when: true

    # ---- User -------------------------------------------------------------
    - name: List existing PVE users
      ansible.builtin.command:
        cmd: pveum user list --output-format json
      register: pve_user_list
      changed_when: false

    - name: Create the advanceteam service account (password set on create only)
      ansible.builtin.command:
        cmd: >-
          pveum user add {{ sa_userid }}
          --password {{ advanceteam_user_pass | quote }}
          --comment {{ sa_comment | quote }}
      when: >-
        sa_userid not in (pve_user_list.stdout | from_json
        | map(attribute='userid') | list)
      no_log: true
      changed_when: true

    # ---- ACL --------------------------------------------------------------
    - name: List current ACL entries
      ansible.builtin.command:
        cmd: pveum acl list --output-format json
      register: pve_acl_list
      changed_when: false

    - name: Grant the Terraform role to advanceteam on /
      ansible.builtin.command:
        cmd: "pveum aclmod / --user {{ sa_userid }} --role {{ sa_role }}"
      when: >-
        (pve_acl_list.stdout | from_json
         | selectattr('path', 'equalto', '/')
         | selectattr('ugid', 'equalto', sa_userid)
         | selectattr('roleid', 'equalto', sa_role)
         | list | length) == 0
      changed_when: true
