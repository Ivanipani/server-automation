---
# Configures OPNsense dnsmasq: general settings, LAN DHCP range, and static
# DHCP+DNS reservations for Proxmox baremetal hosts. Idempotent.
#
# Pre-condition: OPNsense API credentials in vault as `vault_opnsense_api_key`
# and `vault_opnsense_api_secret`. Create them in the OPNsense GUI:
# System -> Access -> Users -> (your user) -> API keys -> +.
#
# Talks to the OPNsense API from the controller; no SSH into the router.
- name: Show interpreter
  hosts: router
  gather_facts: false
  connection: local
  tasks:
    - name:
      debug:
        var: ansible_playbook_python

- name: Configure OPNsense dnsmasq for baremetal
  hosts: router
  gather_facts: false
  connection: local
  module_defaults:
    group/oxlorg.opnsense.dnsmasq:
      firewall: "{{ ansible_host }}"
      api_key: "{{ opnsense_api_key }}"
      api_secret: "{{ opnsense_api_secret }}"
      ssl_verify: false
  vars:
    # Auto-register DHCP-leased VMs/CTs as <hostname>.lan in DNS so cloned
    # nodes are reachable by name without static reservations.
    dnsmasq_register_dynamic_dns: true
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    # PXE flow: turn it on once bootserv01 is in the inventory. The
    # role guards every PXE task with `dnsmasq_pxe_enabled`, so this
    # is the on/off switch for the whole chainload mechanism. The
    # TFTP server is advertised by RESOLVED IP (not hostname): the
    # LXC has no static MAC/IP — its address is whatever dnsmasq's
    # dynamic-DNS assigned — and we resolve it once per playbook run
    # via OPNsense's own DNS so old PXE ROMs that don't do DNS for
    # option 66 (e.g. some Mellanox FlexBoot revisions) still work.
    # If the LXC ever takes a new lease, re-running the playbook
    # refreshes this value. script_url stays as a hostname URL —
    # iPXE itself does DNS resolution natively.
    dnsmasq_pxe_enabled: "{{ 'bootserv01' in groups['all'] }}"
    bootserv_fqdn: "{{ hostvars['bootserv01'].ansible_host | default('bootserv01.lan') }}"
    # Resolved on the controller via `dig +short` against OPNsense
    # (DNS resolver on the LAN). `pipe` lookup avoids the dnspython
    # dependency that the community.general.dig lookup needs.
    dnsmasq_pxe_tftp_servername: "{{ lookup('pipe', 'dig +short ' + bootserv_fqdn + ' @' + (hostvars['opnsense01'].ansible_host | default('10.1.1.1'))) | trim | split('\n') | first }}"
    dnsmasq_pxe_script_url: "http://{{ bootserv_fqdn }}/boot.ipxe"
  pre_tasks:
    # Build the static-lease list from inventory hostvars: every host
    # with `ip_address` plus either `mac_addresses` (physical, list) or
    # `mac_address` (VM, string) gets ONE reservation. OPNsense's
    # dnsmasq_host enforces unique IP per entry, so multi-NIC hosts
    # (e.g. metal-home-01's onboard + dual-port Mellanox) collapse to a
    # single entry with all MACs in `hardware_addr`. The two-field
    # split exists because VMs never have more than one NIC — see
    # the convention block at the top of inventory.yaml.
    # `static_ip: true` (router itself) opts out of any reservation.
    - name: Build static-lease list from inventory hostvars
      ansible.builtin.set_fact:
        dnsmasq_static_leases: >-
          {{
            (dnsmasq_static_leases | default([])) + [{
              'hostname': item,
              'address': hostvars[item].ip_address,
              'macs': hostvars[item].mac_addresses
                       if hostvars[item].mac_addresses is defined
                       else [hostvars[item].mac_address]
            }]
          }}
      loop: "{{ groups['all'] | sort }}"
      when:
        - (hostvars[item].mac_addresses is defined) or (hostvars[item].mac_address is defined)
        - hostvars[item].ip_address is defined
        - not (hostvars[item].static_ip | default(false))
      loop_control:
        label: "{{ item }}"

    # ── Purge stale reservations whose `descr` matches our prefix but
    #    no longer maps to any host in the current inventory. This is
    #    what makes RENAMING a host in inventory work: oxlorg's
    #    dnsmasq_host keys on `description` (FIELD_ID = 'description'),
    #    so renaming pve-home-02 → worker-home-02 in inventory orphans
    #    the existing `lan-static-pve-home-02` entry and a fresh
    #    `lan-static-worker-home-02` would be created with the same
    #    IP — which OPNsense rejects (unique IP per entry). Same fix
    #    handles a host being removed from inventory entirely. We only
    #    touch entries whose description starts with our prefix, so
    #    hand-managed OPNsense entries are never disturbed.
    - name: Fetch current OPNsense dnsmasq state (for orphan detection)
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}/api/dnsmasq/settings/get"
        method: GET
        user: "{{ opnsense_api_key }}"
        password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: _opnsense_dnsmasq_state
      # Always fetch — even in `--check`. The GET is read-only; without
      # this the orphan detector would see an empty state under check
      # mode and report "nothing to clean up" even when entries are
      # actually stale.
      check_mode: false

    - name: Compute the set of descriptions we want present
      ansible.builtin.set_fact:
        _dnsmasq_desired_descriptions: >-
          {{ dnsmasq_static_leases
             | map(attribute='hostname')
             | map('regex_replace', '^', dnsmasq_static_lease_prefix ~ '-')
             | list }}

    - name: Find orphan reservations (our prefix, not in current inventory)
      ansible.builtin.set_fact:
        _dnsmasq_stale_descriptions: >-
          {{ (_opnsense_dnsmasq_state.json.dnsmasq.hosts | default({}) | dict2items)
             | map(attribute='value')
             | selectattr('descr', 'defined')
             | selectattr('descr', 'match', '^' ~ (dnsmasq_static_lease_prefix | regex_escape) ~ '-')
             | rejectattr('descr', 'in', _dnsmasq_desired_descriptions)
             | map(attribute='descr')
             | list }}

    - name: Remove orphan reservations (rename / deletion cleanup)
      oxlorg.opnsense.dnsmasq_host:
        description: "{{ item }}"
        state: absent
      loop: "{{ _dnsmasq_stale_descriptions }}"
      loop_control:
        label: "{{ item }}"
  roles:
    - role: opnsense-dnsmasq
