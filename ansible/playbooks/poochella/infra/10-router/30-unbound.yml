---
# Configures OPNsense Unbound host overrides. Unbound owns port 53 on the
# router (dnsmasq is on 53053), so wildcard A records for cluster ingress
# domains belong here rather than in dnsmasq's Hosts page — the dnsmasq
# plugin's API rejects host overrides with an empty hostname.
#
# Pre-condition: OPNsense API credentials in vault as `vault_opnsense_api_key`
# and `vault_opnsense_api_secret`. Same key/secret as 20-dnsmasq.yml.
#
# Talks to the OPNsense API from the controller; no SSH into the router.
- name: Configure OPNsense Unbound host overrides
  hosts: router
  gather_facts: false
  connection: local
  module_defaults:
    group/oxlorg.opnsense.unbound:
      firewall: "{{ ansible_host }}"
      api_key: "{{ opnsense_api_key }}"
      api_secret: "{{ opnsense_api_secret }}"
      ssl_verify: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  tasks:
    # Wildcard *.doghouse.lan resolves to the MetalLB IP pinned for the
    # Traefik ingress (see k3s HelmChartConfig override), so any Ingress
    # host under doghouse.lan reaches the cluster's ingress controller.
    # Unbound treats hostname '*' as a wildcard match for the domain.
    - name: Wildcard *.doghouse.lan -> Traefik ingress VIP
      oxlorg.opnsense.unbound_host:
        hostname: "*"
        domain: doghouse.lan
        record_type: A
        value: 10.1.1.250
        description: doghouse-ingress-wildcard
        state: present

    # Stable name in front of the k3s apiserver (kube-vip L2 VIP).
    # Lives in the top-level `lan` zone (transparent), NOT under
    # doghouse.lan: the *.doghouse.lan wildcard above makes that zone
    # `redirect`, and Unbound forbids per-host local-data anywhere but
    # the zone apex in a redirect zone ("local-data in redirect zone
    # must reside at top of zone"). Putting the apiserver in .lan also
    # keeps the topology honest — the apiserver is a peer of the
    # ingress, not a service behind it.
    #
    # Hostname + domain are split out of k3s_api_dns_name so this
    # playbook stays inventory-driven: change the name (and the VIP) in
    # group_vars/kubernetes.yml only, and both Unbound and the k3s role
    # follow.
    #
    # We bounce through ANY `kubernetes` member's hostvars (not just a
    # control plane) because `k3s_api_dns_name` and
    # `k3s_kube_vip_address` are group_vars/kubernetes.yml — every kube
    # member (CP, VM worker, baremetal worker) inherits the same
    # cluster-wide value. `kube_control_plane` is empty today
    # (worker-home-02 is currently the only kube node), and indexing an
    # empty list trips Ansible's lazy-templating error. The `when:`
    # gate makes the task skip cleanly when the `kubernetes` group has
    # no members at all.
    - name: api.lan -> k3s apiserver VIP
      oxlorg.opnsense.unbound_host:
        hostname: "{{ hostvars[groups['kubernetes'][0]].k3s_api_dns_name.split('.', 1)[0] }}"
        domain: "{{ hostvars[groups['kubernetes'][0]].k3s_api_dns_name.split('.', 1)[1] }}"
        record_type: A
        value: "{{ hostvars[groups['kubernetes'][0]].k3s_kube_vip_address }}"
        description: doghouse-apiserver
        state: present
      when: groups['kubernetes'] | length > 0

    # NOTE: `nas01.lan` is intentionally NOT defined here. The NAS gets
    # a dnsmasq static DHCP reservation (inventory has its MAC), and
    # dnsmasq_register_static_dns auto-publishes the DNS record — same
    # path every other named LAN host uses. Re-adding an Unbound host
    # override would be a second source of truth for the same name.
