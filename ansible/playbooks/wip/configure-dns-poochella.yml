---
- name: Deploy and configure Pi-hole on pihole2
  hosts: pihole02
  remote_user: root
  pre_tasks:
    - name: Build DNS records from inventory
      ansible.builtin.set_fact:
        pihole_local_dns_records: >-
          [{% for host in groups['all'] if hostvars[host].static_ip | default(false) %}
           {"ip": "{{ hostvars[host].ansible_host }}", "hostname": "{{ host }}"}
           {% if not loop.last %},{% endif %}
          {% endfor %}]
  roles:
    - pihole

- name: Update hypervisor DNS to use pihole2
  hosts: control01
  remote_user: root
  tasks:
    - name: Set DNS to pihole2
      ansible.builtin.template:
        src: templates/resolv.conf.j2
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart networking

  handlers:
    - name: Restart networking
      ansible.builtin.service:
        name: networking
        state: restarted
