# Single source of truth for all hosts in the homelab.
#
# Read by:
#   - Ansible (as its inventory; see ansible.cfg)
#   - OpenTofu (via yamldecode in tofu/locals.tf â€” every host with a `vm:`
#     block becomes a Proxmox VM)
#   - The dnsmasq playbook (every host with `mac_address` defined gets a
#     static DHCP+DNS reservation on OPNsense)
#
# Conventions:
#   - `ip_address` + `mac_address`  â†’ host appears as a dnsmasq static lease
#   - `static_ip: true`             â†’ suppress the dnsmasq reservation (e.g. router)
#   - `vm: {...}`                   â†’ Tofu creates this VM on Proxmox
#   - `vm.data_disk_size: <GiB>`    â†’ attach a 2nd virtio disk backed by
#     the node-local `longhorn-data` PVE storage (k3s workers, Longhorn).
#     One worker per node, sized to consume that node's whole longhorn
#     pool (kept just under the physical pool â€” it is thin-provisioned,
#     so over-committing it would let Longhorn exhaust the pool). The
#     `proxmox_node` MUST point to a hypervisor that yields a
#     `longhorn-data` storage (preflight asserts this); CP-only nodes
#     like pve-home-01 don't and will refuse to host such a VM.
#   - `lxc: { proxmox_node, cores, memory, disk_size, unprivileged,
#     features, tags, ... }` â†’ Tofu creates this LXC on Proxmox
#     (parallels `vm:`). Cloned from `template_ct_ids[proxmox_node]`
#     (Debian 13 LXC anchor). The `tags` list is significant beyond
#     labelling: tag **`infra`** lifts the LXC into a per-node
#     `infra_lxcs` Tofu module that VM modules `depends_on`, so infra
#     LXCs (today: bootserv01) come up before any VM in the same
#     `tofu apply` â€” the ground-up bootstrap invariant. Storage is
#     `vms` (the only pve_storage with `rootdir` content).
#   - `debian_netboot: { install_disk, boot_macs: [...] }` â†’ host is a
#     baremetal Debian target net-booted via iPXE (rendered + served by
#     `bootserv01`). `boot_macs` are the NIC MACs that may initiate PXE
#     â€” all reserved to `ip_address` on OPNsense + dispatched in the
#     rendered iPXE script. `install_disk` is the device the preseed
#     wipes for the Debian install (every other disk untouched).
#   - VM MACs use the locally-administered prefix `02:` and a structured
#     tail (02:00:00:<role>:<index>) so collisions are obvious at a glance.
#   - `storage: {disks: [...]}` on a physical host â†’ the disk layout the
#     host-disks role realises (17-host/15-storage.yml). Applies to BOTH
#     hypervisors and workers. DISK-CENTRIC + STABLE SELECTORS, declared
#     not discovered. Each disk:
#       select: boot                       # the auto-detected host boot disk
#       select: { model: "...", serial: "..." }       # one exact drive
#       select: { min_size_gib: 900, rotational: false }  # attr match
#       select: { size_gib: 1000, rotational: true }      #   "
#       wipe: refuse|force                 # per-disk, default refuse;
#                                          # `force` is DECLARED + scoped
#                                          # (replaces the global -e flag)
#       partitions: [ {label, vg, thinpool, size, ...} ]
#     Each partition declares EXACTLY ONE of (XOR):
#       pve_storage: <id>, content: <pvesm content>   # PVE-side (hypervisor)
#       mount: { path, fstype, lv_name?, lv_size? }   # worker-side (ext4 mount)
#     `label` is the GPT partlabel (unique per node, the idempotency
#     key); `size` is sgdisk +SIZE ("0" = fill). `pve_storage` is a
#     FROZEN contract (Tofu hardcodes `vms`/`longhorn-data`). A
#     non-`boot` selector MUST resolve to EXACTLY ONE non-boot,
#     non-removable disk â€” 0 or >1 matches is a HARD FAILURE (the role
#     never guesses). Several partitions, on different disks, may share
#     one vg/thinpool â†’ that is how a NVMe + HDD become one larger pool
#     (`longhorn-data` on a hypervisor, `longhornthin` mounted at
#     /var/lib/longhorn on a worker). Selectors match hardware
#     attributes, so kernel renames are irrelevant and swapping a disk
#     for an identical/larger one needs NO edit when the selector is
#     attribute-based. Preview resolution + a paste-ready block with
#     `just disk-plan`.
#
#   CONVENTION (enforced in preflight, hypervisors only):
#     - every hypervisor yields a `vms` PVE storage (required: every
#       VM/LXC boot disk + cloud-init drive lands there; Tofu
#       hardcodes the name).
#     - any hypervisor that hosts kube_workers (VMs declaring
#       `vm.data_disk_size`) ALSO yields a `longhorn-data` PVE
#       storage. CP-only hypervisors don't need it and pve-home-01 is
#       sized accordingly (256 GB NVMe, vms only).
#   Hardware sizing follows the role: a small NVMe is enough for
#   CP-only nodes; longhorn-hosting nodes want a â‰Ą1 TB NVMe (plus
#   optional HDDs that extend `longhorn-data`).
#   See group_vars/hypervisors.yml.
#
#   CONVENTION (worker side): plain Linux baremetal kube_workers
#   combine their extra data disks (NVMe + HDD) into one
#   `longhorndata`/`longhornthin` thin pool, mounted as ext4 at
#   `/var/lib/longhorn` for Longhorn baremetal replica storage. The
#   boot disk is owned by the Debian installer (`debian_install.disk`)
#   and the worker does NOT declare `select: boot`.
#
# VMs always DHCP-boot. The static IP comes from the reservation tied to
# the MAC declared here â€” not from cloud-init.
#
# Group topology â€” physical hosts are split by what they run, not by
# hardware. `physical` is the umbrella for EVERY baremetal Linux box, so
# generic baseline work (ansible/pani/tourmanager users, SSH hardening,
# firewall, tailscale, node-exporter â€” the 17-host tier) targets it once.
# Two children narrow further:
#   - `hypervisors`    â†’ PVE hosts. PVE-specific work (repos, cluster,
#                        LVM-thin storage carve, template bake â€” the
#                        20-hypervisor tier) targets this. Children:
#       - `pve_standalone` â†’ independent nodes, NO corosync. Each is its
#                            own API surface; Tofu uses a provider per node.
#       - `pve_cluster`    â†’ parent of zero or more corosync clusters.
#                            Each CHILD group is ONE cluster: the group
#                            name is the cluster name, and
#                            group_vars/<name>.yml sets
#                            `proxmox_cluster_name: <name>`. Empty today.
#   - `workers`        â†’ plain Linux baremetal (no PVE). k3s baremetal
#                        workers, app hosts, etc. Today: worker-home-02
#                        (renamed from pve-home-02 after the gaming-PC
#                        box was de-Proxmoxed to plain Debian; old
#                        crash-loop unit replaced, pve-home-03 retired).
#                        Only pve-home-01 remains a hypervisor.

all:
  vars:
    domain: lan
    network_gateway: "10.1.1.1"
    network_cidr: "/24"
    ansible_python_interpreter: /usr/bin/python3
    # Proxmox API endpoints, one per HYPERVISOR. Read by Tofu via
    # tofu/locals.tf â†’ provider.tf, which declares one aliased provider
    # per node. With independent (non-clustered) nodes a single endpoint
    # cannot place VMs on a peer, so each node is addressed directly. In a
    # cluster every member exposes the full API; pointing each provider at
    # its own node is uniform and works for both topologies. Workers (plain
    # Linux baremetal) do NOT appear here â€” they don't run the PVE API.
    # Adding a hypervisor = add it here + a provider block in
    # tofu/provider.tf + a token var (see tofu/variables.tf) + a module
    # call in tofu/main.tf.
    proxmox_endpoints:
      pve-home-01: "https://pve-home-01.lan:8006"
    # Per-hypervisor Proxmox template IDs. Read by Ansible
    # (04-prepare-templates.yml) and Tofu (tofu/locals.tf). VM storage is
    # node-local LVM-thin, so every hypervisor bakes its own local
    # template. These maps are the single source of truth â€” no offset
    # arithmetic, no group-ordering coupling. The value is each node's
    # *anchor* (first/default template) ID; 04-prepare-templates.yml
    # builds the per-image-family templates as anchor+0, anchor+1, â€¦ in
    # vm_templates_base / lxc_templates_base order on each node. Tofu
    # clones each VM from `template_vm_ids[its proxmox_node]` (the
    # default = first VM template). Per-VM override: set `vm.template_id`
    # on a host below (used verbatim). Keep anchors â‰Ą (#templates) apart
    # so families don't collide.
    template_vm_ids:
      pve-home-01: 9001
      # pve-home-03: 9021
      # pve-home-04: 9031
    template_ct_ids:
      pve-home-01: 9101
      # pve-home-03: 9121
      # pve-home-04: 9131

router:
  hosts:
    opnsense01:
      ansible_host: "10.1.1.1"
      ip_address: "10.1.1.1"
      static_ip: true

physical:
  # Umbrella for EVERY baremetal Linux host (hypervisors + plain workers).
  # The 17-host tier targets this group: ansible/pani/tourmanager users,
  # SSH hardening, firewall, tailscale, node-exporter. Defined as a parent
  # of `hypervisors` and `workers` (which carry the actual host entries).
  children:
    hypervisors:
    workers:

foundation:
  # Foundational subset that must be all-the-way-up (full 17-host +
  # 20-hypervisor stack, plus the bootserv01 LXC) BEFORE any other
  # baremetal host can be netboot-installed â€” fresh workers need
  # bootserv01.lan to PXE-fetch their kernel/initrd/preseed, and
  # bootserv01 is an LXC pinned to a hypervisor in this group.
  #
  # Targeted by the 16-foundation tier (playbooks re-import the 17-host /
  # 20-hypervisor plays with `target_hosts: foundation`). Today: just
  # pve-home-01. Adding a redundant bootserv-hosting hypervisor in the
  # future = add it here, no other change.
  #
  # Members MUST also appear under `hypervisors` (the foundation tier
  # runs 20-hypervisor work against them). Workers cannot be foundation
  # hosts â€” they don't host LXCs.
  hosts:
    pve-home-01:

hypervisors:
  # PVE hypervisors only. The 20-hypervisor tier targets this group
  # (Proxmox repo flip, cluster, LVM-thin storage carve, template bake).
  # Topology is decided by which child group a host sits in (see header).
  # `hosts:` here would be topology-ambiguous, so all hosts live under a
  # child group.
  children:
    pve_standalone:
      # Independent PVE nodes â€” no corosync, no HA, no live-migration.
      hosts:
        pve-home-01:
          ansible_host: pve-home-01.lan
          ip_address: 10.1.1.105
          mac_address: "18:60:24:dc:b7:32"
          # Baremetal Debian unattended-install hint (read by img/debian/).
          # `disk` is the device the Debian installer wipes + lays down LVM
          # on for / (everything else â€” the `vms` + `longhorn-data` carve â€”
          # is owned by the host-disks role post-install). Stable
          # /dev/disk/by-id path so kernel renames don't matter; the value
          # is verified against the host's lsblk output in `just disk-plan`.
          # The PVE auto-install path (img/proxmox/pve-home-01.toml) still
          # works untouched; pick whichever ISO you flash per host.
          debian_install:
            disk: /dev/sda
          # Mini-PC: a single 256 GB boot NVMe is the ONLY storage.
          # PVE installer takes the first ~100 GiB (lvm.hdsize=100) as
          # the `pve` VG (hypervisor); the free tail (~156 GiB) is
          # carved into a single vm-storage pool that backs `vms`.
          # NO `longhorn-data` on this node â€” pve-home-01 hosts the k3s
          # control planes (and bootserv01) only; Longhorn workers live
          # on baremetal worker-home-02. Preflight enforces the
          # corollary (no VM pinned here may declare `data_disk_size`).
          storage:
            disks:
              - select: boot
                partitions:
                  - label: vm-storage
                    vg: vmdata
                    thinpool: vmthin
                    pve_storage: vms
                    content: images,rootdir,iso,vztmpl,snippets
                    size: "0"          # fill the boot tail
    pve_cluster:
      # Parent of all corosync clusters. Each child group is ONE cluster
      # (group name = cluster name; set proxmox_cluster_name in
      # group_vars/<name>.yml). Empty today â€” poochella is standalone.
      # Example:
      #   children:
      #     poochella:
      #       hosts:
      #         pve-home-03:
      #           ansible_host: pve-home-03.lan
      #           ip_address: 10.1.1.107
      #           mac_address: "e4:e7:49:47:dc:bf"
      #         pve-home-04:
      #           ansible_host: pve-home-04.lan
      #           ip_address: 10.1.1.108
      #           mac_address: "<unique-mac>"
      children: {}

workers:
  # Plain Linux baremetal hosts (no PVE). k3s baremetal workers, app
  # hosts, etc. These boxes get the full 17-host baseline (users,
  # ssh-hardening, firewall, tailscale, node-exporter) but skip the
  # 20-hypervisor tier entirely. They DO NOT appear in
  # `all.vars.proxmox_endpoints` / `template_*_ids` and Tofu does not
  # see them (no `vm:` / `lxc:` block).
  hosts:
    worker-home-02:
      # Renamed 2026-05-23 from `pve-home-02` â€” this host was originally
      # a PVE node and got de-Proxmoxed for use as a baremetal Linux
      # worker. The MAC is unchanged, so the OPNsense DHCP reservation
      # follows the rename via the dnsmasq playbook. The `host-base`
      # role enforces hostname == inventory_hostname so a re-run of
      # 17-host/10-bootstrap.yml carries the rename onto the live box.
      ansible_host: worker-home-02.lan
      ip_address: 10.1.1.106
      mac_address: "3c:7c:3f:1f:96:af"
      # Debian unattended install: the installer wipes ONLY this disk.
      # The other disks (1 TB NVMe + WDC HDD) are combined into a single
      # longhorndata/longhornthin LVM-thin pool, ext4-mounted at
      # /var/lib/longhorn for Longhorn baremetal replicas â€” see the
      # `storage:` block below and 40-kube/10-longhorn-host-prep.yml.
      debian_install:
        disk: /dev/nvme0n1
      # Baremetal Debian net-boot via iPXE from the Mellanox ConnectX-4
      # Lx 10GbE NIC. Both ports' MACs are reserved on OPNsense to this
      # host's `ip_address` and dispatched in the rendered iPXE script,
      # so PXE works regardless of which port is cabled / first in BIOS
      # boot order. The preseed (served by bootserv01 over HTTP) wipes
      # ONLY `install_disk`.
      debian_netboot:
        install_disk: /dev/nvme0n1
        boot_macs:
          - "e8:eb:d3:8c:86:bc"
          - "e8:eb:d3:8c:86:bd"
      # Baremetal kube_worker Longhorn data layout: combine the
      # second NVMe + the WDC HDD into ONE LVM-thin pool, then put a
      # single thin LV (`longhorn-data`) on top, ext4'd and mounted at
      # /var/lib/longhorn. host-disks builds the substrate; Longhorn
      # (Flux repo) places replicas into that mountpoint. The boot
      # NVMe (nvme0n1) is owned by the Debian installer above and is
      # NOT declared here â€” only data disks. Selectors are attribute-
      # based: kernel renames + identical-or-larger swap need no edit.
      #
      # Disk signatures: run `just disk-plan` against worker-home-02 to
      # see actual signatures on each data disk. If either disk holds
      # foreign content (e.g. a prior Windows/ext4 layout on the HDD),
      # set `wipe: force` on THAT disk explicitly here â€” declared,
      # scoped, self-documenting. Leave `wipe: refuse` (the default)
      # otherwise so the role refuses to clobber unexpected data.
      storage:
        disks:
          - select: { min_size_gib: 900, rotational: false }
            partitions:
              - label: longhorn-nvme
                vg: longhorndata
                thinpool: longhornthin
                size: "0"
          - select: { min_size_gib: 900, rotational: true }
            partitions:
              - label: longhorn-hdd
                vg: longhorndata
                thinpool: longhornthin
                size: "0"
                # The mount is declared on EXACTLY ONE partition per
                # (vg,thinpool); the role consolidates multi-partition
                # pools to one thin LV + one mount.
                mount:
                  path: /var/lib/longhorn
                  fstype: ext4
                  lv_name: longhorn-data

switches:
  hosts:
    router-01:
      ansible_host: 10.1.1.102
      ip_address: 10.1.1.102
      mac_address: "04:f4:1c:82:e0:ff"

storage:
  # NAS / shared file-storage targets. Administered out-of-band on the
  # device's own UI (Synology DSM), but treated as a normal LAN host
  # from the network's point of view: a dnsmasq static DHCP reservation
  # pins MAC -> ip_address and auto-registers `nas01.lan` in DNS via
  # `dnsmasq_register_static_dns: true` â€” same path every other named
  # LAN host uses (kube-ctl-01.lan, pve-home-01.lan, â€¦), no separate
  # Unbound override needed. The NAS may keep its DSM static-IP config
  # or switch to DHCP; either way the MAC -> IP binding matches and the
  # name resolves.
  #
  # Read by:
  #   - 20-hypervisor/40-bake-images.yml  (Packer publishes the dated qcow2
  #                                        + atomic `latest` symlink here
  #                                        via rsync-over-SSH)
  #   - tofu/locals.tf                    (`nas.https_url_base` is the
  #                                        source of every
  #                                        proxmox_virtual_environment_download_file
  #                                        URL Tofu pulls onto each PVE
  #                                        node's `local` ISO storage)
  #
  # Per-host `nas:` namespace fields (concrete values are PLACEHOLDERS â€”
  # bump them to match the deployed device before first `just bake-images`):
  #   - images_dir        absolute path on the NAS filesystem holding the
  #                       golden-image artifacts.
  #   - rsync_user        service account on the NAS with SSH + write to
  #                       images_dir + the ability to `ln -sf` + `mv -Tf`
  #                       symlinks (Synology: a user with shell access).
  #   - https_url_base    HTTPS URL root the NAS exposes for images_dir.
  hosts:
    nas01:
      ansible_host: nas01.lan
      ip_address: 10.1.1.130
      mac_address: "90:09:d0:96:65:63"
      nas:
        images_dir: /volume1/proxmox/images/vm
        rsync_user: pve-publisher
        https_url_base: https://nas01.lan/proxmox/images/vm

virtual-machines:
  # No loose `hosts:` here on purpose. Every VM lives in a LEAF child
  # group so its inbound firewall policy comes from that group's
  # group_vars/<group>.yml (`firewall_inbound_allow`); see
  # playbooks/poochella/infra/30-guests/40-firewall.yml. Deeper nesting
  # is safe: tofu/locals.tf walks the inventory tree (depth 3, this is
  # depth 2) and the dnsmasq playbook walks groups['all'], so neither
  # the VM-provisioning nor the DHCP-reservation path is affected.
  #
  # NOTE: `kubernetes` USED TO be a child of this group when every kube
  # node was a VM. With a baremetal kube_worker (worker-home-02) that's
  # no longer true, so `kubernetes` is now a top-level group and the
  # firewall play covers both groups explicitly.
  children:
    dev:
      # Developer/scratch VMs (Ivan's devbox). Policy: group_vars/dev.yml
      # hosts:
      #   devbox01:
      #     ansible_host: devbox01.lan
      #     ip_address: 10.1.1.120
      #     mac_address: "02:00:00:00:01:01"
      #     vm:
      #       proxmox_node: pve-home-01
      #       cores: 4
      #       memory: 8192
      #       disk_size: 100
      #       tags: [dev, ivan]

kubernetes:
  # Top-level group (not a child of `virtual-machines` â€” see the note
  # there). Today: `kube_control_plane` is empty until VM CPs come up,
  # and `kube_workers` contains the baremetal worker-home-02. Both VMs
  # and baremetal can coexist as members.
  children:
    kube_control_plane:
    #   hosts:
    #     kube-ctl-01:
    #       ansible_host: kube-ctl-01.lan
    #       ip_address: 10.1.1.110
    #       mac_address: "02:00:00:00:02:01"
    #       vm:
    #         # Only pve-home-01 is a hypervisor today; pin all CP VMs
    #         # there until a second hypervisor exists. With one
    #         # hypervisor an etcd CP cluster has zero failure tolerance
    #         # at the physical layer (any CP loss = etcd loss).
    #         proxmox_node: pve-home-01
    #         cores: 4
    #         memory: 8192
    #         disk_size: 30
    #         tags: [kube, control-plane]
    #     kube-ctl-02:
    #       ansible_host: kube-ctl-02.lan
    #       ip_address: 10.1.1.111
    #       mac_address: "02:00:00:00:02:02"
    #       vm:
    #         proxmox_node: pve-home-01
    #         cores: 4
    #         memory: 8192
    #         disk_size: 30
    #         tags: [kube, control-plane]
    #     kube-ctl-03:
    #       ansible_host: kube-ctl-03.lan
    #       ip_address: 10.1.1.112
    #       mac_address: "02:00:00:00:02:03"
    #       vm:
    #         proxmox_node: pve-home-01
    #         cores: 4
    #         memory: 8192
    #         disk_size: 30
    #         tags: [kube, control-plane]
    kube_workers:
      hosts:
        # worker-home-02 is BAREMETAL (also a member of the `workers`
        # group at top level â€” the 17-host tier applies: users,
        # ssh-hardening, firewall, tailscale, node-exporter). Listed
        # here so the 40-kube tier's `agent` play runs on it,
        # group_vars/kube_workers.yml's firewall_inbound_allow opens
        # k3s ports, and the Longhorn create-default-disk node label
        # lands on it.
        #
        # Caveat: 40-kube/10-longhorn-host-prep.yml's data-disk play
        # hard-codes `/dev/vdb` (VM virtio second disk) and has a
        # `when:` guard that skips it on baremetal. Baremetal Longhorn
        # storage prep is a known follow-up (the host has 1 TB NVMe +
        # 1 TB HDD that need their own format/mount scheme â€” likely an
        # LVM+ext4 mount at /var/lib/longhorn, OR multiple disks
        # registered separately to Longhorn).
        worker-home-02:
      # Aspirational VM-based kube_workers (commented until provisioned):
      #   kube-worker-01:
      #     ansible_host: kube-worker-01.lan
      #     ip_address: 10.1.1.113
      #     mac_address: "02:00:00:00:03:01"
      #     vm:
      #       proxmox_node: pve-home-01
      #       cores: 4
      #       memory: 16000
      #       disk_size: 50
      #       data_disk_size: 600
      #       tags: [kube, worker]

containers:
  # LXC guests. Like VMs, each leaf group owns its inbound firewall
  # policy in group_vars/<group>.yml. Hosts here carry an `lxc:` block
  # which Tofu shapes into `proxmox_virtual_environment_container`
  # resources (cloned from `template_ct_ids[proxmox_node]`); see the
  # header for the namespace contract.
  children:
    bootserv:
      # The fleet's iPXE / Debian-netboot home base. ONE LXC per cluster
      # is enough â€” TFTP + nginx are cheap and there's no reason to
      # shard. Tagged `infra` so its Tofu module precedes every VM
      # module on the same node (the ground-up bootstrap invariant).
      # Lives on pve-home-01 so it survives the worker-home-02 re-image
      # that triggers most iPXE boots.
      #
      # Addressing: NO `ip_address` and NO `mac_address` on purpose.
      # PVE auto-generates a unique MAC at clone time; the LXC DHCPs
      # into OPNsense's dynamic pool; dnsmasq's dynamic-DNS
      # (`regdhcp: true` in 20-dnsmasq.yml) registers `bootserv01.lan`
      # â†’ assigned IP. The hostname `bootserv01` is set by the Tofu
      # LXC module's `initialization.hostname` so the DHCP request
      # advertises the right name. Every reference to the bootserv
      # (Ansible SSH, PXE clients, iPXE scripts) goes through the
      # hostname, never an IP literal.
      hosts:
        bootserv01:
          ansible_host: bootserv01.lan
          lxc:
            proxmox_node: pve-home-01
            cores: 1
            memory: 512
            disk_size: 30
            unprivileged: true
            features:
              nesting: false
            tags: [infra, bootserv]
          firewall_inbound_allow:
            - { proto: tcp, port: 22, comment: "ssh" }
            - { proto: tcp, port: 80, comment: "http" }
