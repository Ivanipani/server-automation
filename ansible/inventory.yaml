# Single source of truth for all hosts in the homelab.
#
# Read by:
#   - Ansible (as its inventory; see ansible.cfg)
#   - OpenTofu (via yamldecode in tofu/locals.tf — every host with a `vm:`
#     block becomes a Proxmox VM)
#   - The dnsmasq playbook (every host with `mac_address` defined gets a
#     static DHCP+DNS reservation on OPNsense)
#
# Conventions:
#   - `ip_address` + `mac_address`  → host appears as a dnsmasq static lease
#   - `static_ip: true`             → suppress the dnsmasq reservation (e.g. router)
#   - Firewall rules: `firewall_inbound_allow` (list of {proto, port,
#     comment?}) and `firewall_outbound_deny` (list of {proto, port})
#     live on EITHER a group (`<group>.vars`) OR a host. Resolution is
#     standard Ansible precedence: HOST > most-specific GROUP > parent
#     groups. There is NO list merge — the deepest level that defines
#     the var REPLACES the parent's value. To "extend" a group's rules
#     on one host, copy the group's list and add. Consumed by both
#     17-host/30-firewall.yml (baremetal) and 30-guests/40-firewall.yml
#     (VMs + LXCs) via the firewall-basic role; SSH 22/tcp is hardcoded
#     in the role to prevent lockout, so groups/hosts do NOT need to
#     re-list it. `firewall_outbound_deny` defaults to denying SSH out
#     on guests (30-guests/40-firewall.yml); set `firewall_outbound_deny: []`
#     on a group/host to opt out.
#   - NFS mounts: `nfs_mounts` (list of
#     {share, path, options}) declares which nas01 shares to mount on
#     each baremetal host. Set on a group's `vars:` block (today:
#     `physical` defines the cluster-wide mounts; `hypervisors` re-lists
#     those + adds `proxmox`) or directly on a host. Same precedence
#     as firewall rules — HOST > most-specific GROUP > parent — and
#     the deepest definition REPLACES the parent's list. Absence of
#     the var is equivalent to "no mounts" (the playbook uses
#     `| default([])`). Consumed by 17-host/16-nfs-mounts.yml.
#
#     NOTE on Synology share access: DSM enforces a proprietary
#     "Synology ACL" layer on top of POSIX. Newly-created shares
#     default to admin-only access regardless of POSIX mode; chmod
#     from an NFS client briefly sets the dirent but DSM resyncs to
#     match its ACL. To grant access, edit the share's Permissions in
#     DSM UI (Control Panel → Shared Folder → Edit → Permissions) or
#     run synoacltool on the NAS — neither is automated by the
#     synology-storage role today.
#   - `vm: {...}`                   → Tofu creates this VM on Proxmox.
#     VM boot disks live on the node-local `vms` PVE storage. NO VM
#     receives a Longhorn-backed data disk: Longhorn replica state lives
#     ONLY on baremetal kube_workers, which carve their own data disks
#     directly via `storage:` (see metal-home-01 below).
#   - `lxc: { proxmox_node, cores, memory, disk_size, unprivileged,
#     features, tags, ... }` → Tofu creates this LXC on Proxmox
#     (parallels `vm:`). Cloned from `template_ct_ids[proxmox_node]`
#     (Debian 13 LXC anchor). The `tags` list is significant beyond
#     labelling: tag **`infra`** lifts the LXC into a per-node
#     `infra_lxcs` Tofu module that VM modules `depends_on`, so infra
#     LXCs (today: bootserv01) come up before any VM in the same
#     `tofu apply` — the ground-up bootstrap invariant. Storage is
#     `vms` (the only pve_storage with `rootdir` content).
#   - `debian_netboot: { boot_macs: [...] }` → host is a baremetal
#     Debian target net-booted via iPXE (rendered + served by
#     `bootserv01`). `boot_macs` are the NIC MACs that may initiate PXE
#     — all reserved to `ip_address` on OPNsense + dispatched in the
#     rendered iPXE script. The install target is NOT declared here:
#     the preseed resolves it at install time from the host's
#     `storage.disks` entry marked `select: boot` (see `hw:` below),
#     so there is no parallel `install_disk` to keep in sync.
#   - VM MACs use the locally-administered prefix `02:` and a structured
#     tail (02:00:00:<role>:<index>) so collisions are obvious at a glance.
#   - `storage: {disks: [...]}` on a physical host → the disk layout the
#     host-disks role realises (17-host/15-storage.yml). Applies to BOTH
#     hypervisors and workers. DISK-CENTRIC + STABLE SELECTORS, declared
#     not discovered. Each disk:
#       select: boot                       # the auto-detected host boot disk
#       select: { model: "...", serial: "..." }       # one exact drive
#       select: { min_size_gib: 900, rotational: false }  # attr match
#       select: { size_gib: 1000, rotational: true }      #   "
#       hw: { model: "...", serial: "..." } # OPTIONAL on a `select: boot`
#                                          # entry; REQUIRED whenever the
#                                          # host is installable via the
#                                          # bootserv netboot preseed
#                                          # (host has `debian_netboot:`)
#                                          # OR the img/debian ISO path
#                                          # (`just img-debian <host>`).
#                                          # Both preseeds resolve the
#                                          # install target by lsblk-
#                                          # matching this block at install
#                                          # time (single source of truth
#                                          # for "which disk is the boot
#                                          # disk"). host-disks runtime
#                                          # asserts findmnt-/ matches.
#       wipe: refuse|force                 # per-disk, default refuse;
#                                          # `force` is DECLARED + scoped
#                                          # (replaces the global -e flag)
#       partitions: [ {label, vg, thinpool, size, ...} ]
#     Each partition declares AT MOST ONE of:
#       pve_storage: <id>, content: <pvesm content>   # PVE-side (hypervisor)
#       mount: { path, fstype, lv_name?, lv_size? }   # worker-side (ext4 mount)
#       (neither)                                     # bare pool member;
#                                                     # the target is declared
#                                                     # on another partition
#                                                     # with the same vg+thinpool
#     `label` is the GPT partlabel (unique per node, the idempotency
#     key); `size` is sgdisk +SIZE ("0" = fill). `pve_storage` is a
#     FROZEN contract (Tofu hardcodes `vms`). A non-`boot` selector
#     MUST resolve to EXACTLY ONE non-boot, non-removable disk — 0 or
#     >1 matches is a HARD FAILURE (the role never guesses). Several
#     partitions, on different disks, may share one vg/thinpool → that
#     is how a NVMe + HDD become one larger pool (e.g. `longhornthin`
#     mounted at /var/lib/longhorn on a baremetal kube_worker).
#     Convention: declare the target on EXACTLY ONE partition per
#     (vg,thinpool); the rest just declare label/vg/thinpool/size and
#     join the pool. Preflight enforces "at least one targeted
#     partition per pool". Selectors match hardware attributes, so
#     kernel renames are irrelevant and swapping a disk for an
#     identical/larger one needs NO edit when the selector is
#     attribute-based. Preview resolution + a paste-ready block with
#     `just disk-plan`.
#
#   CONVENTION (enforced in preflight, hypervisors only):
#     - every hypervisor yields a `vms` PVE storage (required: every
#       VM/LXC boot disk + cloud-init drive lands there; Tofu
#       hardcodes the name). That is the ONLY hypervisor-side PVE
#       storage in the contract — Longhorn replicas live on baremetal
#       kube_workers, NOT on any hypervisor pool.
#   Hardware sizing: a small NVMe is enough for every hypervisor under
#   this model (pve-home-01 today: 256 GB NVMe, vms only).
#   See group_vars/hypervisors.yml.
#
#   CONVENTION (worker side): plain Linux baremetal kube_workers
#   combine their data disks (boot-NVMe tail + extra NVMes + HDDs)
#   into one `longhorndata`/`longhornthin` thin pool, mounted as ext4
#   at `/var/lib/longhorn` for Longhorn baremetal replica storage.
#   The worker DOES declare `select: boot` (with the `hw:` pin) so the
#   preseed installs onto the right device AND host-disks can claim
#   the disk's free tail post-install (preseed caps the OS LVM PV at
#   ~120 GiB root + RAM*2 swap; the rest is host-disks' to claim).
#
# VMs always DHCP-boot. The static IP comes from the reservation tied to
# the MAC declared here — not from cloud-init.
#
# Group topology — physical hosts are split by what they run, not by
# hardware. `physical` is the umbrella for EVERY baremetal Linux box, so
# generic baseline work (ansible/pani/tourmanager users, SSH hardening,
# firewall, tailscale, node-exporter — the 17-host tier) targets it once.
# Two children narrow further:
#   - `hypervisors`    → PVE hosts. PVE-specific work (repos, LVM-thin
#                        storage carve, template bake — the 20-hypervisor
#                        tier) targets this. Children:
#       - `pve_standalone` → every PVE host lives here. No corosync, no
#                            shared storage. Each is its own API surface;
#                            Tofu uses a provider per node.
#       - `pve_cluster`    → GATED OFF. Kept (empty) as deprecated
#                            scaffolding only; 20-hypervisor/20-cluster.yml
#                            asserts this group is empty.
#   - `workers`        → plain Linux baremetal (no PVE). k3s baremetal
#                        workers, app hosts, etc. Today: metal-home-01
#                        (renamed from pve-home-01 after the gaming-PC
#                        box was de-Proxmoxed to plain Debian; old
#                        crash-loop unit replaced, pve-home-03 retired).
#                        Only pve-home-01 remains a hypervisor.

all:
  vars:
    domain: lan
    network_gateway: "10.1.1.1"
    network_cidr: "/24"
    ansible_python_interpreter: /usr/bin/python3
    # Proxmox API endpoints, one per HYPERVISOR. Read by Tofu via
    # tofu/modules/hypervisor/locals.tf, then consumed by each per-node
    # workspace's provider.tf (tofu/per-node/<host>/). Every hypervisor
    # is standalone — there is no shared API, so each node must be
    # addressed directly. Workers (plain Linux baremetal) do NOT appear
    # here — they don't run the PVE API. Adding a hypervisor: see the
    # checklist in tofu/README.md.
    proxmox_endpoints:
      pve-home-01: "https://pve-home-01.lan:8006"
    # Per-hypervisor Proxmox template IDs. Read by Ansible
    # (04-prepare-templates.yml) and Tofu (tofu/locals.tf). VM storage is
    # node-local LVM-thin, so every hypervisor bakes its own local
    # template. These maps are the single source of truth — no offset
    # arithmetic, no group-ordering coupling. The value is each node's
    # *anchor* (first/default template) ID; 04-prepare-templates.yml
    # builds the per-image-family templates as anchor+0, anchor+1, … in
    # vm_templates_base / lxc_templates_base order on each node. Tofu
    # clones each VM from `template_vm_ids[its proxmox_node]` (the
    # default = first VM template). Per-VM override: set `vm.template_id`
    # on a host below (used verbatim). Keep anchors ≥ (#templates) apart
    # so families don't collide.
    template_vm_ids:
      pve-home-01: 9001
      # pve-home-03: 9021
      # pve-home-04: 9031
    template_ct_ids:
      pve-home-01: 9101
      # pve-home-03: 9121
      # pve-home-04: 9131

router:
  hosts:
    opnsense01:
      ansible_host: "10.1.1.1"
      ip_address: "10.1.1.1"
      static_ip: true

physical:
  # Baseline inbound policy for EVERY baremetal Linux host (hypervisors
  # + workers). SSH 22/tcp is hardcoded by the firewall-basic role —
  # this list is for service ports on top of that. Deeper groups
  # (`hypervisors`, `kube_workers`) REPLACE this list with their own.
  vars:
    firewall_inbound_allow:
      - { proto: tcp, port: 22, comment: "ssh" }
      - { proto: tcp, port: 9100, comment: "node-exporter" }
    # Default NFS mounts for every physical host. Deeper groups
    # REPLACE this list (no merge — see header), so `hypervisors`
    # re-lists these entries below and adds its own on top.
    nfs_mounts:
      - share: build-artifacts
        path: /mnt/nas/build-artifacts
        options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
      - share: scratch
        path: /mnt/nas/scratch
        options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
  children:
    hypervisors:
    workers:

foundation:
  hosts:
    pve-home-01:

hypervisors:
  # PVE hypervisors only. The 20-hypervisor tier targets this group
  # (Proxmox repo flip, LVM-thin storage carve, template bake). Every
  # PVE host lives under `pve_standalone`; the sibling `pve_cluster`
  # group is gated off (see header) and exists only as deprecated
  # scaffolding.
  vars:
    # PVE web UI on top of the baseline SSH. SSH is repeated here only
    # because this list REPLACES `physical.firewall_inbound_allow`;
    # the role hardcodes SSH so removing it would still leave SSH open.
    firewall_inbound_allow:
      - { port: 22, proto: tcp }
      - { port: 8006, proto: tcp, comment: "PVE web UI" }
      - { port: 9100, proto: tcp, comment: "node-exporter" }
    # NFS mounts for hypervisors. REPLACES (does not merge) the
    # parent `physical.nfs_mounts`, so the `build-artifacts`
    # and `scratch` mounts are re-listed here. The hypervisor-only
    # addition is `proxmox` — originally the publish target for the
    # deleted 20-hypervisor/40-bake-images.yml (Packer → NAS image-bake
    # path); the current bake flow publishes to bootserv01 HTTP instead
    # (13-foundation/95-bake-publish-images.yml). Retained for manual
    # workflows / backups; remove if unused.
    nfs_mounts:
      - share: build-artifacts
        path: /mnt/nas/build-artifacts
        options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
      - share: scratch
        path: /mnt/nas/scratch
        options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
      - share: proxmox
        path: /mnt/nas/proxmox
        options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
  children:
    pve_standalone:
      # Independent PVE nodes — no corosync, no HA, no live-migration.
      hosts:
        pve-home-01:
          ansible_host: pve-home-01.lan
          ip_address: 10.1.1.105
          mac_address: "18:60:24:dc:b7:32"
          # Mini-PC: a single 256 GB boot NVMe is the ONLY storage.
          # PVE installer takes the first ~100 GiB (lvm.hdsize=100) as
          # the `pve` VG (hypervisor); the free tail (~156 GiB) is
          # carved into a single vm-storage pool that backs `vms`.
          # That is the ONLY PVE storage every hypervisor needs:
          # Longhorn replica state lives on baremetal kube_workers
          # (metal-home-01), never on a hypervisor pool.
          storage:
            disks:
              - select: boot
                partitions:
                  - label: vm-storage
                    vg: vmdata
                    thinpool: vmthin
                    pve_storage: vms
                    content: images,rootdir,iso,vztmpl,snippets
                    size: "0"          # fill the boot tail
    pve_cluster:
      # GATED OFF: PVE clustering is fully disabled in this repo by an
      # assertion in playbooks/poochella/infra/20-hypervisor/20-cluster.yml.
      # Group kept (empty) as deprecated scaffolding for reference.
      # Every hypervisor is standalone — keep them under `pve_standalone`.
      children: {}

workers:
  # Plain Linux baremetal hosts (no PVE). k3s baremetal workers, app
  # hosts, etc. These boxes get the full 17-host baseline (users,
  # ssh-hardening, firewall, tailscale, node-exporter) but skip the
  # 20-hypervisor tier entirely. They DO NOT appear in
  # `all.vars.proxmox_endpoints` / `template_*_ids` and Tofu does not
  # see them (no `vm:` / `lxc:` block).
  hosts:
    metal-home-01:
      ansible_host: metal-home-01.lan
      ip_address: 10.1.1.106
      mac_address: "3c:7c:3f:1f:96:af"
      # Baremetal Debian net-boot via iPXE from the Mellanox ConnectX-4
      # Lx 10GbE NIC. Both ports' MACs are reserved on OPNsense to this
      # host's `ip_address` and dispatched in the rendered iPXE script,
      # so PXE works regardless of which port is cabled / first in BIOS
      # boot order. The preseed (served by bootserv01 over HTTP) wipes
      # ONLY the boot disk — identified by `storage.disks` entry
      # `select: boot` + its `hw: {model, serial}` pin (see below).
      # Both Debian install paths (bootserv netboot + img/debian ISO)
      # resolve the install target by lsblk-matching that hw block at
      # install time, so adding/removing data disks never risks
      # installing onto the wrong device.
      debian_netboot:
        boot_macs:
          - "e8:eb:d3:8c:86:bc"
          - "e8:eb:d3:8c:86:bd"
      # Baremetal kube_worker Longhorn data layout: combine the boot
      # NVMe's tail + the second NVMe + the WDC HDD into ONE LVM-thin
      # pool, then put a single thin LV (`longhorn-data`) on top, ext4'd
      # and mounted at /var/lib/longhorn. host-disks builds the
      # substrate; Longhorn (Flux repo) places replicas into that
      # mountpoint. The boot NVMe is partly owned by the Debian
      # installer — the preseed caps the OS LVM PV at ~120 GiB (root LV)
      # + ~RAM*2 for swap, leaving the rest of the disk as free space.
      # host-disks claims that tail via `select: boot` + the
      # `part-alpha` partition. On the boot disk the role's wipe gate
      # is bypassed and sgdisk only APPENDS a new GPT entry — existing
      # partition entries (EFI, LVM PV) and their byte ranges are not
      # modified. Note: the GPT table itself IS rewritten (header CRCs
      # + one extra entry); partx -u is used instead of partprobe so
      # the busy boot disk's kernel state can refresh without
      # BLKRRPART refusal. The new tail partition is wipe=refuse by
      # default → if old on-platter signatures bleed through, the
      # carve HARD-FAILS rather than overwriting in place. Non-boot
      # disk selectors are attribute-based:
      # kernel renames + identical-or-larger swap need no edit. The two
      # 2 TB NVMes have the same model so the data-NVMe selector MUST
      # pin by serial (model-only would resolve to >1 disk and hard-fail
      # preflight); the boot NVMe is selected via `select: boot` and so
      # never participates in attribute matching.
      #
      # Disk signatures: run `just disk-plan` against metal-home-01 to
      # see actual signatures on each data disk. If either disk holds
      # foreign content (e.g. a prior Windows/ext4 layout on the HDD),
      # set `wipe: force` on THAT disk explicitly here — declared,
      # scoped, self-documenting. Leave `wipe: refuse` (the default)
      # otherwise so the role refuses to clobber unexpected data.
      storage:
        disks:
          # Partition labels are ordinal (alpha, beta, gamma, …) NOT
          # function-named. The label is just the GPT partlabel +
          # idempotency key for host-disks; the consumer (Longhorn) is
          # named through the vg/thinpool/mount instead. Decouples the
          # partition layer from any particular consumer — if longhorn
          # is replaced, only vg/thinpool/mount change, not labels.
          # Ordinals follow disk declaration order on THIS host (alpha
          # = first disk's tail partition, beta = second disk, …); they
          # carry no meaning across hosts.
          - select: boot
            # `hw:` pins the boot disk by stable hardware attributes.
            # Required for any host installable via the bootserv
            # netboot preseed (this host's `debian_netboot:` above) or
            # the img/debian ISO path (`just img-debian <host>`) —
            # both preseeds resolve the install target by lsblk-
            # matching this hw block at install time (single source of
            # truth, no parallel `install_disk` field). At runtime, the
            # host-disks role's preflight asserts that findmnt-/
            # resolves to this same disk.
            # The boot NVMe (~2 TB). The preseed (method=regular)
            # creates a FOUR-partition layout:
            #   p1 (538 MiB): ESP / vfat / /boot/efi
            #   p2 (4 GiB):   linux-swap
            #   p3 (100 GiB): ext4 / /
            #   p4 (~1.78 TiB): the "spare" — formatted ext4 by
            #     partman to make partman happy (it grows the last
            #     unbounded partition to absorb the disk leftover
            #     instead of growing /), then immediately re-purposed
            #     by preseed/late_command into raw partlabel
            #     "part-alpha": umount, fstab-strip, wipefs, sgdisk -c.
            # By the time host-disks sees the box, p4 exists with the
            # expected partlabel and no filesystem signature, so the
            # role skips the carve step and goes straight to pvcreate.
            # (sgdisk appends a new GPT entry (the table
            # is rewritten with one extra entry; the existing EFI + LVM
            # PV entries and their data are not modified).
            hw:
              model: "CT2000P310SSD8"
              serial: "254854AAD28F"
            partitions:
              - label: part-alpha
                vg: longhorndata
                thinpool: longhornthin
                size: "0"
          - select: { model: "CT2000P310SSD8", serial: "254854AC2A9A" }
            partitions:
              - label: part-beta
                vg: longhorndata
                thinpool: longhornthin
                size: "0"
          - select: { model: "WDC WD10EZEX-08WN4A0", serial: "WD-WCC6Y1LPLUY3" }
            # `wipe: force`: this disk holds stale signatures from the
            # previous worker-home-02 carve (`longhorn-hdd` partlabel
            # + an LVM PV in an old `longhorndata` VG whose other PV
            # was on the now-replaced Samsung NVMe). The renamed
            # `part-gamma` partlabel doesn't match the stale one, so
            # host-disks would refuse without explicit consent. Safe
            # to leave at `force` until the next re-image of this
            # host; drop back to `refuse` (default) once stable.
            wipe: force
            partitions:
              - label: part-gamma
                vg: longhorndata
                thinpool: longhornthin
                size: "0"
                # The mount is declared on EXACTLY ONE partition per
                # (vg,thinpool); the role consolidates multi-partition
                # pools to one thin LV + one mount.
                mount:
                  path: /var/lib/longhorn
                  fstype: ext4
                  lv_name: longhorn-data
    metal-home-02:
      # Hardware not yet inspected — this entry is the minimum needed
      # for the host to iPXE-boot the Debian installer. The install will
      # HALT at partman/early_command on first boot: the resolver
      # (resolve-install-disk.sh, rendered from the `hw:` block below)
      # walks /sys/block looking for the pinned model+serial, prints a
      # banner to tty4 (Alt+F4) listing every real disk's model+serial
      # when no match is found, and sleeps 3600s. That banner IS the
      # discovery mechanism. Workflow:
      #   1) PXE-boot the host
      #   2) At the halt banner, Alt+F2 → `lsblk -do NAME,MODEL,SERIAL`
      #      to capture the boot disk + any data disks
      #   3) Replace the TODO placeholders below; add data-disk selectors
      #      + the `mount:` block on the longhorndata pool (see
      #      metal-home-01 above for the full pattern)
      #   4) Re-run 13-foundation/90-bootserv.yml and reboot the host
      ansible_host: metal-home-02.lan
      ip_address: 10.1.1.107
      mac_address: "38:05:25:3a:1f:08"
      # Single-NIC assumption — set to mac_address. If the box has extra
      # PXE-capable NICs (e.g. a 10GbE add-in card), list their MACs too;
      # the iPXE dispatcher (boot.ipxe) matches on any of them. See
      # metal-home-01 above for the dual-port pattern.
      debian_netboot:
        boot_macs:
          - "38:05:25:3a:1f:08"
      storage:
        disks:
          - select: boot
            # TODO: fill in from the resolver halt banner on first boot.
            # Until these match a real disk, the installer will halt by
            # design (which is what gets you the banner in the first
            # place). Leave the strings non-empty — the bootserv role
            # templates this block into resolve-install-disk.sh at
            # render time, so empty values would break the play.
            hw:
              model: "TODO-from-resolver-banner"
              serial: "TODO-from-resolver-banner"
            partitions:
              - label: part-alpha
                vg: longhorndata
                thinpool: longhornthin
                size: "0"
                # TODO: add `mount: { path: /var/lib/longhorn, fstype: ext4,
                # lv_name: longhorn-data }` here (or on a sibling data-disk
                # partition that joins this pool) once the disk layout is
                # known. host-disks preflight refuses pools with no mount
                # target — but that's a post-install concern; iPXE boot
                # does not exercise it.


switches:
  hosts:
    router-01:
      ansible_host: 10.1.1.102
      ip_address: 10.1.1.102
      mac_address: "04:f4:1c:82:e0:ff"

storage:
  hosts:
    nas01:
      ansible_host: nas01.lan
      ip_address: 10.1.1.130
      mac_address: "90:09:d0:96:65:63"
      nas:
        images_dir: /volume1/proxmox/images/vm
        # DSM SSH user used for rsync workflows (rsync-over-SSH style:
        # <user>@nas01.lan:<path>). Currently `pani` is the single
        # activated DSM user — every rsync workflow rides that account.
        # Split into a dedicated `pve-publisher` (or per-workflow user)
        # later if least-privilege becomes a concern.
        rsync_user: pani
        https_url_base: https://nas01.lan/proxmox/images/vm
      # Programmatically-managed NFS shares on nas01 (additive).
      # The underlying storage pool + volume are created MANUALLY in
      # DSM (out of scope by design — see synology-storage role's
      # main.yml). Ansible only owns share existence, quotas, and NFS
      # export rules.
      #
      # Consumed by playbooks/poochella/infra/15-nas/30-storage.yml
      # (synology-storage role); preflight.yml asserts this shape.
      #
      # NFS export scope: every share below is opened to the whole LAN
      # (10.1.1.0/24) RW. Trade-off: any LAN device can mount any share
      # — including `k3s-snapshots` (contains the cluster join token —
      # mount = cluster takeover) and `longhorn-backup` (volume data).
      # Acceptable because OPNsense WAN default-deny means there is no
      # path from the internet, and the LAN is single-admin. Tighten
      # individual shares by replacing the LAN-wide rule with per-IP
      # rules if a share ever needs to be restricted.
      #
      # Squash policy: every rule uses `squash: all_squash` so every
      # NFS client user (root or otherwise) is squashed to DSM's
      # "admin" identity, which on this NAS resolves to `pani` (the
      # only activated DSM user). Consequence: file ownership on the
      # NAS is always `pani` regardless of which client user wrote
      # the file — and crucially, server-side users do NOT need to
      # exist on DSM. Adding a new server-side user requires no NAS
      # change. To restore per-user ownership (and require matching
      # Synology users), switch back to `no_root_squash`.
      storage:
        vol_path: /volume1
        shares:
          # Off-box mirror of k3s embedded-etcd snapshots + the
          # /var/lib/rancher/k3s/server/token (snapshots are useless
          # without it). rsync'd from each CP on a systemd timer; see
          # roles/k3s/tasks/_snapshot_sync.yml (Phase 0.2).
          - name: k3s-snapshots
            description: "k3s etcd snapshots (off-box backup)"
            quota_gb: 10
            nfs:
              rules:
                - host: 10.1.1.0/24
                  privilege: rw
                  squash: all_squash
                  security: sys
                  async: true
          # Durable mirror of bootserv01's published build artifacts
          # (Debian VM qcow2 + LXC tar.zst, with sha256 sidecars).
          # Producer at 13-foundation/95-bake-publish-images.yml pushes
          # to bootserv01 over `pct push`; a follow-up job (TBD) rsyncs
          # those out to this share so a bootserv01 LXC rebuild
          # doesn't require re-baking from upstream. Layout inside the
          # share mirrors bootserv01's /srv/http: cloud-images/ +
          # lxc-templates/.
          # Mounted on every PHYSICAL host (see
          # physical.vars.nfs_mounts in inventory.yaml) so any
          # node can browse / restore artifacts off-box.
          - name: build-artifacts
            description: "bootserv01 cloud-images + lxc-templates mirror"
            quota_gb: 100
            nfs:
              rules:
                - host: 10.1.1.0/24
                  privilege: rw
                  squash: all_squash
                  security: sys
                  async: true
          # Cluster-wide scratch space: arbitrary files shared across
          # every physical host. No defined schema; treat as a shared
          # /tmp that survives reboots. RW for every physical host;
          # extend the rule list when a new baremetal host comes
          # online. Mounted at /mnt/nas/scratch on every physical host
          # (see physical.vars.nfs_mounts in inventory.yaml).
          - name: scratch
            description: "Cluster-wide scratch / shared arbitrary files"
            quota_gb: 100
            nfs:
              rules:
                - host: 10.1.1.0/24
                  privilege: rw
                  squash: all_squash
                  security: sys
                  async: true
          # Longhorn BackupTarget destination (the Flux-side Longhorn
          # config points its BackupTarget URL at
          # nfs://nas01.lan:/volume1/longhorn-backup). Backup chunks +
          # metadata; restore path for re-imaged workers. Allow every
          # kube node since Longhorn manager pods on any node may list
          # backups, and engines on any future worker initiate uploads.
          - name: longhorn-backup
            description: "Longhorn BackupTarget"
            quota_gb: 1024
            nfs:
              rules:
                - host: 10.1.1.0/24
                  privilege: rw
                  squash: all_squash
                  security: sys
                  async: true

virtual-machines:
  # No loose `hosts:` here on purpose. Every VM lives in a LEAF child
  # group so its inbound firewall policy comes from that group's
  # group_vars/<group>.yml (`firewall_inbound_allow`); see
  # playbooks/poochella/infra/30-guests/40-firewall.yml. Deeper nesting
  # is safe: tofu/locals.tf walks the inventory tree (depth 3, this is
  # depth 2) and the dnsmasq playbook walks groups['all'], so neither
  # the VM-provisioning nor the DHCP-reservation path is affected.
  #
  # NOTE: `kubernetes` USED TO be a child of this group when every kube
  # node was a VM. With a baremetal kube_worker (metal-home-01) that's
  # no longer true, so `kubernetes` is now a top-level group and the
  # firewall play covers both groups explicitly.
  children:
    dev:
      # Developer/scratch VMs (Ivan's devbox).
      vars:
        firewall_inbound_allow:
          # Dev/scratch range (port-forwards, ad-hoc services).
          - { port: "50000:50100", proto: tcp }
      # hosts:
      #   devbox01:
      #     ansible_host: devbox01.lan
      #     ip_address: 10.1.1.120
      #     mac_address: "02:00:00:00:01:01"
      #     vm:
      #       proxmox_node: pve-home-01
      #       cores: 4
      #       memory: 8192
      #       disk_size: 100
      #       tags: [dev, ivan]
    # databases:
    #   # Database VMs. STOPGAP: firewall-basic has no source-CIDR
    #   # support, so 5432 is LAN-wide. Acceptable behind OPNsense
    #   # WAN default-deny on a single L2 — tracked as a follow-up.
    #   vars:
    #     firewall_inbound_allow:
    #       - { port: 5432, proto: tcp }            # PostgreSQL
    #       - { port: "50000:50100", proto: tcp }   # dev/scratch range
    #   # hosts:
    #   #   postgres01:
    #   #     ...

kubernetes:
  children:
    kube_control_plane:
      # k3s control plane: kube-apiserver + embedded etcd + kubelet +
      # flannel VXLAN. Must be open BEFORE 40-kube/20-k3s.yml so the
      # cluster can form behind default-deny-incoming.
      # STOPGAP: firewall-basic has no source-CIDR support, so etcd
      # (2379-2380) and kubelet (10250) are LAN-wide. Acceptable behind
      # OPNsense WAN default-deny on a single L2 — tracked as a
      # follow-up.
      vars:
        firewall_inbound_allow:
          - { port: 6443, proto: tcp }       # kube-apiserver + kube-vip VIP
          - { port: 2379, proto: tcp }       # embedded etcd client
          - { port: 2380, proto: tcp }       # embedded etcd peer
          - { port: 10250, proto: tcp }      # kubelet API
          - { port: 8472, proto: udp }       # flannel VXLAN
        # NFS mounts on every CP. Same `nfs_mounts` schema as
        # the baremetal side — the variable name is legacy but the
        # mount mechanics are identical. Re-imported from
        # 17-host/16-nfs-mounts.yml via 40-kube/site.yml scoped to
        # kube_control_plane (mirroring how 13-foundation re-imports
        # 17-host playbooks against the `foundation` group).
        #
        # `k3s-snapshots`: target for the off-box etcd-snapshot rsync
        # sidecar (roles/k3s/tasks/_snapshot_sync.yml). k3s writes
        # snapshots locally every 12h; the sidecar rsyncs them + the
        # cluster join token here so a CP-VM rebuild can be rescued
        # via `--cluster-reset --cluster-reset-restore-path=...`.
        nfs_mounts:
          - share: k3s-snapshots
            path: /mnt/nas/k3s-snapshots
            options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
      hosts:
        kube-ctl-01:
          ansible_host: kube-ctl-01.lan
          ip_address: 10.1.1.110
          mac_address: "02:00:00:00:02:01"
          vm:
            # Only pve-home-01 is a hypervisor today; pin all CP VMs
            # there until a second hypervisor exists. With one
            # hypervisor an etcd CP cluster has zero failure tolerance
            # at the physical layer (any CP loss = etcd loss).
            proxmox_node: pve-home-01
            cores: 4
            memory: 12288
            disk_size: 30
            tags: [kube, control-plane]
    #     kube-ctl-02:
    #       ansible_host: kube-ctl-02.lan
    #       ip_address: 10.1.1.111
    #       mac_address: "02:00:00:00:02:02"
    #       vm:
    #         proxmox_node: pve-home-01
    #         cores: 4
    #         memory: 8192
    #         disk_size: 30
    #         tags: [kube, control-plane]
    #     kube-ctl-03:
    #       ansible_host: kube-ctl-03.lan
    #       ip_address: 10.1.1.112
    #       mac_address: "02:00:00:00:02:03"
    #       vm:
    #         proxmox_node: pve-home-01
    #         cores: 4
    #         memory: 8192
    #         disk_size: 30
    #         tags: [kube, control-plane]
    kube_workers:
      # k3s workers: kubelet + flannel VXLAN. Same STOPGAP as
      # kube_control_plane re: no source-CIDR support.
      #
      # `firewall_outbound_deny: []` OPTS OUT of the parent
      # 30-guests SSH-out deny default: the baremetal metal-home-01
      # hosts dev/CI workloads that need git over SSH to GitHub as
      # `pani`. Risk traded off — a worker-side process gaining
      # git-via-SSH egress — is acceptable because the worker is
      # baremetal-owned (not multi-tenant VM substrate) and an
      # attacker with shell on it already has many egress paths.
      vars:
        firewall_inbound_allow:
          - { port: 10250, proto: tcp, comment: "kubelet API" }      # kubelet API
          - { port: 8472, proto: udp, comment: "flannel VXLAN"}       # flannel VXLAN
          - { port: 9100, proto: tcp, comment: "node-exporter" }
        firewall_outbound_deny: []
      hosts:
        metal-home-01:

containers:
  # LXC guests. Like VMs, each leaf group owns its inbound firewall
  # policy in group_vars/<group>.yml. Hosts here carry an `lxc:` block
  # which Tofu shapes into `proxmox_virtual_environment_container`
  # resources (cloned from `template_ct_ids[proxmox_node]`); see the
  # header for the namespace contract.
  children:
    bootserv:
      # The fleet's iPXE / Debian-netboot home base. ONE LXC per cluster
      # is enough — TFTP + nginx are cheap and there's no reason to
      # shard. Tagged `infra` so its Tofu module precedes every VM
      # module on the same node (the ground-up bootstrap invariant).
      # Lives on pve-home-01 so it survives the metal-home-01 re-image
      # that triggers most iPXE boots.
      hosts:
        bootserv01:
          ansible_host: bootserv01.lan
          lxc:
            proxmox_node: pve-home-01
            cores: 1
            memory: 512
            disk_size: 30
            unprivileged: true
            features:
              nesting: true
            tags: [infra, bootserv]
          firewall_inbound_allow:
            - { proto: tcp, port: 22, comment: "ssh" }
            - { proto: tcp, port: 80, comment: "http" }
            - { proto: tcp, port: 443, comment: "https" }
    # dns:
    #   # DNS/DHCP LXCs (pihole). Carried over from the prior
    #   # host-keyed _container_inbound map for pihole02.
    #   vars:
    #     firewall_inbound_allow:
    #       - { port: 53, proto: tcp }    # DNS
    #       - { port: 53, proto: udp }    # DNS
    #       - { port: 67, proto: udp }    # DHCP
    #       - { port: 80, proto: tcp }    # admin UI
    #   # hosts:
