# Single source of truth for all hosts in the homelab.
#
# Read by:
#   - Ansible (as its inventory; see ansible.cfg)
#   - OpenTofu (via yamldecode in tofu/locals.tf — every host with a `vm:`
#     block becomes a Proxmox VM)
#   - The dnsmasq playbook (every host with `mac_address` defined gets a
#     static DHCP+DNS reservation on OPNsense)
#
# Conventions:
#   - `ip_address` + `mac_address`  → host appears as a dnsmasq static lease
#   - `static_ip: true`             → suppress the dnsmasq reservation (e.g. router)
#   - `vm: {...}`                   → Tofu creates this VM on Proxmox
#   - `vm.data_disk_size: <GiB>`    → attach a 2nd virtio disk backed by
#     the node-local `longhorn-data` PVE storage (k3s workers, Longhorn).
#     One worker per node, sized to consume that node's whole longhorn
#     pool (kept just under the physical pool — it is thin-provisioned,
#     so over-committing it would let Longhorn exhaust the pool).
#   - VM MACs use the locally-administered prefix `02:` and a structured
#     tail (02:00:00:<role>:<index>) so collisions are obvious at a glance.
#   - `storage: {disks: [...]}` on a baremetal host → the disk layout the
#     hypervisor-disks role realises (20-hypervisor/30-storage.yml).
#     DISK-CENTRIC + STABLE SELECTORS, declared not discovered. Each disk:
#       select: boot                       # the auto-detected PVE boot disk
#       select: { model: "...", serial: "..." }       # one exact drive
#       select: { min_size_gib: 900, rotational: false }  # attr match
#       select: { size_gib: 1000, rotational: true }      #   "
#       wipe: refuse|force                 # per-disk, default refuse;
#                                          # `force` is DECLARED + scoped
#                                          # (replaces the global -e flag)
#       partitions: [ {label, vg, thinpool, pve_storage, content, size} ]
#     `label` is the GPT partlabel (unique per node, the idempotency key);
#     `size` is sgdisk +SIZE ("0" = fill). `pve_storage` is a FROZEN
#     contract (Tofu hardcodes `vms`/`longhorn-data`). A non-`boot`
#     selector MUST resolve to EXACTLY ONE non-boot, non-removable disk —
#     0 or >1 matches is a HARD FAILURE (the role never guesses). Several
#     partitions, on different disks, may share one vg/thinpool/
#     pve_storage → that is how a NVMe + HDD become one larger
#     `longhorn-data` pool. Selectors match hardware attributes, so kernel
#     renames are irrelevant and swapping a disk for an identical/larger
#     one needs NO edit when the selector is attribute-based. Preview
#     resolution + a paste-ready block with `just disk-plan`.
#
#   CONVENTION (enforced in preflight): every baremetal node yields BOTH
#   a `vms` and a `longhorn-data` PVE storage. Baseline hardware = one
#   ≥1 TB boot NVMe (carved into both); additional disks are optional and
#   extend `longhorn-data`. See group_vars/baremetal.yml.
#
# VMs always DHCP-boot. The static IP comes from the reservation tied to
# the MAC declared here — not from cloud-init.
#
# Proxmox topology is PER-GROUP (clustered and standalone can coexist):
#   - `baremetal`      → umbrella for ALL Proxmox hosts. Shared roles
#                        target this; children flatten into it.
#   - `pve_standalone` → independent nodes, NO corosync. Each is its own
#                        API surface; Tofu uses a provider per node.
#   - `pve_cluster`    → parent of zero or more corosync clusters. Each
#                        CHILD group is ONE cluster: the group name is the
#                        cluster name, and group_vars/<name>.yml sets
#                        `proxmox_cluster_name: <name>`. Empty today —
#                        poochella runs as two independent standalone nodes
#                        (the gaming-PC pve-home-02 replaced the old
#                        crash-looping unit; pve-home-03 retired).

all:
  vars:
    domain: lan
    network_gateway: "10.1.1.1"
    network_cidr: "/24"
    ansible_python_interpreter: /usr/bin/python3
    # Proxmox API endpoints, one per baremetal node. Read by Tofu via
    # tofu/locals.tf → provider.tf, which declares one aliased provider
    # per node. With independent (non-clustered) nodes a single endpoint
    # cannot place VMs on a peer, so each node is addressed directly. In a
    # cluster every member exposes the full API; pointing each provider at
    # its own node is uniform and works for both topologies.
    # Adding a node = add it here + a provider block in tofu/provider.tf +
    # a token var (see tofu/variables.tf) + a module call in tofu/main.tf.
    proxmox_endpoints:
      pve-home-01: "https://pve-home-01.lan:8006"
      pve-home-02: "https://pve-home-02.lan:8006"
    # Per-node Proxmox template IDs. Read by Ansible
    # (04-prepare-templates.yml) and Tofu (tofu/locals.tf). VM storage is
    # node-local LVM-thin, so every baremetal node bakes its own local
    # template. These maps are the single source of truth — no offset
    # arithmetic, no group-ordering coupling. The value is each node's
    # *anchor* (first/default template) ID; 04-prepare-templates.yml
    # builds the per-image-family templates as anchor+0, anchor+1, … in
    # vm_templates_base / lxc_templates_base order on each node. Tofu
    # clones each VM from `template_vm_ids[its proxmox_node]` (the
    # default = first VM template). Per-VM override: set `vm.template_id`
    # on a host below (used verbatim). Keep anchors ≥ (#templates) apart
    # so families don't collide.
    template_vm_ids:
      pve-home-01: 9001
      pve-home-02: 9011
      # pve-home-03: 9021
      # pve-home-04: 9031
    template_ct_ids:
      pve-home-01: 9101
      pve-home-02: 9111
      # pve-home-03: 9121
      # pve-home-04: 9131

router:
  hosts:
    opnsense01:
      ansible_host: "10.1.1.1"
      ip_address: "10.1.1.1"
      static_ip: true

baremetal:
  # Umbrella for every Proxmox baremetal host. Topology is decided by
  # which child group a host sits in (see header). `hosts:` here would be
  # topology-ambiguous, so all hosts live under a child group.
  children:
    pve_standalone:
      # Independent PVE nodes — no corosync, no HA, no live-migration.
      hosts:
        pve-home-01:
          ansible_host: pve-home-01.lan
          ip_address: 10.1.1.105
          mac_address: "18:60:24:dc:b7:32"
          # Mini-PC: a single ~1 TB boot NVMe carries all three roles.
          # PVE installer took the first ~100 GiB (lvm.hdsize=100) as the
          # `pve` VG (hypervisor). Its free tail is carved, in order,
          # into vm-storage (200 GiB → `vms`) then longhorn (the rest →
          # `longhorn-data`). No extra disks (the baseline convention).
          storage:
            disks:
              - select: boot
                partitions:
                  - label: vm-storage
                    vg: vmdata
                    thinpool: vmthin
                    pve_storage: vms
                    content: images,rootdir,iso,vztmpl,snippets
                    size: "200G"
                  - label: longhorn
                    vg: longhorndata
                    thinpool: longhornthin
                    pve_storage: longhorn-data
                    content: images
                    size: "0"          # fill the boot tail
        pve-home-02:
          ansible_host: pve-home-02.lan
          ip_address: 10.1.1.106
          mac_address: "3c:7c:3f:1f:96:af"
          # Three disks (preview with `just disk-plan`):
          #   - Samsung ~250 GB boot NVMe  → its SSD tail = `vms`
          #     (after lvm.hdsize=100; selector: boot)
          #   - new ~1 TB NVMe             → `longhorn-data` (fast tier)
          #   - freed ~1 TB WDC HDD        → SAME `longhorn-data`
          #     (additional capacity: one combined longhorndata VG /
          #      longhornthin pool spans BOTH the NVMe and the HDD)
          #
          # NOTE (2026-05-19): both data disks carry foreign signatures —
          # the new NVMe a stale 3-partition GPT from a prior install, the
          # HDD the OLD longhorndata VG (it previously WAS longhorn-data).
          # Both therefore declare `wipe: force` (scoped, deliberate). The
          # HDD's live data is safe to destroy because Longhorn keeps a
          # replica on the peer node (kube-worker-02 / pve-home-01) and
          # the operator is taking the workers down for this rebuild — see
          # docs/storage-disk-runbook.md. Selectors are attribute-based
          # (rotational splits NVMe vs HDD), so an identical/larger
          # replacement of either disk needs NO edit here.
          #
          # ⚠ Mixing NVMe + HDD in one LVM-thin pool means extents that
          # land on the HDD run at HDD speed; LVM cannot pin Longhorn's
          # hot data to the NVMe. This is a deliberate capacity-over-
          # uniform-latency choice; segregate at the Longhorn layer
          # (Flux) if it ever matters. Splitting back to two pools is a
          # one-line change (give the HDD its own vg/thinpool/pve_storage).
          storage:
            disks:
              - select: boot
                partitions:
                  - label: vm-storage
                    vg: vmdata
                    thinpool: vmthin
                    pve_storage: vms
                    content: images,rootdir,iso,vztmpl,snippets
                    size: "0"          # fill the boot SSD tail
              - select: { min_size_gib: 900, rotational: false }
                wipe: force            # stale prior-install GPT
                partitions:
                  - label: longhorn-nvme
                    vg: longhorndata
                    thinpool: longhornthin
                    pve_storage: longhorn-data
                    content: images
                    size: "0"          # whole disk
              - select: { min_size_gib: 900, rotational: true }
                wipe: force            # old longhorndata VG (now freed)
                partitions:
                  - label: longhorn-hdd
                    vg: longhorndata
                    thinpool: longhornthin
                    pve_storage: longhorn-data
                    content: images
                    size: "0"          # whole disk
    pve_cluster:
      # Parent of all corosync clusters. Each child group is ONE cluster
      # (group name = cluster name; set proxmox_cluster_name in
      # group_vars/<name>.yml). Empty today — poochella is standalone.
      # Example:
      #   children:
      #     poochella:
      #       hosts:
      #         pve-home-03:
      #           ansible_host: pve-home-03.lan
      #           ip_address: 10.1.1.107
      #           mac_address: "e4:e7:49:47:dc:bf"
      #         pve-home-04:
      #           ansible_host: pve-home-04.lan
      #           ip_address: 10.1.1.108
      #           mac_address: "<unique-mac>"
      children: {}


switches:
  hosts:
    router-01:
      ansible_host: 10.1.1.102
      ip_address: 10.1.1.102
      mac_address: "04:f4:1c:82:e0:ff"

storage:
  # NAS / shared file-storage targets. Administered out-of-band on the
  # device's own UI (Synology DSM), but treated as a normal LAN host
  # from the network's point of view: a dnsmasq static DHCP reservation
  # pins MAC -> ip_address and auto-registers `nas01.lan` in DNS via
  # `dnsmasq_register_static_dns: true` — same path every other named
  # LAN host uses (kube-ctl-01.lan, pve-home-01.lan, …), no separate
  # Unbound override needed. The NAS may keep its DSM static-IP config
  # or switch to DHCP; either way the MAC -> IP binding matches and the
  # name resolves.
  #
  # Read by:
  #   - 20-hypervisor/40-bake-images.yml  (Packer publishes the dated qcow2
  #                                        + atomic `latest` symlink here
  #                                        via rsync-over-SSH)
  #   - tofu/locals.tf                    (`nas.https_url_base` is the
  #                                        source of every
  #                                        proxmox_virtual_environment_download_file
  #                                        URL Tofu pulls onto each PVE
  #                                        node's `local` ISO storage)
  #
  # Per-host `nas:` namespace fields (concrete values are PLACEHOLDERS —
  # bump them to match the deployed device before first `just bake-images`):
  #   - images_dir        absolute path on the NAS filesystem holding the
  #                       golden-image artifacts.
  #   - rsync_user        service account on the NAS with SSH + write to
  #                       images_dir + the ability to `ln -sf` + `mv -Tf`
  #                       symlinks (Synology: a user with shell access).
  #   - https_url_base    HTTPS URL root the NAS exposes for images_dir.
  hosts:
    nas01:
      ansible_host: nas01.lan
      ip_address: 10.1.1.130
      mac_address: "90:09:d0:96:65:63"
      nas:
        images_dir: /volume1/proxmox/images/vm
        rsync_user: pve-publisher
        https_url_base: https://nas01.lan/proxmox/images/vm

virtual-machines:
  # No loose `hosts:` here on purpose. Every VM lives in a LEAF child
  # group so its inbound firewall policy comes from that group's
  # group_vars/<group>.yml (`firewall_inbound_allow`); see
  # playbooks/poochella/infra/30-guests/40-firewall.yml. Deeper nesting
  # is safe: tofu/locals.tf walks the inventory tree (depth 3, this is
  # depth 2) and the dnsmasq playbook walks groups['all'], so neither
  # the VM-provisioning nor the DHCP-reservation path is affected.
  children:
    dev:
      # Developer/scratch VMs (Ivan's devbox). Policy: group_vars/dev.yml
      hosts:
        devbox01:
          ansible_host: devbox01.lan
          ip_address: 10.1.1.120
          mac_address: "02:00:00:00:01:01"
          vm:
            proxmox_node: pve-home-02
            cores: 4
            memory: 8192
            disk_size: 100
            tags: [dev, ivan]
    kubernetes:

kubernetes:
  children:
    kube_control_plane:
      hosts:
        kube-ctl-01:
          ansible_host: kube-ctl-01.lan
          ip_address: 10.1.1.110
          mac_address: "02:00:00:00:02:01"
          vm:
            proxmox_node: pve-home-02
            cores: 4
            memory: 8192
            disk_size: 30
            tags: [kube, control-plane]
        kube-ctl-02:
          ansible_host: kube-ctl-02.lan
          ip_address: 10.1.1.111
          mac_address: "02:00:00:00:02:02"
          vm:
            proxmox_node: pve-home-02
            cores: 4
            memory: 8192
            disk_size: 30
            tags: [kube, control-plane]
        kube-ctl-03:
          ansible_host: kube-ctl-03.lan
          ip_address: 10.1.1.112
          mac_address: "02:00:00:00:02:03"
          vm:
            # On pve-home-01 (the other CPs are on pve-home-02) so the
            # control plane spans two physical nodes. NOTE: a 3-member
            # etcd on 2 physical hosts survives losing pve-home-01 (2/3
            # quorum stays) but NOT pve-home-02 (loses 2/3) — true CP HA
            # needs one CP per physical node; move a CP here when the
            # 3rd node lands. (Longhorn DATA safety is independent of
            # this — it rides the per-node workers + zone anti-affinity.)
            proxmox_node: pve-home-02
            cores: 4
            memory: 8192
            disk_size: 30
            tags: [kube, control-plane]
    kube_workers:
      hosts:
        kube-worker-01:
          ansible_host: kube-worker-01.lan
          ip_address: 10.1.1.113
          mac_address: "02:00:00:00:03:01"
          vm:
            proxmox_node: pve-home-02
            cores: 4
            memory: 16000
            disk_size: 50
            data_disk_size: 600
            tags: [kube, worker]
        kube-worker-02:
          ansible_host: kube-worker-02.lan
          ip_address: 10.1.1.114
          mac_address: "02:00:00:00:03:02"
          vm:
            # On pve-home-01 → one Longhorn worker per PHYSICAL node
            # (kube-worker-01 is on pve-home-02). With replica 2 + HARD
            # zone anti-affinity (zone = vm.proxmox_node, set in
            # group_vars/kubernetes.yml) every volume keeps one copy per
            # box → survives losing either node, rebuilds when it
            # returns. Resources match kube-worker-01 deliberately: if
            # one box dies its workloads must reschedule onto the
            # survivor, so an undersized peer would just move the
            # co-location starvation, not remove it. ASSUMPTION: confirm
            # pve-home-01 has 16 GiB to spare; lower memory/cores if not.
            # data_disk_size 600 fits pve-home-01's ~700 GiB boot_tail
            # `longhorn` pool with thin-pool headroom and matches
            # kube-worker-01 so replica-2 usable capacity is symmetric
            # (~600 GiB). Longhorn — NOT LVM — is what presents the two
            # nodes' longhorn-data disks as one storage system.
            proxmox_node: pve-home-01
            cores: 4
            memory: 16000
            disk_size: 50
            data_disk_size: 600
            tags: [kube, worker]
        # kube-worker-03: enable on the 3rd PHYSICAL node when it
        # arrives, then raise the Longhorn replica count to 3 (Flux
        # side). proxmox_node was pve-home-03 (RETIRED) — re-pin to the
        # new node's name. Keep resources at parity with the others.
        # kube-worker-03:
        #   ansible_host: kube-worker-03.lan
        #   ip_address: 10.1.1.115
        #   mac_address: "02:00:00:00:03:03"
        #   vm:
        #     proxmox_node: <3rd-physical-node>
        #     cores: 4
        #     memory: 16000
        #     disk_size: 50
        #     data_disk_size: 600
        #     tags: [kube, worker]

containers:
  # LXC guests. Like VMs, each leaf group owns its inbound firewall
  # policy in group_vars/<group>.yml. Both children are empty templates
  # for future LXCs; the policies already exist so a host inherits them
  # the moment it is added.
  children:
    webservers:   # caddy/nginx — policy: group_vars/webservers.yml (80/443)
    # dns:        # pihole — policy: group_vars/dns.yml (53, 67, 80)
    #   hosts:
    #     pihole02:
    #       ansible_host: pihole02.lan
    #       ip_address: 10.1.1.53
    #       mac_address: "02:00:00:00:04:01"
