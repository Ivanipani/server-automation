---
# PVE-only knobs. Generic-host vars (tailscale, ssh) live in
# group_vars/physical.yml; firewall rules live in inventory.yaml (on
# each group's `vars:` block).

# PVE clustering is gated off (assertion in 20-hypervisor/20-cluster.yml).
# Every hypervisor is standalone — there is nothing cluster-related to
# set here.

# ── Storage convention (consumed by 17-host/15-storage.yml) ─────────
#
# Tofu hardcodes ONE PVE storage NAME: `vms` (every VM/LXC boot disk +
# cloud-init drive). preflight.yml asserts every hypervisor yields it.
#
# Longhorn replica state lives on baremetal kube_workers (today:
# worker-home-02), NOT on any hypervisor pool. No VM receives a
# Longhorn-backed data disk; CPs are pure consumers via the iSCSI/NFS
# clients installed by 40-kube/10-longhorn-host-prep.yml. A hypervisor
# therefore only ever needs `vms` — a small boot NVMe is sufficient
# (pve-home-01 today: 256 GB NVMe). Disks are named by STABLE
# SELECTOR, never /dev/disk/by-id; preview/derive a host's block with
# `just disk-plan`.
#
# The DESTRUCTIVE carve is opt-in per-run via `host_disks_action: overwrite`
# (defaults/main.yml in the host-disks role defaults to `info`, which is
# read-only and reports PRESENT/MISSING per declared partition without
# mutating anything). Set the overwrite mode per-host (host_vars/<name>.yml)
# or per-run (`-e host_disks_action=overwrite --limit <host>`). Bring-up
# flows (`just do-host-init`) inherit the safe `info` default and never
# halt on already-carved hosts; the foundation tier sets `overwrite`
# explicitly at its 15-storage import.

# ── NFS mounts from nas01 (hypervisor-side override) ────────────────
# Overrides the empty `physical_nfs_mounts` default in physical.yml.
#
# Both former mounts now have no in-repo consumer:
#   - `proxmox` RW share was the publish target for the deleted
#     20-hypervisor/40-bake-images.yml (Packer → NAS image-bake path).
#     The current bake flow publishes to bootserv01 HTTP instead
#     (13-foundation/95-bake-publish-images.yml).
#   - `pxe` RO share was dropped earlier — bootserv01 LXC now serves PXE
#     artifacts over HTTP, so no host needs the NAS `pxe` share. The
#     transitional cleanup that unmounts `/mnt/nas/pxe` lives in
#     17-host/16-nfs-mounts.yml.
# The `proxmox` mount is retained here for now in case the user wants to
# keep it for manual workflows or backups; remove if there's no use for
# it.
physical_nfs_mounts:
  - share: proxmox
    path: /mnt/nas/proxmox
    # read-write; retained but currently no in-repo consumer (see header).
    # `soft,timeo=30` keeps a NAS hiccup from hanging anything that
    # might still write here.
    options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
