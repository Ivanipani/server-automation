---
# PVE-only knobs. Generic-host vars (tailscale, ssh, firewall) live in
# group_vars/physical.yml.

# Proxmox topology is per-group (see inventory.yaml header). A corosync
# cluster name is NOT a fleet-wide setting — standalone nodes have none.
# To form a cluster, create a child group under `pve_cluster` and set
# `proxmox_cluster_name: <group-name>` in group_vars/<group-name>.yml;
# 20-hypervisor/20-cluster.yml scopes corosync to that group's members.
# Poochella runs standalone, so nothing is set here.

# ── Storage convention (consumed by 20-hypervisor/30-storage.yml) ─────
#
# Every hypervisor MUST yield BOTH frozen PVE storages — `vms` and
# `longhorn-data` (Tofu/templates hardcode them). preflight.yml asserts
# this; a node whose declared `storage.disks` would not produce both
# fails loudly rather than silently dropping a storage.
#
# Baseline hardware = ONE ≥1 TB boot NVMe. PVE is installed with
# `lvm.hdsize = 100` (the `pve` VG / hypervisor takes the first ~100
# GiB); the free tail is carved into `vms` then `longhorn-data`. That
# single disk satisfies the convention on its own (pve-home-01).
#
# ADDITIONAL disks are OPTIONAL and, by convention, extend
# `longhorn-data`: declare each as another `storage.disks` entry whose
# partition reuses vg=longhorndata / thinpool=longhornthin /
# pve_storage=longhorn-data — the VG then spans every such disk and the
# thin pool grows over all of them. Disks are named by STABLE SELECTOR,
# never /dev/disk/by-id; preview/derive a host's block with
# `just disk-plan`.
#
# DESTRUCTIVE: `confirm_carve_data_disk: true` authorizes sgdisk to
# write GPTs. A data disk that still holds foreign signatures is REFUSED
# unless that disk declares `wipe: force` in inventory.yaml (scoped,
# deliberate). The boot disk is never wiped. Only enable carving on a
# node with no REAL (non-template) VMs/containers — templates are
# handled by `carve_destroy_templates` below.
confirm_carve_data_disk: true

# Regenerable VM/CT templates (baked by 20-hypervisor/40-templates.yml)
# would otherwise block a re-carve, since `qm list` reports them as
# guests. With this true, preflight `qm/pct destroy --purge`es any
# TEMPLATE-only guests and then proceeds; 40-templates.yml re-bakes them
# in the next tier step. Any REAL (non-template) VM or container still
# HARD REFUSES regardless of this flag — it only ever touches templates.
carve_destroy_templates: false

# ── NFS mounts from nas01 ───────────────────────────────────────────
# Consumed by 20-hypervisor/35-nfs-mounts.yml. Each entry's `share` is
# a NAS-side share name declared in inventory.yaml's
# storage.hosts.nas01.storage.shares; the playbook derives the NFS
# source from nas01's ansible_host. Adding a mount = append here +
# re-run 35-nfs-mounts.yml. Removing a mount = drop the entry AND run
# one transitional play with `state: absent` (ansible.posix.mount with
# `state: mounted` doesn't auto-unmount stragglers).
hypervisor_nfs_mounts:
  - share: pxe
    path: /mnt/nas/pxe
    # read-only — PXE clients only read boot artifacts; matches the
    # NFS export's `ro` rule on the NAS side.
    options: "ro,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
  - share: proxmox
    path: /mnt/nas/proxmox
    # read-write — bake-images writes qcow2s here as the active publish
    # target (Phase 2 of the SSH→NFS migration in 40-bake-images.yml).
    # `soft,timeo=30` keeps a NAS hiccup from hanging the build; data
    # is reproducible so the failure mode is "rerun the bake", not
    # "corrupt the artifact".
    options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"
