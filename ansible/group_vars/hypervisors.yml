---
# PVE-only knobs. Generic-host vars (tailscale, ssh, firewall) live in
# group_vars/physical.yml.

# Proxmox topology is per-group (see inventory.yaml header). A corosync
# cluster name is NOT a fleet-wide setting — standalone nodes have none.
# To form a cluster, create a child group under `pve_cluster` and set
# `proxmox_cluster_name: <group-name>` in group_vars/<group-name>.yml;
# 20-hypervisor/20-cluster.yml scopes corosync to that group's members.
# Poochella runs standalone, so nothing is set here.

# ── Storage convention (consumed by 17-host/15-storage.yml) ─────────
#
# Tofu hardcodes two PVE storage NAMES: `vms` (every VM/LXC boot disk +
# cloud-init drive) and `longhorn-data` (the second virtio disk for
# kube_workers that declare `vm.data_disk_size`). preflight.yml turns
# those hardcodes into per-node assertions:
#
#   1. EVERY hypervisor must yield `vms` (universal: there is no VM
#      without a boot disk).
#   2. A hypervisor must yield `longhorn-data` IF it hosts any VM with
#      `vm.data_disk_size`. A CP-only node does NOT need it.
#
# Today: pve-home-01 hosts the k3s control planes + bootserv01 only
# (longhorn workers live on baremetal worker-home-02), so it has a
# 256 GB NVMe carved into `vms` only — no longhorn-data. A future
# longhorn-hosting hypervisor wants a ≥1 TB boot NVMe (carved into
# `vms` + `longhorn-data`); additional disks are optional and, by
# convention, extend `longhorn-data` by re-using
# vg=longhorndata / thinpool=longhornthin / pve_storage=longhorn-data.
# The VG then spans every such disk and the thin pool grows over all
# of them. Disks are named by STABLE SELECTOR, never /dev/disk/by-id;
# preview/derive a host's block with `just disk-plan`.
#
# The DESTRUCTIVE carve is opt-in per-run via `host_disks_action: overwrite`
# (defaults/main.yml in the host-disks role defaults to `info`, which is
# read-only and reports PRESENT/MISSING per declared partition without
# mutating anything). Set the overwrite mode per-host (host_vars/<name>.yml)
# or per-run (`-e host_disks_action=overwrite --limit <host>`). Bring-up
# flows (`just do-host-init`) inherit the safe `info` default and never
# halt on already-carved hosts; the foundation tier sets `overwrite`
# explicitly at its 15-storage import.

# ── NFS mounts from nas01 (hypervisor-side override) ────────────────
# Overrides the empty `physical_nfs_mounts` default in physical.yml to
# add the `proxmox` RW share that 40-bake-images.yml writes qcow2s into.
# The old `pxe` RO mount was dropped — bootserv01 LXC now serves PXE
# artifacts over HTTP, so no host needs the NAS `pxe` share. The
# transitional cleanup that unmounts `/mnt/nas/pxe` lives in
# 17-host/16-nfs-mounts.yml.
physical_nfs_mounts:
  - share: proxmox
    path: /mnt/nas/proxmox
    # read-write — bake-images writes qcow2s here as the active publish
    # target (40-bake-images.yml). `soft,timeo=30` keeps a NAS hiccup
    # from hanging the build; data is reproducible so the failure mode
    # is "rerun the bake", not "corrupt the artifact".
    options: "rw,vers=4,_netdev,nofail,bg,soft,intr,timeo=30"

firewall_inbound_allow:
  - { port: 22, proto: tcp }
  - { port: 8006, proto: tcp }
