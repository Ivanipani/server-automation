---
# k3s worker vars. Firewall rules live in inventory.yaml on the
# `kube_workers` group's `vars:` block (including the
# `firewall_outbound_deny: []` opt-out so worker-home-02 can git-over-SSH
# as `pani`).

# --- Longhorn storage scheduling (workers only) ----------------------
#
# kube_workers is a CHILD of `kubernetes`, so this k3s_node_labels list
# REPLACES (does not merge) the parent's. Keep the zone label
# (k3s_zone_label is defined in group_vars/kubernetes.yml and is in
# scope here — workers are also in the `kubernetes` group).
#
# NO `node.longhorn.io/create-default-disk` label here — DELIBERATELY.
# Each baremetal worker now exposes ONE plain-ext4 mount PER physical
# disk under /var/lib/longhorn-disks/<label> (host-disks role, from each
# worker's inventory `storage.disks`), instead of a single spanning pool
# at /var/lib/longhorn. The Flux-side Longhorn registers EACH of those
# mounts as an EXPLICIT Longhorn disk per node (replica-2 across nodes,
# optional disk tags), and runs with the single default-disk mechanism
# OFF (`createDefaultDiskLabeledNodes: false`).
#
# WHY the label is gone: if `createDefaultDiskLabeledNodes` were on and
# this label present, Longhorn would create its default disk at
# /var/lib/longhorn — which now has NOTHING mounted on it, i.e. the
# worker's ROOT OS partition — and schedule replica IO onto the OS disk.
# Removing the label (and the Flux switch) keeps storage on the explicit
# per-disk mounts and OFF both root and the schedulable etcd CP VMs.
#
# Lockstep contract: this Ansible change + the Flux explicit-disk config
# must land together. If Flux selects worker nodes by a DIFFERENT label,
# add THAT label below (not create-default-disk).
k3s_node_labels:
  - "{{ k3s_zone_label }}"
