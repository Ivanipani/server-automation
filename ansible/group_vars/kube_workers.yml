---
# Inbound firewall policy for k3s worker VMs (the `kube_workers` leaf
# group).
#
# Consumed by playbooks/poochella/infra/30-guests/40-firewall.yml. The
# uniform baseline (default-deny in, allow SSH, deny SSH out) is set by
# that play; this list is ONLY the per-group extra openings. Must be
# open BEFORE 40-kube/20-k3s.yml so workers can join the cluster behind
# the default-deny-incoming firewall.
#
# GROUP-DRIVEN, not host-enumerated: uncommenting kube-worker-02/03 in
# inventory needs no edit here. See group_vars/kube_control_plane.yml
# for the full port rationale and the source-CIDR STOPGAP note.
#
# Ports (see roles/k3s):
#   10250/tcp  kubelet API
#   8472/udp   flannel VXLAN
firewall_inbound_allow:
  - { port: 10250, proto: tcp }      # kubelet API
  - { port: 8472, proto: udp }       # flannel VXLAN

# --- Longhorn storage scheduling (workers only) ----------------------
#
# kube_workers is a CHILD of `kubernetes`, so this k3s_node_labels list
# REPLACES (does not merge) the parent's. Keep the zone label
# (k3s_zone_label is defined in group_vars/kubernetes.yml and is in
# scope here — workers are also in the `kubernetes` group) and add the
# Longhorn marker so storage lands ONLY on workers.
#
# node.longhorn.io/create-default-disk=true: when the Flux-side Longhorn
# sets `createDefaultDiskLabeledNodes: true`, Longhorn creates its
# default disk ONLY on nodes carrying this label, at the default data
# path /var/lib/longhorn — which on baremetal kube_workers is the
# longhorndata/longhornthin ext4 mount that the host-disks role builds
# from each worker's inventory `storage.disks` block (see
# worker-home-02 in inventory.yaml; realised by 17-host/15-storage.yml).
# Result: replica storage + rebuild IO stay on the baremetal workers
# and OFF the schedulable etcd control plane VMs (the co-location
# starvation risk).
# Contract: Flux MUST set createDefaultDiskLabeledNodes=true, else
# Longhorn would make a default disk on EVERY node, defeating this.
k3s_node_labels:
  - "{{ k3s_zone_label }}"
  - "node.longhorn.io/create-default-disk=true"

# Outbound firewall policy override. Consumed by
# playbooks/poochella/infra/30-guests/40-firewall.yml. kube_workers OPTS
# OUT of the parent "no lateral SSH out from a guest" baseline: the
# baremetal worker-home-02 hosts dev/CI workloads that need git over SSH
# to GitHub as the `pani` user (see
# playbooks/poochella/dev/10-users/30-pani-ssh-key.yml). The risk traded
# off — a worker-side process gaining git-via-SSH egress — is acceptable
# because the worker is baremetal-owned (not multi-tenant VM substrate)
# and an attacker with shell on it already has many egress paths.
firewall_outbound_deny: []
