---
# k3s worker vars. Firewall rules live in inventory.yaml on the
# `kube_workers` group's `vars:` block (including the
# `firewall_outbound_deny: []` opt-out so worker-home-02 can git-over-SSH
# as `pani`).

# --- Longhorn storage scheduling (workers only) ----------------------
#
# kube_workers is a CHILD of `kubernetes`, so this k3s_node_labels list
# REPLACES (does not merge) the parent's. Keep the zone label
# (k3s_zone_label is defined in group_vars/kubernetes.yml and is in
# scope here — workers are also in the `kubernetes` group) and add the
# Longhorn marker so storage lands ONLY on workers.
#
# node.longhorn.io/create-default-disk=true: when the Flux-side Longhorn
# sets `createDefaultDiskLabeledNodes: true`, Longhorn creates its
# default disk ONLY on nodes carrying this label, at the default data
# path /var/lib/longhorn — which on baremetal kube_workers is the
# longhorndata/longhornthin ext4 mount that the host-disks role builds
# from each worker's inventory `storage.disks` block (see
# worker-home-02 in inventory.yaml; realised by 17-host/15-storage.yml).
# Result: replica storage + rebuild IO stay on the baremetal workers
# and OFF the schedulable etcd control plane VMs (the co-location
# starvation risk).
# Contract: Flux MUST set createDefaultDiskLabeledNodes=true, else
# Longhorn would make a default disk on EVERY node, defeating this.
k3s_node_labels:
  - "{{ k3s_zone_label }}"
  - "node.longhorn.io/create-default-disk=true"
