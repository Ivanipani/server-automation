---
# Cluster-wide vars for the k3s role.
#
# k3s_cluster_token is wired through group_vars/all/vars.yml (vault
# indirection). k3s_api_endpoint defaults from the role and resolves to
# the kube-vip VIP, falling back to the first kube_control_plane host.

k3s_version: "v1.31.4+k3s1"

# kube-vip — floating L2 VIP across the control planes. Used as the
# stable apiserver endpoint for kubectl from outside the cluster, and
# as the join endpoint for the other CPs and workers.
k3s_kube_vip_enabled: true
k3s_kube_vip_address: "10.1.1.50"

# Stable DNS name in front of the VIP, resolved by Unbound on OPNsense
# (host override pushed in playbooks/poochella/infra/10-router/30-unbound.yml,
# which reads this var via hostvars). Consumed by the k3s role for the
# rewritten kubeconfig `server:` URL, the joiner --server endpoint, and
# as an extra apiserver TLS SAN — so workflows that touch the cluster
# survive a VIP renumber with a single DNS edit. DNS is sugar ON TOP of
# kube-vip, not a replacement: kube-vip still owns sub-second L2
# failover between CPs, the DNS layer just hides the literal VIP.
k3s_api_dns_name: "api.lan"

# Fetch kubeconfig back to the controller after the cluster is up so you
# can `export KUBECONFIG=$(pwd)/kubeconfig && kubectl get nodes` from
# the repo root. Path is relative to the controller (your laptop).
# playbook_dir is the k3s playbook's own dir (infra/40-guests), so the
# repo root is four levels up.
k3s_kubeconfig_local_path: "{{ playbook_dir }}/../../../../kubeconfig"

# cluster/context/user identifiers in the local copy are renamed to
# k3s_cluster_name (k3s hard-codes "default" on the server side).
k3s_cluster_name: "doghouse"

# --- Physical-node failure domain (the Longhorn data-safety linchpin) -
#
# Stamp every k8s node with the PHYSICAL Proxmox node it runs on, as the
# well-known zone label. Longhorn (deployed by the separate FluxCD repo,
# NOT here) reads topology.kubernetes.io/zone for replica placement:
# with "Replica Zone Level Soft Anti-Affinity" = false (HARD) it refuses
# to put two replicas of a volume in the same zone, so every volume
# always has a copy on a different physical box. This survives a node
# being power-cycled, re-imaged (the DESTRUCTIVE storage carve), or
# disk-swapped — the events that actually destroy data here.
#
# This MUST live in infra: only inventory knows the VM→physical-node
# mapping (`vm.proxmox_node`), and Longhorn's anti-affinity is otherwise
# blind to the fact that several VM "nodes" share one Proxmox host.
# Evaluated per-host: VMs use `vm.proxmox_node` (their hypervisor);
# baremetal kube members (no `vm:` block) fall back to their own
# inventory_hostname — they ARE their own physical node, so the
# hostname is the correct zone identifier and gives Longhorn a distinct
# zone per physical box. Consumed by the k3s role's k3s_node_labels →
# --node-label in server_init / server_join / agent. Note k3s applies
# --node-label only at FIRST registration: relabel any already-joined
# node by hand once (see roles/k3s/defaults/main.yml).
k3s_zone_label: "topology.kubernetes.io/zone={{ vm.proxmox_node | default(inventory_hostname) }}"
k3s_node_labels:
  - "{{ k3s_zone_label }}"
