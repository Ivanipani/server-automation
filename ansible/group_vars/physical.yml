---
# Vars shared by EVERY baremetal Linux host (hypervisors + workers).
# Consumed by the 17-host tier (host-base, ssh-hardening, firewall-basic,
# tailscale, node-exporter). PVE-only knobs live in hypervisors.yml.

# Tailscale on physical hosts is OFF: the OPNsense subnet router
# (10-router/40-tailscale.yml advertises 10.1.1.0/24) gives off-LAN
# clients reach into the whole LAN via the gateway, so per-host
# Tailscale is redundant for LAN-equivalence and only adds attack
# surface (the daemon punches its own accept rules into the host
# firewall, bypassing firewall-basic's ufw policy). Flip back to
# true here or per-host (host_vars/<name>.yml) if a node ever needs
# direct P2P-encrypted tailnet membership independent of the
# gateway path.
tailscale_enabled: false

# SSH hardening policy (consumed by the ssh-hardening role's template).
# A single `Match User tourmanager` block carves out the break-glass
# account so it CAN still log in with a password after lockdown.
ssh_hardening:
  password_authentication: false
  permit_root_login: false
  kbd_interactive_authentication: false
  challenge_response_authentication: false
  pubkey_authentication: true
  permit_empty_passwords: false
  # Account that retains password access. Empty string disables the
  # Match block entirely.
  password_breakglass_user: tourmanager

# Firewall default-allow rules (consumed by 17-host/30-firewall.yml +
# firewall-basic role). Per-group can extend; workers and hypervisors
# add their own service ports on top.
firewall_inbound_allow:
  - { proto: tcp, port: 22, comment: "ssh" }

# ── NFS mounts from nas01 (consumed by 17-host/16-nfs-mounts.yml) ────
# Default is empty — workers don't mount NAS shares today. Hypervisors
# override in group_vars/hypervisors.yml to add the `proxmox` RW share
# 40-bake-images.yml writes qcow2s into. Add a per-host override in
# host_vars/<name>.yml to opt a single host into more.
physical_nfs_mounts: []
