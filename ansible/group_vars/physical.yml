---
# Vars shared by EVERY baremetal Linux host (hypervisors + workers).
# Consumed by the 17-host tier (host-base, ssh-hardening, firewall-basic,
# tailscale, node-exporter). PVE-only knobs live in hypervisors.yml.

# Tailscale on physical hosts is OFF: the OPNsense subnet router
# (10-router/40-tailscale.yml advertises 10.1.1.0/24) gives off-LAN
# clients reach into the whole LAN via the gateway, so per-host
# Tailscale is redundant for LAN-equivalence and only adds attack
# surface (the daemon punches its own accept rules into the host
# firewall, bypassing firewall-basic's ufw policy). Flip back to
# true here or per-host (host_vars/<name>.yml) if a node ever needs
# direct P2P-encrypted tailnet membership independent of the
# gateway path.
tailscale_enabled: false

