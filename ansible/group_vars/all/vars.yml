---
# Indirection layer for vault secrets
# Playbooks/roles reference these; actual values live in vault.yml

postgres_pass: "{{ vault_postgres_pass }}"
router_root_pass: "{{ vault_router_root_pass }}"
# Root password for fresh PVE hypervisors only — needed for the very
# first SSH-as-root probe in 17-host/10-bootstrap.yml +
# 20-hypervisor/10-bootstrap.yml, before the `ansible` user exists on a
# brand-new PVE node. After host-base runs once, ssh-hardening sets
# `PermitRootLogin no` and this password is never used again.
#
# Renamed 2026-05-23 from `hypervisor_root_pass`; the underlying vault
# key stayed `vault_hypervisor_root_pass` to avoid re-encrypting an
# unchanged secret. Match this to whatever the PVE auto-installer
# answerfile baked in, or override per-host.
#
# Debian baremetal hosts (img/debian/) DO NOT need this — their preseed
# locks the root account entirely (`passwd/root-login false`) and the
# `ansible` user is created with the canonical key in the preseed's
# late_command, so the first SSH probe resolves to `ansible` directly.
host_root_pass: "{{ vault_hypervisor_root_pass }}"
ansible_user_pass: "{{ vault_ansible_user_pass }}"
pani_user_pass: "{{ vault_pani_user_pass }}"
# Break-glass account on every physical host (host-base role +
# ssh-hardening's Match block). The ONLY user that can SSH with a
# password after 17-host/20-ssh-hardening.yml runs.
# Add the secret with: `just secret-encrypt vault_tourmanager_user_pass`
tourmanager_user_pass: "{{ vault_tourmanager_user_pass }}"
github_pat: "{{ vault_github_pat }}"
tailscale_auth_key: "{{ vault_tailscale_auth_key }}"
set_user_passwords: true
github_ssh_private_key: "{{ vault_github_ssh_private_key }}"
github_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKUW92m3g0kRPnwq3JCpJGXP2r/5bmi8MKlbtN4/mavu ivanperdomo@Ivans-MacBook-Pro.local"
opnsense_api_key: "{{ vault_opnsense_api_key }}"
opnsense_api_secret: "{{ vault_opnsense_api_secret }}"
proxmox_api_token: "{{ vault_proxmox_api_token }}"
# Per-hypervisor Proxmox API tokens (independent nodes don't share
# /etc/pve, so each node has its own token minted on it). Keyed by the
# inventory node name; consumed by 30-guests/10-opentofu.yml which
# passes each as TF_VAR_proxmox_api_token_<node> to OpenTofu. Only PVE
# hosts appear here — workers (plain Debian) do not run the PVE API.
# Add a hypervisor = mint a `tofu-lan` token on it and add the secret
# with `just secret-encrypt vault_proxmox_api_token_<host>`.
proxmox_api_tokens:
  pve-home-01: "{{ vault_proxmox_api_token_pve_home_01 }}"
k3s_cluster_token: "{{ vault_k3s_cluster_token }}"

# NAS publish/consume coordinates, re-exported from the single source of
# truth in inventory.yaml (`storage.hosts.nas01.nas`). Consumers:
#   - 20-hypervisor/40-bake-images.yml uses nas_rsync_target / nas_ssh_target
#     / nas_images_dir to push the qcow2 from the PVE build host.
#   - tofu/locals.tf reads the same hostvars entry directly (yamldecode)
#     to compose the HTTPS URL for proxmox_virtual_environment_download_file.
# Adding a second NAS = add a host to the `storage` group and parameterize
# these by an `image_publish_target` selector.
nas_images_url_base: "{{ hostvars['nas01'].nas.https_url_base }}"
nas_images_dir:      "{{ hostvars['nas01'].nas.images_dir }}"
nas_rsync_user:      "{{ hostvars['nas01'].nas.rsync_user }}"
nas_rsync_target:    "{{ hostvars['nas01'].nas.rsync_user }}@{{ hostvars['nas01'].ansible_host }}:{{ hostvars['nas01'].nas.images_dir }}"
nas_ssh_target:      "{{ hostvars['nas01'].nas.rsync_user }}@{{ hostvars['nas01'].ansible_host }}"
