[global]
keyboard = "en-us"
country = "us"
fqdn = "pve-home-02.local"
mailto = "root@localhost"
timezone = "America/New_York"
root-password = "changeme"
root-ssh-keys = [
    "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICTl/C06oyAMQiGgvUyH4eT2C0sPsIEqnT2nDNHDQ5j9 ivanperdomo@Ivans-MacBook-Pro.local"
]
reboot-on-error = false

[network]
source = "from-dhcp"

[network.interface-name-pinning]
enabled = true

[network.interface-name-pinning.mapping]
# New gaming-PC hardware NIC (replaced the old crash-looping unit).
"3C:7C:3F:1F:96:AF" = "lan0"

[first-boot]
source = "from-iso"
ordering = "before-network"

# New hardware has TWO disks: a 256 GB SSD (sda — boot/root) and a 1 TB
# HDD (the spinning disk — left UNTOUCHED by the installer). Naming the
# SSD explicitly guarantees the installer never wipes the HDD. hdsize=100
# caps the `pve` VG at 100 GiB; the ~150 GiB SSD tail is left for the
# (deferred) two-disk storage redesign — the single-disk carve in
# roles/hypervisor-disks still assumes one disk and is unchanged here.
[disk-setup]
filesystem = "ext4"
disk-list = ["sda"]
lvm = { hdsize = 100 }
