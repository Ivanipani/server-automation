apiVersion: v1
kind: Secret
metadata:
    name: longhorn-basic-auth
    namespace: longhorn-system
type: Opaque
# The Longhorn UI has no built-in auth; the Traefik BasicAuth middleware
# (middleware.yaml) gates it using the `users` htpasswd entry below.
#
# IMPORTANT: Traefik's basicAuth Middleware REJECTS any Secret with more than
# one key (error: "found N elements for secret '<ns>/<name>', must be single
# element exactly"), so this Secret must contain ONLY `users`. We can't mirror
# the grafana-admin convention of also storing recoverable `username`/`password`
# fields — they break the entire Traefik route. The bcrypt hash in `users` is
# one-way; to rotate, generate a new line with: htpasswd -nbB <user> <pass>.
