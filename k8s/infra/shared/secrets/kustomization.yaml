---
# Shared, namespace-agnostic Secrets reused across deployments. This folder is
# NOT a Flux Kustomization target — it is a kustomize base referenced (via a
# relative `resources:` path) from each consumer overlay, which stamps the
# destination namespace. One ciphertext, projected into N namespaces:
#   - storage/configs/longhorn  -> longhorn-gcs-s3 in longhorn-system (Longhorn
#                                  GCS backup target)
#   - monitoring/controllers/loki -> longhorn-gcs-s3 in monitoring (Loki chunk
#                                  store on the poochella-logs GCS bucket)
#
# The secret carries a namespace in its (plaintext, MAC-covered) metadata; the
# age PRIVATE key is not held locally, so the file cannot be re-encrypted to
# rename/re-namespace it. Consumers therefore OVERRIDE metadata.namespace with
# the kustomize `namespace:` transformer, which runs AFTER Flux decrypts the
# file (MAC already verified), so the override is safe.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gcs-s3-credentials.sops.yaml
