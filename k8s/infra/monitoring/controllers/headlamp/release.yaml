---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: 0.42.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Two replicas across distinct nodes: Headlamp is stateless (auth lives
    # client-side), so the spread survives a node reboot and rolling upgrades
    # with no UI gap. The fleet now has 3 CP + 2 workers, so the constraint
    # below can actually place the replicas on separate hosts.
    replicaCount: 2
    # Keep the two replicas off the same node; DoNotSchedule so we never silently
    # collapse back to a single point of failure.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: headlamp
    # Opt in to the CP taint (see "Node scheduling model" in the README) so
    # Headlamp can be scheduled on the kube-ctl nodes as well as the workers.
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: headlamp.doghouse.lan
          paths:
            - path: /
              type: Prefix
