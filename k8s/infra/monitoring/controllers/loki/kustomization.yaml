---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The monitoring Namespace is created by the kube-prometheus-stack overlay
# (same monitoring-controllers Kustomization), so it is not redeclared here.
#
# `namespace: monitoring` re-namespaces the shared gcs HMAC Secret (baked as
# longhorn-system) into monitoring so Loki can mount it; the HelmRepository /
# HelmRelease are already monitoring, so the transformer is a no-op for them.
namespace: monitoring
resources:
  - repository.yaml
  - release.yaml
  - ../../../shared/secrets
