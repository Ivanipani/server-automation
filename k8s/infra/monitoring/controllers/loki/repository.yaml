---
# Loki chart moved out of grafana/helm-charts to the community org on
# 2026-03-16 (grafana/loki#20705); open-source users track this repo now.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-community
  namespace: monitoring
spec:
  interval: 1h
  url: https://grafana-community.github.io/helm-charts
