---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: loki
      version: 13.1.2  # appVersion 3.7.1
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: monitoring
      interval: 1h
  install:
    # StatefulSet-heavy (ingester/compactor/index-gateway PVCs) on a blip-prone
    # substrate: treat readiness as "manifests applied", observe pod health via
    # Prometheus, and never uninstall-on-failure (would orphan/destroy chunks).
    disableWait: true
    disableWaitForJobs: true
    remediation:
      retries: 3
      remediateLastFailure: false
  upgrade:
    disableWait: true
    disableWaitForJobs: true
    remediation:
      retries: 3
      remediateLastFailure: false
      strategy: rollback
  values:
    # Microservices topology — separate distributor/ingester/querier/etc.
    # deployments, per the install-microservices guide.
    deploymentMode: Distributed

    # GCS HMAC interop keys injected into every chart-managed component. Loki's
    # S3 object client reads AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from the
    # AWS default credential chain, so the keys live only in the SOPS-encrypted
    # secret and never in committed Helm values. This reuses the shared gcs HMAC
    # secret (../../../shared/secrets, re-namespaced into monitoring by
    # kustomization.yaml) — the same project-level HMAC pair that backs the
    # Longhorn GCS backup target, so its service account also needs
    # storage.objectAdmin on the poochella-logs bucket.
    global:
      # Force aws-sdk-go-v2 back to its pre-2025 checksum behavior. Since the s3
      # SDK v1.73 (Jan 2025) the client injects CRC32 checksum headers
      # (x-amz-sdk-checksum-algorithm / x-amz-checksum-crc32) into the SigV4
      # canonical request; GCS's S3-interop layer doesn't recognise them and
      # rejects every call with 403 SignatureDoesNotMatch. "when_required"
      # restores compatibility. (Longhorn uses minio-go, which was never
      # affected — which is why the SAME HMAC keys work there but not here.)
      extraEnv:
        - name: AWS_REQUEST_CHECKSUM_CALCULATION
          value: when_required
        - name: AWS_RESPONSE_CHECKSUM_VALIDATION
          value: when_required
      extraEnvFrom:
        - secretRef:
            name: longhorn-gcs-s3

    loki:
      # Single-tenant homelab: disable multi-tenancy so Loki uses the implicit
      # "fake" tenant and stops demanding an X-Scope-OrgID header. The chart
      # defaults this to true; leaving it on returns 401 "no org id" to both the
      # Alloy writer and the Grafana datasource (neither sends a tenant).
      auth_enabled: false
      # 2 ingesters across the 2 schedulable workers, so the replication factor
      # must be 2 (the chart default is 3, which needs 3 ingesters and would
      # reject every write with "at least N live replicas required").
      commonConfig:
        replication_factor: 2
      # tsdb + s3 (GCS interop below). schema v13 is the current shipping schema.
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      ingester:
        chunk_encoding: snappy
      pattern_ingester:
        enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
      storage:
        type: s3
        # One GCS bucket for all three stores — Loki keys chunks/ruler/admin
        # under distinct prefixes, so they don't collide.
        bucketNames:
          chunks: poochella-logs
          ruler: poochella-logs
          admin: poochella-logs
        s3:
          # GCS's S3-interoperability endpoint. Credentials are intentionally
          # absent here — the AWS SDK picks them up from AWS_ACCESS_KEY_ID /
          # AWS_SECRET_ACCESS_KEY (global.extraEnvFrom above). GCS wants
          # path-style addressing.
          endpoint: storage.googleapis.com
          region: us-east4
          s3ForcePathStyle: true
          insecure: false

    # Bundled MinIO disabled — chunks and the TSDB index live in the external
    # GCS bucket poochella-logs (loki.storage above) over GCS's S3 interop API.
    # No 100Gi Longhorn PVC is provisioned anymore; object storage is GCS.
    minio:
      enabled: false

    # Per-component replicas sized for the 2 schedulable workers. The chart pins
    # each replica of a component to a distinct node via HARD pod anti-affinity,
    # and the 3 control-plane VMs are tainted/untolerated, so anything set above
    # 2 leaves a replica permanently Pending. Singletons (compactor/ruler) stay
    # at 1; the rest cap at 2 (one per worker).
    ingester:
      replicas: 2
      # Zone-aware replication creates 3 ingester StatefulSets (zone-a/b/c), each
      # demanding its own node — impossible on 2 workers, so a zone sits Pending
      # and the ingester ring never reaches health (no writes accepted). Plain
      # non-zonal ingesters co-locate fine.
      zoneAwareReplication:
        enabled: false
    distributor:
      replicas: 2
    querier:
      replicas: 2
    queryFrontend:
      replicas: 2
    queryScheduler:
      replicas: 2
    indexGateway:
      replicas: 2
    compactor:
      replicas: 1
    ruler:
      replicas: 1

    # nginx gateway is the single entry point: http://loki-gateway.monitoring
    # — point a Grafana Loki datasource here.
    gateway:
      enabled: true
      replicas: 1

    # Silence the non-distributed targets so the chart doesn't also spin up
    # SingleBinary / SimpleScalable workloads alongside Distributed.
    singleBinary:
      replicas: 0
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
