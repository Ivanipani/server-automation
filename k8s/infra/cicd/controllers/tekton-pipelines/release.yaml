---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tekton-pipeline
  namespace: tekton-pipelines
spec:
  interval: 30m
  chart:
    spec:
      chart: tekton-pipeline
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: tekton
        namespace: tekton-pipelines
      interval: 1h
  install:
    # The chart ships the tekton.dev CRDs in its crds/ dir; let Helm own their
    # lifecycle so chart upgrades roll the CRDs forward (CreateReplace, since
    # vanilla Helm 3 never updates crds/ on upgrade). The HelmRelease becoming
    # Ready (CRDs installed) is what gates cicd-configs in infra.yaml.
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  # Pipelines controller + webhook are reschedulable Deployments (reach Ready off
  # a NotReady node), so normal Helm --wait is fine.
  values:
    # We declare the namespace ourselves (namespace.yaml) per repo convention.
    namespace:
      create: false
      name: tekton-pipelines
    # Cluster-scoped RBAC so pipelines/tasks can run in any namespace (CI defs
    # live in tekton-ci, not here).
    createClusterRoles: true
    createAggregateRoles: true
  # The chart renders git-resolver-config with stock (anonymous, public-catalog)
  # defaults. Point it at a PAT so the git resolver can fetch pipeline/task YAML
  # from the private Ivanipani/doghouse repo — letting a PR test its own pipeline
  # edits at the head SHA before Flux reconciles them. The CM is Helm-owned, so
  # patch the rendered output here rather than via kustomize (Helm would revert
  # a live edit). Secret `github-resolver` (Contents: R PAT) lives in tekton-ci
  # (doghouse ci/base/secrets); the resolver SA reads it via cluster-scoped RBAC.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ConfigMap
              name: git-resolver-config
            patch: |
              - op: replace
                path: /data/api-token-secret-name
                value: github-resolver
              - op: replace
                path: /data/api-token-secret-key
                value: token
              - op: replace
                path: /data/api-token-secret-namespace
                value: tekton-ci
              - op: replace
                path: /data/default-org
                value: Ivanipani
          # The affinity assistant defaults to `coschedule: workspaces`, which
          # caps a TaskRun at ONE PVC-backed workspace and rejects extras with
          # "more than one PersistentVolumeClaim is bound". Our verify pipeline
          # mounts two PVCs per TaskRun (the per-run `source` volumeClaimTemplate
          # + the shared `pants-cache`), so switch to `pipelineruns`: co-schedule
          # every pod of a PipelineRun onto one node (still correct for RWO
          # Longhorn) while allowing multiple PVCs.
          - target:
              kind: ConfigMap
              name: feature-flags
            patch: |
              - op: replace
                path: /data/coschedule
                value: pipelineruns
          # Emit a CloudEvent on every TaskRun/PipelineRun transition to the
          # in-cluster sink, which posts a GitHub commit status per PipelineRun —
          # so every project's CI reports a PR check without wiring the
          # github-set-status Task. The chart ships config-events with only an
          # `_example` block; add the live sink + format keys (Tekton ignores
          # `_`-prefixed keys). Sink: configs/tekton-ci/cloudevents-sink.yaml.
          - target:
              kind: ConfigMap
              name: config-events
            patch: |
              - op: add
                path: /data/sink
                value: http://tekton-cloudevents-sink.tekton-ci.svc.cluster.local:8080
              - op: add
                path: /data/formats
                value: tektonv1
