---
# Verification gate: fail if any managed Keycloak realm JSON carries
# server-managed id/containerId fields (someone pasted a full export instead of
# a distilled minimal config). This is the in-cluster equivalent of doghouse's
# `just lint-realms`; replicated here so the Task needs neither `just` nor python.
# Extend this Task (or add siblings) as more projects grow real test suites.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint-realms
  namespace: tekton-ci
spec:
  workspaces:
    - name: source
      description: doghouse checkout (clone-and-version writes ./repo).
  steps:
    - name: lint-realms
      image: us-east4-docker.pkg.dev/adept-fountain-498903-t7/poochella/ci-builder:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        cd "$(workspaces.source.path)/repo"
        managed="apps/doghouse/keycloak/config-cli/realms"
        if grep -RnE '"(id|containerId)"[[:space:]]*:' "$managed"; then
          echo "ERROR: managed realm config contains server-managed id/containerId fields." >&2
          echo "Distill the export first: just distill-realm <export.json>" >&2
          exit 1
        fi
        echo "realms OK: no id/containerId fields in $managed."
