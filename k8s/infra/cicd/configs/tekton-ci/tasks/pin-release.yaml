---
# Close the GitOps loop after a publish: rewrite the image tag in the doghouse
# Flux manifest to the freshly-published CalVer and push the commit back to main,
# which Flux reconciles into a rollout. This is the GNU-sed port of doghouse's
# BSD-sed `_pin` recipe (images/justfile), run with a WRITE-capable deploy key
# (the flux doghouse-apps key is read-only). Only the merge-to-main publish
# pipeline runs this step.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pin-release
  namespace: tekton-ci
spec:
  params:
    - name: file
      description: Manifest to pin, relative to repo root.
      type: string
      default: apps/doghouse/keycloak/release.yaml
    - name: image
      description: GAR image name whose tag is rewritten (poochella/<image>:tag).
      type: string
      default: auth-svc
    - name: version
      description: CalVer tag to pin to.
      type: string
    - name: branch
      description: Branch to commit the pin to.
      type: string
      default: main
  workspaces:
    - name: source
      description: doghouse checkout (clone-and-version writes ./repo).
    - name: ssh-creds
      description: WRITE-capable SSH deploy key (key `id_ed25519`).
  steps:
    - name: pin-and-push
      image: us-east4-docker.pkg.dev/adept-fountain-498903-t7/poochella/ci-builder:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        export GIT_SSH_COMMAND="ssh -i $(workspaces.ssh-creds.path)/id_ed25519 \
          -o IdentitiesOnly=yes -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"

        cd "$(workspaces.source.path)/repo"
        git config user.email "tekton-ci@doghouse.lan"
        git config user.name "tekton-ci-bot"
        git fetch origin "$(params.branch)"
        git checkout -B "$(params.branch)" "origin/$(params.branch)"

        # GNU sed: rewrite `.../poochella/<image>:<anytag>` -> `:<version>`.
        sed -i -E \
          "s#(poochella/$(params.image)):[A-Za-z0-9._-]+#\1:$(params.version)#g" \
          "$(params.file)"

        if git diff --quiet -- "$(params.file)"; then
          echo "No change: $(params.file) already pinned to $(params.version)."
          exit 0
        fi

        git add "$(params.file)"
        git commit -m "deploy($(params.image)): pin to $(params.version)"
        git push origin "HEAD:$(params.branch)"
        echo "Pinned $(params.image) -> $(params.version) in $(params.file)."
