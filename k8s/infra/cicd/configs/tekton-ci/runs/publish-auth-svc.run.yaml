---
# On-demand build + publish + deploy of auth-svc. NOT reconciled by Flux —
# kick it by hand:
#   kubectl create -n tekton-ci -f runs/publish-auth-svc.run.yaml
# Set pin=false below to publish the image without pinning/deploying.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: publish-auth-svc-
  namespace: tekton-ci
spec:
  taskRunTemplate:
    serviceAccountName: tekton-ci-bot
  pipelineRef:
    name: publish-auth-svc
  params:
    - name: revision
      value: main
    - name: pin
      value: "true"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          # Pin Longhorn explicitly — the cluster currently has two default
          # StorageClasses (k3s local-path + longhorn), so an unset class binds
          # ambiguously.
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi
    - name: ssh-creds
      secret:
        secretName: doghouse-git
    - name: docker-config
      # One GAR credential serves both roles: the SA mounts gar-pull as its
      # imagePullSecret, and the build-image push step reads the same blob here.
      # gar-pull is a kubernetes.io/dockerconfigjson Secret (data key
      # `.dockerconfigjson`); build-image sets DOCKER_CONFIG=<this dir>, so
      # project that key to `config.json` — which docker/buildx looks for.
      secret:
        secretName: gar-pull
        items:
          - key: .dockerconfigjson
            path: config.json
