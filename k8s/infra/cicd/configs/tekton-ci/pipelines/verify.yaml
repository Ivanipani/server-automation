---
# PR verification: clone at a revision, lint realm config, and prove the image
# builds end-to-end. No image is pushed and nothing is pinned. This is the flow a
# GitHub PR webhook will eventually trigger (Triggers/EventListener deferred for
# the MVP); for now run it on demand from runs/verify.run.yaml.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: verify
  namespace: tekton-ci
spec:
  params:
    - name: url
      type: string
      default: ssh://git@github.com/Ivanipani/doghouse
    - name: revision
      description: PR head SHA / branch to verify.
      type: string
      default: main
  workspaces:
    - name: source
    - name: ssh-creds
  tasks:
    - name: clone-and-version
      taskRef:
        name: clone-and-version
      params:
        - name: url
          value: $(params.url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: source
          workspace: source
        - name: ssh-creds
          workspace: ssh-creds
    - name: lint-realms
      runAfter: [clone-and-version]
      taskRef:
        name: lint-realms
      workspaces:
        - name: source
          workspace: source
    - name: build
      runAfter: [lint-realms]
      taskRef:
        name: build-image
      params:
        - name: version
          value: $(tasks.clone-and-version.results.calver)
        - name: git-sha
          value: $(tasks.clone-and-version.results.git-sha)
        - name: push
          value: "false"
      workspaces:
        - name: source
          workspace: source
