---
apiVersion: v1
kind: Namespace
metadata:
  name: tekton-ci
  # BuildKit runs rootless but still needs to relax the default restricted
  # PodSecurity profile (it mounts /dev/fuse and sets seccomp/AppArmor to
  # unconfined). Same privileged-PSA treatment as metallb-system.
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
