---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# REUSABLE, project-agnostic CI substrate. Assumes the Tekton Pipelines CRDs are
# already installed (the `cicd-controllers` Kustomization). Only the tekton-ci
# namespace, the build identity (ServiceAccount), the BuildKit backend, and the
# generic clone-and-version / build-image Tasks live here.
#
# App-specific definitions (lint-realms, the verify / publish pipelines, the
# on-demand runs, and the CI secrets) are doghouse IP and live in the private
# doghouse repo at ci/doghouse, reconciled by the `doghouse-ci` Kustomization.
resources:
  - namespace.yaml
  - rbac.yaml
  - buildkit.yaml
  - common-tasks/clone-and-version.yaml
  - common-tasks/build-image.yaml
