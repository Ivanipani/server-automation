---
# Identity every PipelineRun runs as. It needs no Kubernetes API rights (the
# pipelines only clone, build, push images, and git-push back) — just the GAR
# pull secret so build pods can pull the private ci-builder image. The push /
# git-write credentials are mounted per-Task from secrets/, not granted here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-ci-bot
  namespace: tekton-ci
imagePullSecrets:
  # GAR creds for the private ci-builder image. A dockerconfigjson Secret named
  # gar-pull in this namespace (see secrets/README.md); the SA tolerates it being
  # absent until then. The same Secret doubles as the build-image push creds —
  # the publish run projects its `.dockerconfigjson` to config.json (one GAR
  # credential, both pull and push).
  - name: gar-pull
