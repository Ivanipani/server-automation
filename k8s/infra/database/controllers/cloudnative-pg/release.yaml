---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.2
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: cnpg-system
      interval: 1h
  install:
    # The chart templates the cnpg.io CRDs; let Helm own their lifecycle so
    # chart upgrades also roll the CRDs forward.
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  # Unlike the DaemonSet charts here (Longhorn, node-exporter) the operator is a
  # single Deployment, so it can reschedule off a NotReady node and reach Ready
  # even during a Proxmox node blip — normal Helm --wait is fine, no disableWait.
  values:
    # Defaults schedule the operator on a worker (CP is tainted, see the node
    # scheduling model). The operator only manages CRs; the PostgreSQL Clusters
    # it provisions are what consume Longhorn storage, declared separately.
    replicaCount: 1
