---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-alpha
  namespace: databases
spec:
  # Primary + hot standby, one per baremetal worker (metal-home-01/-02). Required
  # anti-affinity guarantees the spread so a single worker loss can't take both.
  instances: 2
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  storage:
    size: 10Gi
    storageClass: longhorn
  monitoring:
    # CNPG emits cnpg_* metrics on :9187; this PodMonitor is auto-scraped by the
    # kube-prometheus-stack Prometheus (podMonitorSelectorNilUsesHelmValues:
    # false → selects all). Visualized by the vendored CloudNativePG Grafana
    # dashboard (monitoring/.../dashboards/cloudnative-pg.json).
    enablePodMonitor: true
  managed:
    services:
      # Expose the primary (rw) outside the cluster on a pinned MetalLB IP so
      # pgAdmin & co. can reach it. `selectorType: rw` always tracks the current
      # primary, so failover is transparent to clients. CNPG owns this Service
      # and injects selector + the 5432 port; we only template metadata + type.
      # The IP must stay in sync with the dnsmasq DNS record (pg-alpha.lan) and
      # sit in the MetalLB pool (k8s/infra/networking/configs/metallb).
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: pg-alpha-lb
              annotations:
                metallb.universe.tf/loadBalancerIPs: 10.1.1.240
            spec:
              type: LoadBalancer
  bootstrap:
    initdb:
      database: alpha-db
      owner: remy
      # Owner credentials come from the SOPS-encrypted Secret in this same
      # Kustomization (pg-alpha-app.sops.yaml: username=remy + password) rather
      # than a CNPG-generated one. Flux decrypts + applies it before CNPG reaches
      # bootstrap. CNPG reads it at initdb and does not manage or rotate it.
      secret:
        name: pg-alpha-app
