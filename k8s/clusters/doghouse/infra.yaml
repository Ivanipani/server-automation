---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: networking-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/networking/controllers
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: networking-configs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/networking/configs
  prune: true
  wait: true
  dependsOn:
    - name: networking-controllers
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/storage/controllers
  prune: true
  # The Longhorn HelmRelease uses disableWait (DaemonSet-heavy chart on a
  # blip-prone substrate), so HelmRelease readiness is "manifests applied" —
  # actual pod health is observed via Prometheus/Alertmanager. The HelmRelease
  # becoming Ready also gates storage-configs below: Helm installs the
  # longhorn.io CRDs during install (crds: CreateReplace), then marks the
  # release Ready, then Flux unblocks storage-configs and its BackupTarget /
  # RecurringJob CRs can dry-run successfully.
  wait: true
  dependsOn:
    # Longhorn UI ingress + middleware reference the traefik IngressClass and
    # traefik.io/v1alpha1 Middleware CRD (k3s-built-in Traefik, configured via
    # HelmChartConfig in networking-configs).
    - name: networking-configs
  decryption:
    # The longhorn UI basic-auth Secret is SOPS-encrypted.
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-configs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # BackupTarget and RecurringJob are longhorn.io/v1beta2 CRs whose CRDs ship
  # in the Longhorn Helm chart. Bundling them with the HelmRelease deadlocks:
  # kustomize-controller dry-runs every manifest against live API discovery
  # before applying, so the CRs fail validation, the apply aborts, the
  # HelmRelease never runs, and the CRDs never get installed. Splitting them
  # into a separate Kustomization that dependsOn storage-controllers (with
  # wait: true above) gates the CR apply on HelmRelease Ready → CRDs present.
  path: ./k8s/infra/storage/configs
  prune: true
  wait: true
  dependsOn:
    - name: storage-controllers
  decryption:
    # longhorn-gcs-s3 (HMAC creds for the gcs BackupTarget) is SOPS-encrypted.
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: database-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # CloudNativePG operator only. The operator is a single Deployment that
  # reaches Ready independently of node blips, so wait: true is safe (unlike the
  # disableWait DaemonSet charts). It Helm-installs the cnpg.io CRDs; the
  # PostgreSQL Cluster CRs that consume Longhorn are declared separately and
  # would gate on this becoming Ready (same controllers→configs split as storage).
  path: ./k8s/infra/database/controllers
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: database-configs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # PostgreSQL Cluster CRs (cnpg.io/v1). Split from database-controllers for the
  # same reason as storage-configs: kustomize-controller dry-runs every manifest
  # against live API discovery, so the Cluster CR must not apply until the
  # cnpg.io CRDs exist. dependsOn (with wait: true above) gates on the operator
  # HelmRelease being Ready → CRDs present.
  path: ./k8s/infra/database/configs
  prune: true
  wait: true
  dependsOn:
    - name: database-controllers
  decryption:
    # The pg-alpha owner credentials (pg-alpha-app.sops.yaml) are SOPS-encrypted.
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: messaging-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Strimzi cluster operator only. A single Deployment that reaches Ready
  # independently of node blips, so wait: true is safe (same reasoning as cnpg).
  # It Helm-installs the kafka.strimzi.io CRDs; any Kafka CRs that consume the
  # operator are declared separately (apps) and gate on this becoming Ready.
  path: ./k8s/infra/messaging/controllers
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/monitoring/controllers
  prune: true
  wait: true
  dependsOn:
    - name: networking-controllers
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-configs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/monitoring/configs
  prune: true
  wait: true
  dependsOn:
    - name: monitoring-controllers
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cicd-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Tekton Pipelines (CDF Helm chart) + the read-only Dashboard (vendored upstream
  # manifest). The Pipelines HelmRelease installs the tekton.dev CRDs (crds:
  # CreateReplace) and only then marks Ready. wait: true makes this Kustomization
  # gate cicd-configs below: kustomize-controller dry-runs every manifest against
  # live API discovery, so the Task/Pipeline CRs in cicd-configs must not apply
  # until the CRDs exist (same controllers→configs split as storage/database).
  path: ./k8s/infra/cicd/controllers
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cicd-configs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Tekton CI definitions + the in-cluster BuildKit backend. The tekton.dev CRDs
  # are installed by cicd-controllers (Flux-managed). PipelineRuns are kicked by
  # hand, not reconciled.
  path: ./k8s/infra/cicd/configs
  prune: true
  wait: true
  dependsOn:
    # cicd-controllers → tekton.dev CRDs present (gates the Task/Pipeline CR
    # dry-run that kustomize-controller runs against live API discovery).
    - name: cicd-controllers
    # NOTE: deliberately NOT depending on storage-configs. PipelineRun `source`
    # workspaces want the `longhorn` StorageClass (defined there), but that class
    # is created once and persists — gating CI on storage-configs' continuous
    # readiness froze this Kustomization on every Longhorn flap (blip-prone
    # substrate). The runs pin `storageClassName: longhorn` explicitly; if it's
    # ever absent a PipelineRun just stays Pending, which is recoverable, whereas
    # a frozen Kustomization silently blocks all CI config changes.
  decryption:
    # gar-pull / doghouse-git Secrets are SOPS-encrypted (see secrets/).
    provider: sops
    secretRef:
      name: sops-age
