# Application workloads — the private/public visibility boundary.
#
# This repo (server-automation) is the PUBLIC infrastructure Flux root. Apps are
# the user's private IP and belong in the private repo
# github.com/Ivanipani/doghouse, imported here as an OPAQUE cross-repo source: a
# second GitRepository (`doghouse-apps`, below) plus a Kustomization that pulls
# from it. The public repo never sees app manifests — only a URL + branch + path
# behind a read-only deploy key.
#
# CUTOVER DONE: the app tree now lives in the private repo at apps/doghouse and
# this repo no longer carries k8s/apps. The `apps` Kustomization below sources the
# `doghouse-apps` GitRepository (path ./apps/doghouse) and decrypts SOPS secrets
# via the sops-age Secret (installed in flux-system by Ansible).
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  # Opaque handle to the private apps repo, consumed by the `apps` Kustomization
  # below. The public repo never sees app manifests — only this URL + branch + path
  # behind a read-only deploy key.
  name: doghouse-apps
  namespace: flux-system
spec:
  interval: 10m
  ref:
    branch: main
  # Read-only deploy key for github.com/Ivanipani/doghouse, installed into
  # flux-system by Ansible (40-kube/30-flux.yml) from vault_doghouse_apps_deploy_key.
  secretRef:
    name: doghouse-apps-key
  url: ssh://git@github.com/Ivanipani/doghouse
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: doghouse-apps
  path: ./apps
  prune: true
  dependsOn:
    # HA's ingress wants the traefik IngressClass (networking-configs) and its
    # PVC wants the Longhorn default StorageClass (storage).
    - name: networking-configs
    - name: storage-configs
  # The private apps repo carries SOPS-encrypted *.sops.yaml secrets; the
  # sops-age Secret is installed in flux-system by Ansible. Safe even when no
  # encrypted resources are present (decryption is a no-op for plaintext).
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  # doghouse-specific CI/CD (lint-realms, the verify / publish pipelines, CI
  # secrets) — doghouse IP, so it lives in the private repo at ./ci/doghouse, same
  # opaque cross-repo source as `apps`. The reusable substrate (tekton-ci
  # namespace, SA, BuildKit, generic Tasks) is public and applied by cicd-configs.
  name: doghouse-ci
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: doghouse-apps
  path: ./ci
  prune: true
  dependsOn:
    # cicd-configs applies the tekton-ci namespace, the tekton-ci-bot SA, and the
    # reusable clone-and-version / build-image Tasks these pipelines taskRef; it
    # itself dependsOn cicd-controllers, so the tekton.dev CRDs are present before
    # these Task/Pipeline CRs dry-run against live API discovery.
    - name: cicd-configs
  # gar-pull / doghouse-git Secrets are SOPS-encrypted (ci/doghouse/secrets/).
  decryption:
    provider: sops
    secretRef:
      name: sops-age
