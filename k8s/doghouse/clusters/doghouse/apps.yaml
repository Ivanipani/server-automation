---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/doghouse
  prune: true
  dependsOn:
    # HA's ingress wants the traefik IngressClass (networking-configs) and its
    # PVC wants the Longhorn default StorageClass (storage).
    - name: networking-configs
    - name: storage-configs
