---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    # Longhorn manager/engine/instance-manager pods run privileged
    # (host mounts, iSCSI, /dev access), so the namespace must allow it.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
