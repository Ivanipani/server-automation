---
# NFS and SMB on/off + tuning. DSM's UI: Control Panel → File Services.
#
# AFP is INTENTIONALLY ABSENT — Synology removed AFP server in DSM 7.2,
# and on 7.3.x the SYNO.Core.FileServ.AFP API no longer exists. The
# upstream role still tried to call it and would fail every run on a
# current DSM. If you're managing a DSM 6 box, restore the AFP block
# from upstream's tasks/file_services.yml.
#
# String fields (workgroup) are piped through `to_json` so DSM-legal
# names with hyphens/quotes don't corrupt the compound JSON.

- name: Enable/Disable NFS service
  synology_dsm_api_request:
    api_name: SYNO.Entry.Request
    api_method: request
    request_method: POST
    api_params:
      stop_on_error: 'false'
      mode: sequential
      compound: >-
        [{
        "api":"SYNO.Core.FileServ.NFS",
        "method":"set",
        "version":"2",
        "enable_nfs":{{ synology_dsm_nfs_enable | to_json }},
        "enable_nfs_v4":{{ synology_dsm_nfs_enable_v4 | to_json }},
        "enable_nfs_v4_1":{{ synology_dsm_nfs_enable_v4_1 | to_json }}
        }]

- name: Enable/Disable SMB service
  synology_dsm_api_request:
    api_name: SYNO.Entry.Request
    api_method: request
    request_method: POST
    api_params:
      stop_on_error: 'false'
      mode: sequential
      compound: >-
        [{
        "api":"SYNO.Core.FileServ.SMB",
        "method":"set",
        "version":"3",
        "enable_samba":{{ synology_dsm_smb_enable | to_json }},
        "workgroup":{{ synology_dsm_smb_workgroup | to_json }},
        "disable_shadow_copy":{{ synology_dsm_smb_disable_shadow_copy | to_json }},
        "smb_transfer_log_enable":{{ synology_dsm_smb_enable_transfer_log | to_json }}
        }]
