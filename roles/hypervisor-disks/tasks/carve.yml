---
# Carve each entry in `hypervisor_disks_partitions` as a GPT partition
# at the end of the boot disk. Per-partition logic (existence check,
# next-partnum lookup, sgdisk write, partprobe, signature check) is
# in _carve_one.yml; this file is just the orchestration loop.
#
# Idempotent: skips any partition whose label already exists.
# Requires: preflight.yml has set the `boot_disk` fact.

- name: Assert at least one partition spec was provided
  ansible.builtin.assert:
    that:
      - hypervisor_disks_partitions is defined
      - hypervisor_disks_partitions | length > 0
    fail_msg: >-
      `hypervisor_disks_partitions` must be a non-empty list of
      `{label, size}` mappings. See roles/hypervisor-disks/defaults/main.yml.

- name: Carve each requested partition in order
  ansible.builtin.include_tasks: _carve_one.yml
  loop: "{{ hypervisor_disks_partitions }}"
  loop_control:
    loop_var: partition
    label: "{{ partition.label }}"
