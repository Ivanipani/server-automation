---
# Carve each resolved pool as a GPT partition labelled `pool.pool`:
#   - boot_tail  → a `+size` partition at the end of the boot disk
#   - whole_disk → one full-disk partition on the declared by-id device
# Per-partition logic (existence check, foreign-data refusal, sgdisk
# write, kernel refresh, signature check) is in _carve_one.yml; this file
# is just the orchestration loop.
#
# Idempotent: skips any partition whose GPT label already exists.
# Requires: preflight.yml has built `hypervisor_disks_resolved`.

- name: Assert preflight resolved at least one pool
  ansible.builtin.assert:
    that:
      - hypervisor_disks_resolved is defined
      - hypervisor_disks_resolved | length > 0
    fail_msg: >-
      `hypervisor_disks_resolved` is empty — run preflight.yml first
      (it validates storage.pools and resolves each to a device).

- name: Carve each resolved pool in order
  ansible.builtin.include_tasks: _carve_one.yml
  loop: "{{ hypervisor_disks_resolved }}"
  loop_control:
    loop_var: partition
    label: "{{ partition.pool }} → {{ partition.device }} ({{ partition.backing.strategy }})"
