---
# Create a single GPT partition (type 8300) labelled `partition.label` on
# `partition.device`, sized per `partition.size` (sgdisk +SIZE; "0" =
# fill the rest — for a fresh whole disk that is the whole drive, for the
# boot disk it is the unallocated tail).
#
# Idempotent on the GPT partlabel: an existing label is skipped, so
# re-runs and kernel renames are no-ops. Foreign-data refusal / deliberate
# force-wipe already happened ONCE per disk in _wipe_disk.yml; here we
# only handle residual platter signatures bleeding through a freshly
# created partition (sgdisk rewrites the table, never the platter).
#
# `partx -u` (BLKPG) is used not `partprobe` (BLKRRPART) because the boot
# disk has an active LVM PV; BLKRRPART is refused on busy disks.
#
# Loop var: `partition` (a resolved partition: pool, device, size, wipe…).

- name: "[{{ partition.label }}] Sync kernel partition table (best-effort)"
  ansible.builtin.command: "partx -u {{ partition.device }}"
  changed_when: false
  # A just-wiped whole disk has no table yet ("failed to read partition
  # table"); that is the desired state, not an error. The create step
  # does its own authoritative partx -u after sgdisk writes the GPT.
  failed_when: false

- name: "[{{ partition.label }}] Check whether the partition already exists"
  ansible.builtin.stat:
    path: "/dev/disk/by-partlabel/{{ partition.label }}"
  register: part_stat

- name: "[{{ partition.label }}] Create the partition and refresh the kernel"
  ansible.builtin.shell: |
    set -eu
    sgdisk -n 0:0:{{ '+' + (partition.size | string) if (partition.size | string) != '0' else '0' }} \
           -t 0:8300 \
           -c 0:{{ partition.label }} \
           {{ partition.device }}
    partx -u {{ partition.device }}
  changed_when: true
  when: not part_stat.stat.exists

- name: "[{{ partition.label }}] Wait for the partition device node"
  ansible.builtin.wait_for:
    path: "/dev/disk/by-partlabel/{{ partition.label }}"
    timeout: 30

# Only validate space carved THIS run. On an idempotent re-run the
# partition pre-existed (not created above) and legitimately carries the
# LVM2_member signature WE wrote in storage_pools.yml — not foreign data.
- name: "[{{ partition.label }}] Validate the freshly carved partition"
  when: not part_stat.stat.exists
  block:
    - name: "[{{ partition.label }}] Scan the new partition for residual signatures"
      ansible.builtin.command: "wipefs -n /dev/disk/by-partlabel/{{ partition.label }}"
      register: wipefs_check
      changed_when: false

    # sgdisk only rewrites the partition TABLE. A full-disk partition
    # starts where the old layout's filesystems were, so a stale
    # superblock (e.g. an old ESP's vfat) can bleed through. When this
    # disk was authorised for force-wipe that residue IS the data we were
    # told to destroy → clear it in place (also stops pvcreate later
    # choking on the signature).
    - name: "[{{ partition.label }}] Erase residual signatures (wipe=force disk)"
      ansible.builtin.command: "wipefs -a /dev/disk/by-partlabel/{{ partition.label }}"
      changed_when: true
      when:
        - wipefs_check.stdout | default('') | length > 0
        - partition.wipe == 'force'

    # Strict refusal everywhere else: boot tail, or a non-force data disk.
    - name: "[{{ partition.label }}] Fail on unexpected pre-existing signatures"
      ansible.builtin.fail:
        msg: >-
          /dev/disk/by-partlabel/{{ partition.label }} carries existing
          signatures: {{ wipefs_check.stdout_lines | join(' | ') }}.
          Refusing to use it. For a disposable data disk set `wipe: force`
          on that disk in inventory.yaml and re-run.
      when:
        - wipefs_check.stdout | default('') | length > 0
        - partition.wipe != 'force'

    - name: "[{{ partition.label }}] Verify the partition is signature-free"
      ansible.builtin.command: "wipefs -n /dev/disk/by-partlabel/{{ partition.label }}"
      register: wipefs_recheck
      changed_when: false
      failed_when: wipefs_recheck.stdout | default('') | length > 0
