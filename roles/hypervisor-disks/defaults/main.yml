---
# Per-node disk → LVM-thin → PVE-storage realisation.
#
# DECLARED, NOT DISCOVERED. The layout is the `storage.pools` list on
# each baremetal host in inventory.yaml (single source of truth). This
# role never scans for or auto-claims disks: it only acts on devices
# named there by their /dev/disk/by-id path (whole_disk) or on the
# auto-detected PVE boot disk's free tail (boot_tail). Consequences:
#   - an undeclared disk is NEVER touched
#   - a declared by_id that is not physically present is a HARD FAILURE
#     (preflight.yml) — hardware must match inventory before anything runs
#   - swapping a disk = a new serial = a new by_id, so a swap REQUIRES an
#     inventory edit first; the (blank) replacement is then re-initialised
#     into the same pool because pool/vg/thinpool names are fixed by intent
#
# Idempotency keys are content-addressed, never kernel device names:
#   GPT partlabel (`pool`) → VG (`vg`) → thinpool LV → PVE storage id
#   (`pve_storage`). Re-runs and device renames are no-ops.
#
# `pve_storage` is a FROZEN contract: tofu/modules/vm hardcodes `vms` and
# `longhorn-data`. Renaming it is a breaking change across Tofu/templates.
#
# Schema (see inventory.yaml header + host entries for live examples):
#   storage:
#     pools:
#       - pool: vm-storage          # GPT partlabel (unique per disk)
#         vg: vmdata
#         thinpool: vmthin
#         pve_storage: vms          # PVE storage id (frozen contract)
#         content: images,rootdir   # pvesm --content value
#         backing:
#           strategy: boot_tail     # carve at the end of the boot disk
#           size: "200G"            #   sgdisk +SIZE; "0" = fill the rest
#       - pool: longhorn
#         vg: longhorndata
#         thinpool: longhornthin
#         pve_storage: longhorn-data
#         content: images
#         backing:
#           strategy: whole_disk    # claim an entire dedicated disk
#           by_id: "wwn-0x5000…"    #   path under /dev/disk/by-id/
#
# There is intentionally NO default `storage` here — a node with no
# declared layout fails preflight loudly rather than guessing.

# DESTRUCTIVE: setting this true authorizes sgdisk to write the GPT.
# Per-host opt-in lives in group_vars/baremetal.yml or host_vars.
confirm_carve_data_disk: false

# EXTRA-DESTRUCTIVE escape hatch. By default a `whole_disk` pool whose
# target device already holds ANY signature (old GPT/MBR/FS/LVM) is
# REFUSED — the operator must clear it deliberately. Set this true to
# instead force-wipe (`sgdisk --zap-all` + `wipefs -a`) that device
# before carving. It does NOT bypass `confirm_carve_data_disk` (both are
# required) and only ever touches `whole_disk` targets — never the boot
# disk (boot_tail is unaffected; the device was already validated by
# preflight as the declared by-id, a whole disk, and not the boot disk).
# Keep this false in group_vars/host_vars; pass it per-run only when you
# mean it: `-e hypervisor_disks_force_wipe=true`.
hypervisor_disks_force_wipe: false
