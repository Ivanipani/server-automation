- name: Install sudo
  ansible.builtin.apt:
    name: sudo
    state: present
    update_cache: true

- name: Bootstrap ansible user (baremetal)
  import_role:
    name: create-user
  vars:
    users:
      - name: ansible
        groups: [ansible, sudo]
        shell: /bin/bash
        ssh_key: "~/.ssh/ansible.pub"
        password: "{{ ansible_user_pass }}"
        sudoers:
          commands: ALL
          nopassword: true

- name: Set root password from vault
  ansible.builtin.user:
    name: root
    password: "{{ hypervisor_root_pass | password_hash('sha512') }}"
    update_password: always
  no_log: true
