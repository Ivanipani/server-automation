---
# Establishes inter-node root SSH trust prerequisite for `pvecm add`.
# Idempotent: re-running on configured nodes is a no-op.

- name: Ensure /root/.ssh exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure root SSH keypair exists
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
    owner: root
    group: root
    mode: "0600"

- name: Read root public key
  ansible.builtin.slurp:
    src: /root/.ssh/id_ed25519.pub
  register: root_pubkey_slurp

- name: Expose root pubkey as fact
  ansible.builtin.set_fact:
    root_pubkey: "{{ root_pubkey_slurp.content | b64decode | trim }}"

- name: Authorize peer root pubkeys for cluster SSH
  ansible.posix.authorized_key:
    user: root
    key: "{{ hostvars[item].root_pubkey }}"
    state: present
  loop: "{{ groups['baremetal'] }}"

- name: Ensure /etc/hosts entries for cluster peers
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED: pve-cluster"
    block: |
      {% for node in proxmox_control_nodes %}
      {{ node.address }} {{ node.hostname }}
      {% endfor %}

- name: Configure root SSH client for cluster peers
  ansible.builtin.blockinfile:
    path: /root/.ssh/config
    create: true
    owner: root
    group: root
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED: pve-cluster"
    block: |
      {% for node in proxmox_control_nodes %}
      Host {{ node.hostname }} {{ node.address }}
          StrictHostKeyChecking accept-new
          UserKnownHostsFile /root/.ssh/known_hosts
      {% endfor %}
