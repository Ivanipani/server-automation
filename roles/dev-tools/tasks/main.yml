---
- name: Install development tools
  ansible.builtin.package:
    name:
      - acl
      - zsh
      - git
      - wget
      - build-essential
      - ca-certificates
      - htop
      - curl
      - tree
      - dnsutils
      - iotop
      - sysstat
    state: present

- name: Ensure /opt/bin directory exists
  ansible.builtin.file:
    path: /opt/bin
    state: directory
    mode: "0755"

- name: Check which tools are already installed
  ansible.builtin.stat:
    path: "{{ item }}"
  register: tool_checks
  loop:
    - /opt/bin/just
    - /opt/bin/zellij
    - /opt/nvim/bin/nvim
    - /opt/bin/jj
    - /opt/ripgrep/rg
    - /opt/fd/fd
    - /opt/bin/fzf
    - /opt/bin/direnv

- name: Build installed tools lookup
  ansible.builtin.set_fact:
    installed: "{{ dict(tool_checks.results | map(attribute='item') | zip(tool_checks.results | map(attribute='stat') | map(attribute='exists'))) }}"

# just

- name: Download just installer
  ansible.builtin.get_url:
    url: https://just.systems/install.sh
    dest: /tmp/just-install.sh
    mode: '0755'
  when: not installed['/opt/bin/just']

- name: Install just
  ansible.builtin.shell:
    cmd: /tmp/just-install.sh --to /opt/bin
    creates: /opt/bin/just
  when: not installed['/opt/bin/just']

# zellij

- name: Download zellij
  ansible.builtin.get_url:
    url: https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/zellij.tar.gz
  when: not installed['/opt/bin/zellij']

- name: Install zellij
  ansible.builtin.unarchive:
    src: /tmp/zellij.tar.gz
    dest: /opt/bin
    remote_src: true
  when: not installed['/opt/bin/zellij']

- name: Ensure zellij plugins directory exists
  ansible.builtin.file:
    path: /opt/zellij-plugins
    state: directory
    mode: "0755"

# neovim

- name: Ensure tool directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/nvim
    - /opt/ripgrep
    - /opt/fd

- name: Download neovim
  ansible.builtin.get_url:
    url: https://github.com/neovim/neovim/releases/download/v{{ neovim_version }}/nvim-linux-x86_64.tar.gz
    dest: /tmp/nvim.tar.gz
  when: not installed['/opt/nvim/bin/nvim']

- name: Install neovim
  ansible.builtin.unarchive:
    src: /tmp/nvim.tar.gz
    dest: /opt/nvim
    remote_src: true
    extra_opts: ['--strip-components=1']
  when: not installed['/opt/nvim/bin/nvim']

- name: Symlink neovim binary
  ansible.builtin.file:
    src: /opt/nvim/bin/nvim
    dest: /opt/bin/nvim
    state: link

# jj

- name: Download jj
  ansible.builtin.get_url:
    url: https://github.com/jj-vcs/jj/releases/download/v{{ jj_version }}/jj-v{{ jj_version }}-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/jj.tar.gz
  when: not installed['/opt/bin/jj']

- name: Install jj
  ansible.builtin.unarchive:
    src: /tmp/jj.tar.gz
    dest: /opt/bin
    remote_src: true
  when: not installed['/opt/bin/jj']

# ripgrep

- name: Download ripgrep
  ansible.builtin.get_url:
    url: https://github.com/BurntSushi/ripgrep/releases/download/{{ ripgrep_version }}/ripgrep-{{ ripgrep_version }}-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/ripgrep.tar.gz
  when: not installed['/opt/ripgrep/rg']

- name: Install ripgrep
  ansible.builtin.unarchive:
    src: /tmp/ripgrep.tar.gz
    dest: /opt/ripgrep
    remote_src: true
    extra_opts: ['--strip-components=1']
  when: not installed['/opt/ripgrep/rg']

- name: Symlink ripgrep binary
  ansible.builtin.file:
    src: /opt/ripgrep/rg
    dest: /opt/bin/rg
    state: link

# fd-find

- name: Download fd-find
  ansible.builtin.get_url:
    url: https://github.com/sharkdp/fd/releases/download/v{{ fd_version }}/fd-v{{ fd_version }}-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/fd-find.tar.gz
  when: not installed['/opt/fd/fd']

- name: Install fd-find
  ansible.builtin.unarchive:
    src: /tmp/fd-find.tar.gz
    dest: /opt/fd
    remote_src: true
    extra_opts: ['--strip-components=1']
  when: not installed['/opt/fd/fd']

- name: Symlink fd-find binary
  ansible.builtin.file:
    src: /opt/fd/fd
    dest: /opt/bin/fd
    state: link

# fzf

- name: Download fzf
  ansible.builtin.get_url:
    url: https://github.com/junegunn/fzf/releases/download/v{{ fzf_version }}/fzf-{{ fzf_version }}-linux_amd64.tar.gz
    dest: /tmp/fzf.tar.gz
  when: not installed['/opt/bin/fzf']

- name: Install fzf
  ansible.builtin.unarchive:
    src: /tmp/fzf.tar.gz
    dest: /opt/bin
    remote_src: true
  when: not installed['/opt/bin/fzf']

# direnv

- name: Download direnv
  ansible.builtin.get_url:
    url: https://github.com/direnv/direnv/releases/download/v{{ direnv_version }}/direnv.linux-amd64
    dest: /opt/bin/direnv
    mode: "755"
  when: not installed['/opt/bin/direnv']
