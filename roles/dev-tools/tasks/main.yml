---
- name: Install development tools
  ansible.builtin.package:
    name:
      - acl
      - zsh
      - git
      - wget
      - build-essential
      - ca-certificates
      - htop
      - curl
      - tree
      - dnsutils
      - iotop
      - sysstat
    state: present

- name: Ensure /opt/bin directory exists
  ansible.builtin.file:
    path: /opt/bin
    state: directory
    mode: "0755"

- name: Check which tools are already installed
  ansible.builtin.stat:
    path: "{{ item }}"
  register: tool_checks
  loop:
    - "{{ just_install_dir }}/just"
    - "{{ zellij_install_dir }}/zellij"
    - "{{ neovim_install_dir }}/bin/nvim"
    - "{{ jj_install_dir }}/jj"
    - "{{ ripgrep_install_dir }}/rg"
    - "{{ fd_install_dir }}/fd"
    - "{{ fzf_install_dir }}/fzf"
    - "{{ direnv_install_dir }}/direnv"

- name: Build installed tools lookup
  ansible.builtin.set_fact:
    installed: "{{ dict(tool_checks.results | map(attribute='item') | zip(tool_checks.results | map(attribute='stat') | map(attribute='exists'))) }}"

# just

- name: Install just
  block:
    - name: Download just installer
      ansible.builtin.get_url:
        url: "{{ just_install_script_url }}"
        dest: /tmp/just-install.sh
        mode: '0755'

    - name: Run just installer
      ansible.builtin.shell:
        cmd: "/tmp/just-install.sh --to {{ just_install_dir }}"
        creates: "{{ just_install_dir }}/just"
  when: not installed[just_install_dir + '/just']

# zellij

- name: Install zellij
  block:
    - name: Download zellij
      ansible.builtin.get_url:
        url: "{{ zellij_url }}"
        dest: /tmp/zellij.tar.gz

    - name: Extract zellij
      ansible.builtin.unarchive:
        src: /tmp/zellij.tar.gz
        dest: "{{ zellij_install_dir }}"
        remote_src: true

    - name: Ensure zellij plugins directory exists
      ansible.builtin.file:
        path: "{{ zellij_plugins_dir }}"
        state: directory
        mode: "0755"
  when: not installed[zellij_install_dir + '/zellij']

# neovim

- name: Install neovim
  block:
    - name: Ensure neovim directory exists
      ansible.builtin.file:
        path: "{{ neovim_install_dir }}"
        state: directory
        mode: "0755"

    - name: Download neovim
      ansible.builtin.get_url:
        url: "{{ neovim_url }}"
        dest: /tmp/nvim.tar.gz

    - name: Extract neovim
      ansible.builtin.unarchive:
        src: /tmp/nvim.tar.gz
        dest: "{{ neovim_install_dir }}"
        remote_src: true
        extra_opts: ['--strip-components=1']

    - name: Symlink neovim binary
      ansible.builtin.file:
        src: "{{ neovim_install_dir }}/bin/nvim"
        dest: /opt/bin/nvim
        state: link
  when: not installed[neovim_install_dir + '/bin/nvim']

