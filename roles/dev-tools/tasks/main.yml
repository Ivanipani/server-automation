---
- name: Install development tools
  ansible.builtin.package:
    name:
      - acl
      - zsh
      - git
      - wget
      - build-essential
      - ca-certificates
      - htop
      - curl
      - tree
      - dnsutils
      - iotop
      - sysstat
    state: present

- name: Ensure /opt/bin directory exists
  ansible.builtin.file:
    path: /opt/bin
    state: directory
    mode: "0755"

- name: Check which tools are already installed
  ansible.builtin.stat:
    path: "{{ item }}"
  register: tool_checks
  loop:
    - "{{ just_bin }}"
    - "{{ zellij_bin }}"
    - "{{ neovim_bin }}"
    - "{{ jj_bin }}"
    - "{{ ripgrep_bin }}"
    - "{{ fd_bin }}"
    - "{{ fzf_bin }}"
    - "{{ direnv_bin }}"
    - "{{ atuin_bin }}"
    - "{{ difftastic_bin }}"

- name: Build installed tools lookup
  ansible.builtin.set_fact:
    installed: "{{ dict(tool_checks.results | map(attribute='item') | zip(tool_checks.results | map(attribute='stat') | map(attribute='exists'))) }}"

- name: Check installed tool versions
  ansible.builtin.command:
    cmd: "{{ item.path }} --version"
  register: version_checks
  changed_when: false
  failed_when: false
  when: installed[item.path]
  loop:
    - { path: "{{ just_bin }}", version: "{{ just_version }}" }
    - { path: "{{ zellij_bin }}", version: "{{ zellij_version }}" }
    - { path: "{{ neovim_bin }}", version: "{{ neovim_version }}" }
    - { path: "{{ jj_bin }}", version: "{{ jj_version }}" }
    - { path: "{{ ripgrep_bin }}", version: "{{ ripgrep_version }}" }
    - { path: "{{ fd_bin }}", version: "{{ fd_version }}" }
    - { path: "{{ fzf_bin }}", version: "{{ fzf_version }}" }
    - { path: "{{ direnv_bin }}", version: "{{ direnv_version }}" }
    - { path: "{{ atuin_bin }}", version: "{{ atuin_version }}" }
    - { path: "{{ difftastic_bin }}", version: "{{ difftastic_version }}" }

- name: Build version mismatch lookup
  ansible.builtin.set_fact:
    needs_upgrade: "{{ needs_upgrade | default({}) | combine({item.item.path: item.item.version not in (item.stdout | default(''))}) }}"
  loop: "{{ version_checks.results }}"
  when: not (item.skipped | default(false))

# just

- name: Install just
  block:
    - name: Download just
      ansible.builtin.get_url:
        url: "{{ just_url }}"
        dest: /tmp/just.tar.gz

    - name: Extract just
      ansible.builtin.unarchive:
        src: /tmp/just.tar.gz
        dest: "{{ just_install_dir }}"
        remote_src: true
  when: >-
    not installed[just_bin]
    or (needs_upgrade[just_bin] | default(false))

# zellij

- name: Install zellij
  block:
    - name: Download zellij
      ansible.builtin.get_url:
        url: "{{ zellij_url }}"
        dest: /tmp/zellij.tar.gz

    - name: Extract zellij
      ansible.builtin.unarchive:
        src: /tmp/zellij.tar.gz
        dest: "{{ zellij_install_dir }}"
        remote_src: true

    - name: Ensure zellij plugins directory exists
      ansible.builtin.file:
        path: "{{ zellij_plugins_dir }}"
        state: directory
        mode: "0755"
  when: >-
    not installed[zellij_bin]
    or (needs_upgrade[zellij_bin] | default(false))

# neovim

- name: Install neovim
  block:
    - name: Ensure neovim directory exists
      ansible.builtin.file:
        path: "{{ neovim_install_dir }}"
        state: directory
        mode: "0755"

    - name: Download neovim
      ansible.builtin.get_url:
        url: "{{ neovim_url }}"
        dest: /tmp/nvim.tar.gz

    - name: Extract neovim
      ansible.builtin.unarchive:
        src: /tmp/nvim.tar.gz
        dest: "{{ neovim_install_dir }}"
        remote_src: true
        extra_opts: ['--strip-components=1']

    - name: Symlink neovim binary
      ansible.builtin.file:
        src: "{{ neovim_bin }}"
        dest: /opt/bin/nvim
        state: link
  when: >-
    not installed[neovim_bin]
    or (needs_upgrade[neovim_bin] | default(false))

