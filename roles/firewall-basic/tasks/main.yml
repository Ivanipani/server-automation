---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Enable ufw and set default policy to deny incoming traffic
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming

- name: Set default outgoing policy
  community.general.ufw:
    default: "{{ firewall_outbound_policy }}"
    direction: outgoing

- name: Allow SSH traffic
  community.general.ufw:
    rule: allow
    port: 22
    proto: tcp
    comment: 'Allow SSH'

- name: Allow inbound ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "Allow inbound {{ item.port }}/{{ item.proto }}"
  loop: "{{ inbound_allow }}"

- name: Deny outbound ports
  community.general.ufw:
    rule: deny
    direction: out
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "Deny outbound {{ item.port }}/{{ item.proto }}"
  loop: "{{ outbound_deny }}"

- name: Allow outbound ports
  community.general.ufw:
    rule: allow
    direction: out
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "Allow outbound {{ item.port }}/{{ item.proto }}"
  loop: "{{ outbound_allow }}"
