- name: Validate rust_user exists on system
  ansible.builtin.getent:
    database: passwd
    key: "{{ rust_user }}"
  register: rust_user_getent

- name: Set rust_user_home fact
  ansible.builtin.set_fact:
    rust_user_home: "{{ getent_passwd[rust_user][4] }}"

- name: Install required packages
  ansible.builtin.package:
    name:
      - build-essential
      - ca-certificates
    state: present

- name: Install Rust and Cargo
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-install.sh
    mode: "0755"

- name: Run rustup installer script
  ansible.builtin.shell:
    cmd: /tmp/rustup-install.sh -y
    creates: "{{ rust_user_home }}/.cargo"
  become: true
  become_user: "{{ rust_user }}"
  environment:
    HOME: "{{ rust_user_home }}"
