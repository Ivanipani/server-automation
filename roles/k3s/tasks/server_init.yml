---
# Bootstrap the embedded-etcd cluster on the first control plane.
# Run only on `groups['kube_control_plane'][0]`.

- ansible.builtin.include_tasks: preflight.yml

- name: Compose INSTALL_K3S_EXEC for cluster init
  ansible.builtin.set_fact:
    k3s_install_exec: >-
      server --cluster-init
      --write-kubeconfig-mode {{ k3s_kubeconfig_mode }}
      {% for san in (k3s_tls_sans + [inventory_hostname, ansible_host]) | unique %}
      --tls-san {{ san }}
      {% endfor %}
      {% for c in k3s_disable_components %}
      --disable {{ c }}
      {% endfor %}

- name: Install / upgrade k3s server (cluster init)
  ansible.builtin.command: "{{ k3s_install_script_path }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_install_exec | regex_replace('\\s+', ' ') | trim }}"
    K3S_TOKEN: "{{ k3s_cluster_token }}"
  when: k3s_needs_install
  changed_when: true
  notify: restart k3s

- name: Ensure k3s service is enabled and started
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

- name: Wait for k3s API to become ready
  ansible.builtin.command: k3s kubectl get --raw=/readyz
  register: k3s_ready
  retries: 30
  delay: 5
  until: k3s_ready.rc == 0
  changed_when: false

- name: Wait for node-token (so joiners can authenticate)
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 60
