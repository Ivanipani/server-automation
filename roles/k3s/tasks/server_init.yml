---
# Bootstrap the embedded-etcd cluster on the first control plane.
# Run only on `groups['kube_control_plane'][0]`.

- ansible.builtin.include_tasks: preflight.yml

- name: Compose INSTALL_K3S_EXEC for cluster init
  ansible.builtin.set_fact:
    k3s_install_exec: >-
      server --cluster-init
      --write-kubeconfig-mode {{ k3s_kubeconfig_mode }}
      {% set vip_san = [k3s_kube_vip_address] if (k3s_kube_vip_enabled and k3s_kube_vip_address) else [] %}
      {% for san in (k3s_tls_sans + [inventory_hostname, ansible_host] + vip_san ) | unique %}
      --tls-san {{ san }}
      {% endfor %}
      {% for c in k3s_disable_components %}
      --disable {{ c }}
      {% endfor %}

- ansible.builtin.include_tasks: _install.yml

- name: Ensure k3s is enabled and started (non-blocking)
  ansible.builtin.command: systemctl enable --now --no-block k3s
  changed_when: false

# Real success gate. Generous retries: cluster-init on a small, contended
# homelab VM (slow etcd raft) can take minutes to serve /readyz.
- name: Wait for k3s API to become ready
  ansible.builtin.command: k3s kubectl get --raw=/readyz
  register: k3s_ready
  retries: 60
  delay: 10
  until: k3s_ready.rc == 0
  changed_when: false

- name: Wait for node-token (so joiners can authenticate)
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 60
