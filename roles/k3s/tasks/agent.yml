---
# Install/run k3s as an agent (worker). Joins via K3S_URL + K3S_TOKEN.

- ansible.builtin.include_tasks: preflight.yml

- name: Compose INSTALL_K3S_EXEC for agent
  ansible.builtin.set_fact:
    k3s_install_exec: "agent"

- ansible.builtin.include_tasks: _install.yml

- name: Ensure k3s-agent service is enabled and started
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
