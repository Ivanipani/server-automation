---
# Join an additional control plane to an existing k3s embedded-etcd cluster.
# Run serially on every CP except `groups['kube_control_plane'][0]` — etcd
# requires joiners be added one at a time.

- ansible.builtin.include_tasks: preflight.yml

- name: Compose INSTALL_K3S_EXEC for server join
  ansible.builtin.set_fact:
    k3s_install_exec: >-
      server --server {{ k3s_api_endpoint }}
      --write-kubeconfig-mode {{ k3s_kubeconfig_mode }}
      {% set vip_san = [k3s_kube_vip_address] if (k3s_kube_vip_enabled and k3s_kube_vip_address) else [] %}
      {% set dns_san = [k3s_api_dns_name] if k3s_api_dns_name else [] %}
      {% for san in (k3s_tls_sans + [inventory_hostname, ansible_host] + vip_san + dns_san) | unique %}
      --tls-san {{ san }}
      {% endfor %}
      {% for c in k3s_disable_components %}
      --disable {{ c }}
      {% endfor %}

- ansible.builtin.include_tasks: _install_server.yml

- name: Ensure k3s service is enabled and started
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

- name: Wait for k3s API to become ready
  ansible.builtin.command: k3s kubectl get --raw=/readyz
  register: k3s_ready
  retries: 30
  delay: 5
  until: k3s_ready.rc == 0
  changed_when: false
