---
# Pull /etc/rancher/k3s/k3s.yaml off the first CP and rewrite the
# `server:` URL so kubectl on the controller (your laptop) can talk to
# the cluster via the kube-vip VIP — or, if kube-vip is disabled, via
# the first CP's ansible_host.
#
# No-op when k3s_kubeconfig_local_path is empty.

- name: Fetch and rewrite kubeconfig for external use
  when: k3s_kubeconfig_local_path | length > 0
  block:
    - name: Slurp kubeconfig from first control plane
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig_raw

    - name: Pick the external apiserver host
      ansible.builtin.set_fact:
        k3s_kubeconfig_external_server: >-
          https://{{ k3s_api_dns_name
                      if k3s_api_dns_name
                      else (k3s_kube_vip_address
                             if (k3s_kube_vip_enabled and k3s_kube_vip_address)
                             else ansible_host) }}:6443

    - name: Write rewritten kubeconfig to controller
      ansible.builtin.copy:
        dest: "{{ k3s_kubeconfig_local_path }}"
        content: "{{ k3s_kubeconfig_raw.content | b64decode | regex_replace('https://127\\.0\\.0\\.1:6443', k3s_kubeconfig_external_server | trim) }}"
        mode: "0600"
      delegate_to: localhost
      become: false
