---
# Shared install/upgrade logic for both server entry points.
# Re-runs the install script when EITHER the binary version OR the
# rendered INSTALL_K3S_EXEC differs from what's persisted in the
# systemd unit. When args drifted, also wipes dynamic-cert.json so the
# serving cert is regenerated with the current --tls-san list on next
# k3s startup.
#
# Caller pre-conditions:
#   - preflight.yml has run (sets k3s_needs_install)
#   - k3s_install_exec is set to the desired argv string

- name: Read current k3s ExecStart line
  ansible.builtin.command: "grep -E '^ExecStart=' /etc/systemd/system/k3s.service"
  register: k3s_current_execstart
  changed_when: false
  failed_when: false
  check_mode: false

- name: Detect args drift in INSTALL_K3S_EXEC
  ansible.builtin.set_fact:
    k3s_args_drifted: >-
      {{ (k3s_install_exec | regex_replace('\s+', ' ') | trim)
         not in (k3s_current_execstart.stdout | default('')) }}

- name: Force serving cert regen when SANs/args drifted
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/tls/dynamic-cert.json
    state: absent
  when: k3s_args_drifted

- name: Install / upgrade k3s server
  ansible.builtin.command: "{{ k3s_install_script_path }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_install_exec | regex_replace('\\s+', ' ') | trim }}"
    INSTALL_K3S_FORCE_RESTART: "true"
    K3S_TOKEN: "{{ k3s_cluster_token }}"
  when: k3s_needs_install or k3s_args_drifted
  changed_when: true
  notify: restart k3s
