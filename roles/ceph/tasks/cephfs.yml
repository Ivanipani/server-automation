---
# CephFS for distributed filesystem (K8s ReadWriteMany via ceph-csi-cephfs).
# 1 active MDS + 2 standby across 3 nodes — do NOT enable multi-active
# (max_mds=2) or you have zero standbys.

- name: Read current MDS map
  ansible.builtin.command: ceph fs status -f json
  register: mds_status
  changed_when: false
  failed_when: false

- name: Compute set of existing MDS daemon names
  ansible.builtin.set_fact:
    existing_mds: >-
      {{ ((mds_status.stdout | from_json).mdsmap | default([]))
         | map(attribute='name') | list
         if mds_status.rc == 0 and mds_status.stdout | length > 0 else [] }}

- name: Create MDS daemon on this node
  ansible.builtin.command: pveceph mds create
  changed_when: true
  when: inventory_hostname_short not in existing_mds

- name: Read existing CephFS list
  ansible.builtin.command: ceph fs ls -f json
  register: fs_ls
  changed_when: false
  run_once: true

- name: Compute set of existing CephFS names
  ansible.builtin.set_fact:
    existing_fs: >-
      {{ (fs_ls.stdout | from_json) | map(attribute='name') | list
         if fs_ls.stdout | length > 0 else [] }}
  run_once: true

- name: Create CephFS (auto-registers as PVE storage)
  ansible.builtin.command: >-
    pveceph fs create
    --name {{ ceph_fs_name }}
    --pg_num {{ ceph_fs_pg_num }}
    --add-storage
  changed_when: true
  run_once: true
  when: ceph_fs_name not in existing_fs

- name: Wait for CephFS to be active
  ansible.builtin.command: ceph fs status {{ ceph_fs_name }} -f json
  register: fs_status
  retries: 30
  delay: 2
  until: >
    fs_status.rc == 0 and
    ((fs_status.stdout | from_json).mdsmap | default([])
     | selectattr('state', 'equalto', 'active') | list | length) >= 1
  changed_when: false
  run_once: true

- name: List existing CephFS subvolume groups
  ansible.builtin.command: ceph fs subvolumegroup ls {{ ceph_fs_name }} -f json
  register: subvolgroups
  changed_when: false
  run_once: true

- name: Create ceph-csi subvolume group (required by ceph-csi-cephfs)
  ansible.builtin.command: >-
    ceph fs subvolumegroup create {{ ceph_fs_name }} {{ ceph_fs_subvolumegroup }}
  changed_when: true
  run_once: true
  when: >
    ceph_fs_subvolumegroup not in
    ((subvolgroups.stdout | from_json) | map(attribute='name') | list
     if subvolgroups.stdout | length > 0 else [])
