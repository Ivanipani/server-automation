---
# cephx users for ceph-csi consumption from a future K8s cluster.
# CRITICAL: ceph-csi-rbd requires the `mgr` cap or provisioning fails
# silently. The CephFS user uses raw `allow` caps because there is no
# `profile cephfs`-style shorthand.
# Keyrings land in pmxcfs (/etc/pve/priv/) — root-only, replicated.

- name: Check whether ceph-csi RBD user exists
  ansible.builtin.command: ceph auth get client.kubernetes-rbd
  register: rbd_user_check
  changed_when: false
  failed_when: false

- name: Create ceph-csi RBD user (mon+mgr+osd profile rbd, scoped to k8s pool)
  ansible.builtin.command: >-
    ceph auth get-or-create client.kubernetes-rbd
    mon "profile rbd"
    mgr "profile rbd pool={{ ceph_pool_k8s_rbd.name }}"
    osd "profile rbd pool={{ ceph_pool_k8s_rbd.name }}"
    -o /etc/pve/priv/ceph.client.kubernetes-rbd.keyring
  changed_when: true
  when: rbd_user_check.rc != 0

- name: Check whether ceph-csi CephFS user exists
  ansible.builtin.command: ceph auth get client.kubernetes-cephfs
  register: cephfs_user_check
  changed_when: false
  failed_when: false

- name: Create ceph-csi CephFS user (raw caps; no profile shorthand for cephfs)
  ansible.builtin.command: >-
    ceph auth get-or-create client.kubernetes-cephfs
    mon "allow r"
    mgr "allow rw"
    osd "allow rw tag cephfs metadata={{ ceph_fs_name }}, allow rw tag cephfs data={{ ceph_fs_name }}"
    mds "allow rw"
    -o /etc/pve/priv/ceph.client.kubernetes-cephfs.keyring
  changed_when: true
  when: cephfs_user_check.rc != 0

- name: Lock down keyring permissions
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0600"
  loop:
    - /etc/pve/priv/ceph.client.kubernetes-rbd.keyring
    - /etc/pve/priv/ceph.client.kubernetes-cephfs.keyring
