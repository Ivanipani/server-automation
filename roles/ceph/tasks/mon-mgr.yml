---
# Per-node mon + mgr creation. Mon must come up before mgr.
# Idempotency: query the existing mon/mgr maps and skip if this node is
# already present.

- name: Read current mon map
  ansible.builtin.command: ceph mon dump -f json
  register: ceph_mon_dump
  changed_when: false
  failed_when: false                          # empty cluster has no mons yet

- name: Compute set of existing mon names
  ansible.builtin.set_fact:
    existing_mons: >-
      {{ (ceph_mon_dump.stdout | from_json).mons
         | map(attribute='name') | list
         if ceph_mon_dump.rc == 0 and ceph_mon_dump.stdout | length > 0
         else [] }}

- name: Create monitor on this node
  ansible.builtin.command: pveceph mon create
  changed_when: true
  when: inventory_hostname_short not in existing_mons

- name: Wait for mon to join quorum
  ansible.builtin.command: ceph mon stat -f json
  register: mon_stat
  retries: 30
  delay: 2
  until: >
    mon_stat.rc == 0 and
    inventory_hostname_short in (mon_stat.stdout | from_json).quorum_names | default([])
  changed_when: false
  when: inventory_hostname_short not in existing_mons

- name: Read current mgr map
  ansible.builtin.command: ceph mgr dump -f json
  register: ceph_mgr_dump
  changed_when: false

- name: Compute set of existing mgr names
  ansible.builtin.set_fact:
    existing_mgrs: >-
      {{ ([(ceph_mgr_dump.stdout | from_json).active_name | default('')]
          + ((ceph_mgr_dump.stdout | from_json).standbys | default([]) | map(attribute='name') | list))
         | reject('equalto', '') | list }}

- name: Create manager on this node
  ansible.builtin.command: pveceph mgr create
  changed_when: true
  when: inventory_hostname_short not in existing_mgrs
