---
# Carve a ZFS zvol from rpool to back the Ceph OSD.
# Idempotent: skips if the zvol already exists with the right size.
#
# Layered storage warning: ZFS-on-Ceph adds write amplification. This is
# the only non-destructive path on a single-disk PVE-ZFS-root install;
# the alternative is reinstalling PVE with a smaller rpool.

- name: Check whether the OSD zvol already exists
  ansible.builtin.command: "zfs list -H -o name {{ ceph_zpool }}/{{ ceph_osd_zvol_name }}"
  register: osd_zvol_check
  changed_when: false
  failed_when: false

- name: Deregister local-zfs from PVE storage (if present)
  ansible.builtin.command: pvesm remove local-zfs
  register: pvesm_remove
  changed_when: pvesm_remove.rc == 0
  failed_when:
    - pvesm_remove.rc != 0
    - "'does not exist' not in pvesm_remove.stderr"

- name: Check whether rpool/data dataset exists
  ansible.builtin.command: "zfs list -H -o name {{ ceph_zpool }}/data"
  register: rpool_data_check
  changed_when: false
  failed_when: false

- name: List zvol children of rpool/data (must be empty before destroy)
  ansible.builtin.command: "zfs list -H -r -o name -t volume {{ ceph_zpool }}/data"
  register: rpool_data_children
  changed_when: false
  when: rpool_data_check.rc == 0

- name: Assert rpool/data has no zvol children (no VM disks live there)
  ansible.builtin.assert:
    that:
      - rpool_data_children.stdout_lines | length == 0
    fail_msg: >-
      rpool/data has zvol children on {{ inventory_hostname }} —
      destroying it would lose VM disks. Refusing.
  when: rpool_data_check.rc == 0

- name: Destroy rpool/data dataset
  ansible.builtin.command: "zfs destroy {{ ceph_zpool }}/data"
  changed_when: true
  when:
    - rpool_data_check.rc == 0
    - ceph_destroy_rpool_data | bool

- name: Create the Ceph OSD zvol
  ansible.builtin.command: >-
    zfs create
    -V {{ ceph_osd_zvol_size }}
    -o volblocksize={{ ceph_osd_zvol_volblocksize }}
    -o compression=off
    -o primarycache=metadata
    -o sync=standard
    {{ ceph_zpool }}/{{ ceph_osd_zvol_name }}
  changed_when: true
  when: osd_zvol_check.rc != 0

- name: Wait for the zvol device node to appear
  ansible.builtin.wait_for:
    path: "/dev/zvol/{{ ceph_zpool }}/{{ ceph_osd_zvol_name }}"
    timeout: 30
  when: osd_zvol_check.rc != 0

- name: Check for unexpected signatures on the new zvol (do not auto-wipe)
  ansible.builtin.command: "wipefs -n /dev/zvol/{{ ceph_zpool }}/{{ ceph_osd_zvol_name }}"
  register: wipefs_check
  changed_when: false
  failed_when: false
  when: osd_zvol_check.rc != 0

- name: Fail if the zvol has pre-existing signatures
  ansible.builtin.fail:
    msg: >-
      /dev/zvol/{{ ceph_zpool }}/{{ ceph_osd_zvol_name }} has filesystem
      signatures: {{ wipefs_check.stdout }}.
      Investigate before continuing — auto-wipe is intentionally disabled.
  when:
    - osd_zvol_check.rc != 0
    - wipefs_check.stdout | default('') | length > 0
