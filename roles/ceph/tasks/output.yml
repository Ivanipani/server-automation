---
# Emit a single consumable bundle for ceph-csi (or any future K8s
# integration). The bundle is ansible-vault encrypted and committed
# to the repo. Plaintext keyrings never land on disk in the repo.

- name: Read cluster fsid
  ansible.builtin.command: ceph fsid
  register: fsid_out
  changed_when: false

- name: Read mon endpoints (json)
  ansible.builtin.command: ceph mon dump -f json
  register: mon_dump
  changed_when: false

- name: Read RBD client key
  ansible.builtin.command: ceph auth get-key client.kubernetes-rbd
  register: rbd_key
  changed_when: false
  no_log: true

- name: Read CephFS client key
  ansible.builtin.command: ceph auth get-key client.kubernetes-cephfs
  register: cephfs_key
  changed_when: false
  no_log: true

- name: Build mon endpoint list
  ansible.builtin.set_fact:
    mon_endpoints: >-
      {{ (mon_dump.stdout | from_json).mons
         | map(attribute='public_addr')
         | map('regex_replace', '/.*$', '')
         | list }}

- name: Render plaintext bundle into a temp file
  ansible.builtin.copy:
    dest: "/tmp/ceph-csi-bundle.{{ ansible_date_time.epoch }}.yml"
    mode: "0600"
    content: |
      ---
      # Ceph cluster credentials for ceph-csi consumption.
      # Generated by 03b-install-ceph.yml on {{ ansible_date_time.iso8601 }}.
      fsid: {{ fsid_out.stdout }}
      mon_endpoints:
      {% for ep in mon_endpoints %}
        - {{ ep }}
      {% endfor %}
      rbd:
        pool: {{ ceph_pool_k8s_rbd.name }}
        user: kubernetes-rbd
        key: {{ rbd_key.stdout }}
      cephfs:
        fs_name: {{ ceph_fs_name }}
        subvolumegroup: {{ ceph_fs_subvolumegroup }}
        user: kubernetes-cephfs
        key: {{ cephfs_key.stdout }}
  register: bundle_tmp
  no_log: true
  delegate_to: localhost
  become: false

- name: Encrypt the bundle in-place with ansible-vault
  ansible.builtin.command: >-
    ansible-vault encrypt
    --output {{ ceph_csi_bundle_path }}
    {{ bundle_tmp.dest }}
  delegate_to: localhost
  become: false
  changed_when: true

- name: Remove plaintext temp bundle
  ansible.builtin.file:
    path: "{{ bundle_tmp.dest }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Storage bootstrap complete — next steps
  ansible.builtin.debug:
    msg: |
      Ceph cluster ready.
        - PVE storage: vms (RBD), cephfs (CephFS) registered.
        - K8s/ceph-csi bundle: {{ ceph_csi_bundle_path }} (vault-encrypted).
        - RGW (S3) endpoint: http://{{ inventory_hostname_short }}:{{ ceph_rgw_port }}/
      Next:
        - External NAS backup target (out of scope here):
            pvesm add nfs nas-backup --server <ip> --export <path> --content backup,iso,vztmpl
        - Provision K8s, then apply ceph-csi using the bundle above.
