---
# Ceph-specific preflight. Disk-related preflight (boot-disk detection,
# free-space, partition layout) lives in the `hypervisor-disks` role and
# must run before this.

- name: Read PVE cluster status
  ansible.builtin.command: pvecm status
  register: pvecm_status
  changed_when: false

- name: Read corosync quorum vote count
  ansible.builtin.command: corosync-quorumtool -s
  register: corosync_quorum
  changed_when: false
  failed_when: false                          # tool exits 2 on inquorate; we parse output

- name: Assert Proxmox cluster is quorate with 3 votes
  ansible.builtin.assert:
    that:
      - "'Quorate' in pvecm_status.stdout"
      - "'Total votes:    3' in corosync_quorum.stdout or 'Total votes: 3' in corosync_quorum.stdout"
    fail_msg: >-
      Cluster is not quorate or does not have 3 votes on {{ inventory_hostname }}.
      Run 02b-cluster-hypervisor.yml first.

- name: Assert the ceph-osd GPT partition exists (created by hypervisor-disks role)
  ansible.builtin.stat:
    path: "/dev/disk/by-partlabel/{{ ceph_osd_partition_label }}"
  register: ceph_part
  failed_when:
    - not ceph_part.stat.exists

- name: Check clock skew
  ansible.builtin.command: chronyc tracking
  register: chrony_tracking
  changed_when: false
  failed_when: false

- name: Warn if clock offset is high (mon clock-skew threshold is ~50ms)
  ansible.builtin.debug:
    msg: >-
      Clock check: {{ chrony_tracking.stdout_lines | select('match', '^System time') | list }}.
      Verify offset is < 50ms before continuing in production; mon clock-skew
      will degrade the cluster.
