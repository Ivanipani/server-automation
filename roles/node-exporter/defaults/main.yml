---
node_exporter_enabled: true
node_exporter_version: "1.8.2"
node_exporter_arch: "amd64"
node_exporter_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
node_exporter_install_dir: "/opt/node_exporter"
node_exporter_bin: "{{ node_exporter_install_dir }}/node_exporter"
node_exporter_user: "node_exporter"
node_exporter_group: "node_exporter"
node_exporter_listen_address: ":9100"
node_exporter_textfile_dir: "/var/lib/node_exporter/textfile_collector"
node_exporter_extra_args: ""
