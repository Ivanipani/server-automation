---
# Per-host upsert. Looks up existing entry by hostname+domain in
# dnsmasq_search.json.rows and decides between add / set / no-op.

- name: "Locate existing entry for {{ lease.hostname }}"
  ansible.builtin.set_fact:
    existing_entry: >-
      {{
        (dnsmasq_search.json.rows | default([]))
        | selectattr('host', 'equalto', lease.hostname)
        | selectattr('domain', 'equalto', opnsense_dnsmasq_domain)
        | list
        | first
        | default(none)
      }}

- name: "Add static lease for {{ lease.hostname }}"
  ansible.builtin.uri:
    url: "{{ opnsense_api_url }}/api/dnsmasq/settings/addHost"
    method: POST
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_api_validate_certs }}"
    status_code: [200]
    body_format: json
    body:
      host:
        host: "{{ lease.hostname }}"
        domain: "{{ opnsense_dnsmasq_domain }}"
        ip: "{{ lease.address }}"
        hwaddr: "{{ lease.mac | lower }}"
        descr: "{{ lease.description | default(opnsense_dnsmasq_descr_marker) }}"
  delegate_to: localhost
  become: false
  when: existing_entry is none
  changed_when: true
  register: add_result

- name: "Update static lease for {{ lease.hostname }}"
  ansible.builtin.uri:
    url: "{{ opnsense_api_url }}/api/dnsmasq/settings/setHost/{{ existing_entry.uuid }}"
    method: POST
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_api_validate_certs }}"
    status_code: [200]
    body_format: json
    body:
      host:
        host: "{{ lease.hostname }}"
        domain: "{{ opnsense_dnsmasq_domain }}"
        ip: "{{ lease.address }}"
        hwaddr: "{{ lease.mac | lower }}"
        descr: "{{ lease.description | default(opnsense_dnsmasq_descr_marker) }}"
  delegate_to: localhost
  become: false
  when:
    - existing_entry is not none
    - (existing_entry.ip | default('')) != lease.address
      or (existing_entry.hwaddr | default('') | lower) != (lease.mac | lower)
  changed_when: true
  register: update_result

- name: Mark configuration changed
  ansible.builtin.set_fact:
    dnsmasq_changed: true
  when: (add_result is defined and add_result is changed)
        or (update_result is defined and update_result is changed)
