---
- name: Ensure SSH keypair exists on control node
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f ~/.ssh/ansible -N ""
    creates: ~/.ssh/ansible
  delegate_to: localhost
  become: false
  run_once: true

- name: Create ansible group
  ansible.builtin.group:
    name: ansible
    state: present

- name: Create ansible user
  ansible.builtin.user:
    name: ansible
    group: ansible
    shell: /bin/bash
    groups: sudo
    append: true
    password: '!'
    state: present

- name: Set up SSH authorized key for ansible
  ansible.posix.authorized_key:
    user: ansible
    key: "{{ lookup('file', '~/.ssh/ansible.pub') }}"
    state: present

- name: Grant passwordless sudo to ansible
  community.general.sudoers:
    name: ansible
    user: ansible
    commands: ALL
    nopassword: true
    state: present
