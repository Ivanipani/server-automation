---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Enable ufw and set default policy to deny incoming traffic
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming

- name: Set default policy to allow outgoing traffic
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH traffic
  community.general.ufw:
    rule: allow
    port: 22
    proto: tcp
    comment: 'Allow SSH'

- name: Allow HTTP traffic
  community.general.ufw:
    rule: allow
    port: 80
    proto: tcp
    comment: 'Allow HTTP'

- name: Allow HTTPS traffic
  community.general.ufw:
    rule: allow
    port: 443
    proto: tcp
    comment: 'Allow HTTPS'

