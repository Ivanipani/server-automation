---
tailscale_enabled: false
proxmox_cluster_name: usfa

# Storage partitioning (consumed by 03-partition-disks.yml).
# DESTRUCTIVE: setting `confirm_carve_data_disk: true` authorizes the
# playbook to carve the unallocated tail at the end of the boot disk
# into two fixed-size GPT partitions: `vm-storage` (200 GiB) and
# `longhorn` (fills the rest, ~700 GiB). 03b-provision-storage.yml then
# turns each into a node-local LVM-thin pool registered as the PVE `vms`
# and `longhorn-data` storages. Requires PVE installed with
# `lvm.hdsize = 100` so that ~900 GiB is unpartitioned and available.
# Only set this on a freshly-installed node with no VMs/containers.
confirm_carve_data_disk: true
