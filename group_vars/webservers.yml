---
# Inbound firewall policy for web-server LXCs (the `webservers` leaf
# group under containers — caddy/nginx).
#
# Empty template group today; the policy exists so a webserver LXC
# inherits it automatically the moment it is added. Consumed by
# playbooks/poochella/infra/30-guests/40-firewall.yml; the uniform
# baseline (default-deny in, allow SSH, deny SSH out) is set there.
firewall_inbound_allow:
  - { port: 80, proto: tcp }    # HTTP
  - { port: 443, proto: tcp }   # HTTPS
