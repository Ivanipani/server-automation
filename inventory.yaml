# Single source of truth for all hosts in the homelab.
#
# Read by:
#   - Ansible (as its inventory; see ansible.cfg)
#   - OpenTofu (via yamldecode in tofu/locals.tf — every host with a `vm:`
#     block becomes a Proxmox VM)
#   - The dnsmasq playbook (every host with `mac_address` defined gets a
#     static DHCP+DNS reservation on OPNsense)
#
# Conventions:
#   - `ip_address` + `mac_address`  → host appears as a dnsmasq static lease
#   - `static_ip: true`             → suppress the dnsmasq reservation (e.g. router)
#   - `vm: {...}`                   → Tofu creates this VM on Proxmox
#   - `vm.data_disk_size: <GiB>`    → attach a 2nd virtio disk backed by
#     the `longhorn-data` PVE storage (used by k3s workers for Longhorn)
#   - VM MACs use the locally-administered prefix `02:` and a structured
#     tail (02:00:00:<role>:<index>) so collisions are obvious at a glance.
#
# VMs always DHCP-boot. The static IP comes from the reservation tied to
# the MAC declared here — not from cloud-init.

all:
  vars:
    domain: lan
    network_gateway: "10.1.1.1"
    network_cidr: "/24"
    ansible_python_interpreter: /usr/bin/python3
    # Proxmox API endpoint. Read by Tofu via tofu/locals.tf → provider.tf.
    proxmox_endpoint: "https://pve-home-01.lan:8006"
    # Proxmox VM/LXC base template IDs. Read by Tofu via tofu/locals.tf.
    # VM storage is node-local LVM-thin, so every baremetal node builds
    # its own template with a per-node-unique ID:
    #   effective ID = base + (node_index * template_vm_id_node_stride)
    # node_index is the host's position in `baremetal.hosts`
    # (pve-home-01→0, pve-home-02→1, pve-home-03→2). Each VM is cloned
    # locally on its own `vm.proxmox_node` from that node's template —
    # no cross-node copy, no HA. Per-VM override: set `vm.template_id`
    # on a host below (used verbatim, skips the offset).
    template_vm_id: 9001
    template_ct_id: 9101
    template_vm_id_node_stride: 10

router:
  hosts:
    opnsense01:
      ansible_host: "10.1.1.1"
      ip_address: "10.1.1.1"
      static_ip: true

baremetal:
  hosts:
    pve-home-01:
      ansible_host: pve-home-01.lan
      ip_address: 10.1.1.105
      mac_address: "18:60:24:dc:b7:32"
    pve-home-02:
      ansible_host: pve-home-02.lan
      ip_address: 10.1.1.106
      mac_address: "b0:0c:d1:6f:a6:7d"
    pve-home-03:
      ansible_host: pve-home-03.lan
      ip_address: 10.1.1.107
      mac_address: "e4:e7:49:47:dc:bf"

switches:
  hosts:
    router-01:
      ansible_host: 10.1.1.102
      ip_address: 10.1.1.102
      mac_address: "04:f4:1c:82:e0:ff"

virtual-machines:
  hosts:
    devbox01:
      ansible_host: devbox01.lan
      ip_address: 10.1.1.120
      mac_address: "02:00:00:00:01:01"
      vm:
        proxmox_node: pve-home-01
        cores: 4
        memory: 8192
        disk_size: 100
        tags: [dev, ivan]
  children:
    databases:
    kubernetes:

kubernetes:
  children:
    kube_control_plane:
      hosts:
        kube-ctl-01:
          ansible_host: kube-ctl-01.lan
          ip_address: 10.1.1.110
          mac_address: "02:00:00:00:02:01"
          vm:
            proxmox_node: pve-home-01
            cores: 2
            memory: 8192
            disk_size: 30
            tags: [kube, control-plane]
        kube-ctl-02:
          ansible_host: kube-ctl-02.lan
          ip_address: 10.1.1.111
          mac_address: "02:00:00:00:02:02"
          vm:
            proxmox_node: pve-home-02
            cores: 2
            memory: 8192
            disk_size: 30
            tags: [kube, control-plane]
        kube-ctl-03:
          ansible_host: kube-ctl-03.lan
          ip_address: 10.1.1.112
          mac_address: "02:00:00:00:02:03"
          vm:
            proxmox_node: pve-home-03
            cores: 2
            memory: 8192
            disk_size: 30
            tags: [kube, control-plane]
    kube_workers:
      hosts:
        kube-worker-01:
          ansible_host: kube-worker-01.lan
          ip_address: 10.1.1.113
          mac_address: "02:00:00:00:03:01"
          vm:
            proxmox_node: pve-home-01
            cores: 4
            memory: 8192
            disk_size: 50
            data_disk_size: 100
            tags: [kube, worker]
        kube-worker-02:
          ansible_host: kube-worker-02.lan
          ip_address: 10.1.1.114
          mac_address: "02:00:00:00:03:02"
          vm:
            proxmox_node: pve-home-02
            cores: 4
            memory: 8192
            disk_size: 50
            data_disk_size: 100
            tags: [kube, worker]
        kube-worker-03:
          ansible_host: kube-worker-03.lan
          ip_address: 10.1.1.115
          mac_address: "02:00:00:00:03:03"
          vm:
            proxmox_node: pve-home-03
            cores: 4
            memory: 8192
            disk_size: 50
            data_disk_size: 100
            tags: [kube, worker]

containers:
  children:
    webservers:
