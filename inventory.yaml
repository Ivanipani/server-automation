# Single source of truth for all hosts in the homelab.
#
# Read by:
#   - Ansible (as its inventory; see ansible.cfg)
#   - OpenTofu (via yamldecode in tofu/locals.tf — every host with a `vm:`
#     block becomes a Proxmox VM)
#   - The dnsmasq playbook (every host with `mac_address` defined gets a
#     static DHCP+DNS reservation on OPNsense)
#
# Conventions:
#   - `ip_address` + `mac_address`  → host appears as a dnsmasq static lease
#   - `static_ip: true`             → suppress the dnsmasq reservation (e.g. router)
#   - `vm: {...}`                   → Tofu creates this VM on Proxmox
#   - `vm.data_disk_size: <GiB>`    → attach a 2nd virtio disk backed by
#     the node-local `longhorn-data` PVE storage (k3s workers, Longhorn).
#     One worker per node, sized to consume that node's whole longhorn
#     pool (kept just under the physical pool — it is thin-provisioned,
#     so over-committing it would let Longhorn exhaust the pool).
#   - VM MACs use the locally-administered prefix `02:` and a structured
#     tail (02:00:00:<role>:<index>) so collisions are obvious at a glance.
#   - `storage: {pools: [...]}` on a baremetal host → the disk layout the
#     hypervisor-disks role realises (03-partition-disks +
#     03b-provision-storage). DECLARED, NOT DISCOVERED: the role only
#     touches disks named here by their /dev/disk/by-id path. An
#     undeclared disk is never touched; a declared by-id that is not
#     physically present is a HARD FAILURE. Hardware changes (swap/add a
#     drive) MUST be reflected here first, then the playbook re-run.
#     Per pool: `pool` (GPT partlabel + idempotency key), `vg`,
#     `thinpool`, `pve_storage` (PVE storage id — a FROZEN contract, Tofu
#     hardcodes `vms`/`longhorn-data`), `content`, and `backing`:
#       backing.strategy: boot_tail  → carve `size` at the end of the
#         auto-detected PVE boot disk (size "0" = fill the tail)
#       backing.strategy: whole_disk → claim the entire disk at
#         `by_id` (one full-disk GPT partition)
#     Discover by-id paths with `just disk-ids`.
#
# VMs always DHCP-boot. The static IP comes from the reservation tied to
# the MAC declared here — not from cloud-init.
#
# Proxmox topology is PER-GROUP (clustered and standalone can coexist):
#   - `baremetal`      → umbrella for ALL Proxmox hosts. Shared roles
#                        target this; children flatten into it.
#   - `pve_standalone` → independent nodes, NO corosync. Each is its own
#                        API surface; Tofu uses a provider per node.
#   - `pve_cluster`    → parent of zero or more corosync clusters. Each
#                        CHILD group is ONE cluster: the group name is the
#                        cluster name, and group_vars/<name>.yml sets
#                        `proxmox_cluster_name: <name>`. Empty today —
#                        poochella runs as two independent standalone nodes
#                        (the gaming-PC pve-home-02 replaced the old
#                        crash-looping unit; pve-home-03 retired).

all:
  vars:
    domain: lan
    network_gateway: "10.1.1.1"
    network_cidr: "/24"
    ansible_python_interpreter: /usr/bin/python3
    # Proxmox API endpoints, one per baremetal node. Read by Tofu via
    # tofu/locals.tf → provider.tf, which declares one aliased provider
    # per node. With independent (non-clustered) nodes a single endpoint
    # cannot place VMs on a peer, so each node is addressed directly. In a
    # cluster every member exposes the full API; pointing each provider at
    # its own node is uniform and works for both topologies.
    # Adding a node = add it here + a provider block in tofu/provider.tf +
    # a token var (see tofu/variables.tf) + a module call in tofu/main.tf.
    proxmox_endpoints:
      pve-home-01: "https://pve-home-01.lan:8006"
      pve-home-02: "https://pve-home-02.lan:8006"
    # Per-node Proxmox template IDs. Read by Ansible
    # (04-prepare-templates.yml) and Tofu (tofu/locals.tf). VM storage is
    # node-local LVM-thin, so every baremetal node bakes its own local
    # template. These maps are the single source of truth — no offset
    # arithmetic, no group-ordering coupling. The value is each node's
    # *anchor* (first/default template) ID; 04-prepare-templates.yml
    # builds the per-image-family templates as anchor+0, anchor+1, … in
    # vm_templates_base / lxc_templates_base order on each node. Tofu
    # clones each VM from `template_vm_ids[its proxmox_node]` (the
    # default = first VM template). Per-VM override: set `vm.template_id`
    # on a host below (used verbatim). Keep anchors ≥ (#templates) apart
    # so families don't collide.
    template_vm_ids:
      pve-home-01: 9001
      pve-home-02: 9011
      # pve-home-03: 9021
      # pve-home-04: 9031
    template_ct_ids:
      pve-home-01: 9101
      pve-home-02: 9111
      # pve-home-03: 9121
      # pve-home-04: 9131

router:
  hosts:
    opnsense01:
      ansible_host: "10.1.1.1"
      ip_address: "10.1.1.1"
      static_ip: true

baremetal:
  # Umbrella for every Proxmox baremetal host. Topology is decided by
  # which child group a host sits in (see header). `hosts:` here would be
  # topology-ambiguous, so all hosts live under a child group.
  children:
    pve_standalone:
      # Independent PVE nodes — no corosync, no HA, no live-migration.
      hosts:
        pve-home-01:
          ansible_host: pve-home-01.lan
          ip_address: 10.1.1.105
          mac_address: "18:60:24:dc:b7:32"
          # Single ~1 TB boot disk. PVE took the first 100 GiB (hdsize);
          # carve the tail into vm-storage (200G) + longhorn (rest).
          storage:
            pools:
              - pool: vm-storage
                vg: vmdata
                thinpool: vmthin
                pve_storage: vms
                content: images,rootdir
                backing: { strategy: boot_tail, size: "200G" }
              - pool: longhorn
                vg: longhorndata
                thinpool: longhornthin
                pve_storage: longhorn-data
                content: images
                backing: { strategy: boot_tail, size: "0" }
        pve-home-02:
          ansible_host: pve-home-02.lan
          ip_address: 10.1.1.106
          mac_address: "3c:7c:3f:1f:96:af"
          # Two disks: 256 GB SSD (boot/root, via answer-file sda) + a
          # whole 1 TB HDD. vm-storage lives on the SSD tail; longhorn
          # claims the entire HDD.
          #
          # REPLACE the by_id values below with the REAL paths from
          # `just disk-ids` (run against pve-home-02 once it is built).
          # preflight refuses to run until each declared by_id resolves
          # to a present block device — hardware must match inventory.
          storage:
            pools:
              - pool: vm-storage
                vg: vmdata
                thinpool: vmthin
                pve_storage: vms
                content: images,rootdir
                backing: { strategy: boot_tail, size: "0" }
              - pool: longhorn
                vg: longhorndata
                thinpool: longhornthin
                pve_storage: longhorn-data
                content: images
                backing:
                  strategy: whole_disk
                  by_id: "REPLACE-ME-1tb-hdd-by-id"   # e.g. wwn-0x5000c500... or ata-ST1000..._SERIAL
    pve_cluster:
      # Parent of all corosync clusters. Each child group is ONE cluster
      # (group name = cluster name; set proxmox_cluster_name in
      # group_vars/<name>.yml). Empty today — poochella is standalone.
      # Example:
      #   children:
      #     poochella:
      #       hosts:
      #         pve-home-03:
      #           ansible_host: pve-home-03.lan
      #           ip_address: 10.1.1.107
      #           mac_address: "e4:e7:49:47:dc:bf"
      #         pve-home-04:
      #           ansible_host: pve-home-04.lan
      #           ip_address: 10.1.1.108
      #           mac_address: "<unique-mac>"
      children: {}

switches:
