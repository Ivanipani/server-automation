---
# Firewall configuration for all poochella nodes
# Default-deny incoming, allow outgoing, with per-group port allowances

# 1. Base firewall for ALL hosts: ufw + deny incoming + allow outgoing + SSH
- hosts: all
  become: true
  roles:
    - firewall-basic

# 2. Hypervisor — Proxmox Web UI and VNC consoles
- hosts: baremetal
  become: true
  roles:
    - role: firewall-basic
      vars:
        inbound_allow:
          - { port: 8006, proto: tcp }
          - { port: "5900:5999", proto: tcp }

# 3. Containers — per-host open ports
- hosts: containers
  become: true
  roles:
    - role: firewall-basic
      vars:
        inbound_allow: "{{ _container_inbound[inventory_hostname] | default([]) }}"
  vars:
    _container_inbound:
      caddy01:
        - { port: 80, proto: tcp }
        - { port: 443, proto: tcp }
      nginx01:
        - { port: 80, proto: tcp }
        - { port: 443, proto: tcp }
      pihole02:
        - { port: 53, proto: tcp }
        - { port: 53, proto: udp }
        - { port: 67, proto: udp }
        - { port: 80, proto: tcp }

# 4. Virtual machines — application port range
- hosts: virtual-machines
  become: true
  roles:
    - role: firewall-basic
      vars:
        inbound_allow:
          - { port: "50000:50100", proto: tcp }
