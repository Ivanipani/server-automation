- name: Install required packages
  ansible.builtin.package:
    name:
      - build-essential
      - ca-certificates
    state: present

- name: Install Rust and Cargo
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-install.sh
    mode: "0755"

- name: Run rustup installer script
  become: true
  ansible.builtin.shell:
    cmd: /tmp/rustup-install.sh -y
    creates: /home/pani/.cargo
  become: true
  become_user: pani
  environment:
    HOME: /home/pani
