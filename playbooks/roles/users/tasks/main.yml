---
- name: Create promoter group
  ansible.builtin.group:
    name: promoter
    state: present

- name: Create talent group
  ansible.builtin.group:
    name: talent
    state: present

- name: Create pani user
  ansible.builtin.user:
    name: pani
    state: present
    groups:
      - promoter
      - talent
    shell: /bin/bash
    home: /home/pani
