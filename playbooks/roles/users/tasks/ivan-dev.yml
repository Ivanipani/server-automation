- name: Install zplug
  ansible.builtin.git:
    repo: https://github.com/zplug/zplug.git
    dest: /home/pani/.zplug
    version: main
  become: true
  become_user: pani

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: /home/pani/.config
    state: directory
    owner: pani
    group: pani
    mode: "0755"

- name: Run zsh setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: /home/pani/dotfiles/zsh
  become: true
  become_user: pani
  environment:
    HOME: /home/pani

- name: Configure neovim dotfiles
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: /home/pani/dotfiles/nvim
  become: true
  become_user: pani
  environment:
    HOME: /home/pani

- name: Run zellij setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: /home/pani/dotfiles/zellij
  become: true
  become_user: pani
  environment:
    HOME: /home/pani

- name: Run version control setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: /home/pani/dotfiles/vcs
  become: true
  become_user: pani
  environment:
    HOME: /home/pani
