- name: Create pani user
  ansible.builtin.user:
    name: pani
    state: present
    groups:
      - promoter
      - talent
      - sudo
    shell: /bin/zsh
    home: /home/pani

- name: Set up SSH authorized key for pani
  ansible.posix.authorized_key:
    user: pani
    key: "{{ lookup('file', '~/.ssh/ansible.pub') }}"
    state: present

- name: Install zplug
  ansible.builtin.git:
    repo: https://github.com/zplug/zplug.git
    dest: /home/pani/.zplug
    version: main
  become: true
  become_user: pani


- name: Clone dotfiles repo
  ansible.builtin.git:
    repo: git@github.com:Ivanipani/dotfiles.git
    dest: /home/pani/dotfiles
    version: main
  become: false
  become_user: pani

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: /home/pani/.config
    state: directory
    owner: pani
    group: pani
    mode: "0755"

- name: Run zsh setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: /home/pani/dotfiles/zsh
  become: true
  become_user: pani
