---
- name: Install development tools
  ansible.builtin.package:
    name:
      - acl
      - zsh
      - zplug
      # - neovim
      - direnv
      - fd-find
      - fzf
      - git
      - wget
    state: present
# - name: Install and configure Ivan's dotfiles

- name: Create pani user
  ansible.builtin.user:
    name: pani
    state: present
    groups:
      - promoter
      - talent
      - sudo
    shell: /bin/zsh
    home: /home/pani

- name: Set up SSH authorized key for pani
  ansible.posix.authorized_key:
    user: pani
    key: "{{ lookup('file', '~/.ssh/ansible.pub') }}"
    state: present

- name: Clone dotfiles repo
  ansible.builtin.git:
    repo: git@github.com:Ivanipani/dotfiles.git
    dest: /tmp/dotfiles
    version: main
    accept_hostkey: true
  become: false

- name: Copy dotfiles to pani home
  ansible.builtin.copy:
    src: /tmp/dotfiles/
    dest: /home/pani/dotfiles/
    remote_src: true
    owner: pani
    group: pani
    mode: preserve

- name: Clean up temp dotfiles
  ansible.builtin.file:
    path: /tmp/dotfiles
    state: absent

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: /home/pani/.config
    state: directory
    owner: pani
    group: pani
    mode: "0755"

- name: Run zsh setup script
  ansible.builtin.command:
    cmd: zsh ./setup.sh
    chdir: /home/pani/dotfiles/zsh
  become: true
  become_user: pani
