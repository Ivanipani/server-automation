---
- name: Install development tools
  ansible.builtin.package:
    name:
      - acl
      - zsh
      - neovim
      - direnv
      - fd-find
      - fzf
      - git
      - wget
    state: present

- name: Download starship installer
  ansible.builtin.get_url:
    url: https://starship.rs/install.sh
    dest: /tmp/starship-install.sh
    mode: '0755'

- name: Install starship
  ansible.builtin.shell:
    cmd: /tmp/starship-install.sh --yes
    creates: /usr/local/bin/starship

- name: Download just installer
  ansible.builtin.get_url:
    url: https://just.systems/install.sh
    dest: /tmp/just-install.sh
    mode: '0755'

- name: Install just
  ansible.builtin.shell:
    cmd: /tmp/just-install.sh --to /usr/local/bin
    creates: /usr/local/bin/just

- name: Download zellij
  ansible.builtin.get_url:
    url: https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/zellij.tar.gz

- name: Install zellij
  ansible.builtin.shell:
    cmd: tar -xzf /tmp/zellij.tar.gz -C /usr/local/bin zellij && chmod +x /usr/local/bin/zellij
    creates: /usr/local/bin/zellij

- name: Download neovim
  ansible.builtin.get_url:
    url: https://github.com/neovim/neovim/releases/download/v0.11.6/nvim-linux-x86_64.tar.gz
    dest: /tmp/nvim.tar.gz

- name: Install neovim
  ansible.builtin.shell:
    cmd: tar -xzf /tmp/nvim.tar.gz -C /usr/local/bin && chmod +x /usr/local/bin/zellij
    creates: /usr/local/bin/nvim

