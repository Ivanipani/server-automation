---
- name: Install development tools
  ansible.builtin.package:
    name:
      - acl
      - zsh
      - direnv
      - fd-find
      - fzf
      - git
      - wget
      - build-essential
      - htop
      - curl
      - tree
      - dnsutils
      - iotop
      - sysstat
    state: present

- name: Create pani user
  ansible.builtin.user:
    name: pani
    state: present
    groups:
      - promoter
      - talent
      - sudo
    shell: /bin/zsh
    home: /home/pani

- name: Set up SSH authorized key for pani
  ansible.posix.authorized_key:
    user: pani
    key: "{{ lookup('file', '~/.ssh/ansible.pub') }}"
    state: present


- name: Check if dotfiles repo exists
  ansible.builtin.stat:
    path: /home/pani/dotfiles
  register: dotfiles_dir

- name: Allow pani to access SSH agent socket
  ansible.builtin.file:
    path: "{{ ansible_env.SSH_AUTH_SOCK | dirname }}"
    mode: "0755"
    state: directory
  when: not dotfiles_dir.stat.exists

- name: Set agent socket permissions
  ansible.builtin.file:
    path: "{{ ansible_env.SSH_AUTH_SOCK }}"
    mode: "0666"
  when: not dotfiles_dir.stat.exists

- name: Clone dotfiles repo
  ansible.builtin.git:
    repo: git@github.com:Ivanipani/dotfiles.git
    dest: /home/pani/dotfiles
    version: main
    accept_newhostkey: true
  become: true
  become_user: pani
  environment:
    SSH_AUTH_SOCK: "{{ ansible_env.SSH_AUTH_SOCK }}"
  when: not dotfiles_dir.stat.exists



- name: Ensure /opt/bin directory exists
  ansible.builtin.file:
    path: /opt/bin
    state: directory
    mode: "0755"

- name: Download starship installer
  ansible.builtin.get_url:
    url: https://starship.rs/install.sh
    dest: /tmp/starship-install.sh
    mode: '0755'

- name: Install starship
  ansible.builtin.shell:
    cmd: /tmp/starship-install.sh --yes --bin-dir /opt/bin
    creates: /opt/bin/starship

- name: Download just installer
  ansible.builtin.get_url:
    url: https://just.systems/install.sh
    dest: /tmp/just-install.sh
    mode: '0755'

- name: Install just
  ansible.builtin.shell:
    cmd: /tmp/just-install.sh --to /opt/bin
    creates: /opt/bin/just

- name: Download zellij
  ansible.builtin.get_url:
    url: https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/zellij.tar.gz

- name: Install zellij
  ansible.builtin.unarchive:
    src: /tmp/zellij.tar.gz
    dest: /opt/bin
    remote_src: true
    creates: /opt/bin/zellij

- name: Download neovim
  ansible.builtin.get_url:
    url: https://github.com/neovim/neovim/releases/download/v0.11.6/nvim-linux-x86_64.tar.gz
    dest: /tmp/nvim.tar.gz

- name: Install neovim
  ansible.builtin.unarchive:
    src: /tmp/nvim.tar.gz
    dest: /opt
    remote_src: true
    creates: /opt/nvim-linux-x86_64/bin/nvim

- name: Symlink neovim binary
  ansible.builtin.file:
    src: /opt/nvim-linux-x86_64/bin/nvim
    dest: /opt/bin/nvim
    state: link

- name: Download jj
  ansible.builtin.get_url:
    url: https://github.com/jj-vcs/jj/releases/download/v0.39.0/jj-v0.39.0-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/jj.tar.gz

- name: Install jj
  ansible.builtin.unarchive:
    src: /tmp/jj.tar.gz
    dest: /opt/bin
    remote_src: true
    creates: /opt/bin/jj

- name: Download ripgrep
  ansible.builtin.get_url:
    url: https://github.com/BurntSushi/ripgrep/releases/download/15.1.0/ripgrep-15.1.0-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/ripgrep.tar.gz

- name: Install ripgrep
  ansible.builtin.unarchive:
    src: /tmp/ripgrep.tar.gz
    dest: /opt
    remote_src: true
    creates: /opt/bin/ripgrep-15.1.0-x86_64-unknown-linux-musl

- name: Symlink ripgrep binary
  ansible.builtin.file:
    src: /opt/bin/ripgrep-15.1.0-x86_64-unknown-linux-musl/rg
    dest: /opt/bin/rg
    state: link

