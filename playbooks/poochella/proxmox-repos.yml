---
- name: Configure Proxmox no-subscription repos
  hosts: baremetal
  become: true
  tasks:
    - name: Remove Proxmox enterprise PVE repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        state: absent

    - name: Remove Proxmox enterprise Ceph repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/ceph.list
        state: absent

    - name: Add Proxmox no-subscription PVE repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.list
        content: "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription\n"
        mode: "0644"

    - name: Add Proxmox no-subscription Ceph repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/ceph-no-subscription.list
        content: "deb http://download.proxmox.com/debian/ceph-quincy bookworm no-subscription\n"
        mode: "0644"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
