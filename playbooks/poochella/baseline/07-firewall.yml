---
# Firewall configuration for all poochella nodes
# Default-deny incoming, allow outgoing, with per-group port allowances

# Containers — per-host open ports
- hosts: containers
  become: true
  roles:
    - role: firewall-basic
      vars:
        inbound_allow: "{{ _container_inbound[inventory_hostname] | default([]) }}"
        outbound_deny:
          - { port: 22, proto: tcp }
  vars:
    _container_inbound:
      caddy01:
        - { port: 80, proto: tcp }
        - { port: 443, proto: tcp }
      nginx01:
        - { port: 80, proto: tcp }
        - { port: 443, proto: tcp }
      pihole02:
        - { port: 53, proto: tcp }
        - { port: 53, proto: udp }
        - { port: 67, proto: udp }
        - { port: 80, proto: tcp }

# Virtual machines — per-host open ports
- hosts: virtual-machines
  become: true
  roles:
    - role: firewall-basic
      vars:
        inbound_allow: "{{ _vm_inbound[inventory_hostname] | default([]) }}"
        outbound_deny:
          - { port: 22, proto: tcp }
  vars:
    _vm_inbound:
      devbox01:
        - { port: "50000:50100", proto: tcp }
      postgres01:
        - { port: "50000:50100", proto: tcp }
        - { port: 5432, proto: tcp }
