---
# Establishes a user 'ansible' with SSH + sudo access.
# All Ansible-managed nodes require this setup

- name: Detect SSH user for VMs
  hosts: virtual-machines
  gather_facts: false
  connection: local
  tasks:
    - name: Check if ansible user can connect
      ansible.builtin.command:
        cmd: ssh -o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ansible@{{ ansible_host }} true
      register: ansible_ssh
      ignore_errors: true
      changed_when: false

    - name: Set bootstrap user
      ansible.builtin.set_fact:
        bootstrap_user: "{{ 'ansible' if ansible_ssh.rc == 0 else 'temp' }}"

    - name: "Bootstrap user for {{ inventory_hostname }}: {{ bootstrap_user }}"
      ansible.builtin.debug:
        msg: "Connecting as '{{ bootstrap_user }}' (ansible user {{ 'already exists' if ansible_ssh.rc == 0 else 'not yet created' }})"

- name: Bootstrap ansible user (VMs)
  hosts: virtual-machines
  become: true
  remote_user: "{{ bootstrap_user }}"
  roles:
    - setup-ansible


- name: Detect SSH user for containers
  hosts: containers
  gather_facts: false
  connection: local
  tasks:
    - name: Check if ansible user can connect
      ansible.builtin.command:
        cmd: ssh -o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ansible@{{ ansible_host }} true
      register: ansible_ssh_lxc
      ignore_errors: true
      changed_when: false

    - name: Set bootstrap user
      ansible.builtin.set_fact:
        bootstrap_user_lxc: "{{ 'ansible' if ansible_ssh_lxc.rc == 0 else 'root' }}"

    - name: "Bootstrap user for {{ inventory_hostname }}: {{ bootstrap_user_lxc }}"
      ansible.builtin.debug:
        msg: "Connecting as '{{ bootstrap_user_lxc }}' (ansible user {{ 'already exists' if ansible_ssh_lxc.rc == 0 else 'not yet created' }})"

- name: Bootstrap ansible user (containers)
  hosts: containers
  remote_user: "{{ bootstrap_user_lxc }}"
  become: true
  roles:
    - setup-ansible
