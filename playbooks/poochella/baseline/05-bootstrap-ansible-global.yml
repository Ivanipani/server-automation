---
# Establishes a user 'ansible' with SSH + sudo access.
# All Ansible-managed nodes require this setup

- name: Detect SSH user for VMs
  hosts: virtual-machines
  gather_facts: false
  connection: local
  tasks:
    - name: Detect bootstrap user
      ansible.builtin.include_tasks:
        file: tasks/detect-bootstrap-user.yml
      vars:
        fallback_user: temp
        ssh_extra_flags: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Bootstrap ansible user (VMs)
  hosts: virtual-machines
  become: true
  remote_user: "{{ bootstrap_user }}"
  roles:
    - create-user


- name: Detect SSH user for containers
  hosts: containers
  gather_facts: false
  connection: local
  tasks:
    - name: Detect bootstrap user
      ansible.builtin.include_tasks:
        file: tasks/detect-bootstrap-user.yml
      vars:
        fallback_user: root
        ssh_extra_flags: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Bootstrap ansible user (containers)
  hosts: containers
  remote_user: "{{ bootstrap_user }}"
  become: true
  roles:
    - create-user
