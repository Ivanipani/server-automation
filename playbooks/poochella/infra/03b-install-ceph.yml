---
# Bootstrap a Ceph Squid cluster across the 3-node Proxmox cluster.
# Provides: RBD (VM block storage) and RGW (S3 object storage), with
# size=3/min_size=2 HA. K8s-facing storage (ceph-csi pools, users,
# bundles, CephFS) is intentionally out of scope — handled separately.
#
# Pre-conditions:
#   - 03-partition-disks.yml completed (ceph-osd partition present on
#     each baremetal node)

- name: Ceph preflight (cluster quorate + ceph-osd partition present)
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: preflight.yml

- name: Bootstrap Ceph (install + init + mon-mgr; serial so quorum forms cleanly)
  hosts: baremetal
  become: true
  serial: 1
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: bootstrap.yml

- name: Build the data plane (OSDs + vms RBD pool)
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: cluster.yml

- name: Deploy RGW (S3 object storage) on first node
  hosts: baremetal[0]
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: rgw.yml
