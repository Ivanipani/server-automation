---
# Bootstrap a Ceph Squid cluster across the 3-node Proxmox cluster.
# Provides: RBD (VM block storage), CephFS (K8s RWX), RGW (S3 object),
# size=3/min_size=2 HA, cephx users + bundle ready for ceph-csi.
#
# Disk partitioning is handled by the `hypervisor-disks` role (separate
# concern); this playbook orchestrates both roles in sequence.
#
# DESTRUCTIVE on first run: partitions unallocated space at the end of
# each node's boot disk into a ceph-osd partition + a longhorn partition.
# Refuses to run unless `confirm_carve_data_disk: true` is set per host.
#
# Pre-conditions:
#   - 02-bootstrap-hypervisor.yml completed (ansible user, repos staged)
#   - 02b-cluster-hypervisor.yml completed (PVE cluster quorate)
#   - PVE installed with LVM/ext4 root AND `lvm.hdsize = 100` so that
#     ~900 GB at the end of the disk is unpartitioned. See the answer
#     files under scripts/images/proxmox/pve-home-0X.toml.
#   - No VMs or containers exist yet on any node

- name: Disk preflight (gates + boot-disk detection)
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: preflight.yml

- name: Carve ceph-osd + longhorn partitions on the boot disk
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: carve.yml

- name: Ceph preflight (cluster quorate + ceph-osd partition present)
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: preflight.yml

- name: Install Ceph packages on all nodes
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: install.yml

- name: Initialize Ceph cluster (run-once)
  hosts: baremetal
  become: true
  run_once: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: init.yml

- name: Create monitors and managers on all nodes
  hosts: baremetal
  become: true
  serial: 1                                   # mons join sequentially for clean quorum
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: mon-mgr.yml

- name: Create OSDs on all nodes
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: osd.yml

- name: Create RBD pools (run-once)
  hosts: baremetal
  become: true
  run_once: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: pools.yml

- name: Create CephFS + MDS + ceph-csi subvolumegroup
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: cephfs.yml

- name: Deploy RGW (S3 object storage) on first node
  hosts: baremetal[0]
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: rgw.yml

- name: Create cephx users for ceph-csi (run-once)
  hosts: baremetal
  become: true
  run_once: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: users.yml

- name: Emit vault-encrypted ceph-csi bundle (run-once)
  hosts: baremetal
  become: true
  run_once: true
  tasks:
    - ansible.builtin.import_role:
        name: ceph
        tasks_from: output.yml
