---
# Creates a single VM template if it doesn't already exist.
# Required vars:
#   vm_template      – dict with id, name, image_url, image_file
#   vm_packages      – comma-separated package list for virt-customize --install
#   ansible_pubkey   – contents of ~/.ssh/ansible.pub on the controller

- name: "Check if VM template {{ vm_template.id }} exists"
  ansible.builtin.command: "qm status {{ vm_template.id }}"
  register: vm_status
  failed_when: false
  changed_when: false

- name: "Create VM template {{ vm_template.id }} ({{ vm_template.name }})"
  when: vm_status.rc != 0
  block:
    - name: "Check for existing cloud image for VM {{ vm_template.id }}"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "/tmp/{{ vm_template.image_file }}"
        - "/var/lib/vz/template/iso/{{ vm_template.image_file }}.iso"
      register: image_check

    - name: "Copy cloud image from template storage for VM {{ vm_template.id }}"
      ansible.builtin.copy:
        src: "/var/lib/vz/template/iso/{{ vm_template.image_file }}.iso"
        dest: "/tmp/{{ vm_template.image_file }}"
        remote_src: true
        mode: "0644"
      when:
        - not image_check.results[0].stat.exists
        - image_check.results[1].stat.exists

    # The default get_url timeout is 10s — too short for the TLS handshake
    # to the cloud-image CDN plus a multi-hundred-MB transfer over this
    # single-NIC homelab. Bump the socket timeout and retry transient
    # failures (handshake timeouts, slow mirrors) before giving up.
    - name: "Download cloud image for VM {{ vm_template.id }}"
      ansible.builtin.get_url:
        url: "{{ vm_template.image_url }}"
        dest: "/tmp/{{ vm_template.image_file }}"
        mode: "0644"
        timeout: 120
      when: not image_check.results[0].stat.exists and not image_check.results[1].stat.exists
      register: vm_image_dl
      until: vm_image_dl is succeeded
      retries: 5
      delay: 15

    - name: "Stage ansible SSH public key on PVE host"
      ansible.builtin.copy:
        content: "{{ ansible_pubkey }}"
        dest: /tmp/ansible.pub
        mode: "0644"

    # virt-customize flags execute in order: useradd must precede --ssh-inject.
    # Single invocation so the libguestfs appliance only boots once.
    - name: "Customize cloud image for VM {{ vm_template.id }}"
      ansible.builtin.command:
        argv:
          - virt-customize
          - -a
          - "/tmp/{{ vm_template.image_file }}"
          - --install
          - "{{ vm_packages }}"
          - --run-command
          - id -u ansible >/dev/null 2>&1 || useradd -m -s /bin/bash -G sudo ansible
          - --ssh-inject
          - ansible:file:/tmp/ansible.pub
          - --write
          - "/etc/sudoers.d/90-ansible:ansible ALL=(ALL) NOPASSWD: ALL\n"
          - --chmod
          - "0440:/etc/sudoers.d/90-ansible"
          # cc_set_hostname runs after networking is already up, so the first
          # DHCPREQUEST goes out without option 12 and OPNsense dnsmasq has
          # nothing to register. Renewing the lease in runcmd (cloud-final
          # stage) re-sends the request once /etc/hostname is in place.
          - --write
          - |
            /etc/cloud/cloud.cfg.d/99-renew-dhcp-after-hostname.cfg:runcmd:
              - [sh, -c, "if systemctl is-active --quiet systemd-networkd; then networkctl renew --all || true; elif pgrep -x dhclient >/dev/null; then dhclient -r || true; dhclient || true; fi"]
          - --run-command
          - >-
            sed -ri
            -e 's/^#?PasswordAuthentication.*/PasswordAuthentication no/'
            -e 's/^#?KbdInteractiveAuthentication.*/KbdInteractiveAuthentication no/'
            /etc/ssh/sshd_config
      changed_when: true

    # Sysprep AFTER customize so the customize log lines get cleaned too.
    # `machine-id` reset is the load-bearing fix for the duplicate-DHCP-lease
    # bug. The explicit `--delete /var/lib/cloud/instances` drops cloud-init's
    # instance cache so first boot runs against the new instance-id (the
    # `cloud-init` operation only exists in libguestfs ≥ 1.50; use --delete
    # for portability across PVE versions).
    - name: "Sysprep cloud image for VM {{ vm_template.id }}"
      ansible.builtin.command:
        argv:
          - virt-sysprep
          - -a
          - "/tmp/{{ vm_template.image_file }}"
          - --operations
          - machine-id,ssh-hostkeys,bash-history,logfiles,udev-persistent-net,net-hostname
          - --delete
          - /var/lib/cloud/instances
      changed_when: true

    - name: "Create VM {{ vm_template.id }}"
      ansible.builtin.command: >
        qm create {{ vm_template.id }}
        --name {{ vm_template.name }}
        --memory 2048
        --cores 2
        --cpu qemu64 --kvm 0
        --net0 virtio,bridge=vmbr0
        --scsihw virtio-scsi-single
      changed_when: true

    - name: "Import disk for VM {{ vm_template.id }}"
      ansible.builtin.command: >
        qm importdisk {{ vm_template.id }}
        /tmp/{{ vm_template.image_file }} vms
      changed_when: true

    - name: "Configure VM {{ vm_template.id }}"
      ansible.builtin.command: "{{ item }}"
      loop:
        - "qm set {{ vm_template.id }} --virtio0 vms:vm-{{ vm_template.id }}-disk-0,cache=writeback,iothread=1"
        - "qm set {{ vm_template.id }} --boot order=virtio0"
        - "qm set {{ vm_template.id }} --agent enabled=1"
        - "qm set {{ vm_template.id }} --ide2 vms:cloudinit"
      changed_when: true

    - name: "Convert VM {{ vm_template.id }} to template"
      ansible.builtin.command: "qm template {{ vm_template.id }}"
      changed_when: true

    - name: "Move cloud image to template storage"
      ansible.builtin.command: >
        mv /tmp/{{ vm_template.image_file }}
        /var/lib/vz/template/iso/{{ vm_template.image_file }}.iso
      changed_when: true
