---
# Forms a k3s embedded-etcd HA cluster from groups `kube_control_plane` and
# `kube_workers`. The first CP runs `k3s server --cluster-init`; the others
# join via `--server <k3s_api_endpoint>`, which resolves to the kube-vip VIP
# when enabled. The VIP is brought up on the first CP after init so subsequent
# joiners have a stable endpoint. Idempotent — re-running on a healthy cluster
# is a no-op; appending a worker joins it on the next run.
#
# Pre-conditions:
#   - kube VMs provisioned (`tofu apply`) and reachable as the `ansible` user
#   - vault_k3s_cluster_token set in group_vars/all/vault.yml
#   - first-CP hostname resolves on the LAN (dnsmasq dynamic DNS handles this
#     once the VM has DHCP'd at least once)
#   - k3s_kube_vip_address (in group_vars/kubernetes.yml) is a free address
#     on the same L2 segment as the control planes when kube-vip is enabled
#
# SINGLE-HOST / --limit SEMANTICS (read before piecemeal runs):
#
#   The "first control plane" is ALWAYS groups['kube_control_plane'][0]
#   — the inventory-wide first member, computed from the full inventory,
#   NOT from the --limit / serial subset. This is deliberate and MUST
#   NOT be changed to elect from the limited set: electing the
#   first-host-within-a-limit would let `--limit kube-ctl-03` run
#   `--cluster-init` and bootstrap a SECOND, split-brain cluster.
#   Election is therefore stable and idempotent under any --limit.
#
#   Consequences when scoping a run with --limit:
#     - --limit <first-CP>            → inits (or no-ops if already up).
#     - --limit <other-CP/worker>     → takes the JOIN/agent path. This
#       only succeeds if the cluster is ALREADY up: the joiner waits on
#       the API endpoint with the role's 60×10s gate (a legitimate full
#       bootstrap genuinely needs minutes for etcd/kube-vip to settle —
#       which is exactly why a short fast-fail probe is NOT added here:
#       it could not tell "cluster down" from "cluster still settling"
#       without false-failing real bootstraps). If the cluster is not up
#       and the first CP is not in the run, expect the gate to exhaust
#       (~10 min) then fail — bring the first CP up first.
#     - the "Fetch kubeconfig" play targets the literal host pattern
#       kube_control_plane[0]; under a --limit that excludes the first
#       CP it matches no hosts and is SILENTLY skipped (no kubeconfig is
#       refreshed). Expected, not a failure.
#
#   Rule of thumb for piecemeal dev: bring the cluster up once without
#   --limit (or `--limit <first-CP>`), then iterate on any single other
#   node freely — joins/agents are idempotent against a live cluster.

- name: Initialize k3s on first control plane
  hosts: kube_control_plane
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: k3s
        tasks_from: server_init.yml
      when: inventory_hostname == groups['kube_control_plane'][0]

- name: Deploy kube-vip on first control plane
  hosts: kube_control_plane
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: k3s
        tasks_from: kube_vip.yml
      when:
        - k3s_kube_vip_enabled | bool
        - inventory_hostname == groups['kube_control_plane'][0]

- name: Join remaining control planes
  hosts: kube_control_plane
  become: true
  serial: 1
  tasks:
    - ansible.builtin.import_role:
        name: k3s
        tasks_from: server_join.yml
      when: inventory_hostname != groups['kube_control_plane'][0]

- name: Install k3s agent on workers
  hosts: kube_workers
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: k3s
        tasks_from: agent.yml

- name: Fetch kubeconfig to controller
  hosts: kube_control_plane[0]
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: k3s
        tasks_from: fetch_kubeconfig.yml
