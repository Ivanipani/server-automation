---
# Configures OPNsense dnsmasq: general settings, LAN DHCP range, and static
# DHCP+DNS reservations for Proxmox baremetal hosts. Idempotent.
#
# Pre-condition: OPNsense API credentials in vault as `vault_opnsense_api_key`
# and `vault_opnsense_api_secret`. Create them in the OPNsense GUI:
# System -> Access -> Users -> (your user) -> API keys -> +.
#
# Talks to the OPNsense API from the controller; no SSH into the router.
- name: Show interpreter
  hosts: router
  gather_facts: false
  connection: local
  tasks:
    - name:
      debug:
        var: ansible_playbook_python

- name: Configure OPNsense dnsmasq for baremetal
  hosts: router
  gather_facts: false
  connection: local
  module_defaults:
    group/oxlorg.opnsense.dnsmasq:
      firewall: "{{ ansible_host }}"
      api_key: "{{ opnsense_api_key }}"
      api_secret: "{{ opnsense_api_secret }}"
      ssl_verify: false
  vars:
    dnsmasq_static_leases: "{{ proxmox_control_nodes + switch_nodes }}"
    # Auto-register DHCP-leased VMs/CTs as <hostname>.lan in DNS so cloned
    # nodes are reachable by name without static reservations.
    dnsmasq_register_dynamic_dns: true
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  roles:
    - role: opnsense-dnsmasq
