---
# Firewall configuration for all poochella guests.
#
# Default-deny incoming, allow outgoing EXCEPT SSH out, with PER-GROUP
# inbound allowances. The per-group policy is GROUP-DRIVEN, not
# host-enumerated: each LEAF group owns its open ports in
# group_vars/<group>.yml as `firewall_inbound_allow`. This playbook is a
# thin, host-agnostic loop — there are no host/port maps here anymore.
#
#   Consequences of group-driven:
#     - adding/uncommenting a host inherits its group's policy with zero
#       edits to this file;
#     - an empty group (e.g. `databases` until a DB VM exists) simply
#       opens nothing;
#     - the port rationale lives WITH the data (single source of truth).
#
#   Leaf groups & where their policy lives:
#     dev                -> group_vars/dev.yml
#     databases          -> group_vars/databases.yml
#     kube_control_plane -> group_vars/kube_control_plane.yml
#     kube_workers       -> group_vars/kube_workers.yml
#     webservers         -> group_vars/webservers.yml
#     dns                -> group_vars/dns.yml
#   (k3s port rationale + the firewall-basic source-CIDR STOPGAP note
#    now live in group_vars/kube_*.yml.)
#
# Precedence is unambiguous: a VM in nested groups (e.g. kube-ctl-01 in
# kube_control_plane -> kubernetes -> virtual-machines) resolves
# `firewall_inbound_allow` from the MOST-SPECIFIC group that defines it.
# Only LEAF groups define it (the parent groups virtual-machines /
# kubernetes / containers leave it unset), so exactly one value is ever
# in scope — there is no merge or clobber to reason about.
#
# The k3s ports MUST be open before 40-kube/20-k3s.yml runs so the
# cluster can form behind this default-deny-incoming firewall (this
# playbook runs earlier, in tier 30-guests).

# Virtual machines (dev, databases, kube_control_plane, kube_workers).
- hosts: virtual-machines
  become: true
  roles:
    - role: firewall-basic
      vars:
        inbound_allow: "{{ firewall_inbound_allow | default([]) }}"
        outbound_deny:
          # Uniform fleet baseline: no lateral SSH out from a guest.
          - { port: 22, proto: tcp }

# Containers / LXCs (webservers, dns).
- hosts: containers
  become: true
  roles:
    - role: firewall-basic
      vars:
        inbound_allow: "{{ firewall_inbound_allow | default([]) }}"
        outbound_deny:
          - { port: 22, proto: tcp }
