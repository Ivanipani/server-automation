---
# Phase 0: Ensure every Proxmox node has its own VM/LXC templates before
# Tofu provisioning. Idempotent — safe to re-run.
#
# BAKE-PER-NODE: VM storage is node-local LVM-thin and Proxmox nodes are
# independent (per-group topology; see inventory.yaml). The old
# bake-once-then-`qm migrate`-to-peers optimization required a cluster
# (migrate won't cross independent nodes), so it is gone — every node in
# `baremetal` downloads, customizes, syspreps and templatizes its OWN
# images locally. tasks/distribute-templates-to-node.yml is kept on disk
# as dormant reference (no longer wired here).
#
# Cost: each node repeats the download + virt-customize. To keep the
# result deterministic across nodes and across time, the cloud image
# URLs are PINNED to dated upstream snapshots (not the moving `/latest/`
# // `/current/` paths). Re-pin = bump the URL + image_file together (the
# versioned image_file busts the per-node ISO cache so the new image is
# actually re-fetched).
#
# Per-node IDs come from the explicit `template_vm_ids` /
# `template_ct_ids` maps in inventory.yaml (single source of truth, also
# read by tofu/locals.tf). Each node's value is its *anchor* (first
# template) ID; the per-image-family templates are anchor+0, anchor+1, …
# in vm_templates_base / lxc_templates_base order. VMIDs only need to be
# unique per node now (independent nodes), but distinct anchors stay
# harmless and keep the maps stable if a cluster is ever formed.
#
# Templates bake in the `ansible` user (passwordless sudo + SSH key from
# ~/.ssh/ansible.pub on the controller) and reset machine-id / SSH host
# keys so every clone gets a unique DHCP client-id and host identity.
#
# Pre-condition: 03b-provision-storage.yml has run (the `vms` LVM-thin
# storage exists on every node — the imported disk lands on it).
#
# Flags:
#   build_lxc_templates      – run the LXC template build phase.
#   build_vm_templates       – run the VM template build phase.
#   purge_existing_templates – destroy this node's existing VM/LXC
#                              templates before recreating them. DEFAULT
#                              false: a re-run (incl. site.yml) is then
#                              idempotent and non-destructive — the
#                              per-template status checks short-circuit
#                              and existing templates are left untouched.
#                              Opt in (`-e purge_existing_templates=true`)
#                              ONLY for a deliberate clean rebuild, e.g.
#                              after re-pinning an image. A failed
#                              download mid-purge leaves the node with no
#                              template, so this is never the site.yml
#                              default.
#   purge_cached_images      – wipe this node's cached cloud images on
#                              local ISO storage so the next run
#                              re-downloads fresh upstream and re-bakes.
#
# After re-baking, re-provision any existing clones via
# 05-provision-infrastructure.yml.

- name: Bake VM/LXC templates on every Proxmox node (independent)
  hosts: baremetal
  gather_facts: false
  become: true
  vars:
    lxc_templates_base:
      - hostname: debian-13-lxc-template
        image: debian-13-standard_13.1-2_amd64.tar.zst
      - hostname: ubuntu-24-lxc-template
        image: ubuntu-24.04-standard_24.04-2_amd64.tar.zst
    # PINNED upstream cloud images (dated snapshots, NOT /latest/ //
    # /current/). image_file carries the version so re-pinning forces a
    # fresh download instead of reusing the stale cached ISO.
    vm_templates_base:
      - name: debian-13-template
        image_url: https://cloud.debian.org/images/cloud/trixie/20260518-2482/debian-13-genericcloud-amd64-20260518-2482.qcow2
        image_file: debian-13-genericcloud-amd64-20260518-2482.qcow2
      - name: ubuntu-24-template
        image_url: https://cloud-images.ubuntu.com/noble/20260323/noble-server-cloudimg-amd64.img
        image_file: noble-server-cloudimg-amd64-20260323.img
    build_lxc_templates: false
    build_vm_templates: true
    # Non-destructive by default: re-runs (and site.yml) leave existing
    # templates intact. Opt in for a deliberate clean rebuild only:
    #   -e purge_existing_templates=true
    purge_existing_templates: false
    # Wipe the cached customized cloud images so the next run re-bakes.
    purge_cached_images: false
    ansible_pubkey: "{{ lookup('file', '~/.ssh/ansible.pub') }}"
    lxc_packages: openssh-server curl wget sudo rsync htop
    vm_packages: qemu-guest-agent,curl,wget,sudo,rsync,htop

  pre_tasks:
    - name: Ensure ansible SSH keypair exists on controller
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f ~/.ssh/ansible -N ""
        creates: ~/.ssh/ansible
      delegate_to: localhost
      become: false
      run_once: true

    - name: Derive this node's VM template list (anchor + index)
      ansible.builtin.set_fact:
        vm_templates: "{{ vm_templates | default([]) + [tmpl | combine({'id': (template_vm_ids[inventory_hostname] | int) + idx})] }}"
      loop: "{{ vm_templates_base }}"
      loop_control:
        loop_var: tmpl
        index_var: idx
        label: "{{ tmpl.name }} → {{ (template_vm_ids[inventory_hostname] | int) + idx }}"

    - name: Derive this node's LXC template list (anchor + index)
      ansible.builtin.set_fact:
        lxc_templates: "{{ lxc_templates | default([]) + [tmpl | combine({'id': (template_ct_ids[inventory_hostname] | int) + idx})] }}"
      loop: "{{ lxc_templates_base }}"
      loop_control:
        loop_var: tmpl
        index_var: idx
        label: "{{ tmpl.hostname }} → {{ (template_ct_ids[inventory_hostname] | int) + idx }}"

    - name: Purge cached VM cloud images (ISO storage)
      ansible.builtin.file:
        path: "/var/lib/vz/template/iso/{{ item.image_file }}.iso"
        state: absent
      loop: "{{ vm_templates }}"
      loop_control:
        label: "{{ item.image_file }}"
      when:
        - build_vm_templates | bool
        - purge_cached_images | bool

  tasks:
    # ── Purge this node's existing templates (clean rebuild) ───────────

    - name: Destroy this node's existing VM templates
      ansible.builtin.command: "qm destroy {{ item.id }} --purge"
      loop: "{{ vm_templates }}"
      loop_control:
        label: "{{ item.name }} ({{ item.id }})"
      register: vm_destroy
      changed_when: vm_destroy.rc == 0
      failed_when:
        - vm_destroy.rc != 0
        - "'does not exist' not in vm_destroy.stderr"
      when:
        - build_vm_templates | bool
        - purge_existing_templates | bool

    - name: Destroy this node's existing LXC templates
      ansible.builtin.command: "pct destroy {{ item.id }} --purge"
      loop: "{{ lxc_templates }}"
      loop_control:
        label: "{{ item.hostname }} ({{ item.id }})"
      register: lxc_destroy
      changed_when: lxc_destroy.rc == 0
      failed_when:
        - lxc_destroy.rc != 0
        - "'does not exist' not in lxc_destroy.stderr"
      when:
        - build_lxc_templates | bool
        - purge_existing_templates | bool

    # ── LXC templates ──────────────────────────────────────────────────

    - name: Build LXC templates
      when: build_lxc_templates | bool
      block:
        - name: Update PVE appliance catalog
          ansible.builtin.command: pveam update
          changed_when: true

        - name: Check available LXC images
          ansible.builtin.command: pveam list local
          register: pveam_list
          changed_when: false

        - name: Download LXC base images
          ansible.builtin.command: "pveam download local {{ item.image }}"
          loop: "{{ lxc_templates }}"
          when: item.image not in pveam_list.stdout
          changed_when: true

        - name: Create LXC templates
          ansible.builtin.include_tasks: tasks/create-lxc-template.yml
          loop: "{{ lxc_templates }}"
          loop_control:
            loop_var: lxc_template

    # ── VM templates ───────────────────────────────────────────────────

    - name: Build VM templates
      when: build_vm_templates | bool
      block:
        - name: Ensure libguestfs-tools is installed
          ansible.builtin.apt:
            name: libguestfs-tools
            state: present

        - name: Create VM templates
          ansible.builtin.include_tasks: tasks/create-vm-template.yml
          loop: "{{ vm_templates }}"
          loop_control:
            loop_var: vm_template
