---
# Build node-local LVM-thin storage from the carved partitions and
# register each as PVE storage. Replaces the old Ceph bootstrap
# (03b-install-ceph.yml) in the infra run order — the storage IDs
# (`vms`, `longhorn-data`) are a frozen contract so Tofu and the template
# playbooks need no datastore changes.
#
# Nodes are INDEPENDENT (no shared pmxcfs): /etc/pve/storage.cfg is
# per-node, so the PVE storage entries are registered on EVERY node, each
# derived from that host's declared `storage.pools` and scoped to itself.
#
# Pre-conditions:
#   - 03-partition-disks.yml completed (the by-partlabel devices for each
#     declared pool exist on every baremetal node)

- name: Build LVM-thin pools on every baremetal node
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: storage_pools.yml

- name: Register PVE storage on each node (per-node storage.cfg)
  hosts: baremetal
  become: true
  tasks:
    - name: Read the current storage.cfg
      ansible.builtin.command:
        cmd: "cat /etc/pve/storage.cfg"
      register: storage_cfg
      changed_when: false

    - name: Register each declared pool as PVE lvmthin storage
      ansible.builtin.command: >-
        pvesm add lvmthin {{ item.pve_storage }}
        --vgname {{ item.vg }} --thinpool {{ item.thinpool }}
        --content {{ item.content }}
        --nodes {{ inventory_hostname }}
      loop: "{{ storage.pools }}"
      loop_control:
        label: "{{ item.pve_storage }} (vg={{ item.vg }})"
      when: "'lvmthin: ' + item.pve_storage not in storage_cfg.stdout"
      changed_when: true
