---
# Realise each baremetal node's declared `storage.pools` (inventory.yaml)
# as GPT partitions, then 03b-provision-storage.yml turns each into a
# node-local LVM-thin pool + PVE storage. Per pool the backing is either:
#   - boot_tail  → carve `size` at the end of the PVE boot disk (root/swap
#     — the first ~100 GiB — is already the `pve` VG from the installer's
#     `lvm.hdsize = 100`)
#   - whole_disk → claim the entire disk named by /dev/disk/by-id
#
# DECLARED, NOT DISCOVERED: preflight refuses to run unless every declared
# by_id is physically present (and not the boot disk). A hardware swap
# means a new by_id — update inventory.yaml first, then re-run.
#
# DESTRUCTIVE on first run. Refuses unless `confirm_carve_data_disk: true`
# is set per host. Idempotent on the GPT partlabel, so re-runs are safe.
#
# Pre-conditions:
#   - 02-bootstrap-hypervisor.yml completed (ansible user, repos staged)
#   - PVE installed with LVM/ext4 root AND `lvm.hdsize = 100` so the boot
#     disk has an unpartitioned tail for any boot_tail pools. See the
#     answer files under scripts/images/proxmox/pve-home-0X.toml.
#   - `storage.pools` declared for each baremetal host in inventory.yaml,
#     with real /dev/disk/by-id paths for whole_disk pools (`just disk-ids`)
#   - No VMs or containers exist yet on any node

- name: Disk preflight (gates + boot-disk detection + pool resolution)
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: preflight.yml

- name: Carve a GPT partition for each declared pool
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: carve.yml
