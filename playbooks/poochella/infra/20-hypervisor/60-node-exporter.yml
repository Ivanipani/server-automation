---
# Install Prometheus node_exporter on the Proxmox baremetal hosts.
#
# Baremetal day-2 service, like 50-tailscale.yml: depends on nothing
# past 10-bootstrap, nothing depends on it, idempotent, safe to run in
# isolation (`just run --limit pve-home-02`) for piecemeal dev. Last in
# the hypervisor tier so the critical storage→templates chain reads
# contiguously.
#
# Pre-condition: 10-bootstrap.yml has run (the `ansible` user with
# passwordless sudo exists; connects as `ansible`).

- name: Install Prometheus node_exporter on hypervisors
  hosts: baremetal
  become: true
  roles:
    - role: node-exporter
