---
# Node-local storage, end to end, in one playbook (the former
# partition-disks + provision-storage merged): for each baremetal
# node's declared `storage.pools` (inventory.yaml) it (1) preflights,
# (2) carves a GPT partition, (3) builds the LVM-thin pool, then
# (4) registers it as PVE storage. The storage IDs (`vms`,
# `longhorn-data`) are a FROZEN CONTRACT (tofu/modules/vm hardcodes
# them), so the 30-provision tier needs no datastore changes.
#
# Per pool the backing is either:
#   - boot_tail  → carve `size` at the end of the PVE boot disk (root/swap
#     — the first ~100 GiB — is already the `pve` VG from the installer's
#     `lvm.hdsize = 100`)
#   - whole_disk → claim the entire disk named by /dev/disk/by-id
#
# DECLARED, NOT DISCOVERED: preflight refuses to run unless every declared
# by_id is physically present (and not the boot disk). A hardware swap
# means a new by_id — update inventory.yaml first, then re-run.
#
# DESTRUCTIVE on first run (plays 1-2, the carve). Refuses unless
# `confirm_carve_data_disk: true` is set per host. Idempotent on the GPT
# partlabel and on the storage-id, so re-runs (incl. site.yml) are safe;
# plays 3-4 (LVM-thin build + `pvesm add`) are independently idempotent.
# Independent nodes ⇒ per-node /etc/pve/storage.cfg, registered scoped
# to `--nodes <self>`.
#
# A `whole_disk` target that still holds old signatures (stale GPT/MBR/
# FS/LVM) is REFUSED by default — clear it deliberately. To force it in
# one run (EXTRA-DESTRUCTIVE — `sgdisk --zap-all` + `wipefs -a` that
# disk): add `-e hypervisor_disks_force_wipe=true`. It still requires
# `confirm_carve_data_disk` and only ever wipes the validated, declared,
# non-boot whole_disk device. e.g.:
#   ansible-playbook --vault-password-file ansible-pass \
#     playbooks/poochella/infra/20-hypervisor/30-storage.yml \
#     -e hypervisor_disks_force_wipe=true --limit pve-home-02
#
# Pre-conditions:
#   - 20-hypervisor/10-bootstrap.yml completed (ansible user, repos staged)
#   - PVE installed with LVM/ext4 root AND `lvm.hdsize = 100` so the boot
#     disk has an unpartitioned tail for any boot_tail pools. See the
#     answer files under scripts/images/proxmox/pve-home-0X.toml.
#   - `storage.pools` declared for each baremetal host in inventory.yaml,
#     with real /dev/disk/by-id paths for whole_disk pools (`just disk-ids`)
#   - No VMs or containers exist yet on any node

- name: Disk preflight (gates + boot-disk detection + pool resolution)
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: preflight.yml

- name: Carve a GPT partition for each declared pool
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: carve.yml

- name: Build LVM-thin pools on every baremetal node
  hosts: baremetal
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: storage_pools.yml

- name: Register PVE storage on each node (per-node storage.cfg)
  hosts: baremetal
  become: true
  tasks:
    - name: Read the current storage.cfg
      ansible.builtin.command:
        cmd: "cat /etc/pve/storage.cfg"
      register: storage_cfg
      changed_when: false

    - name: Register each declared pool as PVE lvmthin storage
      ansible.builtin.command: >-
        pvesm add lvmthin {{ item.pve_storage }}
        --vgname {{ item.vg }} --thinpool {{ item.thinpool }}
        --content {{ item.content }}
        --nodes {{ inventory_hostname }}
      loop: "{{ storage.pools }}"
      loop_control:
        label: "{{ item.pve_storage }} (vg={{ item.vg }})"
      when: "'lvmthin: ' + item.pve_storage not in storage_cfg.stdout"
      changed_when: true
