---
# READ-ONLY companion to 30-storage.yml. Prints every baremetal node's
# disks (model / serial / size / rotational / removable / signatures /
# existing partlabels) plus a paste-ready `storage.disks` skeleton with
# STABLE selectors. Writes nothing — safe anytime.
#
# NOT part of the ordered site flow: 20-hypervisor/site.yml imports
# playbooks explicitly and deliberately does NOT list this one. Run it
# via `just disk-plan` after adding/swapping a disk, then update
# inventory.yaml by hand and re-run `just do-storage`.

- name: Disk plan (read-only)
  hosts: baremetal
  become: true
  gather_facts: false
  tasks:
    - ansible.builtin.import_role:
        name: hypervisor-disks
        tasks_from: discover.yml
