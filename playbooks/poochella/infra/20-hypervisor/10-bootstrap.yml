---
# Ensures the 'ansible' user exists on baremetal hypervisors.
# Tries SSH as 'ansible' first; falls back to root with vault password.
# Must run before any other playbook so later plays can connect as 'ansible'.
- name: Detect SSH user for baremetal
  hosts: baremetal
  gather_facts: false
  connection: local
  tasks:
    - name: Detect bootstrap user
      ansible.builtin.include_tasks:
        file: ../tasks/detect-bootstrap-user.yml
      vars:
        fallback_user: root

- name: Configure hypervisors for automated management
  hosts: baremetal
  become: true
  remote_user: "{{ bootstrap_user }}"
  vars:
    ansible_password: "{{ hypervisor_root_pass if use_root_password | default(false) else omit }}"
  roles:
    - role: hypervisor

# Tailscale is intentionally NOT installed here. It is a baremetal day-2
# service (not a bootstrap prerequisite — Ansible reaches hosts over the
# LAN, not the tailnet), kept in its own idempotent, standalone playbook
# (50-tailscale.yml) so it can be re-run in isolation for piecemeal dev
# (key rotation, re-auth) without re-running the whole hypervisor
# bootstrap. site.yml still runs it; so does `just do-hypervisor-init`.
