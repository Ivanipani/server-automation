---
- name: Provision infrastructure with OpenTofu
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Generate tfvars from inventory
      ansible.builtin.template:
        src: templates/infrastructure.auto.tfvars.j2
        dest: "{{ playbook_dir }}/../../tofu/infrastructure.auto.tfvars"
      tags: [gen-tfvars]

    - name: Run tofu init and apply
      community.general.terraform:
        project_path: "{{ playbook_dir }}/../../tofu"
        binary_path: tofu
        state: present
        force_init: true
      register: tofu_output

    - name: Show provisioned resources
      ansible.builtin.debug:
        msg: |
          VMs: {{ tofu_output.outputs.vm_ips.value | default({}) }}
          Containers: {{ tofu_output.outputs.container_ips.value | default({}) }}
