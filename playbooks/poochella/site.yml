---
# Assumes all servers defined in servers.yml have
# been created on Proxmox at their known IPs/hostnames
#
# Full poochella cluster setup — order of playbooks is significant

- import_playbook: apt-setup.yml

# Bootstrap SSH + sudo on all nodes (prerequisite for everything)
- import_playbook: init-ansible-global.yml

- import_playbook: sessions-and-shell.yml

- import_playbook: users.yml

# DNS infrastructure (Pi-hole + hypervisor resolv.conf)
- import_playbook: configure-dns-poochella.yml

# Firewall and networking
- import_playbook: firewall.yml

# Reverse proxy (Caddy on webservers)
- import_playbook: install-caddy.yml

