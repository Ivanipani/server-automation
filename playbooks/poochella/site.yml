---
# Assumes all servers defined in servers.yml have
# been created on Proxmox at their known IPs/hostnames
#
# Full poochella cluster setup — run playbooks in dependency order

# 1. Bootstrap SSH + sudo on all nodes (prerequisite for everything)
- import_playbook: init-ansible-global.yml

- import_playbook: proxmox-repos.yml

# 2. DNS infrastructure (Pi-hole + hypervisor resolv.conf)
- import_playbook: configure-dns-poochella.yml

# 3. Firewall and networking
- import_playbook: firewall.yml

# 4. Reverse proxy (Caddy on webservers)
- import_playbook: install-caddy.yml

