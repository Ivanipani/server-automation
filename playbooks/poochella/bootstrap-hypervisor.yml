---
# Ensures the 'ansible' user exists on baremetal hypervisors.
# Tries SSH as 'ansible' first; falls back to root with vault password.
# Must run before any other playbook so later plays can connect as 'ansible'.
- name: Detect SSH user for baremetal
  hosts: baremetal
  gather_facts: false
  connection: local
  tasks:
    - name: Check if ansible user can connect
      ansible.builtin.command:
        cmd: ssh -o BatchMode=yes -o ConnectTimeout=5 ansible@{{ ansible_host }} true
      register: ansible_ssh
      ignore_errors: true
      changed_when: false

    - name: Set bootstrap user
      ansible.builtin.set_fact:
        bootstrap_user: "{{ 'ansible' if ansible_ssh.rc == 0 else 'root' }}"
        use_root_password: "{{ ansible_ssh.rc != 0 }}"

    - name: "Bootstrap user for {{ inventory_hostname }}: {{ bootstrap_user }}"
      ansible.builtin.debug:
        msg: "Connecting as '{{ bootstrap_user }}' (ansible user {{ 'already exists' if ansible_ssh.rc == 0 else 'not yet created' }})"

- name: Configure Proxmox no-subscription repos
  hosts: baremetal
  become: true
  remote_user: "{{ bootstrap_user }}"
  vars:
    ansible_password: "{{ hypervisor_root_pass if use_root_password | default(false) else omit }}"
  tasks:
    - name: Remove Proxmox enterprise PVE repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        state: absent

    - name: Remove Proxmox enterprise Ceph repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/ceph.list
        state: absent

    - name: Add Proxmox no-subscription PVE repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.list
        content: "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription\n"
        mode: "0644"

    - name: Add Proxmox no-subscription Ceph repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/ceph-no-subscription.list
        content: "deb http://download.proxmox.com/debian/ceph-quincy bookworm no-subscription\n"
        mode: "0644"

    # - name: Stop apt-daily services to release lock
    #   ansible.builtin.systemd:
    #     name: "{{ item }}"
    #     state: stopped
    #   loop:
    #     - apt-daily.service
    #     - apt-daily-upgrade.service
    #     - apt-daily.timer
    #     - apt-daily-upgrade.timer
    #   failed_when: false
    #
    - name: Kill any running apt/dpkg processes
      ansible.builtin.shell: |
        pkill -9 -x apt || true
        pkill -9 -x apt-get || true
        pkill -9 -x dpkg || true
        rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock
        dpkg --configure -a
      changed_when: true

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true


- name: Install sudo (needed on fresh Proxmox hosts)
  hosts: baremetal
  become: true
  remote_user: "{{ bootstrap_user }}"
  vars:
    ansible_password: "{{ hypervisor_root_pass if use_root_password | default(false) else omit }}"
  tasks:
    # - name: Print all available facts
    #   ansible.builtin.debug:
    #     var: ansible_facts
    - name: Install sudo
      ansible.builtin.apt:
        name: sudo
        state: present

- name: Bootstrap ansible user (baremetal)
  hosts: baremetal
  become: true
  remote_user: "{{ bootstrap_user }}"
  vars:
    ansible_password: "{{ hypervisor_root_pass if use_root_password | default(false) else omit }}"
  roles:
    - setup-ansible
