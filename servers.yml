webservers:
  hosts:
    caddy01:
      ansible_host: caddy01
      static_ip: true
      tofu_hostname: caddy01
      tofu_cores: 1
      tofu_memory: 512
      tofu_disk_size: 4
      tofu_tags: ["caddy", "webserver"]
    nginx01:
      ansible_host: nginx01
      tofu_cores: 1
      tofu_memory: 512
      tofu_disk_size: 8
      tofu_tags: ["nginx", "webserver"]

