webservers:
  hosts:
    caddy01:
      ansible_host: caddy01
      static_ip: true
      tofu_hostname: caddy01
      tofu_cores: 1
      tofu_memory: 512
      tofu_disk_size: 4
      tofu_tags: ["caddy", "webserver"]
    nginx01:
      ansible_host: webserver
      tofu_cores: 1
      tofu_memory: 512
      tofu_disk_size: 8
      tofu_tags: ["nginx", "webserver"]

virtual-machines:
  hosts:
    test01:
      ansible_host: test01
      ansible_python_interpreter: /usr/bin/python3
    devbox01:
      ansible_host: devbox01
      ansible_python_interpreter: /usr/bin/python3
      tofu_cores: 4
      tofu_memory: 4096
      tofu_disk_size: 40
      tofu_tags: ["dev", "ivan"]

containers:
  children:
    dns:
    webservers:
