all:
  vars:
    network_gateway: "10.1.1.1"
    network_cidr: "/24"

router:
  hosts:
    opnsense01:
      ansible_host: "10.1.1.1"
      # ansible_python_interpreter: /usr/local/bin/python3
      static_ip: true

baremetal:
  hosts:
    control01:
      ansible_host: "10.1.1.2"
      ansible_python_interpreter: /usr/bin/python3
      static_ip: true

