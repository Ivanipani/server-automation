[defaults]
inventory = inventory.yaml
roles_path = roles
timeout = 30
remote_user = ansible
private_key_file = ~/.ssh/ansible
host_key_checking = False


[privilege_escalation]
become_flags = -E

[ssh_connection]
pipelining = True  # Improves performance for SSH connections
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
# This homelab has a documented-fragile single 1GbE + a hardware
# crash-looping node, so SSH connections transiently drop mid-play
# ("Shared connection ... closed"). Keepalives hold idle/long-running
# connections (e.g. the 10-min k3s readiness waits) open across blips,
# and `retries` re-establishes a dropped connection instead of failing
# the host UNREACHABLE on the first hiccup.
ssh_args = -o ForwardAgent=yes -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=6 -o ConnectTimeout=30
retries = 3
